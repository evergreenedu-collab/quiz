eo quy định của luật giao thông đường bộ, hai câu nào sau đây giải thích đúng về ý nghĩa của đèn tín hiệu  giao thông?","c":["Khi đèn vàng nhấp nháy – Các phương tiện  chú ý quan sát các phương tiện giao thông khác và chỉ dẫn an toàn  khi lái xe.","Đèn đỏ bật lên - Người đi bộ vừa chú ý lối sang đường vừa đi bộ qua đường.","Tín hiệu mũi tên màu xanh bật lên – Các phương tiện có thể chạy theo hướng của mũi tên.","Đèn vàng bật lên - Nếu các phương tiện  đã tiến vào đường giao nhau thì phải dừng xe tại đường giao nhau."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":551,"b":"Theo Pháp lệnh Giao thông đường bộ, 2 phương tiện nào sau đây tương ứng với “xe ô tô”?","c":["Xe khoan (dạng chất trên xe tải)","Xe lu","Xe đạp","Xe đẩy trẻ em (chiều rộng trong 1m)"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":552,"b":"Theo Luật lệnh Giao thông đường bộ, 2 nội dung liên kết nào không đúng với tiêu chuẩn xử phạt người lái xe  ô tô (ngoại trừ phương tiện di chuyển cá nhân)?","c":["Người uống rượu lái xe có nồng độ cồn trong máu từ 0,2% trở lên - Phạt tù từ 1 năm đến 2 năm hoặc phạt tiền hình  sự tối đa 10 triệu Won","Người có hành vi gây nguy hiểm cho cộng đồng - Phạt tù tối đa 2 năm hoặc phạt tiền hình sự tối đa 5 triệu Won","Người lái xe phóng nhanh vượt ẩu - Phạt tù tối đa 1 năm hoặc phạt tiền hình sự tối đa 5 triệu Won","Người điều khiển xe đạp có gắn động cơ khi không có giấy phép lái xe - Phạt tiền hình sự tối đa 500.000 Won hoặc  tạm giam"],"a":"1, 4","imgs":[],"t":"문장형"},{"n":553,"b":"Theo quy định pháp luật giao thông đường bộ, 2 giải thích không phù hợp nhất về hành vi cản trở việc đo  nồng độ cồn?","c":["Trường hợp người được cho đang trong tình trạng say rượu nhưng vẫn cố ý uống thêm rượu với mục đích gây khó  khăn cho việc đo nồng độ cồn của cảnh sát","Trường hợp vi phạm hành vi cản trở việc đo nồng độ cồn sau khi lái ô tô, sẽ bị phạt tù tối đa 1 năm hoặc phạt tiền  tối đa 5 triệu won.","Trường hợp người được cho đang trong tình trạng say rượu nhưng vẫn sử dụng các vật phẩm do Bộ Hành chính và An  ninh quy định hoặc y dược phẩm mà có t","Trường hợp người được cho là đang trong tình trạng say rượu nhưng vẫn lái xe đạp rồi thực hiện hành vi cản trở việc  đo nồng độ cồn thì không bị coi l"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":554,"b":"Hai trường hợp nào sau đây xe ô tô con vi phạm tốc độ quy định trên đường theo Pháp lệnh Giao thông  đường bộ?","c":["Đang lái xe ở đường một chiều có 2 làn đường với tốc độ 85 km/giờ.","Đang lái xe ở đường cao tốc bờ biển Tây (đường cao tốc Seo Hae-an) với tốc độ 90 km/giờ.","Đang lái xe trên đường dành riêng cho xe ô tô với tốc độ 95 km/giờ.","Đang lái xe ở đường cao tốc một chiều có 1 làn đường với tốc độ 75 km/giờ."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":555,"b":"Hai giải thích nào là đúng về lề đường theo Pháp lệnh Giao thông đường bộ?","c":["Không có biểu thị ranh giới.","Được bố trí để tăng sự an toàn cho người đi bộ.","Được bố trí ở những đường không phân biệt giữa vỉa hè và lòng đường.","Không phải là đường."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":556,"b":"Giải thích nào đúng về ngoại lệ xử phạt theo Luật đặc biệt về Xử lý tai nạn giao thông?","c":["Người lái xe gây tai nạn nghiêm trọng làm thiệt hại về người do bất cẩn tuyệt đối không thể bị khởi tố nếu người đó  tham gia bảo hiểm tổng hợp.","Người lái xe gây tai nạn giao thông nghiêm trọng về người do bất cẩn trong công việc chắc chắn sẽ bị khởi tố, kể cả  khi nạn nhân đã đưa ra ý kiến rõ ","Nếu người lái xe bị xử phạt hình sự do gây tai nạn giao thông thì có thể bị phạt tù tối đa 5 năm hoặc phạt tiền hình  sự tối đa 20 triệu Won.","Người lái xe trong tai nạn giao thông gây thiệt hại về người do vượt quá 20 km/giờ so với vận tốc quy định không  bị khởi tố nếu đã tham gia bảo hiểm "],"a":"3","imgs":[],"t":"문장형"},{"n":557,"b":"Loại xe nào sau đây không được coi là xe lăn hỗ trợ người đi bộ (Chiều rộng trong vòng 1 mét) theo quy  định của Luật Giao thông Đường bộ?","c":["Xe lăn tay","Xe lăn điện","Xe trượt scooter dùng trong y tế","Xe đạp điện"],"a":"4","imgs":[],"t":"문장형"},{"n":558,"b":"Nội dung nào dưới đây đúng với giải thích về người mới lái xe theo Pháp lệnh Giao thông đường bộ?","c":["Người lái xe mới được định nghĩa là người chỉ có giấy phép lái xe hạng 1 phổ thông.","Người lái xe mới là người được cấp giấy phép lái xe máy dưới 2 năm.","Trường hợp được cấp lại giấy phép lái xe sau khi bị tước giấy phép lái xe lần đầu tiên trong vòng 2 năm bao gồm cả  thời gian trước khi bị hủy trong k","Người được cấp giấy phép lái xe lần đầu dưới 2 năm được coi là người lái xe mới."],"a":"4","imgs":[],"t":"문장형"},{"n":559,"b":"Điều nào sau đây đúng về tiêu chuẩn của xe đạp máy theo quy định của Luật Giao thông Đường bộ?","c":["Là tất cả các loại xe máy hai bánh.","Là xe máy hai bánh có dung tích xi lanh từ 250cc trở xuống theo Luật Quản lý xe ô tô.","Là xe có động cơ có dung tích xi lanh từ 150cc trở lên.","Là xe có động cơ có công suất tối đa từ 11kW trở xuống trong trường hợp sử dụng động cơ điện (ngoại trừ xe đạp điện)."],"a":"4","imgs":[],"t":"문장형"},{"n":560,"b":"Trường hợp nào không được xem là tai nạn giao thông theo Luật đặc biệt về Xử lý tai nạn giao thông?","c":["Trường hợp xe tải 4,5 tấn va chạm với xe ô tô chở khách khiến tài xế lái xe ô tô chở khách bị thương","Người đi bộ bị thương tích trên lối qua đường ray do bị tàu hỏa đâm","Người đi bộ đang băng qua lối sang đường dành cho người đi bộ thì bị va chạm với xe ô tô vi phạm tín hiệu giao  thông và người đi bộ bị thương","Đi xe đạp trên vỉa hè và va chạm với người đi bộ, gây ra thương tích cho người đi bộ"],"a":"2","imgs":[],"t":"문장형"},{"n":561,"b":"Theo Pháp lệnh Giao thông đường bộ, giải thích nào dưới đây đúng với màu sắc của vạch kẻ đường được bố  trí làm vạch kẻ ở các đoạn hoặc ở các vị trí trên đường?","c":["Màu trắng dành cho vạch phân cách, khu vực an toàn.","Màu vàng biểu thị làn đường dành riêng cho xe buýt và biểu thị khu vực an toàn.","Màu đỏ biểu thị cấm dừng - đỗ xe quanh cơ sở chữa cháy.","Màu đỏ biểu thị khu vực an toàn và cấm dừng - đỗ xe, cấm đỗ xe."],"a":"3","imgs":[],"t":"문장형"},{"n":562,"b":"Giải thích nào đúng về vượt lên trước theo Pháp lệnh Giao thông đường bộ?","c":["Trường hợp có xe khác ở phía bên phải của xe trước đang chạy song song với xe trước, không được vượt.","Ở các đường hầm mới xây dựng gần đây, trên cầu, đường giao nhau, có thể vượt.","Khi người điều khiển xe chạy qua phía bên trái của một xe khác đang ở phía trước thì có nghĩa là đang đi trước xe  khác đó.","Xe ô tô con đang lưu thông trên làn đường dành riêng cho xe buýt của đường cao tốc được phép vượt."],"a":"3","imgs":[],"t":"문장형"},{"n":563,"b":"Loại xe nào không được coi là “xe ô tô” theo định nghĩa của “Pháp lệnh Giao thông đường bộ”?","c":["Xe ô tô con","Xe đạp","Xe ô tô đặc chủng","Xe chở khách"],"a":"2","imgs":[],"t":"문장형"},{"n":564,"b":"Theo Luật Đặc biệt về Xử lý tai nạn giao thông, nội dung nào dưới đây là tai nạn giao thông vi phạm tốc độ  có thể khởi kiện ngược lại ý kiến của người bị tai nạn đã đưa ra?","c":["Tai nạn giao thông xảy ra khi đang lưu thông với tốc độ 110 km/giờ trên đường cao tốc có tốc độ tối đa 100 km/giờ","Tai nạn giao thông xảy ra khi đang lưu thông với tốc độ 95 km/giờ trên đường thông thường có 3 làn xe một chiều  có tốc độ tối đa 80 km/giờ","Tai nạn giao thông xảy ra khi đang lưu thông với tốc độ 100 km/giờ trên đường dành riêng cho xe ô tô có tốc độ tối  đa 90 km/giờ","Tai nạn giao thông xảy ra khi đang lưu thông với tốc độ 82 km/giờ trên đường thông thường có 1 làn xe một chiều  có tốc độ tối đa 60 km/giờ"],"a":"4","imgs":[],"t":"문장형"},{"n":565,"b":"Thứ tự sắp xếp nào là đúng với đèn tín hiệu giao thông nằm ngang 4 màu theo Pháp lệnh Giao thông đường bộ?","c":["Từ bên phải: đỏ → mũi tên xanh lá cây → vàng → xanh lá cây","Từ bên trái: đỏ → vàng → mũi tên xanh lá cây → xanh lá cây","Từ bên trái: vàng → đỏ → mũi tên xanh lá cây → xanh lá cây","Từ bên phải: mũi tên xanh lá cây → vàng → đỏ → xanh lá cây"],"a":"2","imgs":[],"t":"문장형"},{"n":566,"b":"Giấy tờ nào dưới đây không quyết định người lái xe có đáp ứng tiêu chuẩn của kỳ thi kiểm tra năng lực lái xe  theo Pháp lệnh Giao thông đường bộ?","c":["Bản thông báo kết quả kiểm tra sức khỏe theo Luật Bảo hiểm y tế quốc dân","Phiếu chẩn đoán được bác sĩ cấp theo Luật Y tế","Giấy thông báo kết quả kiểm tra sức khỏe nghĩa vụ quân sự theo Luật Nghĩa vụ quân sự","Bản kết quả kiểm tra thị lực được cấp bởi Chủ tịch Hiệp hội Kỹ thuật viên đo mắt Hàn Quốc"],"a":"4","imgs":[],"t":"문장형"},{"n":567,"b":"Phương tiện nào sau đây có thể được Giám đốc Sở Cảnh sát tỉnh - thành phố chỉ định là xe ô tô cứu hộ khẩn  cấp theo đăng ký của cá nhân hoặc cơ quan v.v. sử dụng?","c":["Xe chở máu cung cấp","Xe dùng cho cảnh sát để điều tra tội phạm, kiểm soát giao thông và các loại xe khác được dùng cho việc thi hành  công vụ khẩn cấp của cảnh sát","Xe được dùng cho công việc kiểm soát sóng điện từ","Xe được dùng để điều tra tội phạm trong các loại xe của cơ quan điều tra"],"a":"3","imgs":[],"t":"문장형"},{"n":568,"b":"Hai hạng mục nào là đúng mà xe ô tô khẩn cấp cần tuân thủ theo Pháp lệnh Giao thông đường bộ?","c":["Xe ô tô khẩn cấp dùng để kiểm soát vi phạm tốc độ phải là phương tiện có cấu trúc tuân theo \"tiêu chuẩn vận hành  phương tiện an toàn\".","Xe ô tô khẩn cấp làm nhiệm vụ hộ tống các nhân vật VIP trong và ngoài nước không phải bật còi hú hoặc đèn báo.","Xe ô tô thông thường không thể coi là phương tiện khẩn cấp, kể cả nếu đèn pha trước hay đèn khẩn cấp được bật  lên với mục đích khẩn cấp.","Về nguyên tắc, các phương tiện khẩn cấp phải bật còi báo động hoặc bật đèn nhấp nháy thì mới được ưu tiên lưu  thông và được áp dụng các quy định đặc "],"a":"2, 4","imgs":[],"t":"문장형"},{"n":569,"b":"Hai nội dung nào dưới đây là định ngữ đúng theo Luật Giao thông đường bộ?","c":["\"Làn đường\" là phần đường được thể hiện ranh giới bằng cách sử dụng gờ vỉa hè, biển báo an toàn hoặc cấu trúc  tương tự để tất cả các phương tiện đều ","\"Vạch phân làn\" là vạch biểu thị ranh giới phân chia các làn xe như một loại biển báo an toàn.","\"Đường xe chạy\" là phần đường được phân ra thành các làn để các phương tiện thô sơ và cơ giới lưu thông ở phần  đường đã được quy định theo một hàng.","\"Vỉa hè\" là phần đường được biểu thị ranh giới bằng gờ để người đi bộ có thể lưu thông."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":570,"b":"Giải thích nào là không đúng về cách lưu thông của xe đạp theo Pháp lệnh Giao thông đường bộ?","c":["Ở đường có phân cách lề đường & lòng đường, xe đạp phải lưu thông trên lòng đường.","Khi muốn rẽ phải ở đoạn đường giao nhau, phải đi chậm sát mép đường bên phải rồi rẽ phải.","Khi muốn rẽ trái ở đoạn đường giao nhau, phải đi sát vào mép đường bên trái hoặc chạy giữa đường rồi rẽ trái.","Ở nơi có đường dành riêng cho xe đạp thì xe đạp phải lưu thông trên đường dành riêng đó."],"a":"3","imgs":[],"t":"문장형"},{"n":571,"b":"Giải thích nào đúng với định nghĩa thuật ngữ theo Pháp lệnh Giao thông đường bộ?","c":["“Đường dành riêng cho xe ô tô” là đường chỉ dành cho xe ô tô lưu thông.","“Đường xe đạp” là đường chỉ dành cho xe đạp lưu thông, có đánh dấu ranh giới bằng biển báo an toàn, hàng rào  chắn phòng tránh nguy hiểm hoặc công trì","“Xe ô tô, v.v” tức là bao gồm xe ô tô và xe súc vật kéo.","“Xe đạp, v.v” tức là bao gồm xe đạp và xe đạp điện."],"a":"1","imgs":[],"t":"문장형"},{"n":572,"b":"Nội dung nào không phải là điều mà người điều khiển thiết bị di chuyển cá nhân phải tuân thủ theo Pháp  lệnh Giao thông đường bộ?","c":["Có thể điều khiển thiết bị di chuyển cá nhân mà không cần lấy bằng lái.","Không được chở người đi cùng vượt quá số người cho phép.","Người điều khiển phải trang bị dụng cụ bảo hộ khi điều khiển thiết bị.","Ở nơi có đường dành riêng cho xe đạp thì phải lưu thông trên đường dành riêng này."],"a":"1","imgs":[],"t":"문장형"},{"n":573,"b":"Người nào sau đây không được phép đi xe đạp trên vỉa hè theo Luật Giao thông đường bộ?","c":["Người đã đăng ký là người khuyết tật thân thể theo “Luật Phúc lợi dành cho người khuyết tật”","Trẻ em","Người đang bị bó bột do chấn thương trên cơ thể","Người có công với đất nước là thương binh từ bậc 1 đến bậc 7 theo “Luật Ưu tiên và chế độ đãi ngộ đối với người  có công với đất nước”"],"a":"3","imgs":[],"t":"문장형"},{"n":574,"b":"Cách nào lái xe an toàn nhất khi có người dắt theo xe đạp và băng qua làn đường xe chạy ở phía trước?","c":["Tận dụng không gian trái phải của xe đạp đang băng qua đường và chạy nhanh qua.","Nhấn còi xe và bật đèn pha trước để thông báo có xe đang tiến đến.","Giữ khoảng cách nhất định với nơi xe đạp đang băng qua đường và tạm dừng.","Người điều khiển xe ô tô có quyền ưu tiên nên phải làm cho người đang băng qua đường dừng lại."],"a":"3","imgs":[],"t":"문장형"},{"n":575,"b":"Theo Pháp lệnh Giao thông đường bộ, bị phạt bao nhiêu tiền trong trường hợp đi xe đạp trên con đường  hẹp không bố trí làn xe trong khu vực bảo vệ trẻ em, không giảm tốc độ và không giữ khoảng cách an","c":["100.000 Won","80.000 Won","40.000 Won","20.000 Won"],"a":"3","imgs":[],"t":"문장형"},{"n":576,"b":"Theo Pháp lệnh Giao thông đường bộ, thiết bị nào sau đây không phải là thiết bị trò chơi có độ nguy hiểm  cao mà trẻ em khi điều khiển trên đường phải sử dụng dụng cụ bảo hộ theo quy định bộ ngành hàn","c":["Kickboard","Xe điện hai bánh","Giày trượt patin","Ván trượt"],"a":"2","imgs":[],"t":"문장형"},{"n":577,"b":"Theo Pháp lệnh Giao thông đường bộ, hai giải thích nào là đúng về cách lưu thông trên đường của xe đạp?","c":["Ngoại trừ trường hợp cho phép lưu thông bằng biển báo an toàn, người lái xe đạp không được đi song song 2 xe  đạp trở lên trên đường.","Người lái xe đạp khi sử dụng lối sang đường để sang đường thì phải xuống và dắt xe đi.","Trường hợp người đi xe đạp không thể đi qua đoạn đường bị hỏng, đoạn đường đang sửa chữa thì cũng không  được phép đi trên vỉa hè.","Người đi xe đạp phải đi sát vào vạch phân cách giữa đường ở những nơi không có đường dành riêng cho xe đạp."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":578,"b":"Theo Luật thúc đẩy sử dụng xe đạp, người giám hộ không được phép để trẻ em dưới ( ) tuổi điều khiển xe  đạp điện. Độ tuổi nào đúng trong ( )?","c":["10","13","15","18"],"a":"2","imgs":[],"t":"문장형"},{"n":579,"b":"Theo Pháp lệnh Giao thông đường bộ, hành vi nào không phù hợp với cách lưu thông của xe đạp?","c":["Rẽ trái từ làn đường trong cùng bên trái của hướng đang lưu thông.","Đi trên vỉa hè vì có công trình sửa chữa đường hỏng.","Xuống dắt xe đi qua khi sử dụng vạch đi bộ sang đường.","Đi chậm để phòng ngừa tai nạn cho người đi bộ."],"a":"1","imgs":[],"t":"문장형"},{"n":580,"b":"Theo Pháp lệnh Giao thông đường bộ, người đi xe đạp cần tuân thủ nội dung nào sau đây?","c":["Phải đi chậm và tạm dừng khi cản trở lưu thông của người đi bộ.","Trường hợp trẻ em đi xe đạp thì không được đi trên vỉa hè.","Không được dắt xe đi trong khu vực cấm xe đạp lưu thông.","Trong khu vực mép lề đường, 2 xe đạp có thể đi song song hàng ngang."],"a":"1","imgs":[],"t":"문장형"},{"n":581,"b":"Nội dung nào không phù hợp nhất khi nói về phương pháp lưu thông trên đường của người lái xe đạp (ngoại  trừ xe đạp điện) theo Pháp lệnh Giao thông đường bộ?","c":["Trẻ em đi xe đạp trên vỉa hè","Đi xe đạp trên vỉa hè khi có biển báo an toàn cho phép người đi xe đạp","Đi xe đạp trên vỉa hè vì lòng đường bị hư hại","Đi xe đạp ở giữa đường vì xung quanh không có ô tô"],"a":"4","imgs":[],"t":"문장형"},{"n":582,"b":"Giải thích nào là không đúng về người điều khiển thiết bị di chuyển cá nhân theo Pháp lệnh Giao thông  đường bộ?","c":["Khi băng qua đường ở vạch sang đường dành cho người đi bộ, phải xuống thiết bị di chuyển cá nhân rồi đẩy đi qua.","Ở nơi không có đường dành riêng cho xe đạp, phải lưu thông ở sát mép đường bên phải.","Xe điện hai bánh có thể đi cùng hơn 1 người.","Khi lưu thông vào ban đêm, phải bật đèn pha trước và đèn hậu hoặc đeo dụng cụ phát quang như đai dạ quang."],"a":"3","imgs":[],"t":"문장형"},{"n":583,"b":"Giải thích nào đúng về người đi xe đạp rẽ trái tại đường giao nhau theo Pháp lệnh Giao thông đường bộ?","c":["Đạp xe chậm dọc lề đường bên phải rồi rẽ trái ở khu vực lề đường giao nhau.","Đạp xe chậm dọc lề đường bên trái rồi rẽ trái ở khu vực lề đường giao nhau.","Đạp xe chậm ở giữa làn số 1 của đường rồi rẽ trái ở chính giữa đường giao nhau.","Đạp xe chậm ở giữa làn số 1 của đường rồi rẽ trái ở trung tâm của đường giao nhau."],"a":"1","imgs":[],"t":"문장형"},{"n":584,"b":"Hình phạt đối với xe ô tô con quy định trong Pháp lệnh Giao thông đường bộ đi vào làn đường dành riêng  cho xe đạp theo Luật Giao thông đường bộ là gì?","c":["Phạt tù tối đa 1 năm","Phạt tiền hình sự tối đa 3 triệu Won","Gửi giấy báo phạt vi phạm giao thông với số tiền phạt là 40.000 Won","Không có hình phạt nào"],"a":"3","imgs":[],"t":"문장형"},{"n":585,"b":"Tiêu chuẩn nào không đúng về việc xe đạp điện có thể lưu thông trên đường xe đạp theo Pháp lệnh Giao  thông đường bộ?","c":["Tổng trọng lượng của xe đạp bao gồm cả trọng lượng của trang thiết bị gắn kèm phải dưới 30 kg.","Khi di chuyển với vận tốc từ 25km/giờ trở lên thì động cơ không hoạt động.","Không chỉ di chuyển bằng động cơ điện.","Xe đạp điện có công suất định mức tối đa vượt quá 11 Kilowatt"],"a":"4","imgs":[],"t":"문장형"},{"n":586,"b":"Khi người điều khiển xe đạp lưu thông vào ban đêm, nội dung nào không đúng nhất về cách lưu thông theo  Pháp lệnh Giao thông đường bộ?","c":["Thường xuyên nhấn còi khi lưu thông.","Bật đèn pha trước và đèn hậu khi lưu thông.","Mặc áo phản quang khi lưu thông.","Đeo dụng cụ phát quang như đai dạ quang khi lưu thông."],"a":"1","imgs":[],"t":"문장형"},{"n":587,"b":"Câu nào không phải là căn cứ phạt tiền người đi xe đạp vi phạm pháp luật theo Pháp lệnh Giao thông đường bộ?","c":["Vi phạm tín hiệu giao thông","Lấn vạch phân cách giữa đường","Ngăn cản việc qua đường của người đi bộ ở vạch sang đường","Vi phạm tốc độ giới hạn"],"a":"4","imgs":[],"t":"문장형"},{"n":588,"b":"Hai nội dung nào không phù hợp về việc liên quan đến việc sử dụng làn đường dành riêng cho xe đạp theo  Pháp lệnh Giao thông đường bộ?","c":["Người cao tuổi có thể đi xe đạp trên vỉa hè.","Trên đường dành riêng cho xe đạp, xe đạp gắn động cơ không được lưu thông." .","Phải tạm dừng ngay trước vạch dừng khi đèn đỏ.","Khi đèn đỏ, có thể tạm dừng ngay trước vạch dừng rồi rẽ  phải."],"a":"1, 2","imgs":["img_0001.jpg"],"t":"사진형"},{"n":683,"b":"Hai cách lưu thông nào là không đúng trong tình  huống sau?","c":["Ở làn đường số 1, có thể rẽ phải khi đèn xanh.","Ở làn đường số 1, có thể rẽ trái khi đèn mũi tên rẽ trái bật  sáng.","Ở làn đường số 2, có thể đi thẳng khi đèn xanh.","Ở làn đường số 3, có thể rẽ phải sau khi tạm dừng ngay  trước vạch dừng khi đèn đỏ.","Ở làn đường số 3, đi thẳng khi đèn xanh và tạm dừng ở khu  vực an toàn nằm trong đường giao nhau."],"a":"1, 5","imgs":["img_0002.jpg"],"t":"사진형"},{"n":684,"b":"Hai thông tin sau là không chính xác thông qua từ tình  huống sau?","c":["Phía trước có vạch sang đường dành cho người đi bộ.","Đèn tín hiệu giao thông dành cho xe ở phía trước đang bật  màu xanh.","Ở bên phải đường có làn đường dành cho xe đạp.","Tốc độ giới hạn của đoạn đường này là 30 km/giờ.","Các xe phía trước đang đạp phanh."],"a":"4, 5","imgs":["img_0003.jpg"],"t":"사진형"},{"n":685,"b":"Hai câu liên kết nào không phải là thông tin và cách lái  xe đúng tương ứng có thể rút ra từ tình huống sau?","c":["Vạch sang đường dành cho người đi bộ - Quan sát trái phải  và chú ý người đi bộ.","Người đang ở trên làn đường dành cho xe - Chú ý an toàn  bằng cách giảm tốc độ, v.v.","Đèn hai màu nằm ngang - Đi vào làn đường có đánh dấu X  màu đỏ.","Làn đường khả biến - Có thể đổi làn đường lưu thông tùy  theo tình huống.","Vạch kẻ chấm màu vàng ở giữa đường - Đây là vạch tuyệt  đối không được lấn ngay cả khi muốn vượt."],"a":"3, 5","imgs":["img_0004.jpg"],"t":"사진형"},{"n":686,"b":"Hai câu liên kết nào không phải là thông tin và cách lái  xe đúng tương ứng có thể rút ra từ tình huống sau?","c":["Biển cảnh báo vạch sang đường dành cho người đi bộ -  Ngay phía trước có vạch sang đường dành cho người đi bộ  nên phải lái xe cẩn thận.","Đoạn đường có vạch kẻ đôi nét liền màu vàng ở bên phải  làn đường - Được phép dừng xe lấn lên vỉa hè.","Tình trạng mặt đường bị đóng băng - Lái xe với tốc độ giảm  xuống 20% so với tốc độ tối đa cho phép.","Xe dọn tuyết ở phía trước - Lái xe duy trì khoảng cách đủ  an toàn với xe dọn tuyết đang làm việc đó.","Xe chở hàng đang dừng ở phía trước bên phải - Lái xe cẩn  thận vì có thể có người bất ngờ nhảy ra đường xe chạy."],"a":"2, 3","imgs":["img_0005.jpg"],"t":"사진형"},{"n":687,"b":"Hai cách lái xe nào là không đúng trong tình huống  sau?","c":["Nếu người đi xe đạp muốn rẽ trái thì phải đợi tín hiệu đèn  rẽ trái ở làn đường số 1.","Nếu người điều khiển thiết bị di chuyển cá nhân muốn rẽ  trái thì phải đợi tín hiệu đèn rẽ trái ở làn đường số 2.","Nếu người đi xe hai bánh muốn rẽ trái thì phải đợi tín hiệu  đèn rẽ trái ở làn đường số 2.","Nếu người điều khiển xe ô tô con muốn rẽ phải thì phải vừa  chú ý quan sát người đi bộ vừa rẽ phải.","Nếu người lái xe chở hàng muốn rẽ phải thì trước tiên phải  đi về phía lề đường bên phải rồi mới rẽ phải."],"a":"1, 2","imgs":["img_0006.jpg"],"t":"사진형"},{"n":688,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống sau?","c":["Lái xe với tốc độ dưới 30 km/giờ.","Khi tiến vào bãi đỗ xe tầng hầm của tòa nhà thương mại  phía trước bên phải 10 m, phải tạm dừng xe rồi vừa kiểm  tra an toàn vừa đi chậm tiến vào.","Khi tiến vào bãi đỗ xe tầng hầm của tòa nhà thương mại  phía trước bên phải 10 m, trước tiên phải tạm dừng xe rồi  vừa kiểm tra an toàn vừa đi chậm ti","Khi muốn rẽ trái, bật đèn xi nhan trước rồi vừa lái xe chậm  vừa sử dụng phía ngoài tâm giao lộ để rẽ trái.","Khi điều khiển thiết bị di chuyển cá nhân trong nội thành,  phải lái xe trên vỉa hè."],"a":"1, 2","imgs":["img_0007.jpg"],"t":"사진형"},{"n":689,"b":"Hai câu nào không phải là thông tin và cách lý giải  đúng tương ứng có thể rút ra từ tình huống sau?","c":["Biển báo bảo vệ trẻ em - Đây là khu vực bảo vệ trẻ em, nơi  trẻ em được quan sát bảo vệ đặc biệt.","Biển báo giới hạn tốc độ tối đa - Phải lái xe với tốc độ  không quá 30 km/giờ.","Biển báo vạch sang đường dành cho người đi bộ - Phải lái  xe chú ý đến người đi bộ.","Đèn đỏ nhấp nháy - Phải lái xe chậm.","Các xe ô tô đang đỗ ở bên phải đường - Chú ý người đi bộ  có thể đi ra từ giữa những ô tô đang đỗ."],"a":"1, 4","imgs":["img_0008.jpg"],"t":"사진형"},{"n":690,"b":"Hai phương pháp lái xe an toàn nhất trong các tình  huống giao thông sau đây là gì?","c":["Đèn tín hiệu giao thông đang đỏ, vì vậy giữ bình tĩnh chờ đợi.","Người đi bộ đang đi chậm nên bấm còi để họ đi nhanh hơn.","Để dễ thay đổi làn đường , có thể vượt qua vạch dừng và  dừng trước xe bên cạnh.","Để đảm bảo giao thông suôn sẻ, có thể dự đoán sự thay  đổi của đèn tín hiệu và tăng tốc nhanh chóng.","Vì có vạch dừng nên phải đảm bảo việc tuân thủ vạch  dừng và chờ tín hiệu."],"a":"1, 5","imgs":[],"t":"문장형"},{"n":691,"b":"Hai phương pháp lái xe an toàn nhất trong tình huống  sau đây là gì?","c":["Khi rẽ phải ở ngã tư, đi chậm và không dừng trước vạch  dừng hay vạch qua đường dành cho người đi bộ.","Vì người đi bộ đang đi trên vạch qua đường dành cho  người đi bộ nên hãy chờ họ băng qua xong.","Khi có người đi bộ chạy qua vạch qua đường dành cho  người đi bộ, hãy bấm còi và rẽ phải nhanh chóng.","Dừng trên vạch qua đường dành cho người đi bộ để có  tầm nhìn tốt hơn khi rẽ phải.","Đèn tín hiệu phía trước đang đỏ, phải tạm dừng lại, đợi  người đi bộ qua xong, sau đó đi chậm và rẽ phải."],"a":"2, 5","imgs":["img_0009.jpg"],"t":"사진형"},{"n":692,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì có người đi bộ nên phải đi chậm hoặc tạm dừng để đảm  bảo an toàn cho người đi bộ, rồi kiểm tra an toàn và tiếp  tục đi qua.","Người đi bộ có thể xuất hiện giữa các xe đang đỗ gần đó,  vì vậy phải chú ý khi lái xe.","Vì đây không phải là khu vực bảo vệ trẻ em nên người lái  xe không có nghĩa vụ bảo vệ người đi bộ.","Nếu muốn đi đến cửa hàng bên trái, có thể dừng đỗ xe  tạm thời ở góc đường giao nhau.","Đường không phân chia lề đường và đường xe chạy trong  khu dân cư có rất nhiều xe ô tô đỗ và người đi bộ nên phải  nhấn còi liên tục khi đi qua."],"a":"1, 2","imgs":["img_0010.jpg"],"t":"사진형"},{"n":693,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Khi muốn đi thẳng trong khi đang đi ở làn rẽ phải, có thể  chuyển làn ở đoạn vạch liền màu trắng.","Ngay cả khi đèn rẽ phải ba màu là màu đỏ, vẫn có thể rẽ  phải nếu không có người đi bộ băng qua đường ở vạch  sang đường dành cho người đi bộ.","Vì đèn rẽ phải ba màu là màu đỏ nên phải tạm dừng, rồi  sau khi đèn chuyển sang màu xanh mới có thể rẽ phải.","Khi muốn rẽ phải trong khi đang chạy trên làn đường đi  thẳng, có thể rẽ phải bằng làn đường không phải là làn  đường rẽ phải.","Ngay cả khi đèn rẽ phải ba màu là màu xanh thì vẫn có thể  có người đi bộ, nên phải kiểm tra an toàn rồi mới rẽ phải."],"a":"3, 5","imgs":["img_0011.jpg"],"t":"사진형"},{"n":694,"b":"Hai giải thích nào là đúng nhất về biển báo an toàn  giao thông trong tình huống sau?","c":["Biển báo đường chỉ dành cho ô tô có nghĩa là nếu không  lái xe ô tô thì không được phép đi vào.","Vì có biển báo rẽ trái không được bảo hộ, nên có thể rẽ trái  một cách an toàn bất kể đèn tín hiệu giao thông dành cho xe.","Vạch đôi màu vàng ở bên phải là ký hiệu có thể đỗ xe tạm thời.","Biển báo màu xanh hình ô tô ở phía trước bên phải là biển  chỉ dẫn thuộc biển báo an toàn giao thông.","Vạch liền màu trắng ở phía trước vạch dừng của đường  giao lộ cho biết phía trước có đường giao nhau."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":695,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống sau?","c":["Vì phía trước hướng đang chạy không có xe nên đi nhanh.","Vì khó kiểm tra tình hình phía trước do đường xuống dốc  uốn cong về bên trái, nên phải giảm tốc độ rồi mới tiến vào  đường giao nhau.","Vì có thể có xe đi ra đường từ chung cư, nên phải luôn đề  phòng khi lái xe.","Trường hợp xe ngược chiều định rẽ trái, xe đi thẳng luôn  được ưu tiên nên chỉ cần nhấn còi cảnh báo rồi tiếp tục đi.","Trường hợp là lối ra vào chung cư, vì thường xuyên có  người đi bộ qua lại nên khó nhìn rõ, do đó phải nhấn còi  và tăng tốc để lái xe đi nhanh qua."],"a":"2, 3","imgs":["img_0012.jpg"],"t":"사진형"},{"n":696,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống sau?","c":["Vì có người đi bộ ở phía bên phải đường nên đi nhanh qua.","Ở những nơi khó quan sát xung quanh, kiểm tra tình hình  giao thông bằng gương cầu lồi trên đường.","Vì trong hẻm bên trái có xe, nên phải quan sát kỹ trước khi  tiến vào đường giao nhau rồi từ từ tiến vào đường giao nhau.","Vì khó kiểm tra tình hình phía trước do đường lên dốc uốn  cong về bên phải, nên phải liên tục nhấn còi và đi qua.","Dù có xe ở phía đối diện đi xuống, thì xe đi lên luôn được  ưu tiên hơn nên cứ tiếp tục đi mà không cần giảm tốc độ."],"a":"2, 3","imgs":["img_0013.jpg"],"t":"사진형"},{"n":697,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống sau?","c":["Vì đèn giao thông dành cho xe ở phía trước đang bật đỏ,  nên phải giảm tốc độ từ trước, rồi dừng xe lại một cách an  toàn ở trước vạch dừng.","Có biển báo hết khu vực bảo vệ trẻ em ở phía trước bên  trái, nên trên đường đang lưu thông không cần đặc biệt  chú ý đến sự an toàn của trẻ em.","Khi muốn rẽ trái, quan sát cẩn thận các xe đang đi phía sau  ở làn đường số 1, rồi chuyển làn đường một cách an toàn.","Khi muốn rẽ phải, tránh các xe đang chờ tín hiệu đèn ở làn  đường số 3 và rẽ phải thông qua vỉa hè.","Vạch liền màu vàng ở bên phải đường là ký hiệu cho phép  dừng xe nhưng cấm đỗ xe nên có thể tạm dừng xe một lúc."],"a":"1, 3","imgs":["img_0014.jpg"],"t":"사진형"},{"n":698,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống sau?","c":["Tại đường giao nhau có đèn giao thông ba màu, có thể  quay đầu xe ngay cả khi không có biển báo được phép  quay đầu xe, miễn không gây cản trở cho các","Vạch liền màu trắng có hình dích dắc là vạch hạn chế  chuyển làn đường, nên không được chuyển làn đường.","Vạch liền màu trắng có hình dích dắc có ý nghĩa phải đi  chậm nên phải giảm tốc độ và đi chậm.","Trường hợp muốn rẽ phải trong khi đang đi trên làn đường  số 1, nếu không có xe phía sau thì bật đèn xi nhan rồi cùng  lúc chuyển sang làn đường số 3.","Đèn giao thông ba màu phía trước có thể chuyển sang màu  đỏ, nên dù đang đèn xanh cũng phải tạm dừng lại gấp ở  trước vạch dừng và chờ."],"a":"2, 3","imgs":["img_0015.jpg"],"t":"사진형"},{"n":699,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Khi muốn rẽ phải, vì đường vắng nên có thể rẽ phải ngay từ  làn đường đi thẳng.","Vì có máy móc nông nghiệp đang đi ở phía trước, nên  nhấn còi liên tục và tăng tốc độ để vượt qua đường giao  nhau.","Vì khó kiểm tra các xe đang tiến vào từ đường hầm bên  phải, nên giảm tốc độ và tiến vào đường giao nhau.","Vì là đường ít xe cộ qua lại nên có thể đỗ xe ở bên phải  đường.","Nếu có người đi bộ đang muốn băng qua đường, thì tạm  dừng lại và kiểm tra an toàn của người đi bộ rồi mới đi tiếp."],"a":"3, 5","imgs":["img_0016.jpg"],"t":"사진형"},{"n":700,"b":"Hai phương pháp lái xe an toàn nhất trong tình huống  sau đây là gì?","c":["Vì tín hiệu của xe phía trước là màu vàng, nên giảm tốc từ  từ và dừng ngay trước vạch dừng.","Kiểm tra phía sau các làn 1, 2, nếu không có xe chạy phía  sau, có thể chuyển làn để quay đầu ở làn 1.","Vì có xe màu trắng và xe buýt ở các làn 4, 5 bên cạnh, nên  nhường các xe đó đi trước, sau đó có thể chuyển làn để rẽ  phải.","Vì khu vực có vạch liền màu trắng, không được phép  chuyển làn.","Vì tín hiệu của xe phía trước là màu vàng, nên tăng tốc  theo xe phía trước để đi qua giao lộ."],"a":"1, 4","imgs":["img_0017.jpg"],"t":"사진형"},{"n":701,"b":"Hai cách lái xe nào là không đúng trong tình huống  sau?","c":["Nếu muốn đi thẳng thì phải tạm dừng ngay trước vạch  dừng.","Khi muốn quay đầu xe, nếu phía trước không có xe nào thì  quay đầu xe một cách an toàn thông qua đường giao nhau  ở làn đường số 2.","Khi muốn cho hành khách xuống xe, tạm dừng một chút  ngay phía trước vạch sang đường dành cho người đi bộ.","Khi muốn rẽ phải, tạm dừng ở ngay phía trước vạch dừng,  rồi đi chậm và rẽ phải.","Khi muốn sử dụng vạch sang đường dành cho người đi bộ,  xuống xe và dắt xe đạp băng qua."],"a":"2, 3","imgs":["img_0018.jpg"],"t":"사진형"},{"n":702,"b":"Hai câu nào không phải là thông tin và lý giải tương  ứng có thể rút ra từ tình huống sau?","c":["Xe ô tô đang đỗ ở bên phải đường - Đây là hành vi vi phạm  đỗ xe.","Biển cảnh báo vạch sang đường dành cho người đi bộ -  Ngay phía trước có vạch sang đường dành cho người đi bộ.","Vạch liền màu vàng ở bên phải đường - Cấm đỗ xe nhưng  được phép dừng xe.","Vỉa hè - Người đi xe đạp phải đi trên vỉa hè.","Gờ giảm tốc - Nên lái xe ở tốc độ thấp hơn."],"a":"3, 4","imgs":["img_0019.jpg"],"t":"사진형"},{"n":703,"b":"Hai câu nào là giải thích đúng về tình huống sau?","c":["Người lái xe đang lái xe chậm có thể sử dụng điện thoại di  động.","Người lái xe đang dừng xe có thể sử dụng điện thoại di  động.","Khi đang đi chậm, không được sử dụng điện thoại di động  nhưng có thể điều chỉnh thiết bị hiển thị video.","Người lái xe trên đường trong thành phố có nghĩa vụ phải  thắt dây an toàn.","Người đi cùng trên đường trong thành phố không có nghĩa  vụ phải thắt dây an toàn."],"a":"2, 4","imgs":["img_0020.jpg"],"t":"사진형"},{"n":704,"b":"Hai cách lái xe nào là không đúng của mỗi người lái xe  trong tình huống sau?","c":["Người đi xe đạp - Có thể vượt các xe khác ở phía mép phải  của đường.","Người điều khiển xe kickboard điện - Cả người lái và người  đi cùng đều phải đội mũ bảo hiểm khi đi xe.","Người điều khiển xe hai bánh - Có thể lái xe vào làn đường  dành riêng cho xe buýt ở trung tâm để tránh ùn tắc.","Người lái xe ô tô con - Lái xe chú ý tránh va chạm do ùn  tắc giao thông.","Người lái xe buýt - Khi đang lái xe trên làn đường không  phải làn đường dành riêng, phải tuân theo tín hiệu từ đèn  giao thông dành cho tất cả các xe"],"a":"2, 3","imgs":["img_0021.jpg"],"t":"사진형"},{"n":705,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Lái xe cần chú ý có thể xuất hiện người đi bộ đi ra từ phía  sau các xe đang đỗ.","Giữ khoảng cách với người đi bộ ở bên phải, tạm dừng lại  hoặc đi chậm qua.","Khi tuyết dày đặc và đường trơn trượt, tăng tốc độ và đi  nhanh qua.","Trên đường phủ đầy tuyết, tăng tốc hơn 20% so với tốc độ  tối đa.","Để ngăn chặn hành vi bất ngờ của người đi bộ, vừa lái xe  vừa nhấn còi liên tục."],"a":"1, 2","imgs":["img_0022.jpg"],"t":"사진형"},{"n":706,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Liên tục nhấn còi ở phía sau xe buýt để giục đi nhanh.","Kiểm tra tình hình xung quanh rồi chuyển sang làn đường  số 1.","Bật đèn nháy khẩn cấp, tăng tốc và chuyển sang làn đường  số 1.","Khi chuyển làn đường số 1, không cần chú ý đến người đi  bộ đi ra từ phía trước xe buýt.","Nếu có xe phía sau ở làn đường số 1, không cố gắng bất  chấp chuyển làn đường và đợi ở phía sau xe buýt."],"a":"2, 5","imgs":["img_0023.jpg"],"t":"사진형"},{"n":707,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Liên tục nhấn còi để cảnh báo người đi bộ và tăng tốc để đi  nhanh.","Không cần đề phòng hành vi bất ngờ của người đi bộ ở bên  trái vạch kẻ giữa đường.","Trong số các xe đang đỗ, có thể có xe đột ngột xuất phát  nên phải quan sát kỹ phía trước, trái phải và đi chậm.","Giữ khoảng cách với người đi bộ bên phải, chú ý an toàn và  lái xe chậm.","Trong các khu dân cư, thông thường sẽ an toàn khi đi phía  bên trái của vạch kẻ giữa đường."],"a":"3, 4","imgs":["img_0024.jpg"],"t":"사진형"},{"n":708,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Để đảm bảo an toàn, liên tục nhấn còi và đi qua.","Không cần chú ý đến người đi bộ đang đi trên vỉa hè bên trái.","Bật đèn nháy khẩn cấp, tăng tốc và đi nhanh.","Lái xe chậm và duy trì khoảng cách an toàn với xe ô tô con  xuất phát ở bên phải.","Vì là đường không phân chia lề đường và đường xe chạy  trong khu dân cư nên phải giảm tốc độ để đề phòng có  người đi bộ xuất hiện."],"a":"4, 5","imgs":["img_0025.jpg"],"t":"사진형"},{"n":709,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Lái xe chậm một cách an toàn hoặc tạm dừng lại để bảo vệ  người đi bộ qua đường.","Vì không có nghĩa vụ bảo vệ người đi bộ qua đường nên  nhanh chóng đi qua.","Vì cửa xe đang đỗ bên phải có thể mở ra, nên cần đề  phòng và đi qua.","Nếu không đủ chỗ đậu xe, có thể đỗ xe ở phần lề đường  màu đỏ phía bên trái phía trước.","Không cần phải chú ý đến người đi ra từ phía sau những xe  ô tô đang đỗ, nên có thể tăng tốc và đi qua."],"a":"1, 3","imgs":["img_0026.jpg"],"t":"사진형"},{"n":710,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì xe ô tô hoặc người đi bộ có thể từ con hẻm bên phải  tiến vào nên phải chú ý khi lái xe.","Vì không có vạch kẻ giữa đường, nên phải đi về sát mép  bên phải, gần người đi bộ nhất có thể.","Vì không có biển báo giới hạn tốc độ tối đa nên tăng tốc và  đi nhanh.","Vừa lái xe ở bên phải đường vừa liên tục nhấn còi với người  đi bộ để yêu cầu họ tránh đường.","Nếu cản trở việc lưu thông của người đi bộ, thì phải lái xe  chậm hoặc tạm dừng lại."],"a":"1, 5","imgs":["img_0027.jpg"],"t":"사진형"},{"n":711,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì đường vắng nên tăng tốc để đi nhanh.","Đi trong tốc độ quy định tùy thuộc vào điều kiện thời tiết.","Vì phía trước có thi công, nên cần lái xe chú ý đến tình hình  giao thông.","Vì mặt đường trơn trượt nên lái xe trên cả hai làn đường.","Bám sát phía sau xe chở hàng đang chạy với tốc độ chậm ở  phía trước."],"a":"2, 3","imgs":["img_0028.jpg"],"t":"사진형"},{"n":712,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì phía trước có người đi bộ nên tạm dừng, kiểm tra sự an  toàn của người đi bộ rồi mới tiếp tục đi.","Vì không có nghĩa vụ bảo vệ người đi bộ qua đường nên cứ  thế đi qua.","Lái xe chú ý đến người đi bộ ở phía sau xe màu trắng đang  đỗ bên phải.","Nhấn còi thật to để ngăn người đi bộ băng qua đường.","Dừng đột ngột trước mặt người đi bộ để cảnh báo họ."],"a":"1, 3","imgs":["img_0029.jpg"],"t":"사진형"},{"n":713,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Có biển báo đang thi công nên giảm tốc độ và đi chậm qua.","Tăng tốc và bật đèn pha để cảnh báo xe phía trước đã lấn  qua vạch kẻ giữa đường.","Bật đèn nháy khẩn cấp, tăng tốc và đi nhanh.","Giảm tốc độ và chú ý đến các xe đang đi ở phía sau để đề  phòng tai nạn.","Khu vực lề đường bên phải là nơi không được phép dừng  xe."],"a":"1, 4","imgs":["img_0030.jpg"],"t":"사진형"},{"n":714,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Lái xe chú ý lớp băng mỏng đóng trên mặt đường vào mùa  đông.","Đường không có nhiều xe nên có thể đỗ xe.","Có thể đổi làn đường và đi tiếp.","Không được vượt khi đi trên cầu.","Lái xe sát phía sau xe chở hàng để cảnh báo xe chở hàng  chú ý khi chuyển làn."],"a":"1, 4","imgs":["img_0031.jpg"],"t":"사진형"},{"n":715,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Lái xe cẩn thận vì xe hai bánh phía trước có thể đột ngột đi  vào giữa đường.","Vì đường vắng nên tăng tốc và đi nhanh.","Duy trì khoảng cách đủ an toàn với xe hai bánh.","Liên tục nhấn còi, tăng tốc và vượt lên.","Lái xe bám sát xe hai bánh để không bị lấn qua vạch kẻ  giữa đường."],"a":"1, 3","imgs":["img_0032.jpg"],"t":"사진형"},{"n":716,"b":"Hai phương pháp lái xe an toàn nhất trong tình huống  sau đây là gì?","c":["Vì là lúc bình minh, ánh sáng không sáng bằng ban ngày,  nên bật đèn pha và liên tục sử dụng còi xe khi lái xe.","Sau khi xe ngược chiều đã đi qua, đảm bảo tầm nhìn đầy  đủ rồi vượt xe một cách nhanh chóng.","Vì có thể xảy ra tình huống bất ngờ trước xe tải phía trước,  nên duy trì khoảng cách an toàn đầy đủ khi lái xe.","Vì là đường có vạch liền ở giữa, không được vượt xe.","Để duy trì luồng giao thông suôn sẻ, hãy bấm còi để xe  phía trước tăng tốc."],"a":"3, 4","imgs":["img_0033.jpg"],"t":"사진형"},{"n":717,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Biển báo nhường đường ở bên phải là biển báo dành cho xe  tiến vào phải tuân theo.","Khi vượt trong vòng xuyến, phải vượt ở phía bên trái của xe  phía trước.","Tất cả xe đều có thể sử dụng lối ra hướng 1 giờ mà không  bị hạn chế.","Vì xe tiến vào vòng xuyến được ưu tiên hơn xe đang đi  trong vòng xuyến nên cứ thế tiến vào và đi qua.","Khi đang ở trong và muốn ra khỏi vòng xuyến, phải bật đèn  xi nhan."],"a":"1, 5","imgs":["img_0034.jpg"],"t":"사진형"},{"n":718,"b":"Hai biển báo an toàn giao thông nào không thể quan  sát được trong tình huống sau?","c":["Biển báo vạch sang đường dành cho người đi bộ","Biển báo cấm rẽ trái","Biển báo vòng xuyến","Biển báo cấm dừng và đỗ xe","Biển báo cấm lưu thông"],"a":"3, 5","imgs":["img_0035.jpg"],"t":"사진형"},{"n":719,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì là khu vực bảo vệ trẻ em nên phải lái xe trong giới hạn  tốc độ tối đa và chuẩn bị đề phòng nguy hiểm bất ngờ.","Dù là công trường thi công nhưng nếu không có phương  tiện thi công thì có thể nhanh chóng đi qua.","Để đảm bảo an toàn, bật đèn nháy khẩn cấp và tăng tốc độ  đi qua.","Vì đường vắng nên không cần chú ý đến tình huống trên  đường.","Trước vạch sang đường dành cho người đi bộ, ngay cả khi  không có người đi bộ, cũng phải tạm dừng rồi mới được đi  tiếp."],"a":"1, 5","imgs":["img_0036.jpg"],"t":"사진형"},{"n":720,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì phía trước có người đi bộ sắp băng qua đường, nên tạm  dừng, kiểm tra an toàn của người đi bộ rồi mới tiếp tục đi.","Vì là đường không phân chia lề đường và lòng đường nên  không có nghĩa vụ bảo vệ người đi bộ, do đó có thể tăng  tốc đi qua.","Nếu có xe đi phía sau, bật đèn nháy khẩn cấp để cảnh báo  về tình huống nguy hiểm.","Liên tục nhấn còi để ngăn người đi bộ băng qua đường.","Dừng đột ngột trước mặt người đi bộ để cảnh báo họ."],"a":"1, 3","imgs":["img_0037.jpg"],"t":"사진형"},{"n":721,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Dù là người đi bộ băng qua đường sai luật thì cũng phải đảm  bảo an toàn cho người đi bộ ở trước rồi mới lái xe đi qua.","Không cần phải bảo vệ người đi bộ băng qua đường sai luật  nên cứ thế lái xe đi qua.","Nhấn còi thật to để ngăn người đi bộ băng qua đường sai luật.","Bật đèn nháy khẩn cấp để cảnh báo các xe phía sau về tình  huống nguy hiểm.","Dừng đột ngột ngay trước mặt người đi bộ băng qua đường  sai luật và giáo huấn họ."],"a":"1, 4","imgs":["img_0038.jpg"],"t":"사진형"},{"n":722,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Khi muốn vượt, phải vượt an toàn ở làn đường bên trái sau  khi xe đi ở làn bên trái đã đi qua.","Không được đỗ xe ở trên cầu.","Có thể lái xe chuyển từ làn đường số 2 sang làn đường số 1.","Không được vượt ở trên cầu.","Nếu xe phía trước đang chạy với tốc độ thấp, thì bám sát  phía sau của xe phía trước đó."],"a":"2, 4","imgs":["img_0039.jpg"],"t":"사진형"},{"n":723,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Liên tục nhấn còi để cảnh báo người đi bộ đang đứng bên  trái đường và đi nhanh qua.","Cứ thế đi qua mà không cần dự đoán trước tình huống  nguy hiểm.","Lái xe chậm đề phòng trường hợp có xe tiến vào từ đường  phía trước bên phải.","Vì là đường giao nhau không có đèn tín hiệu giao thông  nên tăng tốc và nhanh chóng đi qua.","Tạm dừng ở vạch dừng trước vạch sang đường dành cho  người đi bộ."],"a":"3, 5","imgs":["img_0040.jpg"],"t":"사진형"},{"n":724,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì đang thi công đường nên lái xe chú ý kỹ tình hình phía  trước.","Vì mặt đường không bằng phẳng nên đi nhanh không giảm  tốc độ sẽ an toàn hơn.","Lái xe chậm và chú ý đến các xe đi ngược chiều.","Liên tục bấm còi để cảnh báo các phương tiện thi công  đang đỗ ở bên phải và tăng tốc để đi nhanh qua.","Giữ nguyên tốc độ rồi dừng lại đột ngột khi chạy đến gần xe  đi ngược chiều."],"a":"1, 3","imgs":["img_0041.jpg"],"t":"사진형"},{"n":725,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Trong vòng xuyến, đi theo chiều kim đồng hồ là an toàn.","Khi muốn tiến vào vòng xuyến, phải đi chậm trước khi tiến  vào hoặc tạm dừng.","Xe đang chạy trong vòng xuyến phải nhường đường cho xe  định tiến vào vòng xuyến.","Khi muốn ra khỏi vòng xuyến, không cần bật đèn xi nhan  mà cứ thế đi ra.","Để tiến vào vòng xuyến, bật đèn xi nhan, nếu có xe thì xe  sau không được cản trở lưu thông của xe trước."],"a":"2, 5","imgs":["img_0042.jpg"],"t":"사진형"},{"n":726,"b":"Hai câu nào là giải thích đúng về chuyển làn đường  trong tình huống sau?","c":["Xe ô tô con đang đi trên làn đường số 2 có thể chuyển  sang làn đường số 1.","Xe ô tô con đang đi trên làn đường số 1 không thể chuyển  sang làn đường số 2.","Có thể chuyển sang làn đường số 1 ngay từ làn đường tiến  vào.","Xe ô tô con đang đi trên làn đường số 2 không thể chuyển  làn đường bằng làn đường tiến vào.","Có thể chuyển làn đường từ tất cả các làn đường."],"a":"2, 4","imgs":["img_0043.jpg"],"t":"사진형"},{"n":727,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống sau?","c":["Tạm dừng ở lề đường rồi đi ra.","Đi ra từ đoạn đường có vạch đôi gồm vạch liền và vạch nét  đứt màu trắng.","Nếu lỡ đi qua đường đi ra, thì cũng phải đi ra ở nơi dự định  đi ra ban đầu cho dù phải lùi xe.","Vì mặt đường trơn trượt nên giảm tốc độ vừa đủ và chuyển  làn đường.","Nếu bị ùn tắc khi đi ra, cố gắng đi ra thật nhanh dù có phải  chen ngang."],"a":"2, 4","imgs":["img_0044.jpg"],"t":"사진형"},{"n":728,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Giảm tốc độ và kiểm tra tình hình an toàn phía trước.","Khi đang đi trên làn đường số 2, chuyển sang làn đường ở  bên phải rồi vượt lên trước xe chở hàng.","Vì đang có tuyết nên giảm tốc độ 10% so với tốc độ giới  hạn tối đa.","Vì là đoạn đường có vạch nét đứt màu trắng nên không thể  chuyển làn đường.","Kiểm tra tình hình đóng băng trên đường, vừa lái xe vừa  quan sát phía sau."],"a":"1, 5","imgs":["img_0045.jpg"],"t":"사진형"},{"n":729,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Bật đèn xi nhan trái, đảm bảo khoảng cách an toàn và đi i xe chậm vừa chú ý biển báo giao thông hoặc  cảnh báo an toàn khác.","Vạch kẻ giữa đường - Vạch biểu thị lưu thông về phía bên  phải của vùng có kẻ vạch."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":733,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Ở làn đường có thể chuyển làn đường, có thể chuyển làn  mà không cần bật đèn xi nhan.","Xe ô tô con đang đi trên làn đường số 1 có thể chuyển  sang làn đường số 2.","Có thể chuyển sang làn đường số 1 ngay từ làn đường tiến  vào.","Xe ô tô con đi trên làn đường số 2 có thể chuyển sang làn  đường số 1.","Có thể chuyển sang làn đường tiến vào từ làn đường số 2."],"a":"2, 4","imgs":["img_0049.jpg"],"t":"사진형"},{"n":734,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì là đoạn đường có vạch đôi gồm vạch nét đứt và vạch liền  màu trắng, nên chuyển làn ở phía vạch nét đứt rồi đi ra.","Tạm dừng ở lề đường bên trái rồi đi ra.","Nếu lỡ đi qua chỗ đi ra, thì dù lùi xe lại cũng phải đi ra từ  nơi dự định ban đầu.","Xem xét tình hình giao thông phía sau và lái xe về phía  đường đi ra ở bên trái.","Sau khi đã vào đường đi ra thì có thể chuyển lại sang làn  đường bên phải."],"a":"1, 4","imgs":["img_0050.jpg"],"t":"사진형"},{"n":735,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Nếu đường đi ra đang ùn tắc xe thì chạy lấn qua vùng an  toàn rồi đi nhanh ra.","Sau khi chuyển sang làn đường đi ra thì bám sát vào xe  phía trước để không cho các xe khác chen vào.","Vì là đoạn đường có vạch đôi gồm vạch đứt và vạch liền  màu trắng, nên chuyển hướng sang làn ở phía vạch đứt rồi  đi ra.","Nếu nhận ra đã đi sai đường sau khi chuyển sang làn  đường đi ra ở bên phải, thì lái xe chuyển hướng sang làn  đường chính ở bên trái.","Khi chuyển hướng sang làn đường đi ra, bật đèn xi nhan  phải."],"a":"3, 5","imgs":["img_0051.jpg"],"t":"사진형"},{"n":736,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Trước khi vào đường hầm, có thể chuyển sang làn đường số  2 từ đoạn đường
