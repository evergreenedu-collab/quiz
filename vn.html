<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--kb:#003FA2;--kg:#00923F;--kd:#00204D;--bg:#F3F4F8;--card:#FFF;--txt:#1A1D2E;--txt2:#6E7191;--bdr:#E2E5EF;--ok:#0D7C3F;--ok-bg:#E6F4EC;--t-txt:#3366CC;--t-txt-bg:#EBF0FA;--t-photo:#D35400;--t-photo-bg:#FDF0E6;--t-sign:#7D3C98;--t-sign-bg:#F3EBF9;--t-vid:#117A65;--t-vid-bg:#E5F5F1;--shadow:0 1px 4px rgba(0,20,60,.05);--r:12px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);line-height:1.65;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
.lsw{display:flex;gap:4px;padding:6px 12px;background:var(--kd);overflow-x:auto;-webkit-overflow-scrolling:touch}.lsw::-webkit-scrollbar{display:none}
.lg{padding:4px 10px;border-radius:14px;font-size:11px;color:rgba(255,255,255,.6);text-decoration:none;white-space:nowrap;font-weight:500}.lg.on{background:rgba(255,255,255,.15);color:#fff}
.hd{background:var(--kb);color:#fff;padding:12px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,32,77,.2)}
.hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hd h1{font-size:15px;font-weight:800;letter-spacing:-.5px}
.hd .badge{font-size:9px;background:rgba(255,255,255,.15);padding:3px 8px;border-radius:12px;font-weight:500}
.sb{display:flex;gap:6px}
.sb input{flex:1;padding:9px 12px;border:none;border-radius:8px;font-size:14px;font-family:inherit;background:rgba(255,255,255,.13);color:#fff;outline:none}
.sb input::placeholder{color:rgba(255,255,255,.4)}.sb input:focus{background:rgba(255,255,255,.22)}
.sb button{padding:9px 16px;background:var(--kg);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--bdr);overflow-x:auto;-webkit-overflow-scrolling:touch}.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:60px;padding:10px 4px 8px;border:none;background:none;font-family:inherit;font-size:11px;font-weight:600;color:var(--txt2);cursor:pointer;text-align:center;border-bottom:2.5px solid transparent;transition:all .15s}
.tab .ic{font-size:17px;display:block;margin-bottom:1px}.tab .num{font-size:9px;font-weight:400;opacity:.5;display:block}
.tab.on{color:var(--kb);border-bottom-color:var(--kb)}
.tab[data-f="문장형"].on{color:var(--t-txt);border-bottom-color:var(--t-txt)}
.tab[data-f="사진형"].on{color:var(--t-photo);border-bottom-color:var(--t-photo)}
.tab[data-f="표지판형"].on{color:var(--t-sign);border-bottom-color:var(--t-sign)}
.tab[data-f="동영상형"].on{color:var(--t-vid);border-bottom-color:var(--t-vid)}
.rng{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}.rng::-webkit-scrollbar{display:none}
.rng button{padding:5px 11px;border:1.5px solid var(--bdr);border-radius:16px;background:var(--card);font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;color:var(--txt2);flex-shrink:0;font-weight:500}
.rng button.on{background:var(--kb);color:#fff;border-color:var(--kb)}
.ct{padding:6px 16px;font-size:11px;color:var(--txt2)}.ct b{color:var(--kb)}
.ls{padding:0 10px 90px}
.cd{background:var(--card);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--bdr);scroll-margin-top:150px;overflow:hidden}.cd.hl{box-shadow:0 0 0 3px var(--kg)}
.ch{display:flex;align-items:center;gap:7px;padding:12px 14px 6px}
.qn{background:var(--kb);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px}
.tp{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:600}
.tp.문장형{background:var(--t-txt-bg);color:var(--t-txt)}.tp.사진형{background:var(--t-photo-bg);color:var(--t-photo)}.tp.표지판형{background:var(--t-sign-bg);color:var(--t-sign)}.tp.동영상형{background:var(--t-vid-bg);color:var(--t-vid)}
.qb{padding:0 14px 10px;font-size:13.5px;font-weight:500;line-height:1.55}
.qp{padding:0 10px 10px}.qp img{width:100%;border-radius:8px;border:1px solid var(--bdr);display:block}
.sr{display:flex;gap:10px;padding:0 14px 10px;align-items:flex-start}.sp{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}.sp img{width:68px;height:auto;border-radius:5px;border:1px solid var(--bdr);image-rendering:crisp-edges}.st{flex:1;font-size:13.5px;font-weight:500;line-height:1.55}
.vb{margin:0 14px 10px;padding:8px 12px;background:var(--t-vid-bg);border-radius:8px;font-size:11px;color:var(--t-vid);font-weight:600}
.cs{padding:0 14px 10px}.ci{display:flex;gap:8px;padding:7px 0;font-size:12.5px;border-bottom:1px solid #F0F1F5;align-items:flex-start;line-height:1.5}.ci:last-child{border-bottom:none}.cn{color:var(--kb);font-weight:700;flex-shrink:0;min-width:18px;font-size:13px}
.ab{display:block;width:calc(100% - 28px);margin:0 14px 12px;padding:10px;background:var(--bg);border:none;border-radius:8px;font-size:12.5px;font-family:inherit;cursor:pointer;text-align:center;color:var(--txt2);font-weight:600}.ab:active{background:#E6E8EE}
.ax{display:none;margin:0 14px 12px;padding:12px;background:var(--ok-bg);border-radius:8px;border-left:3px solid var(--ok)}.ax.show{display:block}
.al{font-size:10px;font-weight:700;color:var(--ok);margin-bottom:3px;letter-spacing:.5px}.av{font-size:15px;font-weight:900;color:var(--ok)}
.tt{position:fixed;bottom:16px;right:16px;width:42px;height:42px;background:var(--kb);color:#fff;border:none;border-radius:50%;font-size:16px;cursor:pointer;box-shadow:0 3px 10px rgba(0,32,77,.25);display:none;z-index:50}
.ft{text-align:center;padding:20px 16px;font-size:10px;color:#aaa}
@media(min-width:640px){.ls{max-width:640px;margin:0 auto}.hd{padding:12px calc(50% - 310px) 10px}.tabs{justify-content:center}.tab{flex:none;padding:10px 18px 8px;min-width:80px}.rng{justify-content:center}.ct,.ft{max-width:640px;margin-left:auto;margin-right:auto}.sp img{width:85px}}
</style>
</head>

<script>
const Q=[{"n":1,"b":"Điều nào sau đây là thủ tục đúng để cấp giấy phép lái xe di động?","c":["Có thể nộp đăng ký trên mọi ứng dụng.","Phải đăng ký bằng điện thoại thông minh đứng tên chính chủ và xác thực danh tính.","Chỉ có thể đăng ký tại bộ phận tiếp nhận khiếu nại giao thông của đồn công an.","Không thể cấp tại trung tâm sát hạch lái xe."],"a":"2","imgs":[],"t":"문장형"},{"n":2,"b":"Giải thích nào là không đúng về cấp Giấy phép lái xe theo Pháp lệnh Giao thông đường bộ?","c":["Giấy phép lái xe phải được cấp trong vòng 30 ngày kể từ ngày đỗ Kỳ thi sát hạch bằng lái xe.","Không thể cấp Giấy phép lái xe bằng tiếng Anh.","Có thể cấp Giấy phép lái xe trên điện thoại.","Nếu bị mất Giấy phép lái xe, có thể xin cấp lại."],"a":"2","imgs":[],"t":"문장형"},{"n":3,"b":"Giấy phép lái xe quốc tế do Giám đốc Sở Cảnh sát tỉnh - thành phố cấp có hiệu lực mấy năm kể từ ngày cấp?","c":["1 năm","2 năm","3 năm","4 năm"],"a":"1","imgs":[],"t":"문장형"},{"n":4,"b":"Điều kiện cần thiết nào là đúng khi lần đầu tiên lái xe cứu trợ khẩn cấp 15 chỗ theo Luật Giao thông đường bộ?","c":["Giấy phép lái xe phổ thông hạng 1 và 3 tiếng đào tạo về an toàn giao thông","Giấy phép lái xe chuyên dụng hạng 1 (xe kéo cỡ lớn) và 2 tiếng đào tạo về an toàn giao thông","Giấy phép lái xe chuyên dụng hạng 1 (xe cứu hộ cứu nạn) và 2 tiếng đào tạo về an toàn giao thông","Giấy phép lái xe phổ thông hạng 2 và 3 tiếng đào tạo về an toàn giao thông"],"a":"1","imgs":[],"t":"문장형"},{"n":5,"b":"Thời hạn hiệu lực của giấy phép xe tập lái là bao lâu theo Luật Giao thông Đường bộ?","c":["6 tháng kể từ ngày nhận","1 năm kể từ ngày nhận","2 năm kể từ ngày nhận","3 năm kể từ ngày nhận"],"a":"2","imgs":[],"t":"문장형"},{"n":6,"b":"Theo Luật Giao thông đường bộ về tiêu chuẩn điều kiện của giấy phép lái xe, nội dung nào sau đây không đúng  với cách ghi thông tin trên giấy phép lái xe?","c":["A: Hộp số sàn","E: Ghi chú là người khiếm thính và gương cầu lồi","G: Xe được phê duyệt và chế tạo đặc biệt","H: Ghi hướng dẫn phía bên phải"],"a":"1","imgs":[],"t":"문장형"},{"n":7,"b":"Người lái xe cần phải có giấy phép lái xe loại nào để kéo chiếc xe có tổng trọng lượng 780kg bằng chiếc xe  khách 11 chỗ?","c":["Giấy phép lái xe phổ thông hạng 1 và giấy phép lái xe kéo cỡ nhỏ","Giấy phép lái xe phổ thông hạng 2 và giấy phép lái xe kéo cỡ nhỏ hạng 1","Giấy phép lái xe phổ thông hạng 1 và giấy phép lái xe cứu hộ cứu nạn","Giấy phép lái xe phổ thông hạng 2 và giấy phép lái xe cứu hộ cứu nạn hạng 1"],"a":"1","imgs":[],"t":"문장형"},{"n":8,"b":"Hai câu giải thích đúng về các loại xe có thể điều khiển tùy vào từng loại bằng?","c":["Có thể lái xe rải nhựa đường khi có bằng lái xe cỡ lớn hạng 1.","Có thể lái xe ben khi có bằng lái xe phổ thông hạng 1.","Có thể lái xe máy hai bánh phân khối 250cc bằng giấy phép lái xe phổ thông hạng 2.","Có thể lái xe đạp gắn động cơ khi có bằng lái xe cỡ nhỏ hạng 2."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":9,"b":"Nếu muốn lái xe ô tô khách 12 chỗ trên đường thì người lái xe cần phải có giấy phép lái xe loại nào?","c":["Giấy phép lái xe kéo cỡ lớn hạng 1","Giấy phép lái xe cứu hộ cứu nạn hạng 1","Giấy phép lái xe phổ thông hạng 1","Giấy phép lái xe phổ thông hạng 2"],"a":"3","imgs":[],"t":"문장형"},{"n":10,"b":"Đối tượng nào có thể lấy giấy phép lái xe phổ thông hạng 2?","c":["Người có một mắt không nhìn thấy nhưng mắt bên kia có thị lực là 0,5","Người không có khả năng phân biệt màu đỏ, màu xanh, màu vàng","Người 17 tuổi","Người không nghe được"],"a":"4","imgs":[],"t":"문장형"},{"n":11,"b":"Giải thích nào là đúng về định nghĩa (tiêu chuẩn) xe đạp gắn động cơ theo Luật Giao thông đường bộ?","c":["Dung tích xi lanh từ 50cc trở xuống - công suất tối đa từ 0,59kW trở xuống","Dung tích xi lanh dưới 50cc - công suất tối đa dưới 0,59kW","Dung tích xi lanh từ 125cc trở xuống - công suất tối đa từ 11kW trở xuống","Dung tích xi lanh dưới 125cc - công suất tối đa dưới 11kW"],"a":"3","imgs":[],"t":"문장형"},{"n":12,"b":"Theo Luật Giao thông đường bộ, tiêu chuẩn nào dưới đây có thể thi lấy giấy phép lái xe cỡ lớn hạng 1? (Ngoại  trừ kinh nghiệm lái xe máy hai bánh)","c":["Người 18 tuổi và có kinh nghiệm lái xe ô tô từ 6 tháng trở lên","Người 18 tuổi và có kinh nghiệm lái xe ô tô từ 1 năm trở lên","Người 19 tuổi và có kinh nghiệm lái xe ô tô từ 6 tháng trở lên","Người 19 tuổi và có kinh nghiệm lái xe ô tô từ 1 năm trở lên"],"a":"4","imgs":[],"t":"문장형"},{"n":13,"b":"Giải thích nào sau đây không đúng về việc hoãn kiểm tra tiêu chuẩn sức khỏe bằng lái xe khi xuất cảnh đi  nước ngoài theo Pháp lệnh Giao thông đường bộ?","c":["Phải nộp Đơn đăng ký xin hoãn kiểm tra tiêu chuẩn sức khỏe trước ngày xuất cảnh.","Sau khi đã xuất cảnh, người đại diện không thể thay mặt đăng ký hoãn kiểm tra tiêu chuẩn sức khỏe.","Khi đăng ký hoãn kiểm tra tiêu chuẩn sức khỏe, phải nộp giấy tờ chứng minh cho việc xuất cảnh như vé máy bay  điện tử.","Trường hợp đăng ký hoãn kiểm tra tiêu chuẩn sức khỏe được phê duyệt, bạn phải kiểm tra tiêu chuẩn sức khỏe trong  vòng 3 tháng sau khi về nước."],"a":"2","imgs":[],"t":"문장형"},{"n":14,"b":"Người thi trượt phần thi lái xe trên đường có thể đăng ký thi lại phần thi lái xe trên đường sau (      ) ngày  kể từ ngày thi trượt. Tiêu chuẩn nào đúng  trong ( )?","c":["1 ngày","3 ngày","5 ngày","7 ngày"],"a":"2","imgs":[],"t":"문장형"},{"n":15,"b":"Hai giải thích nào không phù hợp về chế độ \"Tích điểm lái xe an toàn\"?","c":["Là chế độ cung cấp ưu đãi thiết thực cho người lái xe tuân thủ và chấp hành Luật Giao thông.","Trường hợp người lái xe bị phạt đình chỉ giấy phép lái xe có thể trừ vào điểm tích lũy.","Người chưa nộp phạt hoặc tiền phạt thì vẫn có thể tham gia vào cam kết Không vi phạm - không tai nạn của Chế độ  tích điểm.","Nếu gây ra tai nạn giao thông hoặc vi phạm quy định pháp luật về giao thông trong thời gian thực hiện cam kết sẽ  không thể tham gia lại."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":16,"b":"Giải thích nào không đúng về định nghĩa phương tiện di chuyển cá nhân thuộc xe đạp gắn động cơ?","c":["Góc đi lên dốc phải dưới 25 độ.","Trọng lượng thân xe phải dưới 30kg.","Các phương tiện di chuyển cá nhân và xe đạpgọi là xe đạp.","Khi lái xe với tốc độ 25 km/giờ trở lên, mô tơ phải không được hoạt động."],"a":"1","imgs":[],"t":"문장형"},{"n":17,"b":"Sau đây là giải thích về tiêu chuẩn của thiết bị di chuyển cá nhân theo Luật Giao thông đường bộ. Giải thích  nào là đúng?","c":["Khi điều khiển xe có gắn động cơ đi với tốc độ 20km/giờ trở lên, động cơ phải không được hoạt động.","Bao gồm xe đạp điện không thể di chuyển chỉ bằng lực của động cơ điện (PAS: Pedal Assit System/Hệ thống hỗ trợ  đạp).","Trọng lượng của thân xe có động cơ chính với công suất định mức tối đa từ 11kW trở xuống phải dưới 35kg.","Trọng lượng thân xe phải dưới 30kg."],"a":"4","imgs":[],"t":"문장형"},{"n":18,"b":"Trong các câu dưới đây, 2 lí do nào tương ứng với việc bị mất tư cách lấy bằng lái xe trong vòng 2 năm?  (Trường hợp bị kết án phạt từ phạt tiền trở lên)","c":["Khi 3 lần điều khiển phương tiện giao thông mà không có bằng lái xe.","Khi thi hộ người khác trong kỳ thi cấp giấy phép lái xe.","Trường hợp bị lập biên bản do hành vi hành hung cảnh sát giao thông khi đang làm nhiệm vụ và bị thu hồi giấy  phép.","Trường hợp gây tai nạn giao thông từ 3 lần trở lên do lái xe trong tình trạng say rượu."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":19,"b":"Giải thích nào không đúng về về bằng lái xe tiếng Anh theo Pháp lệnh Giao thông đường bộ? (Áp dụng với các  nước có ký kết Công ước Genève hoặc Công ước Vienna)","c":["Có thể lái xe mà không cần bản dịch công chứng riêng khi lái xe tại các quốc gia công nhận giấy phép lái xe tiếng  Anh.","Có thể sử dụng tại các quốc gia công nhận giấy phép lái xe tiếng Anh mà không liên quan đến thời gian cư trú.","Phải xuất trình kèm giấy phép lái xe của Hàn Quốc, giấy phép lái xe quốc tế, hộ chiếu tại các quốc gia không công  nhận giấy phép lái xe tiếng Anh.","Hiển thị nội dung của giấy phép lái xe bằng tiếng Anh ở mặt sau của giấy phép lái xe."],"a":"2","imgs":[],"t":"문장형"},{"n":20,"b":"Theo Luật Giao thông đường bộ, xe đạp gắn động cơ là xe máy hai bánh có công suất định mức tối đa từ (          ) trở xuống khi chạy bằng điện. Tiêu chuẩn nào đúng  trong ( )?","c":["11kW","9kW","5kW","0,59kW"],"a":"1","imgs":[],"t":"문장형"},{"n":21,"b":"Đáp án nào sau đây đúng với định nghĩa \"gờ vỉa hè” quy định trong Pháp lệnh Giao thông đường bộ?","c":["Vạch phân định chính xác hướng đi của xe","Vạch chỉ dẫn cho xe ô tô đi vào phần đường định sẵn thành một hàng","Đường gờ được làm bằng đá, v.v. để phân  biệt lòng đường và vỉa hè","Vạch để phân biệt làn đường xe chạy"],"a":"3","imgs":[],"t":"문장형"},{"n":22,"b":"Điều nào sau đây là nội dung đúng liên quan đến phương tiện di chuyển cá nhân theo Luật Giao thông Đường  bộ?","c":["Có thể lái xe vượt quá số người quy định được đi trên xe","Người từ 65 tuổi trở lên đã trả bằng lái xe vẫn có thể lái xe","Người từ 13 tuổi trở lên có thể lái xe dù chưa có bằng lái xe","Khi sử dụng lối đi dành cho người đi bộ, phải xuống khỏi phương tiện di chuyển cá nhân và kéo hoặc mang theo  để đi bộ."],"a":"4","imgs":[],"t":"문장형"},{"n":23,"b":"Tiêu chuẩn độ tuổi nào là đúng về người cao tuổi cần kiểm tra năng lực theo chu kỳ 3 năm và đổi giấy phép lái  xe theo Pháp lệnh Giao thông đường bộ?","c":["Từ 65 tuổi trở lên","Từ 70 tuổi trở lên","Từ 75 tuổi trở lên","Từ 80 tuổi trở lên"],"a":"3","imgs":[],"t":"문장형"},{"n":24,"b":"Dưới đây là giải thích về quy trình xác nhận nhân thân của người tham gia thi lấy giấy phép lái xe theo Pháp  lệnh Giao thông đường bộ. Nội dung nào không đúng?","c":["Trường hợp bị mất chứng minh nhân dân thì có thể sử dụng giấy xác nhận đăng ký xin cấp chứng minh nhân dân.","Nếu không thể xác minh danh tính của bản thân bằng giấy tờ tùy thân hoặc bằng dấu vân tay thì không thể đăng  dự thi.","Thông tin vân tay có thể được đối chiếu và xác minh bằng phương pháp điện tử mà không cần sự đồng ý của người  đăng ký.","Trường hợp từ chối xác minh danh tính có thể bị từ chối cấp giấy phép lái xe."],"a":"3","imgs":[],"t":"문장형"},{"n":25,"b":"Cơ quan nào sau đây thực hiện đ t nên không thể vượt lên trước.","Có thể vượt xe khi dừng hoặc chạy chậm theo chỉ dẫn của cảnh sát giao thông."],"a":"3","imgs":[],"t":"문장형"},{"n":83,"b":"Nội dung nào sau đây là tư duy không đúng đắn nhất của người lái xe?","c":["Vì tình hình giao thông không có gì thay đổi nên không cần lên kế hoạch điều khiển xe trước.","Trong xe luôn để sẵn bình chữa cháy dùng cho xe ô tô để đề phòng xảy ra cháy.","Không để trong xe các vật dụng dễ cháy nổ như bật lửa.","Điều khiển xe một cách nhường nhịn, thông cảm cho những người mới lái xe."],"a":"1","imgs":[],"t":"문장형"},{"n":84,"b":"Nội dung nào sau đây phù hợp nhất với hành vi lái xe đúng của người lái xe?","c":["Lái xe trong khi buồn ngủ có nguy cơ gây tai nạn giao thông, vì vậy phải dừng ở lề đường để nghỉ ngơi.","Người mới lái xe chạy vượt trên đường cao tốc và tiếp tục lái xe trên làn xe.","Lắp đặt thiết bị cản trở chức năng của thiết bị kiểm soát giao thông và lái xe.","Khi phát hiện yếu tố gây nguy hiểm đến an toàn giao thông thì phải thông báo cho xung quanh bằng đèn nhấp  nháy khẩn cấp."],"a":"4","imgs":[],"t":"문장형"},{"n":85,"b":"Nội dung nào sau đây là tư duy không đúng đắn nhất của người lái xe?","c":["Có thói quen điều khiển xe đúng đắn như duy trì tốc độ ổn định","Đi vào làn đường phụ (sát mép đường) khi đường bị tắc","Nghĩ rằng Luật Giao thông là cam kết giữa các bên","Ưu tiên cho người đi bộ hơn là để xe ô tô lưu thông nhanh chóng"],"a":"2","imgs":[],"t":"문장형"},{"n":86,"b":"Nội dung nào sau đây khác xa nhất với trách nhiệm của người điều khiển xe khi xảy ra tai nạn giao thông?","c":["Trách nhiệm hình sự","Trách nhiệm hành chính","Trách nhiệm dân sự","Trách nhiệm thông cáo"],"a":"4","imgs":[],"t":"문장형"},{"n":87,"b":"Cách xử lý ứng phó nào là không đúng của người lái xe tại hiện trường xảy ra tai nạn giao thông khi đang lái  xe trên đường cao tốc?","c":["Xử lý cấp cứu theo mức độ chấn thương của người đi cùng xe.","Bật đèn khẩn cấp để cảnh báo nguy hiểm cho người lái xe phía sau.","Điều tiết giao thông ở phía sau xe bị tai nạn cho đến khi cảnh sát đến.","Di chuyển đến nơi an toàn để phòng ngừa tai nạn thứ cấp."],"a":"3","imgs":[],"t":"문장형"},{"n":88,"b":"Hành vi nào là không đúng nhất của người điều khiển xe ô tô con trong trường hợp có trẻ em đi cùng trên xe?","c":["Người lớn ngồi ở ghế cạnh ghế lái ôm trẻ và thắt dây an toàn.","Nếu trẻ ngồi ở ghế sau ghế lái thì chỉ cần thắt dây an toàn, không cần chuẩn bị ghế ngồi ô tô cho bé.","Trong lúc điều khiển xe mà trẻ quấy khóc thì cho trẻ ngồi cùng với ghế lái, thắt dây an toàn để dỗ trẻ.","Khi có trẻ em đi cùng, bất kể là đoạn đường nào đều phải trang bị thiết bị bảo vệ cho trẻ, sau đó thắt dây an toàn."],"a":"4","imgs":[],"t":"문장형"},{"n":89,"b":"2 hạng mục phải tuân thủ nào là đúng của người lái xe.","c":["Tạm thời dừng lại khi có nguy cơ xảy ra tai nạn giao thông đối với trẻ em.","Khi đi qua nơi có nước đọng, giảm tốc độ để tránh gây tổn hại cho người khác.","Không có quy định về độ sáng của cửa kính xe ô tô nên có thể nhuộm màu (dán phim) màu tối.","Đi chậm lại khi người đi bộ đi qua lối sang đường."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":90,"b":"2 hành vi nào sau đây là cách lái xe đúng của người lái xe trên đường cao tốc?","c":["Khi mệt mỏi, dừng xe ở làn đường phụ để nghỉ ngơi, ổn định lại rồi mới tiếp tục xuất phát.","Vừa xem video yêu thích vừa điều khiển xe.","Nghỉ ngơi và mở cửa cho thoáng khí thường xuyên để ngăn chặn tình trạng buồn ngủ khi điều khiển xe.","Không chỉ trước khi xuất phát mà ngay cả trong lúc đang nghỉ, cũng phải luôn kiểm tra các yếu tố nguy hiểm trên  đường cho đến khi đến nơi."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":91,"b":"Hạng mục chuẩn bị nào là không đúng nhất của người lái xe để lái xe an toàn?","c":["Chấn chỉnh tình trạng cơ thể không bị lơ là chú ý.","Mặc quần áo thoải mái để điều khiển thiết bị lái và phù hợp với việc lái xe.","Chuẩn bị dụng cụ báo hiệu khẩn cấp như đèn tín hiệu dạng pháo hoa.","Để tiết kiệm nhiên liệu nên khởi động làm nóng động cơ trước khi khởi hành 10 phút."],"a":"4","imgs":[],"t":"문장형"},{"n":92,"b":"Hai nội dung phù hợp nhất về khả năng tập trung khi đang lái xe là gì?","c":["Khi lái xe, việc nói chuyện liên tục với người đi cùng làm tăng khả năng tập trung.","Tốt nhất là bỏ các thứ làm hạn chế tầm nhìn của người lái.","Sự tập trung khi đang lái xe không liên quan gì với việc lái xe an toàn.","Tốt nhất là lắp đặt TV/DMB vào ghế sau để chỉ có những người ngồi ghế sau xem được."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":93,"b":"Theo Luật Giao thông đường bộ, trường hợp có trẻ em đi cùng trên xe ô tô (ngoại trừ xe máy hai bánh) thì  phải sử dụng trang bị bảo hộ trẻ em. Độ tuổi nào sau đây là phù hợp sử dụng đồ bảo hộ?","c":["Từ 8 tuổi trở xuống","Dưới 8 tuổi","Dưới 6 tuổi","Từ 6 tuổi trở xuống"],"a":"3","imgs":[],"t":"문장형"},{"n":94,"b":"Quy định và cách lái xe an toàn nào là không đúng với thiết bị di chuyển cá nhân theo Pháp lệnh Giao thông  đường bộ?","c":["Khi đi trên đường vào ban đêm, người điều khiển xe phải bật đèn pha và đèn hậu.","Trong số thiết bị di chuyển cá nhân có xe điện Kickboard chỉ có thể chở 1 người nên chở 2 người là không được.","Thiết bị di chuyển cá nhân bao gồm các thiết bị phù hợp cho cá nhân di chuyển như xe điện hai bánh, xe Kickboard  điện, xe đạp điện, bánh xe điện, xe ","Xe đạp điện chỉ di chuyển bằng động cơ điện chỉ có thể đi được 2 người."],"a":"3","imgs":[],"t":"문장형"},{"n":95,"b":"Giải thích nào là đúng về việc thắt dây an toàn trên xe ô tô (trừ xe máy hai bánh)?","c":["Nếu trẻ em dưới 13 tuổi không thắt dây an toàn, người điều khiển xe bị phạt hành chính 100.000 Won.","Nếu người đi cùng từ 13 tuổi trở lên không thắt dây an toàn, người điều khiển xe bị phạt hành chính 30.000 Won.","Khi lưu thông trên đường thông thường, chỉ có người điều khiển xe và người đi cùng ngồi cạnh ghế lái mới có nghĩa  vụ phải thắt dây an toàn.","Tất cả người ngồi trên xe đều có nghĩa vụ phải thắt dây an toàn nhưng đối với trẻ em dưới 3 tuổi thì chỉ cần người  bảo hộ ôm là có thể đi cùng."],"a":"2","imgs":[],"t":"문장형"},{"n":96,"b":"Hành vi lái xe nào là đúng giúp phòng tránh tai nạn giao thông?","c":["Sử dụng đèn xi nhan để chỉ rõ hướng di chuyển của mình","Thường xuyên có thao tác điều khiển bất ngờ và phanh gấp","Phỏng đoán hướng có lợi cho bản thân và lái theo hướng đó","Trả đũa các tài xế khác có hành vi lái xe vi phạm quy định pháp luật"],"a":"1","imgs":[],"t":"문장형"},{"n":97,"b":"Hành vi lái xe nào sau đây là không đúng nhất của người lái xe?","c":["Lái xe theo dòng giao thông trong giới hạn tốc độ cho phép.","Trường hợp là người mới lái xe, nên sử dụng làn đường phụ trên đường cao tốc để không gây cản trở luồng giao  thông.","Không dừng xe trên đường để cãi nhau.","Người có giấy phép tập lái xe phải đi cùng với người khác khi lái xe theo quy định của pháp luật."],"a":"2","imgs":[],"t":"문장형"},{"n":98,"b":"Giải thích nào là đúng nhất về việc nhường đường khi lái xe theo Pháp lệnh Giao thông đường bộ?","c":["Khi đang tiếp tục đi với tốc độ chậm thì tránh vào lề đường bên trái để nhường đường.","Đi với tốc độ nhanh khi có xe khẩn cấp đi theo phía sau.","Người điều khiển xe đang định tiến vào đoạn đường giao nhau không có đèn tín hiệu giao thông phải nhường  đường cho xe của làn đường bên trái.","Xe đang đi trên đường có biển báo nhường đường phải nhường làn đường cho xe chạy trên đường khác."],"a":"4","imgs":[],"t":"문장형"},{"n":99,"b":"Đối tượng nào sau đây không thuộc “người di chuyển giao thông khó khăn” theo Luật nâng cao tiện ích cho  người di chuyển giao thông khó khăn?","c":["Người cao tuổi","Phụ nữ mang thai","Người đi cùng trẻ sơ sinh, trẻ nhỏ","Người đi cùng thú cưng"],"a":"4","imgs":[],"t":"문장형"},{"n":100,"b":"Theo Luật nâng cao tiện ích di chuyển cho người di chuyển giao thông khó khăn, nội dung nào khó được  xem là \"Cơ sở tiện ích an toàn cho đi bộ\" dành cho những người di chuyển giao thông khó khăn?","c":["Công trình giảm tốc độ","Làn đường dành riêng cho xe đạp","Trang thiết bị hướng dẫn về giao thông như phương tiện thông báo thông tin giao thông công cộng","Đèn tín hiệu giao thông ưu tiên cho người đi bộ"],"a":"2","imgs":[],"t":"문장형"},{"n":101,"b":"Theo Luật Giao thông đường bộ, trường hợp nào sau đây phải lái xe đi chậm?","c":["Khi đèn tín hiệu ở giao lộ đang nhấp nháy màu đỏ","Khi đi qua giao lộ không có điều khiển giao thông và lưu lượng giao thông đông đúc","Khi đi qua giao lộ không có điều khiển giao thông","Trường hợp đổi làn xe gần giao lộ"],"a":"3","imgs":[],"t":"문장형"},{"n":102,"b":"Phương pháp lái xe đúng nhất khi rẽ trái ở đoạn đường giao nhau bị ùn tắc giao thông.","c":["Tiến vào theo chiếc xe phía trước nếu có thể.","Khi đèn bật xanh thì tiến vào cũng không sao.","Dù đèn bật đỏ nhưng nếu có khoảng trống thì vẫn tiến vào.","Dù tín hiệu đèn mũi tên màu xanh bật sáng nhưng vẫn không lái xe tiến vào."],"a":"4","imgs":[],"t":"문장형"},{"n":103,"b":"Cách lái xe nào đúng để chuyển từ làn đường tăng tốc sang làn đường lái trên đường cao tốc?","c":["Nhất định phải tạm dừng để quan sát luồng giao thông rồi sau đó mới nhanh chóng đi vào.","Tạm dừng trước khi đi vào, nếu trường hợp có xe thì nhanh chóng đi vào.","Mặc dù thiếu không gian để đi vào nhưng vì nghĩ cho xe ở phía sau nên cứ thế đi vào.","Sử dụng làn đường tăng tốc và duy trì tốc độ, sau khi xác định có đủ không gian thì mới tiến vào."],"a":"4","imgs":[],"t":"문장형"},{"n":104,"b":"Xe A đang đi chậm ở làn đường bên phải làn đường chính trên đường cao tốc. Lúc này, cách phù hợp nhất  khi chuyển sang làn đường chính an toàn của xe B là cách nào?","c":["Từ từ tăng tốc và đi vào làn đường chính sau khi xe A đi qua.","Tăng tốc và lợi dụng đường trống để vào làn.","Dừng xe ở cuối làn đường tăng tốc và chờ cho xe A đi qua rồi tiến vào.","Tiếp tục lái xe với tốc độ giống với xe A ở làn đường tăng tốc."],"a":"1","imgs":[],"t":"문장형"},{"n":105,"b":"Hành vi lái xe nào là đúng đắn nhất của người lái xe khi trẻ em đi sang đường mà không có người giám hộ?","c":["Bấm còi liên tục để trẻ có thể băng qua đường nhanh chóng.","Đảm bảo an toàn cho trẻ em qua đường bằng cách đi chậm lại.","Tạm dừng xe để đảm bảo an toàn cho trẻ em qua đường.","Đảm bảo an toàn cho trẻ em đi qua đường bằng cách đi qua nhanh."],"a":"3","imgs":[],"t":"문장형"},{"n":106,"b":"Cách lái xe an toàn nhất khi tiến vào đoạn đường giao nhau không thể quan sát bên phải - bên trái và không  có đèn tín hiệu giao thông là gì?","c":["Tùy theo tình hình xung quanh, đi từ từ kiểm tra an toàn rồi sau đó đi qua.","Bấm còi và nháy đèn pha trước, sau đó tiến vào rồi đi chậm qua.","Nhất định phải tạm dừng, sau đó kiểm tra an toàn rồi đi qua theo thứ tự lái xe ưu tiên.","Xe tiến vào trước được ưu tiên trước nhất nên vừa nhìn xung quanh vừa đi qua nhanh chóng."],"a":"3","imgs":[],"t":"문장형"},{"n":107,"b":"Yếu tố nguy hiểm nhất khi rẽ trái ở đường giao nhau là gì?","c":["Người đi bộ đi qua vạch sang đường của đường bên phải","Xe máy hai bánh chạy từ phía sau tới ở làn đường bên phải","Xe ô tô con rẽ phải từ đường phía bên trái","Xe đạp rẽ phải từ đường phía đối diện"],"a":"4","imgs":[],"t":"문장형"},{"n":108,"b":"Giải thích nào đúng nhất về tư thế của người lái phương tiện di chuyển cá nhân theo Luật Giao thông đường  bộ?","c":["Lái xe phải tránh người đi bộ trong trường hợp lưu thông trên vỉa hè.","Lái xe phải đặc biệt lưu ý trong trường hợp uống rượu trước khi lái xe.","Nếu có lối qua đường dành cho người đi bộ và đường dành cho xe đạp qua đường, phải lái xe trên làn đường dành  cho xe đạp qua đường.","Lái xe phải tránh người đi bộ sử dụng làn đường dành cho người đi bộ qua đường trong trường hợp băng qua vạch  đi bộ qua đường."],"a":"3","imgs":[],"t":"문장형"},{"n":109,"b":"Nội dung nào đúng với chính sách an toàn giao thông 5030 về tốc độ an toàn?","c":["Tối đa 50 km/giờ trên đường dành riêng cho xe ô tô và tối đa 30 km/giờ trên đường nhánh ở khu vực dân cư trong  khu đô thị","Tối đa 50 km/giờ trên đường thông thường ở khu vực đô thị và tối đa 30 km/giờ trên đường nhánh ở khu vực dân  cư trong khu đô thị","Tối đa 50 km/giờ trên đường dành riêng cho ô tô và tối đa 30 km/giờ trong khu vực bảo vệ trẻ em","Tối đa 50 km/giờ trên đường thông thường ở khu vực đô thị và tối đa 30 km/giờ trên đường dành cho xe đạp"],"a":"2","imgs":[],"t":"문장형"},{"n":110,"b":"Chọn 2 câu đúng về trường hợp hay khu vực phải đi chậm lại khi đang lái xe theo Pháp lệnh Giao thông  đường bộ.","c":["Đoạn đường giao nhau không có đèn tín hiệu giao thông","Khi các em nhỏ qua đường mà không có người bảo hộ","Khi người không nhìn thấy phía trước cầm gậy màu trắng đang đi qua đường","Ở gần đoạn đường quanh co"],"a":"1, 4","imgs":[],"t":"문장형"},{"n":111,"b":"Cách lưu thông nào là phù hợp nhất ở đường vòng xuyến?","c":["Xe đang chạy trong vòng xuyến là xe được ưu tiên.","Khi muốn tiến vào vòng xuyến, phải tiến vào thật nhanh.","Khi tiến vào vòng xuyến, phải bật đèn nháy khẩn cấp để báo hiệu sẽ tiến vào.","Trong vòng xuyến lưu thông theo chiều ngược chiều kim đồng hồ."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":112,"b":"Chọn 2 câu đúng khi đi trên đường cao tốc.","c":["Phải thắt dây an toàn ở tất cả các ghế ngồi khi đi trên đường cao tốc.","Các xe đang đi trên đường cao tốc phải nhường đường cho xe tiến vào.","Nếu đang chạy xe trên đường cao tốc thì dù có xe cấp cứu đang tiến vào cũng không cần nhường đường.","Khi đi phải mang theo biển báo hỏng xe (bao gồm cả biển tam giác cảnh báo an toàn)."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":113,"b":"Hãy chọn 2 câu giải thích đúng.","c":["Biểu thị nhường đường ở trên mặt đường là hình tam giác \"△'' màu trắng.","Xe đang chạy trên làn đường có biển báo nhường đường phải nhường đường cho các xe đang lưu thông trên làn  đường khác.","Khi muốn đổi làn ở đường thông thường, phải bật tín hiệu từ nơi cách chỗ đổi làn trên 30m.","Để đảm bảo giao thông thông thoáng, phải tăng tốc điều khiển xe chạy sát nhau."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":114,"b":"Chọn 2 nội dung giải thích đúng về nhường đường ở đường giao nhau không có điều khiển giao thông.","c":["Người lái xe định rẽ trái phải nhường đường cho xe định rẽ phải hoặc xe đi thẳng.","Người lái xe đang định đi vào đường giao nhau không có nghĩa vụ phải nhường đường cho xe đang rẽ trái ở trong  đường giao nhau.","Trong trường hợp có xe từ đường hẹp cũng đang đi vào đường giao nhau thì người lái xe đang định tiến vào đường  giao nhau không được nhường đường cho ","Khi các xe có cùng thứ bậc ưu tiên đồng thời định tiến vào đường giao nhau thì phải nhường đường cho xe của  đường bên phải."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":115,"b":"Hai giải thích nào không đúng về phương tiện di chuyển cá nhân theo Pháp lệnh Giao thông đường bộ?","c":["Động cơ điện không được hoạt động khi vận hành với tốc độ từ 25 km/h trở lên và trọng lượng phương tiên phải  dưới 30 kg.","Người điều khiển từ 13 tuổi trở lên đều có thể lái phương tiện di chuyển cá nhân mà không cần giấy phép.","Vì là loại xe đạp chỉ chạy bằng động lực của động cơ điện nênđược phân loại là phương tiện di chuyển cá nhân  theo quy định pháp luật.","Phương tiện di chuyển cá nhân có thể tự do lưu thông trên đường dành cho xe đạp và vỉa hè."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":116,"b":"Người lái xe nào có khả năng cao dễ gây ra tai nạn nhất?","c":["Người lái xe chỉ tập trung vào lái xe","Người lái xe có thói quen khởi hành bất ngờ, phanh gấp và chuyển làn đột ngột","Người lái xe giữ khoảng cách an toàn với xe đạp và xe máy hai bánh","Người lái xe kiên nhẫn và không vội vàng"],"a":"2","imgs":[],"t":"문장형"},{"n":117,"b":"Thái độ lái xe nào là không đúng đúng đắn của người điều khiển xe?","c":["Luôn nhớ rằng tín hiệu của cảnh sát được ưu tiên hơn tín hiệu của đèn tín hiệu giao thông.","Phải nắm rõ Luật Giao thông đã sửa đổi theo sự thay đổi của môi trường giao thông.","Khi phát hiện xe khẩn cấp, bất kể đang ở vị trí nào cũng phải tạm dừng xe và nhường đường.","Trên đường đang có mưa to hoặc thường có mưa vào mùa mưa, phải chú ý các ổ gà (pothole)."],"a":"3","imgs":[],"t":"문장형"},{"n":118,"b":"Muốn tiến vào đoạn đường giao nhau không có điều khiển giao thông để đi thẳng. Trường hợp xe ô tô đang  định rẽ trái từ làn đường đối diện đã tiến vào đường giao nhau, thì lúc này cách lái xe đúng của","c":["Khi có xe khác, phải nhường đường cho xe đó.","Dù có xe khác thì xe đi thẳng vẫn là ưu tiên nên cứ đi qua trước.","Khi có xe khác, cần kiểm tra hai bên trái phải và nhanh chóng đi qua đoạn đường giao nhau mà không quan tâm  đến xe khác đó.","Dù có xe khác nhưng nếu làn đường xe bạn đang đi rộng hơn làn đường của xe khác thì cứ tiến vào theo quyền ưu  tiên lưu thông."],"a":"1","imgs":[],"t":"문장형"},{"n":119,"b":"Giải thích nào không đúng về số người đi trên thiết bị di chuyển cá nhân theo Pháp lệnh Giao thông đường  bộ?","c":["Số người đi trên xe Kickboard điện là 1 người.","Số người đi trên xe điện hai bánh là 1 người.","Số người đi trên xe đạp chỉ chuyển động bằng động cơ là 1 người.","Trường hợp vi phạm số người đi trên xe bị phạt tiền 40.000 Won."],"a":"3","imgs":[],"t":"문장형"},{"n":120,"b":"Thái độ nào dưới đây là tốt nhất mà người lái xe cần có?","c":["Tôn trọng tín hiệu giao thông và an toàn","Ưu tiên cho xe hơn là cho con người","Ưu tiên cho xe của mình hơn xe của người khác","Tai nạn giao thông là kết quả của xui xẻo, không phải do lái xe không tuân thủ luật"],"a":"1","imgs":[],"t":"문장형"},{"n":121,"b":"Theo Luật Giao thông đường bộ, giải thích nào là sai khi nói về người được cấp giấy phép lái xe có điều kiện  phải gắn thiết bị ngăn chặn việc lái xe khi say rượu?","c":["Trong trường hợp muốn điều khiển ô tô, v.v, phải lắp đặt thiết bị ngăn chặn việc lái xe khi say rượu và đăng ký với  Giám đốc Sở Cảnh sát tỉnh/thành p","Không được phép điều khiển ô tô, v.v nếu không lắp đặt thiết bị ngăn chặn việc lái xe khi say rượu.","Có thể điều khiển ô tô, v.v đã lắp đặt thiết bị ngăn chặn việc lái xe khi say rượu nhưng không đáp ứng tiêu chuẩn lắp  đặt.","Phải nộp báo cáo hồ sơ vận hành của ô tô, v.v có gắn thiết bị ngăn chặn việc lái xe khi say rượu cho Giám đốc Sở  Cảnh sát tỉnh/thành phố ít nhất 2 lầ"],"a":"3","imgs":[],"t":"문장형"},{"n":122,"b":"Theo Luật Giao thông đường bộ, người lái xe sẽ bị xử phạt như thế nào khi lái xe trong tình trạng không  bình thường do quá sức (bao gồm cả lái xe khi buồn ngủ)?","c":["Không xử phạt","Tạm giam hoặc phạt tiền hình sự tối đa 100.000 Won","Tạm giam hoặc phạt tiền hình sự tối đa 200.000 Won","Tạm giam hoặc phạt tiền hình sự tối đa 300.000 Won"],"a":"4","imgs":[],"t":"문장형"},{"n":123,"b":"Người lái xe mệt mỏi sẽ gây ảnh hưởng đến việc lái xe. Giải thích nào đúng về tác động của sự mệt mỏi lên  hành động lái xe?","c":["Phản ứng về những kích thích xung quanh nhanh hơn.","Thị lực giảm và tầm nhìn mở rộng hơn.","Cảm giác và khả năng điều khiển xe giảm.","Lái xe tỉ mỉ và có kế hoạch."],"a":"3","imgs":[],"t":"문장형"},{"n":124,"b":"Giải thích nào dưới đây là sai về tiêu chuẩn xử phạt đối với người lái xe ô tô khi uống rượu bia?","c":["Khi vi phạm lần đầu, nếu nồng độ cồn trong máu từ 0,2% trở lên thì bị phạt tù từ 2 năm đến 5 năm hoặc phạt tiền  hình sự từ 10 triệu Won đến 20 triệu ","Khi vi phạm 1 lần về từ chối kiểm tra nồng độ bia rượu thì bị phạt tù từ 1 năm đến 5 năm hoặc phạt tiền hình sự từ  5 triệu Won đến 20 triệu Won","Trường hợp 2 lần vi phạm nồng độ cồn trong máu 0,05% thì bị phạt tù tối đa 1 năm hoặc phạt tiền hình sự tối đa 5  triệu Won","Trường hợp vi phạm lần đầu tiên với nồng độ cồn trong máu từ 0,08% ~ 0,2%, phạt tù 1 năm ~ 2 năm hoặc phạt  tiền 5 triệu won ~ 10 triệu won"],"a":"3","imgs":[],"t":"문장형"},{"n":125,"b":"Nếu lái xe trong trạng thái mệt mỏi thì khả năng nhận định về tốc độ không đúng. Giải thích nào đúng về nội  dung này?","c":["Trên đoạn đường hẹp sẽ cảm thấy chậm hơn tốc độ thực tế.","Ở đoạn đường xung quanh thoáng rộng sẽ cảm thấy nhanh hơn so với thực tế.","Có thể xảy ra tai nạn do đánh giá thấp tốc độ của xe đang tiến đến từ phía xa.","Không xảy ra tình huống lầm tưởng xe đang dừng lại ở phía trước là xe đang chạy trên đường cao tốc."],"a":"3","imgs":[],"t":"문장형"},{"n":126,"b":"Hãy chọn 2 tình huống có thể gây ảnh hưởng đến khoảng cách phản xạ phanh khi lái xe.","c":["Điều khiển xe khi trời mưa.","Điều khiển xe trong tình trạng say rượu.","Điều khiển xe trong tình trạng lượng dầu phanh không đủ.","Điều khiển xe trong tình trạng mệt mỏi."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":127,"b":"Hãy chọn 2 hình phạt đúng đối với người uống rượu lái xe.","c":["Người điều khiển xe mà nồng độ cồn trong máu trên 0,08% sẽ bị tước bằng lái xe và bị truy cứu trách nhiệm hình sự.","Trường hợp lái xe không chấp hành đo nồng độ cồn theo yêu cầu của cảnh sát hoặc điều khiển xe trong tình trạng  nồng độ cồn trong máu trên 0,03% gây t","Trường hợp lái xe có nồng độ cồn trong máu từ 0,03% đến dưới 0,08% điều khiển xe lưu thông trên đường thì sẽ bị  cấm lái xe trong 120 ngày và bị truy ","Người uống rượu trong lúc lái xe lần đầu tiên với nồng độ cồn trong máu từ 0,03% đến dưới 0,08% gây thiệt hại về  mặt vật chất thì sẽ bị hủy giấy phép"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":128,"b":"Chọn 2 giải thích đúng về việc lái xe khi say rượu trong số các câu sau.","c":["Trong trường hợp không chấp nhận kết quả đo nồng độ cồn bằng cách sử dụng máy đo nồng độ cồn trong hơi thở  thì có thể thực hiện đo lại nồng độ cồn tr","Theo Luật Giao thông đường bộ, không có quy định xử phạt hành vi cản trở việc đo nồng độ cồn.","Người lái xe đạp trong tình trạng say rượu và cản trở việc đo nồng độ cồn có thể bị xử phạt.","Người lái ô tô (và các phương tiện tương tự) bị nghi ngờ đang say rượu và không chấp hành việc đo nồng độ cồn  theo yêu cầu của cảnh sát, dù có lí do "],"a":"3, 4","imgs":[],"t":"문장형"},{"n":129,"b":"Hai nội dung giải thích đúng về lái xe khi mệt mỏi, làm việc quá sức và buồn ngủ là?","c":["Buồn ngủ khi lái xe thường xuyên xảy ra khi đang mệt mỏi, cần tăng lượng cafein hấp thụ và thường xuyên thay đổi  làn đường để tránh buồn chán.","Trên đường ít có biến động và ít xuất hiện các tình huống nguy hiểm, khả năng chú ý được nâng cao và giảm tình  trạng buồn ngủ khi lái xe.","Uống thuốc cảm có thể dẫn đến buồn ngủ nên cần hạn chế lái xe để đảm bảo an toàn.","Lái xe sau khi uống rượu làm giảm chức năng của não và tăng khả năng buồn ngủ khi lái xe."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":130,"b":"Điều gì xảy ra nếu bị bắt giữ khi đang lái xe ở tình trạng thể chất không thể lái xe một cách bình thường do  bệnh tật hay quá sức?","c":["Có thể bị phạt tiền hành chính","Có thể bị đình chỉ bằng lái xe","Bị tạm giữ hoặc phạt tiền hình sự","Không bị phạt"],"a":"3","imgs":[],"t":"문장형"},{"n":131,"b":"Trường hợp người lái xe trong tình trạng không thể lái xe bình thường do sử dụng chất cấm như ma túy mà  gây tai nạn giao thông thiệt hại về người thì trách nhiệm của người lái xe là gì theo Luật đặc ","c":["Dù chỉ tham gia Bảo hiểm Trách nhiệm và có thỏa thuận thêm với nạn nhân thì vẫn bị xử phạt hình sự.","Nếu có tham gia Bảo hiểm cho Người lái xe thì được miễn xử phạt hình sự.","Nếu có tham gia Bảo hiểm Tổng hợp thì được miễn xử phạt hình sự.","Nếu có tham gia Bảo hiểm Tổng hợp và đã thỏa thuận thêm với nạn nhân thì được miễn xử phạt hình sự."],"a":"1","imgs":[],"t":"문장형"},{"n":132,"b":"Giải thích nào đúng với trường hợp tài xế A lái xe trong trạng thái nồng độ cồn trong máu từ 0,03% trở lên  bị va chạm từ phía sau (với tài xế B) trong khi đang chờ đèn tín hiệu?","c":["Tài xế A bị xử phạt với tư cách là người gây ra tai nạn vì lái xe khi say xỉn là hành vi vi phạm nghiêm trọng.","Tài xế B trở thành người gây ra tai nạn nhưng tài xế A cũng bị phạt do lái xe khi say xỉn.","Tài xế A là nạn nhân trong vụ tai nạn nên không bị xử phạt hành chính đối với giấy phép lái xe.","Tài xế B không phải đối mặt với hình phạt nào bất kể nguyên nhân và hậu quả của vụ tai nạn."],"a":"2","imgs":[],"t":"문장형"},{"n":133,"b":"Theo Luật Giao thông đường bộ thì tiêu chuẩn về nồng độ cồn trong máu của người say rượu bị cấm lái xe là  ( ). Chọn câu đúng để điền vào trong dấu ngoặc ( ).","c":["Từ 0,01% trở lên","Từ 0,02% trở lên","Từ 0,03% trở lên","Từ 0,08% trở lên"],"a":"3","imgs":[],"t":"문장형"},{"n":134,"b":"Hai câu giải thích nào dưới đây là đúng về lái xe trong tình trạng mệt mỏi và lái xe trong trạng thái bị ảnh  hưởn
