ừng xe trên đường có phân làn xe và vỉa hè, phải đỗ sát lề phải của phần đường dành cho xe.","Ở những nơi chỉ định phương pháp dừng và đỗ xe bằng biển báo an toàn, không cần phải tuân thủ theo phương  pháp đó.","Trên đường bằng phẳng, đối với xe số sàn, chỉ cần để số 1 hoặc số lùi mà không cần kéo phanh tay.","Trên đường dốc, sau khi kéo phanh tay, phải đặt vật chèn bánh để cố định xe."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":354,"b":"Hai nội dung tương ứng với \"đỗ xe” theo Pháp lệnh Giao thông đường bộ là gì?","c":["Trường hợp dừng xe kéo dài do xe bị hỏng.","Tạm thời dừng lại để đề phòng nguy hiểm.","Dù không quá 5 phút nhưng ở trạng thái không thể điều khiển được ngay do người lái đã rời xe.","Tạm dừng lại để cho bạn xuống ở ga tàu điện ngầm."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":355,"b":"Hai nội dung tương ứng với “dừng xe” theo Pháp lệnh Giao thông đường bộ là gì?","c":["Trường hợp người lái xe đang chờ đón khách ở trạm chờ taxi đi vệ sinh","Trường hợp người lái xe rời khỏi xe để bốc hàng hóa nên không thể lái xe đi ngay","Dừng xe để chờ tín hiệu giao thông trong khi đang lưu thông.","Dừng xe và hỏi đường người đi bộ từ ghế lái."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":356,"b":"Hai nơi nào không áp dụng ngoại lệ đặc biệt đối với khu vực cấm dừng hoặc đỗ xe theo Pháp lệnh Giao  thông đường bộ?","c":["Cách cửa ra vào trong khu vực bảo vệ trẻ em trong vòng 50m","Cách lối qua đường cho người đi bộ trong vòng 10m","Cách nơi lắp đặt thiết bị chữa cháy khẩn cấp trong vòng 5m","Cách bốn phía của khu vực an toàn trong vòng 10m"],"a":"3, 4","imgs":[],"t":"문장형"},{"n":357,"b":"Hai nơi nào sau đây có thể đỗ xe theo Pháp lệnh Giao thông đường bộ?","c":["Khu vực cách góc đường 5m","Khu vực cách nơi lắp đặt trạm chứa nước chữa cháy 7m","Khu vực cách nơi lắp đặt thiết bị chữa cháy khẩn cấp 7m","Khu vực cách khu vực an toàn 5m"],"a":"2, 3","imgs":[],"t":"문장형"},{"n":358,"b":"Cách nào lái xe an toàn nhất khi định rẽ trái ở giao lộ không có điều khiển giao thông theo Pháp lệnh Giao  thông đường bộ?","c":["Dù có xe khác tiến vào trước thì vẫn chạy chậm và rẽ trái cẩn thận.","Nhường đường đi thẳng cho xe đi ở đường lớn hơn.","Nhường đường cho xe ô tô đi thẳng nhưng có quyền ưu tiên hơn xe rẽ phải.","Trước tiên, đi chậm theo vạch phân cách giữa đường và rẽ trái ở phần phía ngoài khu vực trung tâm đường giao  nhau."],"a":"2","imgs":[],"t":"문장형"},{"n":359,"b":"Giải thích nào là sai về phương pháp đi trong vòng xuyến theo Pháp lệnh Giao thông đường bộ?","c":["Khi tiến vào vòng xuyến, giảm tốc độ và đi từ từ.","Chờ ở vạch nhường đường, dừng tạm thời và đi từ từ tiến vào trong vòng xuyến.","Xe vào trong vòng xuyến trước có quyền được ưu tiên nên xe đang rẽ phải nhường.","Lưu thông theo chiều ngược chiều kim đồng hồ."],"a":"3","imgs":[],"t":"문장형"},{"n":360,"b":"Trường hợp có xe đi vào trước và rẽ trái tại đường giao nhau không có đèn tín hiệu giao thông thì cách xử lý  nào là đúng theo Pháp lệnh Giao thông đường bộ?","c":["Vừa chú ý đến xe đi thẳng phía trước vừa lái xe.","Xe định rẽ phải thì đi chậm chậm rồi rẽ phải.","Xe đi thẳng và xe rẽ phải tất cả đều phải nhường đường cho xe rẽ trái.","Xe đi trên đường hẹp thì cần lái xe qua chậm."],"a":"3","imgs":[],"t":"문장형"},{"n":361,"b":"Điều nào sau đây là cách đi đúng nhất khi rẽ trái tại ngã tư theo quy định của Luật Giao thông Đường bộ?","c":["Lái chậm rãi theo vạch phân làn và rẽ trái vào hướng giữa ngã tư.","Tại ngã tư có đèn tín hiệu, nếu có biển báo cho phép rẽ trái mà không có đèn tín hiệu ưu tiên thì được phép rẽ  trái khi đèn đỏ.","Khi vào ngã tư không có đèn tín hiệu cùng lúc, xe rẽ trái được ưu tiên hơn xe đi thẳng.","Trên đường một chiều 3 làn không có xe lưu thông, được phép rẽ trái từ làn bên phải."],"a":"1","imgs":[],"t":"문장형"},{"n":362,"b":"Cách đi đúng khi đi qua đường giao nhau không có điều khiển giao thông theo Pháp lệnh Giao thông đường bộ?","c":["Trong trường hợp nếu không quan sát được trái phải thì phải đi từ từ.","Xe rẽ trái được ưu tiên hơn xe đi thẳng.","Xe rẽ phải được ưu tiên hơn xe đi thẳng.","Trong trường hợp chiều rộng của đường giao nhau lớn hơn chiều rộng của đường đang đi thì phải lái xe chậm."],"a":"4","imgs":[],"t":"문장형"},{"n":363,"b":"Trường hợp nào được khuyến cáo nên lắp đặt vòng xuyến để đảm bảo an toàn và lưu thông thông thoáng  trên đường?","c":["Nơi có lưu lượng giao thông không cao, nhưng phát sinh nhiều tai nạn giao thông ở đường giao nhau.","Nơi có nhiều hơn một đường có từ 3 làn đường một chiều trở lên tiến vào đường giao nhau.","Nơi lưu lượng giao thông của vòng xuyến vượt quá khả năng có thể xử lý.","Nơi vòng xuyến nằm trong khu vực cần phối hợp tín hiệu (điều khiển) giao thông nhưng bị giảm hiệu quả phối hợp  này."],"a":"1","imgs":[],"t":"문장형"},{"n":364,"b":"Giải thích nào là đúng về vòng xuyến?","c":["Vòng xuyến có nhiều điểm xung đột hơn so với các nút giao thông tín hiệu.","Khi tiến vào, phải chờ ở vạch nhường đường cho đến khi trong vòng xuyến có khoảng trống.","Hướng dẫn phương tiện đi vào bằng việc lắp đặt đèn tín hiệu để xử lý lưu lượng giao thông trong nút giao.","Xe đang rẽ cần phải nhường đường cho xe đang tiến vào."],"a":"2","imgs":[],"t":"문장형"},{"n":365,"b":"Theo Pháp lệnh Giao thông đường bộ, đường có biểu thị trên mặt đường vạch đứt màu trắng trong đoạn  đường giao nhau để người lái xe có thể rẽ trái một cách chính xác gọi là đường là gì?","c":["Đường hướng dẫn","Đường nối tiếp","Đường chỉ thị","Đường hạn chế"],"a":"1","imgs":[],"t":"문장형"},{"n":366,"b":"Hai phương pháp lái xe nào là an toàn nhất của người lái xe khi rẽ trái tại đường giao nhau?","c":["Phải chú ý xe dừng ở hướng ngược lại.","Chỉ cần chú ý xe rẽ phải ở hướng ngược lại.","Phải chú ý các xe rẽ phải ở cùng chiều.","Phải chú ý đến cả xe cùng rẽ trái bên cạnh."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":367,"b":"Hai phương pháp lái xe nào là an toàn nhất khi rẽ trái hoặc rẽ phải tại đường giao nhau?","c":["Khi rẽ phải, trước tiên cần đi từ từ sang lề bên phải của đường rồi sau đó mới rẽ phải.","Khi rẽ trái trên đường tắc nghẽn, phải nhanh chóng đi qua bất kể vạch hướng dẫn bên trái là gì.","Khi rẽ trái, trước tiên cần đi từ từ theo vạch phân cách chính giữa đường, đi vào phía trong chính giữa của đường  giao nhau rồi rẽ trái.","Khi rẽ trái ở đường giao nhau có vạch hướng dẫn, bánh xe trái phải đi qua phía trong vạch hướng dẫn."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":368,"b":"Phương pháp nào là đúng khi đi qua vòng xuyến theo Pháp lệnh Giao thông đường bộ?","c":["Ưu tiên xe đang rẽ.","Ưu tiên xe chuẩn bị vào vòng xuyến.","Ưu tiên xe đã ra khỏi vòng xuyến.","Không có thứ tự ưu tiên cho xe."],"a":"1","imgs":[],"t":"문장형"},{"n":369,"b":"Hành vi nào là không bị cấm trong vòng xuyến theo Pháp lệnh Giao thông đường bộ?","c":["Dừng xe","Đỗ xe","Đi chậm và tạm dừng","Vượt lên trước"],"a":"3","imgs":[],"t":"문장형"},{"n":370,"b":"Xe nào sau đây được công nhận có quyền ưu tiên khi lưu thông trong vòng xuyến?","c":["Xe chạy trên làn đường quay đầu xe trong bùng binh vòng xoay","Xe định rẽ trái trước khi vào bùng binh vòng xoay","Xe định rẽ phải trước khi vào bùng binh vòng xoay","Xe định rẽ trái và rẽ phải trước khi vào bùng binh vòng xoay"],"a":"1","imgs":[],"t":"문장형"},{"n":371,"b":"Giải thích nào là sai về vòng xuyến?","c":["Các phương tiện phải từ từ tiến lại gần vòng xuyến.","Nhường cho bất kỳ xe nào đang rẽ.","Các phương tiện có thể liên tục đi vào vòng xuyến khi không có tín hiệu.","Hướng lưu thông trong vòng xuyến là theo chiều kim đồng hồ."],"a":"4","imgs":[],"t":"문장형"},{"n":372,"b":"Hai câu đúng nhất với cách lưu thông ở vòng xuyến?","c":["Tạm dừng trước khi tiến vào đường giao nhau, nếu không có xe đang tiến đến từ phía bên trái của đường giao nhau  thì mới tiến vào.","Trong vòng xuyến đi theo chiều kim đồng hồ.","Khi tiến vào/ ra khỏi vòng xuyến, không cần phải bật đèn xi nhan.","Sau khi đã tiến vào vòng xuyến vẫn phải chú ý các xe khác khi lưu thông."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":373,"b":"Nơi nào là nơi phải tạm dừng khi lái xe theo Pháp lệnh Giao thông đường bộ?","c":["Gần đoạn đường quanh co.","Ở đoạn đường xuống dốc đứng.","Gần đỉnh dốc.","Đường giao nhau không có điều khiển giao thông và có lưu lượng giao thông lớn."],"a":"4","imgs":[],"t":"문장형"},{"n":374,"b":"Nơi nào đúng là nơi bắt buộc phải tạm dừng theo Pháp lệnh Giao thông đường bộ?","c":["Đường giao nhau không thể quan sát phải trái và không có điều khiển giao thông","Đường giao nhau có bật đèn tín hiệu màu xanh","Trong đường hầm hoặc trên cầu có lưu lượng giao thông lớn","Gần đoạn đường quanh co hoặc khu vực gần với đỉnh dốc"],"a":"1","imgs":[],"t":"문장형"},{"n":375,"b":"Nơi nào là nơi phải tạm dừng theo Pháp lệnh Giao thông đường bộ?","c":["Trong hầm và trên cầu","Đường giao nhau có giao thông đông đúc nhưng không có đèn tín hiệu giao thông","Đường dốc xuống có độ dốc lớn","Gần đoạn đường quanh co"],"a":"2","imgs":[],"t":"문장형"},{"n":376,"b":"Giải thích nào là không đúng về khu vực hạn chế tốc độ khả biến?","c":["Đây là hệ thống chủ động thay đổi tốc độ quy định theo hoàn cảnh.","Sử dụng biển báo nháy đèn hiển thị thay đổi số tốc độ quy định.","Trường hợp đã quy định tốc độ tối đa bằng biển báo giới hạn tốc độ khả biến thì phải tuân theo điều này.","Trường hợp tốc độ tối đa được quy định bởi biển báo giới hạn tốc độ khả biến và tốc độ tối đa được quy định bởi  biển báo an toàn khác nhau thì phải t"],"a":"4","imgs":[],"t":"문장형"},{"n":377,"b":"Theo Luật Giao thông đường bộ, người lái xe (   ) khi muốn đi qua đường ngang đường ray xe lửa, phải (    trước đường ray, kiểm tra an toàn rồi mới đi qua. Nội dung đúng điền vào (   )?","c":["Tất cả xe, đi chậm","Tất cả xe hoặc xe dạng thiết bị xây dựng, đi chậm","Tất cả xe hoặc tất cả xe điện, tạm dừng","Tất cả xe hoặc xe điện mặt đất, tạm dừng"],"a":"4","imgs":[],"t":"문장형"},{"n":378,"b":"Phương pháp lái xe nào sau đây là an toàn nhất ở nút giao thông lập thể ở đường cao tốc?","c":["Do tắc nghẽn xe tại nút giao thông lập thể nên phanh gấp để xe phía sau không thể tới gần nhằm phòng ngừa tai  nạn.","Tạm thời dừng lại rồi xuất phát do cảm giác về tốc độ tại nút giao thông lập thể.","Nếu đã đi qua nút giao thông lập thể mà mình định đi vào thì sẽ sử dụng nút giao thông tiếp theo.","Tăng tốc đột ngột và đi ra tại nút giao tương ứng."],"a":"3","imgs":[],"t":"문장형"},{"n":379,"b":"Cách xử lý nào là đúng nhất phải thực hiện khi người lái xe của xe phía trước đưa tay trái ngang ra phía  ngoài của thân xe theo Pháp lệnh Giao thông đường bộ?","c":["Đi chậm vì xe phía trước được dự đoán sẽ rẽ phải.","Đổi làn đường sang làn xe bên trên vì xe phía trước được dự đoán sẽ băng qua đường.","Vượt lên vì xe phía trước được dự đoán sẽ quay đầu.","Đi chậm vì xe phía trước được dự đoán sẽ đổi làn đường."],"a":"4","imgs":[],"t":"문장형"},{"n":380,"b":"Người lái xe sử dụng tín hiệu bằng tay nào khi định rẽ phải theo Pháp lệnh Giao thông đường bộ?","c":["Đưa tay trái ra ngoài phía bên trái rồi gập khuỷu tay và đưa tay thẳng đứng lên trên.","Đưa tay trái ngang ra phía ngoài bên trái thân xe.","Đưa tay phải ra ngoài bên phải của thân xe rồi vẫy tay theo chiều trước sau.","Đưa tay trái ra ngoài thân xe rồi duỗi tay xuống 45° về phía dưới."],"a":"1","imgs":[],"t":"문장형"},{"n":381,"b":"Khi đang định tiến vào giao lộ theo tín hiệu giao thông thì cảnh sát ra tín hiệu yêu cầu dừng lại. Cách nào sau  đây là lái xe an toàn nhất?","c":["Tạm dừng ngay trước vạch dừng.","Nhanh chóng giảm tốc và đi chậm lại.","Thực hiện theo đèn tín hiệu.","Đi từ từ vào giao lộ."],"a":"1","imgs":[],"t":"문장형"},{"n":382,"b":"Giải thích nào là đúng về việc vượt lên trước khi vạch phân cách giữa đường là vạch đôi gồm vạch đứt màu  vàng và vạch liền màu vàng?","c":["Không thể lấn vạch phân cách giữa đường rồi vượt lên trước dù cho đang ở bên vạch liền màu vàng hay vạch đứt  màu vàng.","Có thể lấn vạch phân cách giữa đường rồi vượt lên trước ở bên có vạch đứt màu vàng.","Nếu đảm bảo an toàn rồi thì có thể vượt lên trước bất kể đang ở bên vạch liền màu vàng hay vạch đứt màu vàng.","Có thể lấn vạch phân cách giữa đường rồi vượt lên trước ở bên có vạch liền màu vàng."],"a":"2","imgs":[],"t":"문장형"},{"n":383,"b":"Trong khi lái xe, cách lưu thông nào là đúng nhất tại khúc giao đường sắt?","c":["Cứ thế đi qua nếu không có tàu hỏa đến.","Tạm dừng để kiểm tra an toàn sau đó đi qua.","Đi qua trên mức tốc độ giới hạn.","Đi qua nhanh trong trường hợp rào chắn đang chuẩn bị hạ xuống."],"a":"2","imgs":[],"t":"문장형"},{"n":384,"b":"Phương pháp nào đúng khi muốn thay đổi làn đường sang bên trái theo Pháp lệnh Giao thông đường bộ?","c":["Bật đèn báo rẽ trái trước điểm định đổi làn đường tối thiểu 30m (với đường cao tốc là 100m).","Bật đèn báo rẽ trái trước điểm định đổi làn đường tối thiểu 10m (với đường cao tốc là 100m).","Bật đèn báo rẽ trái trước điểm định đổi làn đường tối thiểu 20m (với đường cao tốc là 80m).","Bật đèn báo rẽ trái tại điểm định đổi làn đường."],"a":"1","imgs":[],"t":"문장형"},{"n":385,"b":"Câu nào không đúng về tốc độ của xe ô tô theo Pháp lệnh Giao thông đường bộ?","c":["Tốc độ được quy định tùy theo đường thông thường, đường dành riêng cho xe ô tô, đường cao tốc và tổng số làn xe.","Tại các đường thông thường không có giới hạn về tốc độ tối thiểu.","Khi thời tiết xấu phải giảm tốc độ khi điều khiển xe.","Trong trường hợp tốc độ tối đa được quy định bằng bảng giới hạn tốc độ khả biến khác với tốc độ tối đa được quy  định bởi những bảng hiệu an toàn còn "],"a":"4","imgs":[],"t":"문장형"},{"n":386,"b":"Câu nào không đúng về tốc độ của xe ô tô theo Pháp lệnh Giao thông đường bộ?","c":["Tốc độ của xe càng lớn thì nguy cơ tai nạn giao thông càng cao nên phải hạn chế việc xe vượt quá tốc độ.","Giới hạn tốc độ tối thiểu để nâng cao hiệu quả giao thông tại các làn đường chuyên dành cho xe ô tô và đường cao tốc.","Cục trưởng Cục Cảnh sát hoặc Giám đốc Sở Cảnh sát tỉnh - thành phố có thể giới hạn tốc độ riêng vì sự an toàn và  làm cho giao thông thông thoáng.","Giám đốc Sở Cảnh sát tỉnh - thành phố là người có quyền quy định tốc độ tại đường cao tốc, các làn đường còn lại  ngoài đường cao tốc sẽ do Cục trưởng"],"a":"4","imgs":[],"t":"문장형"},{"n":387,"b":"Hai trường hợp nào là vi phạm tín hiệu giao thông theo Pháp lệnh Giao thông đường bộ?","c":["Vượt qua vạch dừng xe và dừng lại khi đèn đỏ bật lên","Tiến vào đoạn đường giao nhau khi đèn vàng bật lên trước khi đến đường giao nhau","Khi đèn vàng nhấp nháy, phải vừa lưu thông vừa chú ý đến biển báo giao thông hoặc biển báo an toàn khác","Khi đèn đỏ nhấp nháy, tạm dừng ở ngay trước vạch dừng xe rồi vừa chú ý các phương tiện giao thông vừa lái xe đi qua"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":388,"b":"Hai cách lưu thông đúng khi rẽ phải ở đường giao nhau của đường có 3 làn đường một chiều?","c":["Khi rẽ phải, phải bật đèn xi nhan ngay trước đường giao nhau để thông báo hướng lưu thông.","Nếu đèn dành cho người đi bộ ở vạch sang đường của đường bên phải là màu xanh nhưng không có người đi bộ  thì cứ thế đi qua.","Khi đèn 3 màu báo hiệu rẽ phải là màu đỏ thì dù không có người đi bộ cũng không được đi qua..","Trên đường một chiều có 3 làn đường, rẽ phải ở làn đường số 2 thì an toàn."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":389,"b":"Hai phương pháp lái xe nào sau đây đúng về việc phải lưu ý khi lái xe rẽ trái theo xe khách và tiêu chuẩn xe  khách theo Luật Quản lý xe ô tô?","c":["Xe khách cỡ lớn là xe từ 36 chỗ trở lên. Vì là xe khách cỡ lớn nên có thể không nhìn thấy tín hiệu đèn, nên phải luôn  duy trì khoảng cách an toàn và ","Xe khách cỡ trung là xe 16 ~ 35 chỗ. Khi xe chở khách bật đèn rẽ hướng, xe khác có thể chen vào nên cần rút ngắn  khoảng cách xe và đi chậm.","Xe khách cỡ nhỏ là xe từ 15 chỗ trở xuống. So với xe ô tô con thì có trọng lực lớn nên dễ bị lật nên cần giữ khoảng  cách an toàn khi lưu thông.","Xe khách nhỏ gọn có dung tích xi lanh dưới 1200cc. Trọng lực tương đồng với xe ô tô con nhưng vẫn cần giữ  khoảng cách an toàn và đi theo phía sau."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":390,"b":"Hai phương pháp lái xe nào an toàn khi thay đổi làn đường?","c":["Chuyển làn mà vẫn duy trì tốc độ nếu khoảng cách với xe đằng sau trên làn định chuyển đủ xa.","Đi chậm lại khi chuyển làn nếu khoảng cách với xe đằng sau trên làn định chuyển đủ xa.","Giảm tốc độ để xe đằng sau trên làn đường định chuyển đi qua trước nếu xe đó đang tới gần.","Chuyển làn nhanh chóng nếu xe đằng sau trên làn đường định chuyển đang tới gần."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":391,"b":"Hai câu giải thích nào là đúng về vạch phân làn đường?","c":["Trên đường cùng có đường vạch liền và đường vạch đứt thì không thể đổi làn từ đường vạch liền sang đường vạch đứt.","Trên đường cùng có đường vạch liền và đường vạch đứt thì có thể đổi làn từ đường vạch liền sang đường vạch đứt.","Trên đường cùng có đường vạch liền và đường vạch đứt thì không thể đổi làn từ đường vạch đứt sang đường vạch liền.","Trên đường cùng có đường vạch liền và đường vạch đứt thì có thể đổi làn từ đường vạch đứt sang đường vạch liền."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":392,"b":"Trong Luật Giao thông đường bộ, ý nghĩa đèn đỏ nhấp nháy là gì?","c":["Các phương tiện xe phải vừa đi chậm vừa chú ý quan sát tình hình giao thông.","Các phương tiện xe có thể vừa tiếp tục đi vừa chú ý quan sát tình hình giao thông.","Các phương tiện xe có thể vừa lùi lại vừa chú ý quan sát biển báo an toàn.","Các phương tiện xe phải dừng ngay trước vạch dừng rồi sau đó vừa tiếp tục đi vừa chú ý quan sát tình hình giao  thông."],"a":"4","imgs":[],"t":"문장형"},{"n":393,"b":"Sau đây là giải thích đoạn đường giao nhau có biển báo “không bảo vệ rẽ trái”. Câu nào đúng?","c":["Có thể vừa chú ý quan sát tình hình giao thông vừa rẽ trái bất kể tín hiệu nào.","Có thể vừa chú ý quan sát tình hình giao thông vừa rẽ trái khi đèn đỏ.","Có thể vừa chú ý quan sát tình hình giao thông vừa rẽ trái khi đèn xanh.","Có thể vừa chú ý quan sát tình hình giao thông vừa rẽ trái khi đèn vàng."],"a":"3","imgs":[],"t":"문장형"},{"n":394,"b":"Giải thích nào là đúng về tốc độ của xe ô tô theo Pháp lệnh Giao thông đường bộ?","c":["Giới hạn tốc độ tối thiểu trên đường cao tốc là 50 km/giờ.","Đường dành riêng cho xe ô tô có giới hạn tốc độ tối đa, nhưng không có giới hạn tốc độ tối thiểu.","Có giới hạn tốc độ tối đa và tối thiểu trên đường thông thường.","Giới hạn tốc độ tối đa trên đường cao tốc có nhiều hơn 2 làn đường một chiều là như nhau đối với tất cả các loại  phương tiện."],"a":"1","imgs":[],"t":"문장형"},{"n":395,"b":"Giải thích nào là đúng về hành vi vượt xe theo Pháp lệnh Giao thông đường bộ?","c":["Bạn có thể vượt xe phía trước trong trường hợp xe này cũng đang vượt một xe khác.","Bạn phải vượt ở bên phải khi ở trong đường hầm.","Chỉ được vượt trong khu vực vạch liền màu vàng trên đường một chiều có 1 làn đường.","Cấm vượt ở khu vực đường giao nhau."],"a":"4","imgs":[],"t":"문장형"},{"n":396,"b":"Giải thích nào là đúng về vạch phân cách giữa đường là đúng theo Pháp lệnh Giao thông đường bộ?","c":["Được phép vượt nếu vạch phân cách giữa đường là vạch liền màu vàng.","Trên làn đường khả biến là vạch đứt màu vàng ở ngoài cùng bên trái theo hướng đi được điều khiển bởi tín hiệu  giao thông.","Có thể vượt bằng cách lấn qua vạch liền màu vàng phân cách giữa đường trong trường hợp xe buýt đang dừng trên  đường tỉnh lộ một chiều có 1 làn đường.","Vạch phân cách giữa đường có thể áp dụng trên đường có độ rộng tối thiểu là 4,75m."],"a":"2","imgs":[],"t":"문장형"},{"n":397,"b":"Xe nào được phép lưu thông trên làn số 2 trên đường cao tốc một chiều có 3 làn đường theo Pháp lệnh Giao  thông đường bộ?","c":["Xe chở hàng","Xe ô tô đặc chủng","Máy móc thiết bị thi công","Xe chở khách cỡ nhỏ, cỡ vừa"],"a":"4","imgs":[],"t":"문장형"},{"n":398,"b":"Theo quy định pháp luật về luật giao thông đường bộ, trên đường cao tốc một chiều có 2 làn, nếu làn 1 do  lượng xe tăng cao mà bắt buộc phải đi với tốc độ dưới ( ) km/h, thì dù không trong trường hợp ","c":["80","90","100","110"],"a":"1","imgs":[],"t":"문장형"},{"n":399,"b":"Giải thích nào là đúng về việc sử dụng sử dụng làn đường phụ (làn đường cứu hộ) của đường cao tốc theo  Pháp lệnh Giao thông đường bộ?","c":["Để tránh buồn ngủ khi lái xe, có thể dừng xe trên làn đường phụ để nghỉ ngơi.","Đỗ xe trên làn đường phụ để ngắm bình minh.","Khi các làn đường lưu thông trên đường cao tốc bị tắc nghẽn, có thể sử dụng làn đường phụ.","Tiền phạt đối với người điều khiển xe ô tô con lưu thông trên làn đường phụ mà không có lý do chính đáng là  60.000 Won."],"a":"4","imgs":[],"t":"문장형"},{"n":400,"b":"Nếu theo tiêu chuẩn xe lưu thông trên làn đường của đường cao tốc có 5 làn xe một chiều trong Pháp lệnh  Giao thông đường bộ, làn xe số mấy được coi là làn xe bên trái? (Trường hợp giao thông thông th","c":["Làn số 1~2","Làn số 2~3","Làn số 1~3","Chỉ làn số 2"],"a":"2","imgs":[],"t":"문장형"},{"n":401,"b":"Giải thích nào là không đúng về làn đường quy định trên đường cao tốc theo Pháp lệnh Giao thông đường  bộ? (Giao thông thông thoáng, không có làn đường chuyên dành cho xe buýt)","c":["Đối với đường có 3 làn xe một chiều, ở làn đường số 1 các xe ô tô con, xe khách nhỏ gọn/cỡ nhỏ/cỡ trung định vượt  lên trước có thể lưu thông.","Khi định vượt lên trước, có thể lưu thông trên làn đường ngay cạnh bên trái của làn đường quy định.","Tất cả các xe đều có thể lưu thông trên làn đường bên trái của làn đường quy định.","Điểm phạt đối với người điều khiển xe ô tô con vi phạm lưu thông trên làn đường quy định của đường cao tốc là 10  điểm."],"a":"3","imgs":[],"t":"문장형"},{"n":402,"b":"Theo quy định pháp luật về luật giao thông đường bộ, giải thích nào là sai về cách vượt xe trên đường cao  tốc một chiều 3 làn có lưu thông thông suốt? (Không có làn dành riêng cho xe buýt)","c":["Nếu xe con muốn vượt lên trước, phải chuyển sang làn số 1 rồi tiếp tục đi trên làn số 1.","Xe ô tô chở khách cỡ lớn đang đi trên làn số 3 vượt sang làn số 2.","Xe tải nhỏ đang lưu thông trên làn số 2 sử dụng làn số 1 để vượt.","Xe tải 5 tấn sử dụng làn số 2 để vượt."],"a":"1","imgs":[],"t":"문장형"},{"n":403,"b":"Giải thích nào dưới đây không đúng với quy định về làn xe lưu thông theo Pháp lệnh Giao thông đường bộ?","c":["Tất cả các loại xe đều có thể lưu thông trên làn đường bên phải của làn đường được chỉ định.","Khi xe ô tô vượt lên trước thì phải chạy ở làn đường bên phải ngay cạnh làn đường được chỉ định lưu thông.","Làn đường lưu thông của xe ô tô trên đường thông thường một chiều có 4 làn đường là tất cả các làn.","Làn đường lưu thông của xe chở hàng loại lớn trên đường cao tốc một chiều có 4 làn đường là làn đường bên phải."],"a":"2","imgs":[],"t":"문장형"},{"n":404,"b":"Trường hợp nào có thể lưu thông trên làn đường dành riêng cho xe buýt của đường thông thường theo  Pháp lệnh Giao thông đường bộ?","c":["Trường hợp xe chở khách 12 chỗ chở 6 người","Trường hợp xe chở khách chuyên chở khách du lịch nội địa chở 25 hành khách du lịch","Trường hợp xe chở khách 12 chỗ chuyên dùng để đưa đón nhân viên đang chở nhân viên lưu thông theo tuyến  đường riêng","Trường hợp taxi tạm thời lưu thông để đón hoặc trả khách"],"a":"4","imgs":[],"t":"문장형"},{"n":405,"b":"Theo Pháp lệnh Giao thông đường bộ, xe ô tô con 9 chỗ có thể lưu thông trên đường dành riêng cho xe buýt  của đường cao tốc được quy định phải chở từ ( ) người trở lên. Tiêu chuẩn nào đúng điền vào tr","c":["3","4","5","6"],"a":"4","imgs":[],"t":"문장형"},{"n":406,"b":"Tiêu chuẩn nào là đúng về xe lưu thông trên đường cao tốc 3 làn xe một chiều? (Giao thông thông thoáng,  không có làn đường chuyên dành cho xe buýt)","c":["Phải lưu thông trên làn số 1 do làn đường của xe ô tô con là làn số 1.","Khi xe chở khách loại nhỏ có làn đường lưu thông là làn số 2, muốn vượt lên trước thì phải sử dụng làn số 1.","Xe ô tô chở khách cỡ lớn phải lưu thông ở làn số 1.","Xe tải chở hàng có trọng tải từ 1,5 tấn trở xuống phải lưu thông ở làn số 1."],"a":"2","imgs":[],"t":"문장형"},{"n":407,"b":"Xe ô tô đang lưu thông trên làn số 2 của đường cao tốc có 3 làn xe một chiều. Theo Pháp lệnh Giao thông  đường bộ, xe lưu thông ở làn xe nào có thể vượt lên trước? (Giao thông thông thoáng, không có l","c":["Làn số 1","Làn số 2","Làn số 3","Cả ba làn 1, 2, 3"],"a":"1","imgs":[],"t":"문장형"},{"n":408,"b":"Giải thích nào sau đây không đúng nhất với cách vượt lên trước theo Pháp lệnh Giao thông đường bộ?","c":["Nếu định vượt xe trước phải lưu thông ở làn bên trái xe phía trước.","Có thể vượt khi không có xe ở chiều đối diện trong trường hợp vạch phân cách là vạch chấm màu vàng.","Không thể vượt trên vạch chấm màu vàng ở trong cùng bên trái hướng di chuyển có đèn tín hiệu chỉ thị trong  trường hợp của làn đường khả biến.","Xe đang lưu thông trên làn xe bên phải trên đường cao tốc 4 làn xe một chiều có thể tiến vào làn xe số 1."],"a":"4","imgs":[],"t":"문장형"},{"n":409,"b":"Theo Pháp lệnh Giao thông đường bộ, giải thích nào là không đúng về tiêu chuẩn của xe lưu thông theo làn  xe? (Trường hợp giao thông trên đường cao tốc thông thoáng, không có làn đường chuyên dành cho","c":["Khi đi với tốc độ chậm thì có thể đi qua làn đường bên phải của làn đường mà mình đang đi.","Tất cả các xe ô tô định vượt lên trước có thể đi ở làn số 1của đường cao tốc một chiều có 2 làn xe.","Ở đường thông thường thì làn số 1 là làn đường đầu tiên từ bên phải sang.","Làn bên phải của đường cao tốc một chiều có 3 làn xe là làn đường xe tải chở hàng có thể chạy."],"a":"3","imgs":[],"t":"문장형"},{"n":410,"b":"Theo Pháp lệnh Giao thông đường bộ, giải thích nào đúng với tiêu chuẩn của xe lưu thông trên đường cao  tốc có 3 làn xe một chiều? (Giao thông thông thoáng, không có làn đường chuyên dành cho xe buýt)","c":["Làn số 1 là làn đường vượt của xe ô tô con đang lưu thông ở làn số 2.","Làn số 1 là làn đường lưu thông của xe chở khách.","Làn đường phụ là làn đường lưu thông của xe cứu hộ khẩn cấp và xe đầu kéo.","Làn số 1 là làn đường lưu thông của xe tải chở hàng trong trường hợp có làn đường dành riêng cho xe buýt."],"a":"1","imgs":[],"t":"문장형"},{"n":411,"b":"Làn đường nào không phải là đường chuyên dụng theo Pháp lệnh Giao thông đường bộ?","c":["Làn đường dành riêng cho xe buýt","Làn đường dành riêng cho xe khách","Làn đường dành riêng cho xe ô tô","Làn đường dành riêng cho xe đạp"],"a":"3","imgs":[],"t":"문장형"},{"n":412,"b":"Nội dung nào phù hợp nhất với giải thích về hiện tượng trượt nước?","c":["Để giảm hiện tượng trượt nước, thay bánh xe cơ bản bằng bánh xe rộng hơn.","Hiện tượng trượt nước xảy ra trên đường tuyết nhiều hơn đường mưa nên phải giảm tốc khi lưu thông.","Gai lốp bị mài mòn làm tăng lực tiếp đất nên giảm khả năng phát sinh hiện tượng trượt nước.","Áp suất hơi của lốp xe càng thấp thì khi xe chạy với vận tốc cao, hiện tượng trượt nước càng tăng."],"a":"4","imgs":[],"t":"문장형"},{"n":413,"b":"Cách điều khiển xe nào là an toàn nhất khi xe bị trơn trượt trên đường đóng băng?","c":["Điều khiển vô lăng về hướng trơn.","Cài số lớn đối với trường hợp xe số sàn.","Điều khiển tay lái về hướng ngược với hướng trơn trượt.","Sử dụng phanh đỗ xe để dừng xe."],"a":"1","imgs":[],"t":"문장형"},{"n":414,"b":"Khi lái xe trên đường nhiều sương mù, phương pháp lái xe an toàn nhất là?","c":["Ở đường cong hay đường giao nhau, dùng còi báo hiệu để các xe khác tránh đường rồi đi nhanh qua.","Bảo đảm tầm nhìn bằng cách bật đèn pha nếu có nhiều sương.","Ở đường có nhiều sương chỉ có cách bật đèn sương mù là có thể lái xe an toàn.","Khi đảm bảo được tầm nhìn rõ ở một mức độ nhất định, lái xe chậm và tận dụng các ký hiệu trên đường để xác định  vị trí xe như dải ngăn cách trên đườn"],"a":"4","imgs":[],"t":"문장형"},{"n":415,"b":"Phương pháp nào phanh xe an toàn nhất để dừng xe trên đường có băng hoặc tuyết?","c":["Đạp phanh mạnh hết cỡ.","Dừng xe nhanh chóng bằng cách đạp đồng thời phanh chân và phanh đỗ xe.","Chỉ sử dụng phanh động cơ để giảm tốc đến khi xe dừng lại hẳn.","Sau khi giảm tốc bằng phanh động cơ, đạp nhẹ chân phanh vài lần."],"a":"4","imgs":[],"t":"문장형"},{"n":416,"b":"Thái độ nào của người lái xe chạy trong đường hầm khi có mưa lớn là đúng đắn nhất?","c":["Tất cả các tuyến đường hầm đều có hệ thống thoát nước tốt nên không phát sinh các yếu tố nguy hiểm.","Lắng nghe thông tin về thảm họa như chương trình phát thanh về thiên tai và bảng hướng dẫn v.v... và ứng phó với  yếu tố nguy hiểm.","Tạm dừng xe và nghỉ ngơi ở làn đường phụ của đường hầm cho đến khi tạnh cơn mưa lớn.","Chạy nhanh hơn tốc độ quy định vì phải đi qua nhanh."],"a":"2","imgs":[],"t":"문장형"},{"n":417,"b":"Giải thích nào là đúng nhất về đường đóng băng vào mùa đông?","c":["Đường đóng băng do hạt sương đóng đá trên bề mặt đường và chủ yếu xảy ra trong đường hầm.","Hiện tượng băng đen thường xuyên xuất hiện trên cầu, lối ra vào đường hầm và những tuyến đường có nhiều bóng râm.","Hiện tượng băng đen xảy ra do tuyết đóng băng trên bề mặt đường trở nên dơ bẩn do khói của xe.","Trường hợp đi qua đường đóng băng phải giảm tốc độ tối đa bằng cách giữ cố định tay lái, phanh gấp."],"a":"2","imgs":[],"t":"문장형"},{"n":418,"b":"Phương pháp ứng phó nào là sai nhất khi xe bị ngập do mưa lớn cục bộ?","c":["Mở cửa nằm ở phía đối diện với dòng nước chảy và cố gắng thoát ra khỏi xe.","Nếu cửa xe không mở được, dùng vật sắc nhọn (như khung tựa cổ, khóa của dây an toàn...) đập vào mép kính cửa sổ  để phá cửa sổ và thoát ra ngoài.","Nếu không thể đập vỡ cửa kính xe, đừng hoảng sợ mà hãy gọi 119, rồi nhanh chóng mở cửa xe và thoát ra ngoài  khi mực nước trong và ngoài xe tương đươn","Khi đã thoát được ra ngoài, sơ tán ngay đến vùng đất thấp nhất có thể hoặc dưới gầm xe."],"a":"4","imgs":[],"t":"문장형"},{"n":419,"b":"Cách xử lý nào hợp lý nhất trong trường hợp phanh không ăn lúc xe xuống dốc?","c":["Ngay lập tức tắt động cơ.","Cài số nhỏ sau đó nhảy ra khỏi xe.","Điều khiển tay lái cho xe chạy theo hình zic zắc để giảm tốc độ.","Cài số nhỏ, sau khi tốc độ giảm xuống thì cho xe đâm vào thanh chắn đường hoặc bờ tường."],"a":"4","imgs":[],"t":"문장형"},{"n":420,"b":"Cách xử lý hợp lý nhất khi chứng kiến hỏa hoạn xảy ra do tai nạn ô tô trong lúc đang lái xe trong đường hầm  là gì?","c":["Dừng xe lại là an toàn hơn dù vẫn có thể đi tiếp.","Trong trường hợp xe không thể đi qua thì dừng xe lại rồi ở trong xe chờ cho tới khi lửa được dập tắt.","Trong trường hợp xe không thể đi qua thì dừng xe lại rồi cầm theo chìa khóa xe và di chuyển tránh ra xa.","Sau khi xuống xe, nếu thấy nhiều khói thì cúi thấp người xuống hết sức có thể và di chuyển theo đèn tín hiệu hướng  dẫn đi về hướng ngược chiều với hư"],"a":"4","imgs":[],"t":"문장형"},{"n":421,"b":"Giải thích nào là đúng khi đang lưu thông trên đường cua?","c":["Duy trì tốc độ như tốc độ trước khi vào đường cua để đi qua.","Sau khi vào khúc cua, nên tăng tỷ số truyền động thay đổi tốc độ để giảm lực ly tâm.","Xe dẫn động cầu sau có thể xảy ra hiện tượng trượt hai bánh trước khi vào cua.","Để giảm hiện tượng hai bánh sau trượt khi vào cua trên đường cua, phải quay vô lăng ngược hướng điều khiển từng  chút một."],"a":"4","imgs":[],"t":"문장형"},{"n":422,"b":"Đạp phanh chân quá đà sinh nhiệt ma sát làm hình thành bọt khí trong dầu phanh khiến phanh không ăn gọi  là hiện tượng gì?","c":["Sóng thẳng (Là sóng truyền quanh lốp xe khi xe chạy với tốc độ cao)","Sự tạo hơi bên trong (Là trạng thái mà trong đó chất lỏng bắt đầu sôi và bay hơi trong lòng ống dẫn thủy lực)","Bám đường (Là khả năng xe bám trên đường)","Thiếu lực chỉ đạo (Là việc điều khiển tay lái có xu hướng gây cho xe quay ngang khi tăng tốc tại đoạn ngoặt)"],"a":"2","imgs":[],"t":"문장형"},{"n":423,"b":"Phương pháp nào là lái xe an toàn khi lưu thông trên đường có sương mù?","c":["Nhấn còi xe khi chạy trên khúc quẹo hoặc đường đồi núi.","Nếu tầm nhìn trước trong phạm vi 70m thì giảm tốc độ xuống dưới một nửa tốc độ quy định.","Tầm nhìn trước khó khăn hơn ngày thường nên phải bật đèn sương mù và đèn pha để đảm bảo tầm nhìn.","Khi xe bị hư hỏng hoặc va chạm nhẹ, phải nhanh chóng tránh ra phía mép đường."],"a":"3","imgs":[],"t":"문장형"},{"n":424,"b":"Giải thích nào không đúng về băng đen (black ice) vào mùa đông?","c":["Là hiện tượng tạo ra lớp băng mỏng như được phủ trên mặt đường.","Là hiện tượng tuyết và hơi ẩm trên bề mặt nhựa đường bị trộn lẫn với các chất ô nhiễm trong không khí rồi thấm  vào và đóng băng thành màu đen.","Chủ yếu xảy ra ở những nơi có nhiệt độ thấp như trên cầu, lối ra vào đường hầm, đường râm mát và trong bóng râm  của các góc núi v.v... vào mùa đông l","Là hiện tượng tuyết tan ra trên đường có nhiều ánh nắng mặt trời và thấm xuống đường rồi phản xạ với ánh sáng  mặt trời tạo thành màu đen."],"a":"4","imgs":[],"t":"문장형"},{"n":425,"b":"Giải thích nào là không đúng về tình trạng đóng băng đường vào mùa đông?","c":["Đường trải bê tông bị đóng băng nhiều hơn đường trải nhựa.","Đường trải nhựa tan băng chậm hơn đường trải bê tông.","Hệ số ma sát của đường trải nhựa khi bề mặt đường khô là lớn đến 1,6.","Ở cùng một tình trạng đóng băng, hệ số ma sát của đường bê tông và đường nhựa là như nhau."],"a":"3","imgs":[],"t":"문장형"},{"n":426,"b":"Biện pháp xử lý nào là không đúng đắn nhất về hành động của người lái xe trong trường hợp xảy ra động đất?","c":["Tăng tốc độ của xe đang lái và nhanh chóng đi qua khu vực đó.","Đỗ xe ở lề đường rồi tránh đi trong trường hợp không thể di chuyển bằng xe.","Cắm nguyên chìa khóa xe và lánh nạn nhằm đề phòng trường hợp xe đã đỗ bị dịch chuyển.","Bật đài phát thanh và tập trung nghe chương trình phát thanh về thiên tai."],"a":"1","imgs":[],"t":"문장형"},{"n":427,"b":"Hai phương pháp lái xe nào sau đây là đúng nhất trong tình huống gió thổi mạnh hay có lốc xoáy?","c":["Dùng hai tay nắm chặt vô lăng và duy trì làn xe.","Tăng tốc bất kể gió thổi.","Đỗ xe ở gần biển báo, cột đèn giao thông hoặc hàng cây bên đường.","Ở khu vực núi, trên cầu hoặc lối ra vào đường hầm cần phải chú ý vì rất nguy hiểm khi gió thổi mạnh."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":428,"b":"Hai cách lái xe nào là an toàn nhất trên đường sỏi đá?","c":["Giữ vô lăng lỏng nhất có thể để hạn chế tối đa tác động truyền lên cánh tay.","Tăng tốc độ khi lái xe để bánh xe tiếp xúc được tối đa với bề mặt đường.","Đi chậm để tránh sỏi văng vào người đi bộ hoặc các phương tiện khác.","Lái xe dễ dàng hơn nếu hơi trong lốp ít hơn mức hơi phù hợp một chút so với lốp căng hơi."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":429,"b":"Khi đang lưu thông trên đường mưa, nhìn thấy xe phía trước dừng nên phanh lại, hai nội dung nào không  phải là hiện tượng sẽ phát sinh?","c":["Khi phanh gấp, ma sát giữa lốp xe và mặt đường gây ra hiện tượng xe nghiêng về trước.","Lực ma sát với mặt đường nhỏ đi nên khoảng cách an toàn trước khi đạp phanh do phát hiện nguy hiểm dài ra hơn.","Khi phát sinh hiện tượng trượt nước và phanh cục bộ, xe có thể bị lệch ra khỏi làn đường.","Tỷ lệ hao mòn của lốp xe càng lớn thì khoảng cách phanh càng ngắn lại."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":430,"b":"Hai cách lái xe nào an toàn khi xe đang lên đến gần đỉnh của đường dốc?","c":["Tăng số vòng quay động cơ trong 1 phút để giảm tiêu thụ nhiên liệu.","Bắt buộc tạm dừng trên đỉnh dốc sau đó mới xuất phát.","Duy trì khoảng cách an toàn với xe trước để lưu thông.","Đi số thấp thay vì đi số cao."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":431,"b":"Hai cách lái xe nào là an toàn nhất khi điều khiển xe xuống dốc.","c":["Không cần quan tâm đến cần số mà chỉ sử dụng phanh chân để xuống dốc.","Nếu xảy ra tình huống nguy cấp thì dùng ngay phanh đỗ xe.","Tốt nhất nên cài cùng số với khi lên dốc để đi xuống dốc.","Vừa sử dụng đồng thời cả phanh chân và phanh động cơ một cách phù hợp để xuống dốc."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":432,"b":"Giải thích nào không phù hợp về việc lái xe an toàn khi đường đóng băng vào mùa đông?","c":["Khi lái xe trên đường vào mùa đông, cần kiểm tra trước thông tin thời tiết và tình hình giao thông trước khi tham  gia giao thông.","Các đoạn đường hầm và cầu dễ bị đóng băng cần phải được lái xe cẩn thận hơn.","Nếu chất chống đóng băng được rải trước và sau khi có tuyết rơi gần khu vực đường hầm, cầu, thì có thể tham gia  giao thông bình thường với tốc độ giớ","Một số sở cảnh sát thành phố và tỉnh đã quy định rõ trong thông báo rằng khi lưu thông trên đường có tuyết hoặc  băng, phải sử dụng thiết bị mùa đông."],"a":"3","imgs":[],"t":"문장형"},{"n":433,"b":"Giải thích nào là đúng về ổ gà (nơi bị lõm xuống trên đường)?","c":["Ổ gà thường được hình thành trong mùa hè khi có mưa lớn liên tục.","Tăng tốc khi lái xe để phòng tránh thiệt hại do ổ gà.","Ổ gà hình thành do xe tải cỡ lớn phanh gấp ở gần lối sang đường của người đi bộ trong khi nhiệt độ bề mặt đường  đang tăng cao.","Ổ gà có thể dễ dàng nhìn thấy khi mặt đường khô và bạn có thể chỉ cần lái xe qua chúng mà không ảnh hưởng gì."],"a":"1","imgs":[],"t":"문장형"},{"n":434,"b":"Cách nào dưới đây là không an toàn nhất khi lái xe dưới trời mưa to?","c":["Bật cả đèn pha trước và đèn hậu khi lái xe.","Bật sưởi với chế độ lưu thông khí bên trong xe.","Kiểm tra độ mòn lốp để ngăn ngừa hiện tượng trượt nước.","Duy trì khoảng cách an toàn gấp 2 lần bình thường trên đường có mưa."],"a":"2","imgs":[],"t":"문장형"},{"n":435,"b":"Cách xử lý nào là không phù hợp của người lái xe khi đang lưu thông trên đường có bão kèm mưa to, gió lớn?","c":["Vì quãng đường phanh dài hơn bình thường nên phải giữ khoảng cách với xe phía trước gấp ít nhất 2 lần so với  bình thường.","Khi đi qua khu vực bị ngập, tốt nhất không dừng lại mà cứ thế đi thẳng qua.","Khi đỗ xe cần tránh các khu vực hạ lưu hoặc ven bờ sông có nguy cơ chìm cao.","Đỗ xe dưới biển quảng cáo tấm lớn hoặc cạnh bờ tường là an toàn."],"a":"4","imgs":[],"t":"문장형"},{"n":436,"b":"Giải thích nào là sai về việc lái xe trên đường có tuyết?","c":["Chỉ cần dọn sạch tuyết trên kính chắn gió để đảm bảo đủ tầm nhìn là có thể lái xe an toàn.","Phanh chân và phanh động cơ cần được sử dụng đồng thời.","Nếu vỏ xe gắn xích đi tuyết, lái xe ở vận tốc không quá 30 km/giờ để đảm bảo an toàn.","Duy trì khoảng cách an toàn lớn hơn bình thường."],"a":"1","imgs":[],"t":"문장형"},{"n":437,"b":"Cách lái xe nào sau đây là không an toàn khi trời mưa?","c":["Tùy theo tình hình mà giảm tốc 50% so với tốc độ giới hạn.","Giữ khoảng cách thích hợp để không làm bắn nước lên người đi bộ trên đường.","Lái xe trong tình trạng bánh xe lăn ì ạch, không đạp ga tăng tốc và phanh khi trời mới bắt đầu mưa là không tốt.","Nếu lái xe vào ban ngày thì nên bật cả đèn hậu và đèn pha trước rồi lái xe."],"a":"3","imgs":[],"t":"문장형"},{"n":438,"b":"Cách nào dưới đây là không an toàn khi lái xe trên đường có sương mù?","c":["Bật đèn báo bên hông xe, đèn hậu và đèn pha trước để các xe phía sau biết rõ vị trí của bạn.","Bắt buộc phải bật đèn pha hướng lên để các xe đối diện biết rõ vị trí của bạn.","Duy trì khoảng cách an toàn và giảm tốc độ.","Dùng cần gạt nước để gạt đi lớp hơi nước đọng lại, đảm bảo tầm nhìn."],"a":"2","imgs":[],"t":"문장형"},{"n":439,"b":"Theo Pháp lệnh Giao thông đường bộ, nội dung nào đúng với tốc độ cần giảm xuống trong trường hợp mặt  đường dành riêng cho xe ô tô có 2 làn xe một chiều bị ướt mưa?","c":["80 km/giờ","90 km/giờ","72 km/giờ","100 km/giờ"],"a":"3","imgs":[],"t":"문장형"},{"n":440,"b":"Hai phương pháp lái xe nào an toàn khi gặp sét đánh trong khi đang lưu thông?","c":["Đỗ xe dưới một cây to.","Đóng kín cửa sổ và ở trong xe.","Nên tránh đến gần các tòa nhà do mặt tường bị ướt có thể dẫn điện.","Sơ tán khỏi xe để tránh trường hợp sét đánh vào xe thì rất nguy hiểm."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":441,"b":"Hành động nào sau đây là đúng nhất khi xảy ra tai nạn giao thông?","c":["Không cần bật đèn khẩn cấp và mở cốp xe để thông báo về tình huống khẩn cấp.","Chụp ảnh về tình huống tai nạn trong khu vực đường xảy ra tai nạn và ngồi chờ trong xe.","Không cần đi khỏi khu vực tai nạn mà cứ chờ trong xe.","Ra khỏi xe đến nơi an toàn bên ngoài, quan sát biển số cơ bản được gắn trên cột đèn đường hoặc đèn tín hiệu  giao thông để xác định vị trí xảy ra tai "],"a":"4","imgs":[],"t":"문장형"},{"n":442,"b":"Cách nào là tốt nhất để tránh bị chói mắt do đèn pha trước của xe ngược chiều chiếu đến khi đi trong đêm?","c":["Không nhìn thẳng vào đèn pha trước mà nhìn vào phía dưới làn xe mình đang đi.","Không nhìn thẳng vào đèn pha trước mà nhìn về hướng lề đường bên phải.","Mở hé mắt và nhìn xuống phía dưới làn đường mình đang đi.","Mở hé mắt và nhìn sang lề đường bên trái."],"a":"2","imgs":[],"t":"문장형"},{"n":443,"b":"Theo Pháp lệnh Giao thông đường bộ, nội dung nào không phù hợp là việc người lái xe phải xử lý trong  trường hợp xe không thể chạy do bị hỏng trên đường cao tốc vào ban đêm?","c":["Phải bật tín hiệu nhấp nháy màu đỏ, đèn điện hoặc tín hiệu tia lửa điện có thể phân biệt từ trước 500m ở cả bốn  phía.","Trường hợp đặt biển báo, phải đặt ở vị trí người lái xe từ phía sau đến có thể nhìn thấy.","Phải thực hiện các biện pháp xử lý cần thiết như di chuyển đến một nơi khác ngoài đường cao tốc.","Bắt buộc phải đặt cột tam giác an toàn ở sau 200m tính từ vị trí xe ô tô bị hỏng đang đỗ."],"a":"4","imgs":[],"t":"문장형"},{"n":444,"b":"Trường hợp nào là đúng khi người lái xe ô tô con không phải xe kinh doanh phải bật tất cả đèn pha, đèn  hông, đèn hậu, đèn biển số theo Pháp lệnh Giao thông đường bộ?","c":["Trường hợp dừng xe trên đường vào ban đêm","Trường hợp dừng xe trên đường có sương mù dày đặc","Trường hợp xe bị kéo đi trên đường do vi phạm đỗ xe","Trường hợp lái xe đi trong đường hầm"],"a":"4","imgs":[],"t":"문장형"},{"n":445,"b":"Biện pháp xử lý nào sau đây phù hợp khi xe ô tô bị hỏng trên đường cao tốc theo Pháp lệnh Giao thông  đường bộ?","c":["Nhanh chóng bật đèn nháy báo khẩn cấp và báo cho công ty bảo hiểm sau khi dừng xe trên đường.","Mở nắp ca-pô và nhanh chóng kiểm tra chỗ hỏng hóc sau đó gọi xe cứu hộ.","Trường hợp không thể di chuyển, đặt biển báo tam giác an toàn ở điểm trước xe bị hỏng 500m.","Nếu có thể di chuyển, nhanh chóng bật đèn cảnh báo khẩn cấp, dừng xe ở lề đường và di chuyển đến nơi an toàn."],"a":"4","imgs":[],"t":"문장형"},{"n":446,"b":"Cách nào là xử lý và phòng tránh lốp xe bị thủng khi đang lưu thông?","c":["Phải thường xuyên kiểm tra bề mặt lốp xe tiếp xúc với mặt đường có bị dính đinh hay không.","Duy trì áp suất không khí thích hợp của lốp xe theo định kỳ và theo dõi mặt lốp không bị vượt hạn mức hao mòn.","Khi tay lái bị nghiêng về một phía thì khả năng lốp xe sau bị thủng cao.","Phanh động cơ khi cần số vẫn chạy và tay lái được cố định hướng về trước để giảm tốc."],"a":"3","imgs":[],"t":"문장형"},{"n":447,"b":"Theo Pháp lệnh Giao thông đường bộ, trường hợp xe ô tô không thể lưu thông do bị hỏng trên đường cao  tốc vào ban đêm phải đặt đèn tín hiệu phát sáng có thể phân biệt trong phạm vi (          ) cùng v","c":["Bốn phía cách 200m","Bốn phía cách 300m","Bốn phía cách 400m","Bốn phía cách 500m"],"a":"4","imgs":[],"t":"문장형"},{"n":448,"b":"Phương pháp nào là đúng nhất để xử lý thủng lốp khi đang lái xe?","c":["Nếu phương tiện bất ngờ bị nghiêng về một bên, hãy kéo phanh gấp để tránh tai nạn.","Nắm chắc tay lái, lái thẳng và tránh phanh gấp, dùng phanh động cơ để dừng xe lại ở nơi an toàn.","Bẻ lái theo hướng phương tiện bị nghiêng.","Dùng phanh đỗ xe để dừng phương tiện khi bàn đạp phanh không hoạt động."],"a":"2","imgs":[],"t":"문장형"},{"n":449,"b":"Trong trường hợp xảy ra tai nạn giao thông trên đường cao tốc, biện pháp nào sau đây là đúng nhất để ngăn  ngừa tai nạn thứ cấp?","c":["Ưu tiên chụp ảnh làm bằng chứng để xử lý bảo hiểm.","Phân định rõ ràng lỗi thuộc về người điều khiển xe kia và yêu cầu xử lý bảo hiểm.","Dừng xe ở mép phải của đường và đặt biển báo theo quy định của Bộ Hành chính và An ninh.","Bật đèn báo khẩn cấp rồi vào trong xe và liên hệ với cơ quan chức năng."],"a":"3","imgs":[],"t":"문장형"},{"n":450,"b":"Giải thích nào là không đúng về khu vực công trình thi công trên đường cao tốc?","c":["Trong trường hợp công trình chắn ngang làn đường, phải chú ý vì có thể xảy ra ùn tắc.","Khi điều khiển xe chở hàng, việc buồn ngủ trong chốc lát và lơ là không quan sát phía trước có thể dẫn đến tai nạn  nghiêm trọng.","Có nhiều kiểu công trình được thi công như công trình cố định, công trình di động, v.v.","Tốc độ giới hạn là 80 km/giờ."],"a":"4","imgs":[],"t":"문장형"},{"n":451,"b":"Hai cách xử lý nào là đúng khi Hi-Pass không nhận dạng được do máy đọc thông tin Hi-Pass gặp trục trặc?","c":["Kích hoạt đèn hiệu khẩn cấp và dừng tạm thời sau đó lấy vé thông hành của làn đường thông thường.","Báo điểm đã tiến vào cho người phụ trách thanh toán tại trạm thu phí ở đích đến và tiến hành thanh toán.","Nếu vượt qua làn đường Hi-pass của trạm thu phí ở đích đến thì sẽ tự động được thanh toán.","Có thể rút thẻ ra khỏi máy Hi-pass ở xe và đưa cho người phụ trách tại trạm thu phí đích đến để thanh toán."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":452,"b":"Khi xảy ra hỏa hoạn trong đường hầm, hành động nào sau đây của người lái xe là đúng nhất?","c":["Đóng cửa xe để phòng chống trộm và sơ tán ra bên ngoài đường hầm.","Đợi trong xe do hoả hoạn khiến cho bên trong đường hầm đầy khói.","Tắt động cơ xe và nhanh chóng xuống xe để sơ tán, nhưng vẫn cắm chìa khoá để có thể di chuyển xe khi cần.","Quay đầu xe để quay trở lại hướng đối diện lối ra."],"a":"3","imgs":[],"t":"문장형"},{"n":453,"b":"Điều nào sau đây không đúng nhất về phương pháp lái xe an toàn của tài xế khi đi qua hầm?","c":["Trước khi vào đường hầm, tháo kính màu ra để thích nghi với ánh sáng sau đó bật đèn chiếu sáng chuẩn của ban  đêm.","Khi vạch phân làn trong đường hầm là vạch liền màu trắng, đi qua đường hầm mà không thay đổi làn đường.","Duy trì khoảng cách an toàn với xe phía trước, phòng trường hợp xe trước phanh đột ngột.","Trước khi vào đường hầm, kiểm tra thông tin hướng dẫn đường được lắp đặt ở lối vào."],"a":"1","imgs":[],"t":"문장형"},{"n":454,"b":"Sau đây là những giải thích liên quan đến phanh gấp trong tình huống khẩn cấp khi đang lái xe. Giải thích  nào đúng?","c":["Khi phát sinh hiện tượng trượt nước thì lực phanh của phanh cao hơn bình thường.","Khi có sự cố thì việc sử dụng tường bảo vệ va chạm là một trong những cách phòng tránh tai nạn lớn.","Nếu đạp phanh gấp khi mặt đường có khí ẩm thì luôn bị trơn trượt về hướng phía trước.","Xe được trang bị ABS có quãng đường phanh dài hơn xe không có ABS."],"a":"2","imgs":[],"t":"문장형"},{"n":455,"b":"Hai phương pháp ứng phó an toàn đúng trong trường hợp xảy ra động đất là gì?","c":["Nếu như xảy ra động đất cần phải lái xe thật nhanh để thoát ra khỏi khu vực động đất.","Dừng xe ở phía bên phải đường đảm bảo đủ khoảng cách giữa các xe.","Khi cần bỏ xe lại và lánh nạn, phải tắt động cơ của xe.","Tiếp tục lái xe không cần để ý đến động đất."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":456,"b":"Khi lưu thông trên đoạn đường cao tốc đang thi công, hai cách thức lái xe nào là không đúng của người điều  khiển xe?","c":["Phải luôn chú ý tình hình của đoạn đường đang thi công phía trước.","Phải chạy nhanh hơn tốc độ quy định trên biển báo tốc độ giới hạn trên đoạn đường thi công.","Không cố tình chen vào và vượt.","Để đảm bảo giao thông thông thoáng, trước khi vào đoạn đường thi công cần duy trì tốc độ nhất quán."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":457,"b":"Hai hành động nào là đúng cần phải thực hiện trong trường hợp xảy ra hoả hoạn trong đường hầm trong lúc  lái xe?","c":["Trong trường hợp xuống xe và di chuyển, cần tắt động cơ sau đó mới xuống xe.","Trong trường hợp dùng bình cứu hoả dập lửa thì phải đứng quay lưng lại với chiều gió.","Trong trường hợp khó có thể di chuyển ra phía bên ngoài đường hầm thì phải dừng xe lại nơi gần nhất với vạch  phân cách giữa đường.","Trong trường hợp bỏ xe lại và lánh nạn thì cần phải rút chìa khoá xe và di chuyển."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":458,"b":"Hai câu giải thích nào là đúng liên quan đến hiện tượng trơn trượt của xe?","c":["Vì đây là hiện tượng thường xảy ra khi phanh gấp lúc đang đi trên đường cao tốc nên việc đi quá tốc độ là nguyên  nhân chính.","Chủ yếu phát sinh khi đi với tốc độ chậm trên đường có mưa.","Các dấu vết xuất hiện trên mặt đường do hiện tượng trơn trượt không giúp ích gì cho việc dự đoán nguyên nhân tai  nạn.","Việc điều khiển vô lăng gấp gáp cũng có thể là nguyên nhân gây trượt xe."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":459,"b":"Hai khả năng lớn nhất làm xe bị chệch làn đường là gì?","c":["Khi lái xe lên dốc","Khi điều khiển vô lăng gấp trên đường quanh co","Khi lái xe ở đường xuống dốc","Khi mặt đường trơn"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":460,"b":"Trong khi đang chạy trên đường cao tốc thì thấy khói ở khoang máy và đã xảy ra hỏa hoạn thì 2 biện pháp  xử lý tốt nhất là gì?","c":["Dừng lại tại chỗ ngay khi phát hiện.","Sau khi đi vào làn đường phụ khẩn cấp, tắt máy và nhanh chóng xuống xe.","Trường hợp hỏa hoạn chưa lớn thì có thể dùng bình cứu hỏa trên xe để dập tắt.","Trường hợp không thể dập tắt ngọn lửa thì gọi ngay 119 và đứng đợi bên cạnh xe."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":461,"b":"Điểm nào là điểm bắt đầu giảm làn đường trong khu vực cần thay đổi làn đường để đảm bảo lưu thông an  toàn trong khu vực đang thi công đường?","c":["Điểm bắt đầu khu vực cần chú ý","Điểm bắt đầu khu vực chuyển tiếp","Điểm bắt đầu khu vực thao tác thi công","Điểm bắt đầu của cuối khu vực thi công (trở về làn đường bình thường)"],"a":"2","imgs":[],"t":"문장형"},{"n":462,"b":"Đáp án nào sau đây đúng nhất với nội dung liên quan đến lái xe vào ban đêm?","c":["Nếu phủ màu kính phía trước có thể đảm bảo tầm nhìn rộng hơn vào ban đêm.","Khoảng cách phanh dài ra khi lái xe vào ban đêm hơn là ban ngày vào những ngày trời quang đãng.","Vào ban đêm, bật đèn sương mù khi đi sẽ thuận tiện hơn trong việc đảm bảo tầm nhìn phía trước.","Nếu nhìn thẳng vào đèn xe đối diện thì sẽ xảy ra hiện tượng lóa mắt."],"a":"4","imgs":[],"t":"문장형"},{"n":463,"b":"Giải thích nào là đúng về “hiện tượng lóa mắt” khi đang lái xe vào ban đêm?","c":["Khi xảy ra hiện tượng lóa mắt, ngay lập tức tắt đèn pha trước của ô tô thì hiện tượng lóa mắt sẽ biến mất.","Hiện tượng lóa mắt thường xảy ra khi hai xe ô tô đối diện cùng chiếu đèn pha hướng lên.","Nhiều trường hợp xảy ra khi lái xe trên đường phố đông đúc vào ban đêm.","Là hiện tượng tạm thời không nhìn thấy gì do ánh đèn sáng chóa khi tiến vào đường hầm vào ban đêm."],"a":"2","imgs":[],"t":"문장형"},{"n":464,"b":"Giải thích nào là đúng về việc \"Giảm tỉnh táo khi lưu thông\" của người lái xe khi lái xe vào ban đêm?","c":["Khả năng nhận thức được cải thiện hơn bình thường.","Chuyển động của mắt trở nên nhanh nhạy hơn.","Nhiều trường hợp xảy ra khi lái xe trên đường phố đông đúc.","Trạng thái đã quen với một nhịp điệu đơn điệu và rơi vào tình trạng tê liệt."],"a":"4","imgs":[],"t":"문장형"},{"n":465,"b":"Biện pháp nào sau đây của người lái xe là không đúng nhất khi mặt trời lặn và trời bắt đầu tối?","c":["Bật đèn hông và đèn hậu.","Lái xe chậm hơn tốc độ lái ban ngày.","Mắt cần thời gian để thích nghi với bóng tối sau khi mặt trời lặn nên phải cẩn trọng.","Lái xe dễ hơn vì tầm nhìn rõ hơn so với ban ngày."],"a":"4","imgs":[],"t":"문장형"},{"n":466,"b":"Giải thích nào sau đây là không đúng về khớp nối của cáp sạc xe ô tô điện? ⓛ Là kết cấu không thể thay thế bằng các thiết bị phối dây khác, được phân chia phân cực và có điện cực tiếp đất.","c":["Là kết cấu có điện cực tiếp đất được tiếp xúc sau cùng khi mở và phân chia đầu tiên khi đóng cắt.","Là kết cấu có thiết bị cơ khí để khóa hoặc gắn hay tháo nhằm ngăn ngừa đóng cắt phụ tải không cố ý.","Là kết cấu có chức năng khóa liên động để ngắt nguồn điện của cáp sạc khi ngắt kết nối của xe khỏi cổng kết nối của  xe điện."],"a":"2","imgs":[],"t":"문장형"},{"n":467,"b":"Cách nào dưới đây là tốt nhất để phòng ngừa hỏa hoạn trong xe?","c":["Thay đổi hệ thống dây điện theo ý mình để lắp đặt âm li trong xe.","Tránh tạo ra tĩnh điện khi nạp nhiên liệu trong mùa đông.","Nếu là xe LPG thì nên mang theo khí ga butan dùng một lần để sẵn sàng dùng trong trường hợp khẩn cấp.","Có thể để bật lửa dùng một lần trong xe vào mùa hè."],"a":"2","imgs":[],"t":"문장형"},{"n":468,"b":"Cách nào dưới đây là đúng nhất để kiểm soát nguy cơ va chạm do phương tiện phía trước phanh gấp gây ra?","c":["Đạp bàn đạp phanh để giảm tốc độ, không bỏ cuộc cho tới trước khi va chạm xảy ra.","Quay gấp tay lái sang trái, vượt qua vạch phân cách để tránh đâm vào xe phía trước.","Nhắm mắt lại để giảm thiểu thiệt hại.","Bật cả đèn pha và cần gạt nước."],"a":"1","imgs":[],"t":"문장형"},{"n":469,"b":"Hai hiện tượng nào sẽ xảy ra khi lốp của xe đang di chuyển với tốc độ cao có vấn đề?","c":["Hiện tượng nút hơi nước","Hiện tượng sóng đứng","Hiện tượng mất phanh","Hiện tượng xe bị trượt nước"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":470,"b":"Nội dung nào là đúng về việc thắt dây an toàn theo Pháp lệnh Giao thông đường bộ?","c":["Cố định dây an toàn trên thắt lưng để phòng ngừa va đập khi xảy ra tai nạn giao thông.","Lính cứu hỏa đi chữa cháy có thể không cần thắt dây an toàn.","Để trẻ em ngồi ở ghế phía trước rồi thắt dây an toàn là an toàn nhất.","Bị phạt hành chính 30.000 Won nếu để trẻ dưới 13 tuổi không thắt dây an toàn."],"a":"2","imgs":[],"t":"문장형"},{"n":471,"b":"Cần điều chỉnh gì trước khi xuất phát để giảm thiểu chấn thương đầu và cổ nếu gặp tai nạn?","c":["Điều chỉnh trước và sau ghế.","Điều chỉnh độ ngả của ghế.","Điều chỉnh độ cao của phần đỡ đầu trên thân ghế.","Điều chỉnh độ cao thấp của ghế."],"a":"3","imgs":[],"t":"문장형"},{"n":472,"b":"Nội dung nào là đúng liên quan đến lái xe an toàn trong đường hầm?","c":["Bật đèn xi nhan bên trái và vượt về bên trái.","Cảm giác về cự ly với xe phía trước ở trong đường hầm bị suy giảm.","Phải chú ý hiện tượng thích nghi với ánh sáng khi tiến vào đường hầm.","Xảy ra hiện tượng thích nghi với bóng tối ở khu vực lối ra khỏi đường hầm."],"a":"2","imgs":[],"t":"문장형"},{"n":474,"b":"Trong trường hợp nào có thể vượt lên trước?","c":["Trường hợp xe trước đang vượt lên trước xe khác","Trường hợp xe trước dừng lại hoặc đi chậm để phòng tránh nguy hiểm","Trường hợp chiếc xe khác ở bên trái xe trước đang đi song song với xe trước","Trường hợp xe phía trước chạy chậm và bảo đảm khoảng cách an toàn với xe khác"],"a":"4","imgs":[],"t":"문장형"},{"n":475,"b":"Dưới đây là giải thích về tốc độ khi muốn vượt xe khác. Chọn giải thích đúng nhất.","c":["Khi vượt xe khác thì không giới hạn tốc độ.","Có thể tăng tốc đến hơn 50% tốc độ cho phép trên đường đó.","Không có giới hạn, tùy theo năng lực của người lái xe.","Chỉ có thể vượt lên trước trong giới hạn tốc độ tối đa cho phép của đường đó."],"a":"4","imgs":[],"t":"문장형"},{"n":476,"b":"Để đề phòng tai nạn, đường cao tốc quy định cấm dừng xe và đỗ xe. Giải thích nào không đúng về việc này?","c":["Xe cứu hỏa đang làm nhiệm vụ đảm bảo an toàn có thể dừng xe hoặc đỗ xe.","Có thể dừng xe hoặc đỗ xe theo điều khiển của cảnh sát hoặc để phòng tránh nguy hiểm.","Xe thông thường có thể dừng xe ở nơi thu phí để thanh toán phí giao thông.","Xe cứu hỏa, xe cứu hộ của cảnh sát có thể dừng hoặc đỗ xe ở khu vực đỗ xe khẩn cấp trong đường hầm."],"a":"4","imgs":[],"t":"문장형"},{"n":477,"b":"Hai trường hợp “khoảng cách phanh” dài nhất kể từ khi người lái xe cảm thấy nguy hiểm và đạp chân phanh  cho đến khi xe dừng lại hẳn là trường hợp nào?","c":["Khi trọng lượng của xe tương đối nhẹ.","Khi tốc độ của xe tương đối nhanh.","Ngay sau khi mua và lắp lốp xe mới.","Khi lái xe trong lúc mệt mỏi và uống rượu."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":478,"b":"Hai giải thích nào là đúng về số người đi xe ô tô?","c":["Không được lưu thông vượt quá số người quy định của xe trên đường cao tốc.","Số người quy định được ghi trên giấy đăng ký xe là số người không bao gồm người lái xe.","Trường hợp được Giám đốc Sở Cảnh sát khu vực khởi hành cấp phép thì có thể lưu thông vượt quá số người quy  định.","Phải xin phép Giám đốc Sở Cảnh sát khu vực điểm đến khi vượt quá số người quy định."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":479,"b":"Hai phương pháp lái xe nào là an toàn nhất để phòng ngừa tai nạn va chạm khi xe trước dừng đột ngột?","c":["Duy trì với xe trước một khoảng cách lớn hơn khoảng cách phanh.","Bật đèn báo khẩn cấp và đi theo xe khẩn cấp.","Để không va chạm với xe trước, cần giảm tốc độ và giữ khoảng cách an toàn.","Khi phát hiện nguy hiểm thì đồng thời sử dụng phanh chân và phanh đỗ xe để rút ngắn khoảng cách đạp phanh."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":480,"b":"Hai giải thích nào đúng về dây an toàn?","c":["Trường hợp người điều khiển xe không thắt dây an toàn thì bị phạt hành chính 30.000 Won.","Chấn thương do giật cổ (Whiplash) thường xảy ra đối với loại dây an toàn kiểu 2 điểm.","Trẻ dưới 13 tuổi không thắt dây an toàn bị phạt tiền vi phạm giao thông 60.000 Won.","Dây an toàn được phân loại thành loại 2 điểm, loại 3 điểm và loại 4 điểm."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":481,"b":"Hai giải thích nào đúng về việc thắt dây an toàn?","c":["Khi đi quãng đường ngắn thì dây an toàn không có tác dụng gì nên không cần thắt cũng được.","Vì an toàn nên người trên xe phải thắt dây an toàn.","Đối với trẻ em thì đặt ngồi ở ghế cạnh ghế lái để có thể nhận được sự giúp đỡ của bố mẹ, và thắt dây an toàn để  đảm bảo an toàn.","Người lái xe khẩn cấp ngoài những lúc được điều động làm nhiệm vụ khẩn cấp thì cũng phải thắt dây an toàn."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":482,"b":"Phương pháp xử lý phù hợp nhất về trường hợp phỏng đoán bị chấn thương cột sống nghiêm trọng do tai  nạn giao thông?","c":["Kiểm tra người bị thương còn ý thức hay không và tiến hành hô hấp nhân tạo ngay.","Dìu người bị thương đến nơi an toàn rồi gọi cho 119.","Đường hô hấp trên có thể bị tắc nghẽn nên cần thực hiện biện pháp Heimlich (đẩy bụng).","Nếu không phải trường hợp khẩn cấp thì không được di chuyển người bị thương. Trường hợp bất khả kháng phải  chuyển người bị thương đi thì sử dụng nẹp "],"a":"4","imgs":[],"t":"문장형"},{"n":483,"b":"Khi xảy ra tai nạn giao thông, biện pháp trước tiên để kiểm tra trạng thái ý thức của người bị thương là gì?","c":["Bắt mạch của người bị thương để kiểm tra.","Thử nói chuyện hoặc vỗ nhẹ vào vai.","Quan sát xem chỗ nào chảy máu nhiều nhất.","Kiểm tra mồm xem có dị vật trong khí quản hay không."],"a":"2","imgs":[],"t":"문장형"},{"n":484,"b":"Khi xảy ra tai nạn giao thông, theo Pháp lệnh Giao thông đường bộ, 2 loại xe nào có thể yêu cầu người đi  cùng hỗ trợ xử lý để tiếp tục lưu thông trong trường hợp khẩn cấp?","c":["Xe con đang đưa người bị thương đi bệnh viện","Xe cứu hỏa sau khi đi chữa cháy về","Xe cứu hộ giao thông đang chạy đến hiện trường tai nạn giao thông","Xe ô tô bưu chính đang chở hàng bưu phẩm/bưu kiện."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":485,"b":"Theo Pháp lệnh Giao thông đường bộ, 2 đáp án nào đúng với trường hợp có thể tiếp tục đi khi xảy ra tai nạn  giao thông?","c":["Người lái xe cấp cứu đang chở bệnh nhân đi cấp cứu để người đi cùng thực hiện các biện pháp xử lý cần thiết và  tiếp tục đi.","Người lái xe đang di chuyển để tham gia cuộc họp khẩn cấp để người đi cùng thực hiện các biện pháp xử lý cần  thiết và tiếp tục đi.","Người lái xe chở bưu phẩm khẩn cấp để người đi cùng thực hiện các biện pháp xử lý cần thiết và tiếp tục đi.","Người lái xe cấp cứu đang chở dược phẩm khẩn cấp để người đi cùng thực hiện các biện pháp xử lý cần thiết và tiếp  tục đi."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":486,"b":"Nội dung nào không phải là cách lái xe phòng tránh tai nạn “đâm phải động vật qua đường (road kill)” trên  đường vào ban đêm?","c":["Khi lưu thông trên đường quốc lộ hoặc đường núi ít người và xe qua lại, phải chú ý giảm tốc độ.","Khi phát hiện có động vật hoang dã, đi chậm từ từ rồi dừng lại ở làn đường phụ để tránh va chạm với động vật.","Khi phát hiện có động vật hoang dã, nhẹ nhàng nhấn còi kết hợp với tắt đèn pha trước để dụ động vật bỏ chạy.","Nếu có thể nên lưu thông ở phần đường gần với làn đường phụ để dễ dàng phát hiện ra động vật."],"a":"4","imgs":[],"t":"문장형"},{"n":487,"b":"Cơ quan nào dưới đây cung cấp dịch vụ kéo xe miễn phí trên một quãng đường nhất định trong trường hợp  khẩn cấp như hỏng xe trên đường cao tốc?","c":["Cơ quan Giao thông đường bộ Hàn Quốc","Cơ quan Đường bộ Hàn Quốc","Cục Cảnh sát","Cơ quan An toàn giao thông Hàn Quốc"],"a":"2","imgs":[],"t":"문장형"},{"n":488,"b":"Cách xử lý nào là không đúng khi phát sinh tai nạn “đâm phải động vật qua đường (road kill)” trên đường?","c":["Vì có nguy cơ mắc bệnh truyền nhiễm nên không tùy tiện chạm vào xác động vật.","Khi phát sinh tai nạn “đâm phải động vật qua đường (road kill)”, phải báo lên Trung tâm Cứu trợ Động vật hoang dã  hoặc Tổng đài địa phương số “Mã vùn","Để phòng tránh tai nạn thứ cấp xảy ra, phải lập tức đưa động vật bị tai nạn lên xe của mình.","Nếu đã thực hiện các biện pháp xử lý phòng tránh tai nạn thứ cấp và đảm bảo lưu thông cho giao thông, thì không  cần phải khai báo nữa."],"a":"3","imgs":[],"t":"문장형"},{"n":489,"b":"Giải thích nào là đúng về cách kiểm soát cơn giận để phòng tránh lái xe trả đũa hay phát sinh tai nạn giao  thông?","c":["Kiểm soát cơn giận bằng cách, trong tình huống cảm xúc dâng lên sôi sục, cần tạm thoát khỏi tình huống và thư  giãn trong một thời gian để cảm xúc ổn ","Kiểm soát cơn giận bằng cách dừng suy nghĩ về sự cố tiêu cực dẫn đến phẫn nộ và tập trung 1~2 phút nghĩ đến  những hình ảnh hạnh phúc thường ngày, đây","Phương pháp tự đặt câu hỏi cho bản thân về kinh nghiệm nhận thức thụ động liên quan đến tai nạn đã bị bóp méo  trong quá khứ và đức tin chung dẫn đến ","Phương pháp lặp đi lặp lại động tác kéo căng hết mức các bộ phận cơ thể như hai cánh tay, chân, bụng dưới, ngực,  vai v.v... rồi thả lỏng, đây là “Phư"],"a":"4","imgs":[],"t":"문장형"},{"n":490,"b":"Đường hầm phía trước bị ngập nước do mưa lớn. Phương pháp lái xe nào là an toàn nhất?","c":["Xe có thể di chuyển an toàn khi bánh xe chưa bị ngập hoàn toàn trong nước, nên cứ lái chậm đi qua.","Lái xe qua chỗ ngập nhanh nhất có thể.","Kiểm tra đường vòng rồi quay lại.","Lái xe qua. Nếu động cơ tắt, khởi động lại ngay lập tức và tiếp tục lái xe qua."],"a":"3","imgs":[],"t":"문장형"},{"n":491,"b":"Nội dung nào không đúng với cách xử lý khi xảy ra tình huống khẩn cấp như tai nạn giao thông?","c":["Kiểm tra xem có nguy hiểm không","Kiểm tra phản ứng của nạn nhân","Đảm bảo đường thở và kiểm tra hô hấp","Kiểm tra điểm đến và nhân thân của nạn nhân"],"a":"4","imgs":[],"t":"문장형"},{"n":492,"b":"Cách nào sau đây là không đúng khi xử lý tình huống nguy hiểm lúc lái xe?","c":["Nắm chắc tay lái nếu nó rung lắc mạnh và tiếp tục lái xe.","Nếu khói bốc ra từ xe, tấp vào nơi an toàn và tắt máy.","Nếu xảy ra nổ lốp, giữ chắc tay lái, giảm tốc và dừng xe ở nơi an toàn.","Nếu động cơ dừng khi đi qua đường ray tàu hỏa, sơ tán khỏi phương tiện ngay lập tức và thông báo cho cơ quan  chức năng."],"a":"1","imgs":[],"t":"문장형"},{"n":493,"b":"Hai nội dung nào sau đây đúng với cách quay phim, chụp ảnh để làm bằng chứng tại hiện trường tai nạn  giao thông?","c":["Nếu đã có video của hộp đen (blackbox) thì không cần quay phim, chụp ảnh thêm.","Các dấu vết như dầu động cơ, nước làm lạnh, v.v... lưu lại rất lâu trên đường nên không cần phải quay phim, chụp  ảnh lại.","Cần quay phim, chụp ảnh gần và xa cùng một đối tượng như các mảnh vỡ, phần bị hư hại của xe và đường, v.v...","Đánh dấu hướng xoay của bánh xe bằng bình xịt hoặc quay phim, chụp ảnh lại."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":494,"b":"Trước khi đi xa cần ưu tiên kiểm tra 2 lựa chọn nào dưới đây?","c":["Kiểm tra tình trạng vệ sinh sạch sẽ của xe","Hoạt động của hệ thống DMB (thiết bị hiển thị hình ảnh)","Các loại dầu","Tình trạng lốp"],"a":"3, 4","imgs":[],"t":"문장형"},{"n":495,"b":"Lý do đúng của việc tước bằng lái xe theo Pháp lệnh Giao thông đường bộ là gì?","c":["Lái xe không tiến hành kiểm tra xe theo định kỳ, quá hạn 6 tháng kể từ ngày hết hạn kiểm tra.","Lái xe đang bị khởi tố tại ngoại do có hành vi bạo lực chống đối công chức thi hành nhiệm vụ (cảnh sát, công chức  quận-huyện-thành phố).","Lái xe đã đăng ký xe nhưng điều khiển xe không gắn biển số xe.","Lái xe không đổi mới bằng lái phổ thông hạng 2, quá hạn 2 năm."],"a":"2","imgs":[],"t":"문장형"},{"n":496,"b":"Theo Pháp lệnh Giao thông đường bộ, người nhận Giấy báo nộp phạt nhưng để quá thời hạn nộp phạt lần 1  thì phải nộp phạt trong vòng 20 ngày với số tiền là bao nhiêu?","c":["Phải nộp thêm 10% tiền phạt nộp chậm.","Phải nộp thêm 20% tiền phạt nộp chậm.","Phải nộp thêm 30% tiền phạt nộp chậm.","Phải nộp thêm 40% tiền phạt nộp chậm."],"a":"2","imgs":[],"t":"문장형"},{"n":497,"b":"Điểm phạt vượt quá bao nhiêu thì bị tước bằng lái xe theo Pháp lệnh Giao thông đường bộ?","c":["Từ 100 điểm phạt trở lên trong 1 năm","Từ 191 điểm phạt trở lên trong 2 năm","Từ 271 điểm phạt trở lên trong 3 năm","Từ 301 điểm phạt trở lên trong 5 năm"],"a":"3","imgs":[],"t":"문장형"},{"n":498,"b":"Nội dung nào đúng về chuẩn điểm phạt tùy theo hậu quả tai nạn giao thông theo Pháp lệnh Giao thông  đường bộ?","c":["Người lái xe khi gây ra tai nạn bị xử phạt hành chính nhưng bản thân cũng bị thương thì cũng bị tính điểm phạt  theo phân loại tai nạn giao thông gây ","Trường hợp tai nạn giao thông giữa xe và người nếu là do lỗi của hai bên thì không bị tính điểm phạt.","Khi lý do xảy ra tai nạn là bất khả kháng hay là do lỗi rõ ràng của nạn nhân thì giảm nhẹ một nửa điểm phạt.","Trong tai nạn giao thông giữa xe với xe, chỉ tính điểm phạt cho người lái xe có vi phạm nghiêm trọng trong các  nguyên nhân gây ra tai nạn."],"a":"4","imgs":[],"t":"문장형"},{"n":499,"b":"Giải thích nào đúng về tiền phạt do vi phạm đỗ xe được ghi lại bằng thiết bị ghi hình theo Pháp lệnh Giao  thông đường bộ?","c":["Chủ sở hữu xe ô tô con phải nộp phạt hành chính 30.000 Won.","Chủ sở hữu xe khách phải nộp phạt hành chính 70.000 Won.","Không nộp tiền phạt hành chính đúng hạn cũng không bị bất lợi gì.","Trường hợp vi phạm đỗ xe do đỗ từ 2 tiếng trở lên tại cùng một địa điểm thì tiền phạt hành chính sẽ bị tăng nặng."],"a":"4","imgs":[],"t":"문장형"},{"n":500,"b":"Trường hợp nào người lái xe gây tai nạn giao thông có tham gia bảo hiểm tổng hợp hay thuộc Hiệp hội  Tương trợ được áp dụng điều lệ đặc biệt của Luật đặc biệt về Xử lý tai nạn giao thông?","c":["Vi phạm nghĩa vụ lái xe an toàn, làm hư hại xe và gây ra tai nạn nhẹ.","Gây tai nạn giao thông dẫn đến tử vong cho người.","Bỏ trốn sau khi gây ra tai nạn giao thông mà không cứu người bị thương.","Gây ra tai nạn giao thông nhẹ do vi phạm tín hiệu."],"a":"1","imgs":[],"t":"문장형"},{"n":501,"b":"Bảy người cùng đi trên 4 chiếc xe trên đường cùng có hành vi gây nguy hiểm cho người khác và đã bị xử lý  hình sự. Mức xử phạt nào không đúng theo Pháp lệnh Giao thông đường bộ? (Trừ thiết bị di chuyể","c":["Phạt tù tối đa 2 năm hoặc phạt tiền hình sự tối đa 5 triệu Won","Đình chỉ bằng lái ngay khi phát hiện vi phạm","Hủy bằng lái trong trường hợp bị giam giữ","Trừ 40 điểm trong trường hợp bị xử lý hình sự"],"a":"2","imgs":[],"t":"문장형"},{"n":502,"b":"Người lái xe đã bị cáo buộc hình sự vì lái xe ẩu theo Pháp lệnh Giao thông đường bộ. Xử phạt hành chính đối  với giấy phép lái xe trong trường hợp này là gì?","c":["Hủy giấy phép","Tạm đình chỉ giấy phép 100 ngày","Tạm đình chỉ giấy phép 60 ngày","Tạm đình chỉ giấy phép 40 ngày"],"a":"4","imgs":[],"t":"문장형"},{"n":503,"b":"Trường hợp đi xe đạp trong trạng thái say rượu bị xử lý như thế nào theo Pháp lệnh Giao thông đường bộ?","c":["Không bị xử phạt.","Bị gửi giấy báo phạt tiền vi phạm giao thông với số tiền phạt là 30.000 Won.","Xử phạt hành chính 40.000 Won.","Phạt tiền hình sự tối đa 100.000 Won hoặc tạm giam."],"a":"2","imgs":[],"t":"문장형"},{"n":504,"b":"Xử phạt như thế nào theo Pháp lệnh Giao thông đường bộ đối với người đi xe đạp có lý do chính đáng để  công nhận rằng đã say rượu nhưng không tuân thủ yêu cầu hợp pháp của cảnh sát về việc đo nồng độ ","c":["Không xử phạt.","Xử phạt hành chính 70.000 Won.","Bị gửi giấy báo phạt tiền vi phạm giao thông với số tiền phạt là 100.000 Won.","Phạt tiền hình sự tối đa 100.000 Won hoặc tạm giam."],"a":"3","imgs":[],"t":"문장형"},{"n":505,"b":"Hai trường hợp đúng về xử phạt hình sự theo Luật đặc biệt về Xử lý tai nạn giao thông?","c":["Khi xe không tham gia bảo hiểm tổng hợp gây tai nạn giao thông có thiệt hại về tài sản và hòa giải với nạn nhân.","Khi xe taxi tham gia Liên đoàn taxi lấn vào vạch phân làn giữa đường, gây tai nạn thiệt hại về người.","Khi xe tham gia bảo hiểm tổng hợp vi phạm tín hiệu giao thông gây tai nạn thiệt hại về người.","Khi xe tải đã tham gia Quỹ bảo hiểm hàng hóa gây tai nạn giao thông có thiệt hại về người do không tuân thủ lái  xe an toàn."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":506,"b":"Hai giải thích đúng về trường hợp người nhận thông báo nộp phạt quá thời hạn nộp phạt lần 2 theo Pháp  lệnh Giao thông đường bộ là gì?","c":["Phải đề nghị Tòa án ra phán quyết rút gọn ngay lập tức.","Nế
