"Nếu bật đèn xi nhan trước thì sẽ không được nhường  đường, nên phải bật đèn xi nhan cùng lúc với khi bắt đầu  chuyển làn."],"a":"1, 4","imgs":["img_0055.jpg"],"t":"사진형"},{"n":740,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Chuyển sang làn đường số 1 để tránh xe chở hàng đang  định chuyển làn đường.","Để tránh va chạm với xe chở hàng, kiểm tra tình hình giao  thông ở phía sau và giảm tốc độ lái xe.","Vì đường hầm ngắn nên có thể kiểm tra được tình hình bên  ngoài đường hầm ở phía trước, do đó có thể tăng tốc để  nhanh chóng ra khỏi đường hầm.","Bật đèn pha trước khi tiến vào đường hầm.","Khi xe chở hàng chuyển sang làn đường số 3 làm khoảng  cách với xe ô tô phía trước tăng lên, thì bám sát phía sau xe  ô tô đó nhất có thể."],"a":"2, 4","imgs":["img_0056.jpg"],"t":"사진형"},{"n":741,"b":"Hai cách lái xe nào là không đúng trong tình huống sau?","c":["Người sử dụng Hi-Pass chuyển sang làn đường dành riêng  cho xe sử dụng Hi-Pass trước.","Vì ở làn đường dành cho Hi-Pass không cần dừng lại, nên  khi lái xe không cần chú ý đến các xe đang chạy phía trước.","Nếu muốn thanh toán bằng tiền mặt hoặc thẻ thì đổi sang  làn đường tương ứng đó trước.","Nếu muốn thanh toán bằng tiền mặt nhưng lỡ bị đi vào làn  đường khác thì lùi xe lại rồi tìm lại đúng làn đường.","Khi qua trạm thu phí phải đi với tốc độ dưới 30 km/giờ."],"a":"2, 4","imgs":["img_0057.jpg"],"t":"사진형"},{"n":742,"b":"Hai câu nào không đúng khi kết nối thông tin có thể biết  được và cách lái xe an toàn tương ứng thông qua các tình  huống sau?","c":["Vật rơi trên đường - Bật đèn nháy khẩn cấp để thông báo  cho các xe đi sau biết tình huống nguy hiểm.","Làn đường số 1 - Vào ngày thường, người lái xe ô tô con  được phép vượt.","Vạch màu chỉ dẫn trên mặt làn đường số 3 - Vào ngày  thường, đây là làn đường dành riêng cho xe buýt.","Biển báo trạm dừng chân - Đây là biển báo cho biết phía  trước bên phải sắp có trạm dừng chân.","Đường có 3 làn đường một chiều - Người lái xe chở hàng có  thể đi ở làn đường số 1 để vượt."],"a":"3, 5","imgs":["img_0058.jpg"],"t":"사진형"},{"n":743,"b":"Hai cách lái xe nào là không đúng nhất trong tình  huống sau?","c":["Làn đường dành cho xe buýt chỉ có xe buýt mới được lưu  thông.","Xe ô tô con được phép đi trên làn đường số 1 để vượt xe  chở hàng phía trước.","Giữ khoảng cách an toàn với xe chở hàng phía trước và cẩn  thận với trường hợp có vật rơi xuống.","Xe đang đi trên làn đường khả biến phải chuyển sang làn  đường số 3.","Xe chở hàng 5 tấn không thể tiến vào Oksan IC."],"a":"1, 2","imgs":["img_0059.jpg"],"t":"사진형"},{"n":744,"b":"Hai cách lái xe nào là không đúng trong tình huống  sau?","c":["Giảm tốc dần.","Chú ý xe hướng dẫn thi công phía trước.","Duy trì khoảng cách an toàn với xe phía trước.","Dừng lại một lúc ở phía sau xe hướng dẫn thi công để sử  dụng điện thoại di động.","Nếu quyết định không ghé vào trạm dừng chân thì quan sát  gương chiếu hậu bên trái, bật đèn xi nhan và đồng thời  chuyển ngay sang làn đường số 3."],"a":"4, 5","imgs":["img_0060.jpg"],"t":"사진형"},{"n":745,"b":"Hai cách nào không phải là cách lái xe an toàn trong  tình huống sau?","c":["Không được lưu thông trên làn đường khả biến.","Lái xe cẩn thận vì phía trước 1km là khu vực có sương mù.","Vì sắp đến đoạn đường kiểm soát giao thông nên lái xe đi  sát lề đường để tránh camera.","Có thể đi trên làn đường số 2 để vượt xe chở hàng.","Người đi cùng trên xe chở hàng ở đường cao tốc không có  nghĩa vụ phải thắt dây an toàn."],"a":"3, 5","imgs":["img_0061.jpg"],"t":"사진형"},{"n":746,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Sau khi tiến vào làn đường Hi-Pass, nếu muốn đi sang làn  đường khác thì lùi xe rồi tìm làn đường phù hợp.","Nếu không gắn thiết bị Hi-Pass, bắt buộc phải dừng lại ở  làn đường Hi-Pass và thanh toán rồi mới được đi qua.","Nếu muốn thanh toán bằng tiền mặt hoặc thẻ thì đổi sang  làn đường tương ứng đó trước.","Vì ở làn đường dành cho Hi-Pass không cần dừng lại, nên  khi lái xe không cần chú ý đến các xe đang chạy phía trước.","Khi đi qua làn đường Hi-Pass, phải lái xe an toàn với tốc độ  dưới 30 km/giờ."],"a":"3, 5","imgs":["img_0062.jpg"],"t":"사진형"},{"n":747,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì có xe hướng dẫn thi công trên làn đường số 1 nên tăng  tốc và đi nhanh qua.","Từ từ giảm tốc độ và vừa đi vừa chú ý tình huống phía trước.","Bật đèn nháy khẩn cấp để cảnh báo cho các xe đi sau về  tình huống nguy hiểm.","Chuyển gấp sang làn đường số 3 để tránh xe hướng dẫn thi  công.","Vì các xe đi trên đường cao tốc được ưu tiên hơn xe hướng  dẫn thi công, nên nhấn còi liên tục để gây chú ý và cứ thế  đi qua."],"a":"2, 3","imgs":["img_0063.jpg"],"t":"사진형"},{"n":748,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì xe chở hàng đang đi với tốc độ thấp, nên có thể chuyển  làn đường bất kể khoảng cách giữa các xe.","Vì có thể gây cản trở việc lưu thông bình thường của xe chở  hàng, nên duy trì khoảng cách an toàn và chuyển làn đường.","Khi chuyển làn đường, luôn luôn lái xe tăng tốc độ lên tối  đa có thể.","Kiểm tra vị trí hoặc tốc độ của xe chở hàng rồi cẩn thận  chuyển làn đường.","Nếu đảm bảo đủ khoảng cách an toàn thì không cần bật  đèn xi nhan."],"a":"2, 4","imgs":["img_0064.jpg"],"t":"사진형"},{"n":749,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Trong đường hầm, cấm đỗ xe nhưng có thể tạm dừng khẩn  cấp tại một số khu vực nhất định.","Mặc dù trong đường hầm tối nhưng vẫn vừa đeo kính mát  vừa lái xe.","Dù đang ở đoạn đường kẻ vạch trắng liền trong đường hầm  nhưng nếu xe hai bên trái phải lưu thông thông suốt thì  vẫn có thể chuyển làn đường.","Trong đường hầm không giới hạn tốc độ tối đa nên tăng tốc  và đi nhanh qua.","Xung quanh đường hầm có thể có gió nên cẩn thận giảm  tốc độ."],"a":"1, 5","imgs":["img_0065.jpg"],"t":"사진형"},{"n":750,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Phía trước có bắn tốc độ tự động nên phanh gấp và giảm  tốc độ.","Giảm tốc độ trước và lái xe đi qua một cách an toàn.","Nếu bị nhầm làn đường, có thể sử dụng khu vực an toàn để  chuyển làn đường.","Chuyển gấp sang làn đường bên phải để tránh thiết bị giám  sát tự động.","Duy trì tốc độ lái xe tối đa 50 km/giờ."],"a":"2, 5","imgs":["img_0066.jpg"],"t":"사진형"},{"n":751,"b":"Trường hợp bàn đạp ga bị kẹt vào thảm chân dưới ghế  ngồi của người lái dẫn đến tăng tốc, 2 cách nào giúp  người lái xe dừng xe hoặc giảm tốc độ an toàn?","c":["Đạp bàn đạp phanh mạnh nhất có thể.","Nhấn liên tục nút đèn nhấp nháy khẩn cấp.","Vừa lái xe vừa nhấn còi mạnh.","Sử dụng phanh tay điện tử (EPB) liên tục.","Điều khiển vô lăng mạnh sang trái /phải."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":752,"b":"Hai giải thích nào là đúng nhất về khu vực sau?","c":["Có thể dừng đỗ xe ở khu vực bảo vệ trẻ em.","Nếu khu vực bảo vệ trẻ em có lắp hàng rào, thì trẻ em  không thể tiến ra làn đường xe chạy nên không cần phải  chú ý.","Để bảo vệ trẻ em tránh nguy cơ bị tai nạn giao thông, có  thể chỉ định khu vực bảo vệ trẻ em.","Cân nhắc tình hình tuyết chất đống, tuân thủ tốc độ lưu  thông, vừa lái xe vừa chú ý đến an toàn của trẻ em.","Trong khu vực bảo vệ trẻ em, trẻ em phải chú ý nên không  có nguy cơ phát sinh tai nạn."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":753,"b":"Hai câu nào không phải là “hành vi cản trở đỗ xe ở khu  vực đỗ xe dành cho người khuyết tật” theo Luật Đảm bảo  tiện lợi cho người khuyết tật, người cao tuổi và phụ nữ  mang thai, v.v?","c":["Hành vi cản trở đỗ xe do chất đồ đạc trong khu vực đỗ xe  dành cho người khuyết tật.","Hành vi chất đồ hoặc đỗ xe ở trước, sau, hai bên khu vực đỗ  xe dành cho người khuyết tật.","Hành vi đỗ xe ở khu vực đỗ xe dành cho người khuyết tật  nhưng không có biển báo đây là khu vực đỗ xe dành cho  người khuyết tật.","Hành vi cản trở đỗ xe do xóa hoặc làm hỏng vạch kẻ hay  biển báo, v.v của khu vực đỗ xe dành cho người khuyết tật.","Hành vi đỗ chiếc xe không chở người có khuyết tật về đi lại  vào khu vực đỗ xe dành cho người khuyết tật có biển báo  đây là khu vực đỗ xe dành cho ng"],"a":"3, 5","imgs":[],"t":"문장형"},{"n":754,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Hành vi cản trở đỗ xe do chất đồ đạc trong khu vực đỗ xe  dành cho người khuyết tật.","Dù là khu vực bảo vệ trẻ em nhưng không có trẻ em nên  không cần tuân thủ tốc độ giới hạn tối đa.","Lái xe tuân thủ tốc độ giới hạn tối đa được ghi trên biển  báo an toàn.","Vì trẻ em có thể đột ngột chạy ra nên phải chú ý quan sát  khi lái xe.","Trong khu vực được chỉ định là khu vực bảo vệ trẻ em, phải  nhanh chóng đi qua với tốc độ tối đa."],"a":"3, 4","imgs":["img_0067.jpg"],"t":"사진형"},{"n":755,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Liên tục nhấn còi và lái xe đi nhanh qua.","Giảm tốc độ vừa đủ trước và chú ý an toàn.","Dù không nhìn thấy có người cao tuổi đang đi bộ thì cũng  lái xe đi chậm.","Lái xe bám sát xe trước nếu có thể.","Vì phía trước có vạch sang đường dành cho người đi bộ nên  tăng tốc để nhanh chóng đi qua khu vực bảo vệ người cao  tuổi."],"a":"2, 3","imgs":["img_0068.jpg"],"t":"사진형"},{"n":756,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Lái xe chậm với tốc độ tối đa 30 km/giờ.","Vì phía trước không có xe đang chạy nên lái xe đi nhanh  qua.","Không được đỗ xe nhưng được dừng xe.","Khi đi qua vạch sang đường, nhấn còi và đi qua nhanh bất  kể có trẻ em hay không.","Dù có hàng rào ngăn băng qua đường sai luật nhưng vẫn  lái xe chú ý trẻ em có thể xuất hiện bất ngờ."],"a":"1, 5","imgs":["img_0069.jpg"],"t":"사진형"},{"n":757,"b":"Trong tình huống sau đây, 2 hành vi nào mà người lái  xe hoặc người đi cùng không bị phạt vi cảnh hoặc phạt  tiền vi phạm an toàn giao thông?","c":["Xe ô tô con giảm tốc độ xuống dưới 30km/giờ trước.","Dắt xe máy đã tắt động cơ đi trên vỉa hè.","Người điều khiển thiết bị di chuyển cá nhân đã không tuân  theo hướng dẫn của người lái xe gương mẫu.","Người lái xe ô tô con đã đỗ xe trong khu vực bảo vệ trẻ em.","Trẻ nhỏ không đội mũ bảo hiểm và đang đi xe đạp trên vỉa  hè có người bảo hộ theo dõi."],"a":"1, 2","imgs":["img_0070.jpg"],"t":"사진형"},{"n":758,"b":"Hai câu nào là giải thích đúng về biển báo an toàn giao  thông trong tình huống sau?","c":["Số 30 ký hiệu trên mặt đường mang ý nghĩa là giới hạn tốc  độ tối đa trên đường là 30 km/giờ.","Vạch sang đường dành cho người đi bộ chỉ được ký hiệu  bằng màu trắng, vì vậy nếu ký hiệu bằng màu vàng là sai.","Vạch kẻ liền màu trắng hình dích dắc báo hiệu cần chạy  chậm và có thể chuyển làn đường ở đoạn đường này.","Biển báo hướng dẫn gắn với đèn tín hiệu giao thông dành cho  xe có ý nghĩa là có vạch sang đường dành cho người đi bộ.","Nhựa đường màu đỏ chỉ được sử dụng cho khu vực bảo vệ  trẻ em."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":759,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì đường uốn cong về bên trái nên vừa đi vừa kiểm tra tình  hình phía trước bằng cách sử dụng gương cầu lồi trên  đường được lắp ở bên phải là an toàn","Vì là đường lên dốc nên tốt nhất là nên tăng tốc vượt hơn  tốc độ tối đa một chút khi lái xe.","Mép phải đường có vạch kẻ liền màu vàng nên không được  phép đỗ xe nhưng có thể tạm dừng xe.","Ở vạch sang đường dành cho người đi bộ không có đèn tín  hiệu, dù không có người đi bộ thì tuyệt đối vẫn phải tạm  dừng ngay trước vạch sang đường rồi","Trên đường uốn cong về bên trái, việc đi bên trái vẫn an  toàn dù có lấn qua vạch kẻ giữa đường."],"a":"1, 4","imgs":["img_0071.jpg"],"t":"사진형"},{"n":760,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Tăng tốc trước khi đi đến điểm kết thúc khu vực bảo vệ trẻ  em.","Trên đường không phân chia lề đường và lòng đường  không có vạch kẻ giữa đường, phải lái xe đặc biệt chú ý đến  an toàn của người đi bộ.","Dù là vạch sang đường dành cho người đi bộ trong khu vực  không phải là khu vực bảo vệ trẻ em nhưng cũng cần kiểm  tra có người đi bộ hay không rồi mớ","Vì là thời điểm hoàng hôn nên để kiểm tra được an toàn ở  phía trước, phải bật đèn pha và nhấn còi liên tục.","vạch nét đứt màu vàng ở bên phải đường có ý nghĩa là cho  phép đỗ xe nhưng không được phép dừng xe nên có thể  đỗ xe."],"a":"2, 3","imgs":["img_0072.jpg"],"t":"사진형"},{"n":761,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì là khu vực bảo vệ trẻ em nên phải nhấn còi liên tục kể cả  khi không có người đi bộ.","Vì có xe đang chạy lấn vạch kẻ giữa đường, nên giảm tốc độ  để giảm nguy cơ xảy ra tai nạn.","Vì có đường tiến vào bãi đỗ xe của tòa nhà ở bên trái, nên  có thể lấn vạch kẻ giữa đường để tiến vào.","Khó đảm bảo tầm nhìn do xe buýt đang đi ngược chiều, nên  trước khi băng qua đường phải giảm tốc độ và quan sát có  người đi bộ hay không.","Nơi gờ giảm tốc trong khu vực bảo vệ trẻ em cấm đỗ xe  nhưng có thể tạm dừng xe."],"a":"2, 4","imgs":["img_0073.jpg"],"t":"사진형"},{"n":762,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Trường hợp muốn rẽ phải khi đèn giao thông dành cho xe  phía trước là màu đỏ, thì có thể băng qua vạch sang đường  dành cho người đi bộ mà không cần d","Đèn tín hiệu dành cho người đi bộ ở bên phải là màu xanh  và có người đi bộ nên nếu muốn rẽ phải thì tạm dừng lại  trước vạch sang đường dành cho ngườ","Nếu người đi bộ vẫn còn băng qua đường dù đèn tín hiệu  dành cho người đi bộ đã chuyển sang màu đỏ, thì nhấn còi  để thúc giục.","Vì tín hiệu đèn dành cho người đi bộ ở bên phải là màu  xanh nên có thể rẽ trái bất kể đèn giao thông dành cho xe.","Người đi bộ có thể băng qua đường muộn, nên phải lái xe  chú ý đến an toàn hơn."],"a":"2, 5","imgs":["img_0074.jpg"],"t":"사진형"},{"n":763,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Có thể có xe xuất hiện từ đường hẻm bên phải nên nhanh  chóng vượt qua đường giao nhau.","Tình huống khó đảm bảo tầm nhìn do xe cứu hỏa đang đỗ  bên trái phía trước, nên giảm tốc độ và quan sát kỹ tình  hình phía trước.","Trong khu vực bảo vệ trẻ em, chỉ tạm dừng khi có người đi  bộ đang đi trên vạch sang đường dành cho người đi bộ.","Khi muốn rẽ phải, lái xe chú ý quan sát xe hoặc người đi bộ  đang đi ra từ đường hẻm bên phải.","Tốc độ giới hạn tối đa của tất cả các khu vực bảo vệ trẻ em  là 30 km/giờ, nên có thể lái xe trong giới hạn tốc độ tối đa  đó."],"a":"2, 4","imgs":["img_0075.jpg"],"t":"사진형"},{"n":764,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Lái xe chú ý cẩn thận hơn để đảm bảo an toàn cho người đi  bộ đang che ô.","Vì xung quanh có nhiều người đi bộ nên tăng tốc độ và đi  nhanh qua.","Dù không phải là khu vực bảo vệ trẻ em nhưng vì ở phía  trước trường học nên phải chú ý lái xe đảm bảo an toàn  cho người đi bộ.","Tình huống phía trước có đường giao nhau không có đèn  tín hiệu giao thông nên khó đảm bảo tầm nhìn hai bên trái  phải, do đó cần lái xe chậm.","Người đi bộ có thể xuất hiện giữa các xe đang đỗ, nên nhấn  còi liên tục để cảnh báo và lái xe đi ㅏㅐqua."],"a":"1, 3","imgs":["img_0076.jpg"],"t":"사진형"},{"n":765,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Dù không có người đi bộ thì cũng liên tục nhấn còi và đi  qua.","Phía sau xe chở hàng đang đỗ bên phải có đường hẻm nên  tạm dừng lại để quan sát tình hình người đi bộ và xe cộ rồi  mới tiến vào đường giao nhau.","Tại vạch sang đường dành cho người đi bộ không có đèn  tín hiệu giao thông nên nếu không có người đi bộ thì có  thể đi chậm qua.","Vì có xe đang chạy lấn vạch kẻ giữa đường ở phía trước,  nên giảm tốc độ để giảm nguy cơ xảy ra tai nạn.","Trường hợp muốn rẽ phải, dù bên phải có biển “Dừng lại”  nhưng vì không có đèn tín hiệu giao thông dành cho xe  nên không dừng lại mà cứ thế rẽ phải."],"a":"2, 4","imgs":["img_0077.jpg"],"t":"사진형"},{"n":766,"b":"Hai câu nào sau đây không đúng với giải thích về khu  vực dành riêng cho xe cứu hỏa theo Luật cơ bản về  phòng cháy chữa cháy?","c":["Được lắp đặt tại các khu chung cư để đảm bảo công tác  chữa cháy được suôn sẻ.","Không ai được phép đỗ xe ở khu vực chuyện dụng hoặc  chặn lối vào của khu vực chuyên dụng này.","Chủ xây dựng khu chung cư phải lắp đặt ít nhất một khu  vực chuyên dụng này trong mỗi tòa nhà mà không có  ngoại lệ.","Nếu đỗ xe như trong ảnh thì sẽ bị phạt tiền vi cảnh.","Hành vi xóa hoặc làm hư hỏng biển báo khu vực chuyên  dụng không phải là hành vi gây cản trở cho khu vực chuyên  dụng này."],"a":"3, 5","imgs":[],"t":"문장형"},{"n":767,"b":"Hai giải thích nào không đúng về xử lý cưỡng chế đối  với xe gây cản trở xe cứu hỏa đang đi làm nhiệm vụ khẩn  cấp?","c":["Có thể di chuyển các xe đang đỗ trái phép gây cản trở hoạt  động chữa cháy.","Có thể dẹp bỏ các xe đang đỗ trong đường phân chia khu  vực đỗ xe gây cản trở hoạt động chữa cháy.","Có thể di chuyển hoặc dẹp bỏ các đồ vật gây cản trở lưu  thông của xe cứu hỏa.","Người điều khiển xe đang đỗ trái phép bị xử lý cưỡng chế  có thể yêu cầu bồi thường thiệt hại.","Người điều khiển xe đang đỗ trong đường phân chia khu đỗ  xe bị xử lý cưỡng chế có thể yêu cầu bồi thường thiệt hại."],"a":"4, 5","imgs":[],"t":"문장형"},{"n":768,"b":"Hai cách lái xe nào là vi phạm luật trong tình huống  sau?","c":["Người lái xe B - Lái xe với tốc độ 100 km/giờ.","Người lái xe A - Lái xe với tốc độ 70 km/giờ.","Người lái xe B - Vượt ở đoạn đường giao nhau.","Người lái xe A - Vượt ở đoạn đường giao nhau.","Người lái xe B - Không đảm bảo khoảng cách an toàn với  xe trước."],"a":"2, 4","imgs":["img_0078.jpg"],"t":"사진형"},{"n":769,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Khi có xe khẩn cấp tiến đến gần, xe thông thường phải  nhường đường về hai bên trái phải đường.","Bám theo phía sau xe khẩn cấp sẽ có thể đi nhanh hơn nên  lái xe bám theo.","Lái xe tăng tốc để xe khẩn cấp ở bên phải không thể chuyển  làn đường.","Xe khẩn cấp đã làm xong nhiệm vụ và đang trên đường  quay về thì không bật đèn báo động và còi hú nên không  cần phải nhường đường.","Nếu phát hiện có xe khẩn cấp đang đi theo ở phía sau, thì  phải tăng tốc để không bị xe khẩn cấp đó vượt lên trước."],"a":"1, 4","imgs":["img_0079.jpg"],"t":"사진형"},{"n":770,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Chỉ có thể nhường đường ở làn đường số 2, nên nếu đang  đi trên làn đường số 1 thì không cần phải chú ý đến xe  khẩn cấp đang chạy phía sau.","Nếu phía trước có đường giao nhau, thì nhường đường để  tránh đường giao nhau.","Nhanh chóng chuyển sang làn đường số 2, bật đèn khẩn  cấp và chạy trước xe khẩn cấp.","Nếu đi trước xe khẩn cấp, thì nhường đường bằng cách  tránh qua bên trái hoặc bên phải của đường.","Nếu đi theo phía sau xe khẩn cấp thì có thể đi nhanh hơn,  nên khi xe khẩn cấp đi qua thì chuyển ngay sang làn đường  số 2 và bám sát theo."],"a":"2, 4","imgs":["img_0080.jpg"],"t":"사진형"},{"n":771,"b":"Hai câu nào là đúng nhất về thiết bị an toàn giao  thông và hành động đi kèm theo trong tình huống sau?","c":["Vạch sang đường dành cho người đi bộ - Có thể đi xe đạp  qua.","Vạch sang đường dành cho xe đạp - Khi băng qua đường  có vạch sang đường dành cho xe đạp, có thể chạy xe đạp  băng qua.","Đèn tín hiệu giao thông dành cho người đi bộ - Nếu nhấp  nháy xanh thì người đi bộ phải nhanh chóng bắt đầu băng  qua đường.","Đèn tín hiệu giao thông dành cho người đi bộ - Nếu không  có đèn tín hiệu giao thông dành cho xe đạp thì xe đạp  thực hiện theo hướng dẫn của đèn tín ","Đèn tín hiệu dành cho xe - Nếu không có đèn tín hiệu giao  thông dành cho xe đạp thì xe đạp thực hiện theo hướng  dẫn của đèn tín hiệu giao thông dành"],"a":"2, 4","imgs":["img_0081.jpg"],"t":"사진형"},{"n":772,"b":"Hai cách lái xe nào là không đúng nhất trong tình  huống sau?","c":["Khi muốn rẽ phải, tạm dừng ở ngay phía trước vạch dừng  rồi mới rẽ phải.","Khi rẽ phải, phải đi chậm sát mép phải của đường trước rồi  mới rẽ phải.","Người lái xe rẽ phải phải chú ý đến người đi bộ hoặc xe  đạp đang dừng lại hoặc đi theo đèn tín hiệu giao thông.","Khi có người xuống xe, xe chỉ tạm dừng trong chốc lát nên  có thể dừng trước trụ cấp nước chữa cháy.","Ở đường trong thành phố, dù là ban đêm thì xung quanh  vẫn sáng nên không cần bật đèn pha."],"a":"4, 5","imgs":["img_0082.jpg"],"t":"사진형"},{"n":773,"b":"Hai cách lái xe nào là không đúng nhất trong tình  huống sau?","c":["Người điều khiển xe đạp có thể đi qua vạch sang đường  dành cho người đi bộ khi đang đạp xe.","Người lái xe đạp nếu là trẻ em thì có thể đi trên vỉa hè.","Người lái xe đạp phải đội mũ bảo hiểm.","Người lái xe đạp khi lưu thông trên đường vào ban đêm,  phải bật đèn pha trước hoặc đèn sau, phải trang bị thiết bị  phát quang như đai dạ quang, v.v.","Xe buýt đưa đón học sinh có thể đỗ hoặc dừng ở bên trái  đường để thuận tiện cho trẻ lên xuống xe."],"a":"1, 5","imgs":["img_0083.jpg"],"t":"사진형"},{"n":774,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Nếu máy móc nông nghiệp đang không chạy, thì người lái  xe không cần phải đặc biệt chú ý.","Đường ở nông thôn và làng chài không quy định tốc độ  giới hạn nên lái xe tăng tốc.","Mặt đường có nhiều cát và bụi nên cần lái xe cẩn thận.","Đảm bảo khoảng cách an toàn với máy móc nông nghiệp  bằng cách tạm dừng hoặc giảm tốc độ trước khi tiến đến  gần máy móc nông nghiệp.","Tuyệt đối không nhấn còi làm ảnh hưởng đến người lái máy  móc nông nghiệp."],"a":"3, 4","imgs":["img_0084.jpg"],"t":"사진형"},{"n":775,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Đường ở nông thôn và làng chài không quy định tốc độ  giới hạn nên lái xe tăng tốc.","Dù có khoảng trống giữa xe ô tô con và máy móc nông  nghiệp thì cũng phải tạm dừng để đảm bảo an toàn cho  người trên xe máy cày.","Đảm bảo khoảng cách an toàn với máy móc nông nghiệp  bằng cách tạm dừng hoặc giảm tốc độ trước khi tiến đến  gần máy móc nông nghiệp.","Tuyệt đối không nhấn còi làm ảnh hưởng đến người lái máy  móc nông nghiệp.","Khu vực lề đường hai bên trái phải cấm dừng xe nhưng  cho phép đỗ xe nên có thể đỗ xe."],"a":"2, 3","imgs":["img_0085.jpg"],"t":"사진형"},{"n":776,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì đèn tín hiệu giao thông không hoạt động nên khi tiến  vào đường giao nhau phải quan sát kỹ tình hình ở đường  giao nhau rồi mới tiến vào.","Nếu muốn rẽ phải, bấm còi cảnh báo xe máy cày ở bên trái  rồi vượt lên trước.","Vì xe máy cày đang đi với tốc độ chậm nên tăng tốc và rẽ  phải trước.","Nếu muốn đi thẳng trên làn đường số 3, phải l kiểm tra  chính xác tình hình lưu thông của xe máy cày và lái xe.","Vì xe máy cày có thể đi thẳng nên dự đoán trước và  chuyển gấp sang làn đường số 2 rồi đi thẳng."],"a":"1, 4","imgs":["img_0086.jpg"],"t":"사진형"},{"n":777,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Có thể lấn vạch kẻ giữa đường để vượt lên trước máy cày.","Khi máy cày đi qua chiếc xe đang đỗ thì tận dụng khoảng  trống bên phải để vượt lên trước với tốc độ nhanh.","Mặc dù người lái xe máy cày ra dấu hiệu tay bảo đi trước  nhưng vẫn duy trì khoảng cách an toàn và đi theo sau một  cách an toàn.","Nếu xe máy cày chuyển sang làn đường số 2 và nhường  đường thì lái xe đi về phía bên trái của xe máy cày trong  phạm vi không lấn vạch kẻ giữa đường.","Không cần phải dự tính trước đến cả tình huống sẽ có  người đi bộ xuất hiện ở phía trước xe đang đỗ."],"a":"3, 4","imgs":["img_0087.jpg"],"t":"사진형"},{"n":778,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Trường hợp muốn đi thẳng, vì đèn tín hiệu dành cho xe ở  phía trước là màu đỏ nên phải đi chậm rồi dừng lại sau xe  phía trước một cách an toàn.","Khi đèn tín hiệu dành cho xe chuyển sang màu xanh, đầu  tiên tiếp tục đi trên làn đường hiện tại, đảm bảo đủ khoảng  cách rồi chuyển làn đường một các","Chuyển sang làn đường rẽ trái, khi đèn giao thông chuyển  sang màu xanh thì nhanh chóng đi sang làn đường ngược  chiều.","Nếu đang đi sau xe máy kéo, thì có thể vượt lên trước ở  bên phải của xe máy kéo.","Trường hợp muốn quay đầu xe, có thể quay đầu xe khi đèn  tín hiệu giao thông dành cho xe đang màu đỏ."],"a":"1, 2","imgs":["img_0088.jpg"],"t":"사진형"},{"n":779,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì xe máy kéo đang dừng lại nên liên tục nhấn còi để giục  xe máy kéo đi.","Khi xe ngược chiều đi qua thì ngay lập tức lấn vạch kẻ giữa  đường và vượt lên ở phía bên trái.","Vì xe chở hàng bên phải đang dừng có thể đột ngột xuất  phát nên cần phải vừa lái xe vừa đề phòng.","Nếu có khoảng trống ở bên phải xe máy kéo thì tận dụng  khoảng trống đó để vượt.","Vì tốc độ của xe máy kéo chậm hơn tốc độ của xe ô tô nên  cần duy trì khoảng cách an toàn thay vì bất chấp vượt lên  trước."],"a":"3, 5","imgs":["img_0089.jpg"],"t":"사진형"},{"n":780,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Xe dạng ghế hỗ trợ đi bộ được xem như là người đi bộ,  nên cần đảm bảo giữ một khoảng cách vừa đủ.","Khi xe chở hàng phía trước đã vượt xong thì bám theo  ngay phía sau và vượt lên trước.","Vì không thể kiểm tra tình hình phía trước nên bám sát  theo sau xe chở hàng.","Vì xe dạng ghế hỗ trợ đi bộ phải lưu thông trên vỉa hè nên  có thể nhấn còi và yêu cầu họ đi lên vỉa hè bên trái.","Bật đèn nháy khẩn cấp và lái xe chậm để cảnh báo các xe  đi sau về tình huống nguy hiểm phía trước."],"a":"1, 5","imgs":["img_0090.jpg"],"t":"사진형"},{"n":781,"b":"Hai cách lái xe nào là an toàn nhất khi muốn đi thẳng  trong tình huống sau?","c":["Không tiến vào đường giao nhau cho đến khi xe buýt đưa  đón trẻ xuất phát.","Vì xe buýt đưa đón trẻ đang dừng nên có thể đi về phía  bên trái.","Đi về phía bên trái theo ký hiệu tay của người lái xe buýt  đưa đón trẻ.","Tiến vào đường giao nhau và chờ ở phía sau xe buýt đưa  đón trẻ.","Đề phòng có người đi bộ xuất hiện ở phía sau xe tải ở phía  đối diện."],"a":"1, 5","imgs":["img_0091.jpg"],"t":"사진형"},{"n":782,"b":"Hai cách điều khiển xe an toàn nhất trong tình huống  sau là gì?","c":["Bật đèn pha cảnh báo người điều khiển xe đạp rồi nhanh  chóng đi qua.","Có khả năng người điều khiển xe đạp băng qua đường sai  luật nên phải chú ý đi chậm.","Vì xe đạp cũng là xe nên phỏng đoán xe đạp đã dừng ở vị  trí hiện tại đó nên cứ thế băng qua đường giao nhau.","Liên tục nhấn còi cảnh báo để người điều khiển xe đạp  không thể có hành động nguy hiểm và nhanh chóng băng  qua.","Vì người điều khiển xe đạp đang ở dưới lòng đường nên  đảm bảo khoảng cách an toàn và đi qua bên cạnh."],"a":"2, 5","imgs":["img_0092.jpg","img_0093.jpg"],"t":"사진형"},{"n":783,"b":"Hai tình huống nguy hiểm có thể xảy ra nếu đi qua  đoạn đường giao nhau trong trường hợp sau là gì?","c":["Xe màu trắng ở làn đường số 3 có thể rẽ phải.","Xe màu trắng ở làn đường số 2 có thể đột ngột đổi qua  làn đường số 1.","Xuất hiện người đi bộ băng qua đường sai luật từ chân cầu.","Tạm dừng để đảm bảo an toàn cho người đi bộ qua  đường chậm trên vạch sang đường dành cho người đi bộ.","Xe phía sau vượt lên trước xe của mình."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":784,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vì đèn xanh nên tăng tốc và nhanh chóng đi thẳng qua  đường giao nhau.","Bật đèn nháy khẩn cấp để thông báo cho các xe xung  quanh rồi rẽ phải ở làn đường số 2.","Lái xe đề phòng tình huống có xe phía trước đang chạy ở  làn đường số 3 thì bất ngờ chuyển hướng sang trái.","Vì xe phía sau bám theo quá sát nên tăng tốc để đảm bảo  khoảng cách an toàn và nhanh chóng đi qua đường giao  nhau.","Vừa kiểm tra bằng mắt tình hình xung quanh đường giao  nhau, vừa từ từ tăng tốc để đi qua."],"a":"3, 5","imgs":["img_0094.jpg","img_0095.jpg"],"t":"사진형"},{"n":785,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Ngay sau khi đèn đổi màu thì tăng tốc nhanh và nhanh  chóng đi qua đường giao nhau.","Bật đèn xi nhan trái và vừa chú ý xe khác vừa rẽ trái.","Tăng tốc nhanh trong khu vực đường giao nhau, chuyển  hướng về phía bên phải rồi đi nhanh qua.","Suy nghĩ lý do xe ô tô con màu trắng rẽ trái vì sao dừng  lại và lái xe chậm để đề phòng tình huống nguy hiểm.","Vừa kiểm tra trái phải có xe nào vi phạm tín hiệu đèn hay  không, vừa từ từ tăng tốc để đi qua."],"a":"4, 5","imgs":[],"t":"문장형"},{"n":786,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Để lưu thông thuận tiện, lấn vạch dừng trước khi đèn đang  đỏ, chờ rồi rẽ trái.","Không cần chú ý đến xe màu đỏ rẽ phải từ đường đối diện  vì xe rẽ trái được ưu tiên hơn.","Phải chú ý cẩn thận vì có thể nhất thời không nhìn thấy xe  hai bánh do nằm trong điểm mù của xe ô tô.","Rẽ trái theo vạch hướng dẫn màu trắng được ký hiệu trên  mặt đường giao nhau.","Vừa rẽ trái, vừa bật đèn xi nhan phải và tiến ngay vào làn  đường số 3 của đường bên trái."],"a":"3, 4","imgs":["img_0096.jpg"],"t":"사진형"},{"n":787,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Lái xe càng bám sát xe phía trước càng tốt để đi qua  đường giao nhau có nhiều xe.","Cần chú ý đề phòng xe phía trước đang ở làn đường số 3  thì đột ngột chuyển hướng sang trái.","Tiến vào đường giao nhau bất kể xe phía trước có đang  ùn tắc hay không để lưu thông thông suốt.","Bật đèn nháy khẩn cấp và vượt lên trước rồi đi thẳng về  phía làn đường số 1 đối diện đang không có xe.","Nếu không thể vượt qua đường giao nhau khi đèn xanh  do giao thông tắc nghẽn thì tạm dừng lại ngay trước vạch  dừng."],"a":"2, 5","imgs":["img_0097.jpg"],"t":"사진형"},{"n":788,"b":"Bạn muốn rẽ trái trong tình huống sau. Hai cách lái xe  nào là nguy hiểm nhất?","c":["Bật đèn nháy khẩn cấp, đi qua khu vực an toàn, tiến vào  làn đường số 1 rồi rẽ trái.","Tiến vào làn đường rẽ trái rồi bám sát xe trước nhất có thể  và nhanh chóng rẽ trái.","Khi chuyển hướng sang làn đường số 1, phải chú ý xe đi  theo phía sau.","Chuyển sang làn đường số 1 ở vạch nét đứt màu trắng rồi  rẽ trái.","Khi chuyển làn đường sang làn đường rẽ trái, cần chú ý  đến xe ở ngay phía trước."],"a":"1, 2","imgs":["img_0098.jpg"],"t":"사진형"},{"n":789,"b":"Hai cách điều khiển xe an toàn nhất trong tình huống  sau là gì?","c":["Liên tục nhấn còi để không cản trở lưu thông của xe.","B phỏng đoán xe sẽ lưu thông theo hướng bên trái nên  cứ thế chạy.","Dừng lại cho đến khi B băng qua đường xong để không  cản trở việc băng qua đường của B.","Ở nơi không phải là đường đi bộ thì xe được ưu tiên lưu  thông nên nhấn còi để B không thể băng qua đường.","Nếu đi qua bên cạnh B thì phải đi chậm và giữ khoảng  cách an toàn."],"a":"3, 5","imgs":["img_0099.jpg"],"t":"사진형"},{"n":790,"b":"Hai cách nào có thể quay đầu xe an toàn nhất trong  tình huống sau?","c":["Quay đầu xe lần lượt bắt đầu từ xe ở trước trong khu vực  quay đầu xe có vạch nét đứt màu trắng cùng với tín hiệu  đèn cho phép quay đầu xe.","Không cần phải chú ý đến xe rẽ phải và đi nhập vào làn  đường chính từ làn đường phụ bên trái.","Có thể quay đầu xe bất cứ lúc nào bất kể đèn tín hiệu  giao thông miễn là không cản trở các xe ở đường phía  đối diện.","Không cần chú ý đến xe quay đầu xe trước ở ngay sau xe  mình.","Có thể có xe ở đường đối diện vi phạm tín hiệu đèn và  chạy thẳng, nên cần kiểm tra bằng mắt rồi mới quay đầu  xe."],"a":"1, 5","imgs":["img_0100.jpg"],"t":"사진형"},{"n":791,"b":"Bạn muốn rẽ phải tại đường giao nhau như sau. Hai  cách lái xe nào là an toàn nhất?","c":["Lái xe chậm rồi rẽ phải mà không cần tạm dừng trước  vạch dừng của đường giao nhau.","Luôn phải quan sát xem có người đi bộ đang đi qua  đường ở vạch sang đường có đèn tín hiệu giao thông ở  ngay trước đường giao nhau không.","Không cần thiết bắt buộc phải quan sát xe đang đi từ  đường bên trái đi thẳng đến đường bên phải.","Phải chú ý xe hai bánh đang đi phía sau có thể nhìn thấy  qua gương bên phải.","Không cần thiết bắt buộc phải quan sát người đi bộ đang  ở vạch sang đường dành cho người đi bộ có đèn tín hiệu  giao thông ngay sau khi rẽ phải."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":792,"b":"Hai cách lái xe nào là nguy hiểm nhất khi rẽ phải  trong tình huống sau?","c":["Tạm dừng trước vạch dừng, sau đó chờ đến khi đèn 3  màu chuyển sang đèn rẽ phải.","Dù là sau khi đèn 3 màu chuyển sang mũi tên rẽ phải  màu xanh thì vẫn phải kiểm tra tình hình phía trước rồi  mới rẽ phải.","Dù đèn 3 màu rẽ phải là màu đỏ, nhưng nếu không có  người đi bộ thì tạm dừng rồi từ từ rẽ phải.","Rẽ phải và không cần chú ý đến vạch sang đường dành  cho người đi bộ xuất hiện ở ngay đường bên phải.","Chú ý người đi bộ có thể bất ngờ lao ra vạch sang đường  dành cho người đi bộ từ vỉa hè bên phải."],"a":"3, 4","imgs":["img_0101.jpg"],"t":"사진형"},{"n":793,"b":"Hai cách lái xe nào đúng nhất trong tình huống lưu  thông trên đường sau?","c":["Xe buýt đưa đón trẻ có khả năng đổi sang làn đường bên  phải nên giảm tốc độ và giữ khoảng cách an toàn.","Vì là tình huống xe buýt đưa đón trẻ phanh và giảm tốc,  nên vượt lên trước một cách an toàn theo đúng cách  vượt lên trước.","Chú ý Kickboard điện ở làn đường số 3, đổi làn đường và  vượt lên trước ở phía bên phải.","Vì là tình huống không nhìn thấy phía trước xe buýt đưa  đón trẻ, nên không đổi làn đường mà giảm tốc và duy trì  khoảng cách an toàn.","Nhấn còi để thông báo cho người điều khiển xe buýt  đưa đón trẻ đang vi phạm tốc độ tối thiểu."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":794,"b":"Hai yếu tố nào là nguy hiểm nhất khi rẽ trái không  bảo hộ trong tình huống sau?","c":["Có thể có xe từ làn đường số 2 đối diện lao nhanh thẳng  đến.","Xe phía sau xe chở hàng ở làn đường số 1 đối diện có thể  tạm dừng để rẽ trái.","Xe đang đi theo phía sau có thể đột ngột chuyển sang làn  đường số 2.","Người đi bộ ở đường bên trái có thể băng qua vạch sang  đường dành cho người đi bộ.","Xe chở hàng ở làn đường số 1 đối diện có thể rẽ trái  không bảo hộ."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":795,"b":"Hai yếu tố nào là nguy hiểm nhất trong tình huống  trên đường sau?","c":["Có thể va chạm với xe đang rẽ trái nhanh từ làn đường số  1 theo hướng đang chạy.","Có thể va chạm với xe đang rẽ phải từ đường bên phải.","Có thể va chạm với xe đang rẽ phải từ đường đối diện.","Có thể va chạm với xe đang quay đầu từ đường đối diện.","Có thể va chạm với xe đang định rẽ phải từ phía sau ở làn  đường số 3 theo hướng đang chạy."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":796,"b":"Hai câu nào giải thích đúng về cách rẽ phải tại “vòng  xuyến giảm làn đường” như trong hình sau?","c":["Sau khi tiến vào vòng xuyến thì nhanh chóng đi ra theo  hướng rẽ phải một cách an toàn.","Không tiến vào vòng xuyến mà sử dụng mép đường bên  phải rồi vừa đi chậm vừa rẽ phải.","Rẽ phải ngay sau khi tiến vào vòng xuyến là “vi phạm  nguyên tắc lưu thông ở đường giao nhau”.","Tại vạch sang đường dành cho người đi bộ ở làn đường  rẽ phải, dù có người đi bộ hay không thì cũng phải tạm  dừng.","Sau khi tiến vào vòng xuyến thì phải nhanh chóng đi theo  chiều kim đồng hồ rồi rẽ phải."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":797,"b":"Hai cách điều khiển xe an toàn nhất trong tình huống  sau là gì?","c":["Trường hợp định rẽ phải, đi chậm qua vạch sang đường  dành cho người đi bộ.","Trường hợp định rẽ phải, bắt buộc phải tạm dừng ở trước  vạch sang đường dành cho người đi bộ.","Trường hợp định đi thẳng, được ưu tiên hơn các xe khác  nên đi chậm và tiến vào.","Trường hợp định đi thẳng và rẽ phải, tất cả phải tạm dừng  rồi mới tiến vào.","Chỉ trường hợp định rẽ phải mới phải tạm dừng rồi tiến  vào."],"a":"2, 4","imgs":["img_0102.jpg"],"t":"사진형"},{"n":798,"b":"Hai cách điều khiển xe an toàn nhất trong trường  hợp định ra khỏi hướng 12 giờ ở tình huống sau là gì?","c":["Dừng xe để nhường đường cho xe ô tô con đang định  tiến vào vòng xuyến.","Bật đèn xi nhan chỉ hướng bên trái và tiến vào sân đỗ xe  chở hàng.","Bật đèn xi nhan chỉ hướng bên phải và đi theo hướng 12  giờ.","Nếu đã bỏ lỡ cơ hội đi ra khỏi vòng xuyến thì đi thêm  một vòng rồi tiến ra khỏi vòng xuyến.","Vì là tình huống định đi thẳng theo hướng 12 giờ nên  không cần bật đèn xi nhan chỉ hướng."],"a":"3, 4","imgs":["img_0103.jpg"],"t":"사진형"},{"n":799,"b":"Hai cách lái xe nào là an toàn nhất khi muốn rẽ phải  trong tình huống sau?","c":["Khó đảm bảo tầm nhìn bên phải nên dừng lại rồi mới rẽ phải.","Không có người đi bộ ở trên vạch sang đường nên cứ thế  đi qua nhanh chóng.","Tạm dừng ở trước vạch dừng để không cản trở giao  thông của xe đối diện.","Đang ở tư thế tiến vào đường giao nhau trước nên cứ thế đi.","Nhấn còi để người đi bộ không thể tiến vào vạch sang  đường."],"a":"1. 3","imgs":["img_0104.jpg"],"t":"사진형"},{"n":800,"b":"Tình huống xe từ làn đường bên trái (làn đường số 1)  đi thẳng đến và đang tiến gần đến đường giao nhau.  Hai cách lái xe nào là an toàn?","c":["Không có xe ở hướng ngược chiều nên vượt về phía bên  trái rồi đi qua.","Giảm tốc độ, giữ khoảng cách an toàn với xe taxi ở làn  đường số 1 rồi tiến đến gần.","Nhấn còi để xe taxi dừng lại rồi nhanh chóng đi qua ở  phía bên phải của xe taxi.","Chuyển làn đường liên tục sang làn đường số 3 rồi tạm  dừng xe.","Khi chuyển sang làn đường số 2, phải giảm tốc khi tiến  đến gần xe taxi và người đi bộ."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":801,"b":"Bạn đang đi thẳng. Hai cách lái xe nào là an toàn?","c":["Tăng tốc để xe ô tô màu trắng không thể tiến vào.","Xe ô tô màu trắng có thể chạy thẳng nên đi chậm lại và  chú ý quan sát.","Đường đang bảo trì nên có thể cứ thế đi về phía bên trái.","Dự đoán xe ô tô con màu trắng sẽ dừng lại nên lái xe chú  ý xe ở hướng ngược chiều.","Xe ô tô con màu đỏ đi ngược chiều có thể tiến vào làn  đường rẽ trái nên nếu cần thiết phải dừng lại để quan sát  tình hình."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":802,"b":"Hai phương pháp lái xe an toàn nhất trong tình  huống lái xe trên đường hẻm trong khu vực đô thị?","c":["Vì có thể có xe đạp hoặc chó đi dạo bất ngờ đi ra giữa  đường, nên phải chú ý.","Sử dụng còi để báo hiệu xe của bản thân đang đi tới rồi  cứ thế đi.","Giảm tốc độ vì trẻ em có thể đột ngột đi ra giữa đường.","Tăng tốc tránh xe đạp và nhanh chóng vượt qua.","Dùng đèn pha trước báo hiệu có xe đang đến để các xe  đi ngược chiều chú ý."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":803,"b":"Hai cách điều khiển xe an toàn nhất trong tình huống  sau là gì?","c":["Người đi bộ có thể xuất hiện từ giữa các xe đang đỗ nên  phải đi chậm.","Xe đang đỗ có thể bất thình lình xuất phát nên phải chú ý.","Không nhất thiết phải tuân thủ theo ký hiệu trên mặt  đường trong bãi đỗ xe tầng hầm.","Chỉ chú ý quan sát khu vực mà xe mình có thể đỗ xe vào.","Các cột trong bãi đỗ xe tầng hầm gây cản trở tầm nhìn  nên phải vừa nhấn còi vừa điều khiển xe."],"a":"1, 2","imgs":["img_0105.jpg"],"t":"사진형"},{"n":804,"b":"Tình huống đang đi thẳng với vận tốc 30 km/giờ. Hai  cách lái xe nào là an toàn?","c":["Băng qua vạch sang đường dành cho người đi bộ với vận  tốc từ 30 km/giờ trở xuống để tránh va chạm với các xe ô  tô đang đỗ.","Giảm tốc độ tiến đến gần và tạm dừng lại ngay trước vạch  dừng của vạch sang đường dành cho người đi bộ.","Vì ở vạch sang đường không có người nên đi chậm với  tốc độ 30 km/giờ.","Vì ở vạch sang đường không có người nên cứ thế đi qua.","Lái xe chậm và chú ý xe đang tiến vào đường từ phía bên  phải."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":805,"b":"Bạn định rẽ trái trong bãi đỗ xe của khu chung cư.  Hai câu nào khác xa với yếu tố nguy hiểm cần đề  phòng?","c":["Khu vực A không thể nhìn thấy do bị các đồ vật che khuất","Xe ô tô màu trắng đang lùi xe","Khả năng va chạm với túi thu gom rác tái sử dụng","Trẻ đang chơi đi ra đường xe chạy","Khả năng va chạm với xe phía sau"],"a":"3, 5","imgs":[],"t":"문장형"},{"n":806,"b":"Tình huống đang đến gần đường giao nhau và muốn  rẽ phải. Hai cách lưu thông nào là an toàn nhất?","c":["Vì trẻ em đang băng qua bên trái nên sử dụng khoảng  trống bên phải để tiến vào rồi rẽ phải.","Quan sát có xe đang tiến vào từ phía đường ngược chiều  định rẽ trái hay không.","Tạm dừng ở vạch dừng ngay trước vạch sang đường dành  cho người đi bộ và đợi cho đến khi trẻ băng qua đường  xong.","Tăng tốc đi qua vạch dừng để tiến vào đường giao nhau  trước xe ô tô con ở phía ngược chiều.","Chú ý đi theo tín hiệu đèn, đi chậm để tiến vào rồi rẽ phải."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":807,"b":"Tình huống muốn rẽ trái từ đường giao nhau hình  chữ T. Hai cách lái xe nào là an toàn nhất?","c":["Nhanh chóng rẽ trái theo tín hiệu đèn rẽ trái.","Tạm dừng ở trước vạch dừng của vạch sang đường dành  cho người đi bộ.","Đi chậm và tiến vào vạch sang đường dành cho người đi  bộ, sau đó chú ý xe ở bên trái rồi rẽ trái.","Giữ khoảng cách an toàn bên cạnh với người bên phải rồi  rẽ trái.","Đợi cho đến khi người đi bộ và xe đạp băng qua đường  trên vạch sang đường xong."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":808,"b":"Hai tình huống nguy hiểm nào phải chú ý nhất trong  tình huống trên đường sau?","c":["Người điều khiển xe kickboard điện có thể đột ngột đi về  phía bên trái để tránh người đi bộ phía trước.","Những người đi bộ ở bên phải có thể băng qua đường  sang bên trái.","Nếu lái xe chậm thì có thể va chạm với các xe sau.","Có thể va chạm với xe ô tô màu trắng đi ngược chiều.","Xekickboard điện có thể va chạm với người đi bộ ở bến xe  buýt."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":809,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Bật đèn pha trước và đèn xi nhan bên trái rồi an toàn  vượt qua.","Chú ý đi theo tín hiệu tay của người lái xe máy cày và an  toàn vượt qua.","Khi người lái xe máy cày đã dừng ra ký hiệu tay thì vượt  lên trước.","Không quan tâm đến ký hiệu tay của người lái xe máy cày  và đi theo phía sau.","Duy trì khoảng cách an toàn với xe máy cày."],"a":"4, 5","imgs":["img_0106.jpg"],"t":"사진형"},{"n":810,"b":"Hai cách điều khiển xe an toàn nhất trong tình huống  sau là gì?","c":["Xe định tiến vào phải nhường đường cho xe đang chạy  trong vòng xuyến.","Khi muốn tiến vào vòng xuyến phải đi chậm lại hoặc tạm  dừng.","Ưu tiên xe vào trước  nên nhanh chóng tiến vào để đi  đến điểm đến.","Khi tiến vào vòng xuyến, phải tiến nhanh vào trước xe  đang chạy trong vòng xuyến.","Không cần chú ý đến sự di chuyển của các xe xung  quanh."],"a":"1, 2","imgs":["img_0107.jpg"],"t":"사진형"},{"n":811,"b":"Tình huống đang tiến đến gần đường giao nhau và  muốn đi thẳng. Hai cách lái xe nào là an toàn nhất?","c":["Xe ô tô màu đen có thể lùi lại nên giảm tốc độ để đề  phòng.","Chú ý xe hai bánh có thể chuyển sang làn bên trái xe ô tô  màu đen.","Sử dụng làn đường đi thẳng đang trống ở phía ngược  chiều để đi thẳng rồi quay lại làn đường ban đầu.","Tăng tốc ở bên cạnh xe ô tô màu đen đang dừng rồi đi  thẳng.","Tăng tốc để đi qua để không cho xe hai bánh phía trước  mình chuyển hướng."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":812,"b":"Hai cách lái xe nào là an toàn trong tình huống sau?","c":["Người lái xe ô tô màu đen sử dụng khu vực P để đi  nhanh qua.","Người lái xe ô tô màu đen dừng lại phía sau xe buýt đưa  đón học sinh.","Người lái xe ô tô màu trắng chú ý xe buýt đưa đón học  sinh và đi thẳng với tốc độ chậm.","Người lái xe ô tô màu trắng dừng lại trước khi đến chỗ xe  buýt đưa đón học sinh sau đó đi chậm.","Người lái xe ô tô màu trắng liên tục nhấn còi để cho biết  mình đi thẳng."],"a":"2, 4","imgs":["img_0108.jpg"],"t":"사진형"},{"n":813,"b":"Hai giải thích nào là cách lưu thông an toàn nhất  trong đường giao nhau sau?","c":["Bật xi nhan trái khi muốn tiến vào từ làn đường A.","Người lái xe đã tiến vào từ làn đường A ngay lập tức tiến  vào làn đường a rồi rẽ và đi ra theo hướng Bắc.","Bật xi nhan phải khi muốn tiến vào từ làn đường B.","Người lái xe đã tiến vào từ làn đường B ngay lập tức tiến  vào làn đường b. Sau đó chuyển sang làn đường a rồi đi  ra theo hướng Bắc.","Bật xi nhan trái khi muốn đi ra sau khi quay xe ở trong."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":814,"b":"Theo Luật Giao thông đường bộ, khi muốn rẽ phải  trong tình huống sau, hai cách lái xe an toàn nhất là gì?","c":["Theo tín hiệu đèn xanh phía trước, nhanh chóng rẽ phải.","Vì người đi bộ bên phải có thể qua đường theo vạch kẻ  đường dành cho người đi bộ, nên tạm dừng lại và xác  nhận an toàn trước khi rẽ phải.","Dừng lại vì tín hiệu dành riêng cho rẽ phải đang là màu  đỏ.","Ngay cả khi tín hiệu dành riêng cho rẽ phải là màu đỏ,  nếu không gây cản trở cho người đi bộ qua đường thì  vẫn có thể rẽ phải.","Dừng lại tại vạch dừng và chờ cho đến khi tín hiệu mũi  tên rẽ phải chuyển sang màu xanh."],"a":"3, 5","imgs":["img_0109.jpg"],"t":"사진형"},{"n":815,"b":"Khi muốn rẽ trái trong tình huống sau, hai cách lái xe  an toàn nhất cản trở cho người đi bộ, có thể lái xe với  tốc độ trên 20km/h."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":824,"b":"Trong tình huống sau, hai cách lái xe an toàn nhất là  gì?","c":["Chuyển làn nhanh sang làn đường thứ 3 để tránh xe đang  đổi làn.","Tăng tốc để ngăn xe ở làn đường thứ 1 nhập làn.","Sử dụng còi và đèn pha để cản trở xe đổi làn.","Giảm tốc để nhường đường cho xe đang đổi làn.","Trên đường trơn ướt, khoảng cách phanh dài hơn bình  thường nên giảm tốc từ sớm."],"a":"4, 5","imgs":["img_0114.jpg"],"t":"사진형"},{"n":825,"b":"Trong các tình huống sau, hai tình huống có khả  năng xảy ra tai nạn cao nhất là gì?","c":["Xe đạp đang di chuyển ở phía bên phải vỉa hè","Xe ô tô đang chờ rẽ trái để vào tòa nhà","Xe ô tô đang chạy từ bên trái sang bên phải của đường","Xe ô tô đỗ ở bãi đất trống đối diện","Xe ô tô được nhìn thấy qua gương chiếu hậu"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":826,"b":"Trong tình huống sau, hai cách lái xe đúng nhất là gì?","c":["Nhường đường cho xe giao hàng đang đi tới từ phía đối  diện.","Vì tài xế xe con có quyền ưu tiên, nên tiếp tục di chuyển.","Nháy đèn pha liên tục để ngăn không cho xe đối diện đi  tiếp.","Chú ý đến người chuẩn bị xuống từ xe đang đỗ.","Dừng lại và chờ cho đến khi tài xế đối diện nhường  đường."],"a":"1, 4","imgs":["img_0115.jpg"],"t":"사진형"},{"n":827,"b":"Trong tình huống sau, hai cách lái xe an toàn nhất  là gì?","c":["Phanh ngay trước đầu xe màu trắng để phản đối việc  đổi làn đột ngột.","Giảm tốc để đảm bảo khoảng cách an toàn cho xe  màu trắng đổi làn.","Chuyển sang làn đường thứ 4 để tránh va chạm.","Tăng tốc đột ngột để tránh va chạm với xe màu trắng.","Xoay vô-lăng sang trái và phanh gấp."],"a":"2, 3","imgs":["img_0116.jpg"],"t":"사진형"},{"n":828,"b":"828. Sau khi nghỉ ngơi tại trạm dừng chân trên  đường cao tốc và muốn nhập làn trở lại đường cao tốc,  hai cách lái xe an toàn nhất là gì?","c":["Tạm dừng cho đến khi không có xe nào đang chạy thì  tiến hành nhập làn vào đường.","Tăng tốc và băng qua nhiều làn để đến thẳng làn 1.","Tăng tốc vừa đủ và kiểm tra bên trái trước khi nhập làn.","Tiếp tục lái xe trên làn đường dừng khẩn cấp/làn đường  phụ.","Không gây cản trở giao thông của các phương tiện khác."],"a":"3, 5","imgs":[],"t":"문장형"},{"n":829,"b":"Hai cách lái xe nào là đúng nhất trong tình huống  sau?","c":["Đổi sang làn đường số 1 và nhanh chóng đi qua.","Bật tín hiệu đèn để báo cho người lái xe khác về xe của  mình.5","Mặt đường đang ẩm ướt nên giảm tốc độ và đi chậm.","Canh chỉnh tốc độ với xe đang đi phía trước và nhìn xe  trước để đi qua.","Đổi sang làn đường cứu hộ và vượt xe phía trước."],"a":"2, 3","imgs":["img_0117.jpg"],"t":"사진형"},{"n":830,"b":"Trong tình huống sau đây, hai cách lái xe đúng nhất  là gì?","c":["Vì tuyết không nhiều nên lái xe như bình thường.","Chuẩn bị ứng phó cho trường hợp xe tải có thể trượt và  xoay trên đường tuyết.","Giảm tốc độ xuống 10% so với tốc độ tối đa.","Bật đèn khẩn cấp và lái xe chậm lại.","Lái xe theo hình zigzag để giảm tốc độ."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":831,"b":"Khi đi qua khu vực xảy ra cháy, hai cách lái xe đúng  nhất là gì?","c":["Vì có thể bị kẹt trên đường nên tăng tốc để thoát ra bằng  mọi cách.","Tầm nhìn phía trước bị hạn chế nên bật đèn khẩn cấp  trong khi lái xe","Theo dõi thông tin đường tránh qua radio hoặc các  phương tiện khác.","Đặt hệ thống điều hòa ở chế độ tuần hoàn ngoài để tuần  hoàn không khí tươi.","Dừng xe ở làn dừng khẩn cấp rồi vượt qua lan can bên  phải để thoát ra khỏi khu vực đường đang cháy."],"a":"2, 3","imgs":["img_0118.jpg"],"t":"사진형"},{"n":832,"b":"Trong tình huống sau, hai cách lái xe an toàn nhất là gì?","c":["Nhấn còi về phía xe kéo (trailer) đang chạy chậm để thúc  giục tăng tốc.","Sử dụng làn đường số 1 để vượt xe kéo phía trước một  cách an toàn.","Bật đèn xi-nhan trước khi đổi làn.","Chuyển vào làn đường số 1 - làn đường chính, và chạy với  tốc độ ổn định.","Làn 1 không giới hạn tốc độ tối đa nên tăng tốc để chạy  nhanh hơn."],"a":"2, 3","imgs":["img_0119.jpg"],"t":"사진형"},{"n":833,"b":"Hai tình huống nguy hiểm có thể xảy ra trong trường  hợp sau là gì?","c":["Xe chở hàng cảnh báo có công trình thi công ở phía trước  có thể đang tạm dừng.","Xe buýt ở làn đường số 2 có thể giảm tốc độ để đảm bảo  lái xe an toàn.","Xe buýt đã đổi qua làn đường số 4 có thể tiếp tục chạy.","Xe ở làn đường số 1 có thể tăng tốc.","Xe khác có thể vượt lên trước xe của mình."],"a":"1, 5","imgs":["img_0120.jpg"],"t":"사진형"},{"n":834,"b":"Hai cách điều khiển xe an toàn nhất trong tình huống  sau là gì?","c":["Đổi sang làn đường bên phải bất kể trên đường có vạch  hạn chế đổi làn đường.","Bật đèn xi nhan chỉ hướng bên phải để thông báo cho  những người điều khiển xe xung quanh.","Tăng tốc đột ngột và đổi sang làn đường bên phải.","Đổi làn đường bằng cách giảm tốc độ ngay trước đường ra.","Trong tình huống lo ngại sẽ cản trở lưu thông của xe  khác, không được đổi làn đường."],"a":"2, 5","imgs":["img_0121.jpg"],"t":"사진형"},{"n":835,"b":"Trong số các phương tiện đang lưu thông trên đường  cao tốc, hai phương tiện nào vi phạm làn đường quy  định?","c":["A (Xe con đang vượt)","B (Xe khách lớn 36 chỗ)","C (Xe tải 1 tấn)","D (Xe khách lớn 26 chỗ)","E (Xe con đang chạy bình thường)"],"a":"2, 3","imgs":[],"t":"문장형"},{"n":836,"b":"Trong tình huống sau, hai cách lái xe an toàn nhất là gì?","c":["Đường trơn trượt vì mưa nên lưu thông với tốc độ dưới  80km/h.","Chú ý khi xe buýt lớn bên phải đi qua vũng nước có thể  làm nước bắn lên che khuất tầm nhìn.","Bật đèn khẩn cấp để thông báo vị trí của mình cho tài xế  phía sau trong khi lái xe.","Vì xe phía trước bên phải có khả năng đổi làn, nên chuyển  sang làn số 1 để đi tiếp.","Nếu nước bắn lên làm mất tầm nhìn đột ngột, phanh gấp  để đảm bảo an toàn."],"a":"2, 3","imgs":["img_0122.jpg"],"t":"사진형"},{"n":837,"b":"Hai cách lái xe nào an toàn trong tình huống giao  thông trên đường tuyết rơi?","c":["Khi tuyết dày làm mất dấu vạch kẻ, đi theo dấu bánh xe  trước.","Trên đường tuyết hoặc đường băng, quãng đường phanh  ngắn lại nên cần giữ khoảng cách an toàn lớn hơn bình  thường.","Khi tuyết rơi dày, khu vực lối vào và ra khỏi hầm là đoạn  đường thường xuyên đóng băng, cần đề phòng va chạm  liên hoàn do trơn trượt.","Trên đoạn đường bị đóng băng, phải giảm tốc độ tối đa  xuống 20% so với bình thường.","Sau khi đi qua hầm, có thể bị mất thị lực tạm thời do hiện  tượng thích nghi với bóng tối, cần phải cẩn thận."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":838,"b":"Trong tình huống  đoạn đường như sau, hai cách lái  xe an toàn nhất là gì?","c":["Bên trong hầm không có tuyết, vì vậy không cần giảm tốc  độ tối đa khi lái xe.","Có thể nhận biết tình huống bất ngờ xảy ra bên ngoài  hầm, cần chuẩn bị đối phó.","Để tránh va chạm với xe phía trước, thực hiện đổi làn đột  ngột sang làn số 3.","Khi đi qua hầm, có thể bị mất thị lực tạm thời do hiện  tượng thích nghi với ánh sáng, cần phải cẩn thận.","Cần chuẩn bị trước cho sự thay đổi môi trường đột ngột  giữa bên trong và bên ngoài hầm."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":839,"b":"Hai cách lái xe nào là an toàn nhất khi lưu thông trên  đường sau?","c":["Tạm dừng trước khi đến gần xe đạp.","Khi đi qua vạch sang đường phải tạm dừng ở vạch dừng.","Đang có khoảng cách gần với xe sau nên tăng tốc để tăng  khoảng cách.","Không có người đi trên vạch sang đường nên cứ thế đi qua.","Liên tục nhấn còi và đi chậm qua."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":840,"b":"Hai giải thích nào là đúng về cơ sở đảm bảo an toàn  giao thông theo Luật Giao thông đường bộ?","c":["Tốc độ giới hạn là 50 km/giờ và có thể bị bắt phạt khi  vượt quá tốc độ này.","Chỉ có thể rẽ trái khi tín hiệu đèn phía trước là mũi tên  xanh lá cây.","Tốc độ giới hạn ở tất cả khu vực bảo vệ trẻ em là 50  km/giờ.","Thứ tự đèn tín hiệu là đỏ - vàng - xanh - mũi tên xanh lá cây.","Nếu tín hiệu đèn phía trước là xanh thì có thể rẽ trái khi  làn đường đối diện không có xe tiến đến."],"a":"1, 5","imgs":[],"t":"문장형"},{"n":841,"b":"Hai cách điều khiển xe lưu thông một cách an toàn  trong khu vực bảo vệ trẻ em là gì?","c":["Đi chậm theo xe phía trước và đi qua vạch sang đường A.","Duy trì tốc độ và đi theo xe phía trước để tránh va chạm  với xe phía sau.","Tạm dừng trước vạch dừng của vạch sang đường A rồi đi  qua.","Vì không có người đi bộ trên vạch sang đường B nên đi  chậm qua.","Tạm dừng ở trước vạch sang đường B rồi đi qua."],"a":"3, 5","imgs":[],"t":"문장형"},{"n":842,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Vượt qua vạch kẻ đường giữa và lái xe bên trái để duy trì  khoảng cách an toàn với xe lăn hỗ trợ người đi bộ.","Quan sát kỹ hành vi và giảm tốc trước khi đến gần xe lăn  điện.","Tăng tốc nhanh để đi qua trước khi xe lăn hỗ trợ người  đi bộ đi vào làn đường.","Bấm còi liên tục để xe lăn hỗ trợ người đi bộ không đi  vào làn đường.","Tạm dừng để đảm bảo an toàn khi xe lăn hỗ trợ người  đi bộ sắp đi vào làn đường."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":843,"b":"Trong tình huống giao thông sau, hai cách lái xe an  toàn nhất là gì?","c":["Cần chú ý vì có thể có trẻ em bất ngờ chạy ra từ phía sau  xe buýt đưa đón học sinh.","Vạch sang đường phía trước không có đèn tín hiệu giao  thông và cũng không có người đang qua đường nên  giảm tốc độ rồi băng qua.","Vì trẻ em đang chạy bên phải có thể bất ngờ lao ra vạch  kẻ đường, nên phải tạm dừng trước vạch kẻ đường.","Khu vực này cho phép chỉ xe buýt đưa đón học sinh được  đỗ và dừng xe.","Vì có trẻ em đang lên xuống xe buýt đưa đón học sinh  phía trước bên phải, nên phải tạm dừng trước khi đi  ngang qua xe buýt rồi mới được đi tiếp."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":844,"b":"Trong tình huống đoạn đường sau, hai hành vi lái xe  an toàn nhất là gì?","c":["Tạm dừng trước khi vào giao lộ rồi mới đi tiếp.","Bấm còi và tăng tốc để đi qua.","Vì có người đi bộ cao tuổi sử dụng xe lăn điện đang chờ  xe qua, nên lái xe nhanh qua giao lộ.","Cần chú ý vì có thể có trẻ em đi bộ giữa các xe đang đỗ  hoặc dừng.","Vì xe đi thẳng có quyền ưu tiên, nên cứ bám sát bên trái  để đi qua giao lộ."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":845,"b":"Trong tình huống đoạn đường sau, hai hành vi lái xe  an toàn nhất là gì?","c":["Giữ khoảng cách an toàn vì xe buýt đưa đón học sinh  phía trước có thể dừng lại.","Nếu giảm tốc độ có thể bị xe sau đâm vào, nên vượt qua  xe buýt đưa đón học sinh.","Có trẻ em bên trái có thể đi vào vạch kẻ đường, nên chú  ý quan sát hành động của trẻ.","Cẩn thận với xe hai bánh đậu bên trái phía trước, và vượt  xe buýt học sinh một cách chậm rãi.","Vì trẻ em đang lên xuống xe buýt học sinh, nên vượt xe  buýt một cách từ từ."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":846,"b":"Trong tình huống đoạn đường sau, hai cách lái xe an  toàn nhất là gì?","c":["Vừa bấm còi liên tục để cảnh báo nguy hiểm vừa đi qua.","Vừa dùng đèn pha để cảnh báo nguy hiểm cho tài xế xe  buýt đưa đón học sinh vừa đi qua.","Chú ý vì trẻ em có thể bất ngờ chạy ra từ phía trước xe  đỗ hoặc dừng bất hợp pháp bên phải và đi qua.","Trước khi đi đến chỗ xe buýt học sinh bên trái, tạm thời  dừng lại rồi đi chậm qua.","Vì xe buýt đưa đón học sinh bên phải đang dừng để  đón/trả học sinh, nên nhanh chóng vượt qua để rời khỏi  con hẻm."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":847,"b":"Trong tình huống đoạn đường sau, hai cách lái xe an  toàn nhất là gì?","c":["Không có khả năng va chạm với trẻ em ở vạch sang  đường, nên rẽ phải luôn.","Chuẩn bị ứng phó cho hành vi của trẻ em có thể lao ra  bất ngờ.","Chỉ phải sau khi trẻ em đã sang đường xong.","Bấm còi để giục trẻ em đi qua nhanh hơn.","Dừng xe trên vạch sang đường để ngăn trẻ em khác đi  vào."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":848,"b":"Trong tình huống đoạn đường sau, hai cách lái xe  đúng nhất là gì?","c":["Lái xe trong giới hạn tốc độ 20km/h.","Giảm tốc trước vạch sang đường và đi qua luôn.","Dừng xe bên lề đường phải để tránh cổng trường học.","Chú ý khi đi qua vì trẻ em có thể bất ngờ lao ra  đường.","Đỗ xe trước cổng trường học để đón con."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":849,"b":"Hai cách lái xe nào là đúng nhất trong tình huống  sau?","c":["Xe ưu tiên vi phạm Luật Giao thông đường bộ nên không  quan tâm và cứ thế đi qua.","Bật đèn pha nhiều lần để xe ưu tiên không thể có hành vi  vi phạm.","Đạp và nhả thắng để báo cho người lái xe phía sau.","Dừng lại và giữ khoảng cách để xe ưu tiên có thể đi  ngược chiều lại.","Dừng xe ở phía trước, không để xe ưu tiên đi qua."],"a":"3, 4","imgs":["img_0123.jpg"],"t":"사진형"},{"n":850,"b":"Trong tình huống đoạn đường sau, hai cách lái xe  đúng nhất là gì?","c":["Tăng tốc và chuyển qua làn số 3 để nhường đường cho xe  cứu thương.","Dù đèn tín hiệu giao thông phía trước là màu xanh, vẫn  nhường đường cho xe cứu thương.","Sau khi xe cứu thương đi qua, kiểm tra xem có xe khẩn  cấp nào khác theo sau không.","Tăng tốc và đi theo xe màu đỏ.","Bấm còi báo hiệu với tài xế xe cứu thương và tiếp tục đi  qua."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":851,"b":"Trong tình huống đoạn đường sau, hai cách lái xe  đúng nhất là gì?","c":["Tiếp tục đi thẳng bất kể có cháy hay không.","Nhanh chóng chuyển hệ thống điều hòa sang chế độ  lưu thông gió từ bên ngoài.","Dừng xe giữa đường, khóa xe và bỏ chạy.","Đóng kín cửa xe để ngăn khí độc.","Không đi vào khu vực lửa cháy mạnh và tuân theo  hiệu lệnh tay của cảnh sát."],"a":"4, 5","imgs":[],"t":"문장형"},{"n":852,"b":"Hai cách điều khiển xe đúng nhất trong tình huống  sau là gì?","c":["Vì đèn giao thông của xe bật xanh nên cứ thế tiến vào  đường giao nhau.","Vì xe cứu hộ cần được ưu tiên đi trước, nên phải dừng  lại trước khi vào ngã tư.","Vì xe đang ở làn đường số 2 có thể đột ngột đổi làn  đường sang bên trái nên phải giảm tốc độ vừa đủ trước.","Tín hiệu đèn giao thông của xe được ưu tiên hơn xe khẩn  cấp nên cứ thế tiến vào.","Tăng tốc để có thể vượt qua trước xe khẩn cấp rồi tiến vào."],"a":"2, 3","imgs":["img_0124.jpg"],"t":"사진형"},{"n":853,"b":"Trong tình huống sau đây, hai cách lái xe an toàn  nhất là gì?","c":["Tiếp tục lái xe ở làn số 1 theo biển báo “Hết làn số 2”.","Phanh gấp để tránh khu vực thi công.","Đường phía trước hẹp nên chuyển sang làn 2 từ sớm.","Bật đèn cảnh báo để thông báo đang có công trình thi  công.","Đi ở làn số 1, đến gần sát công trường rồi chuyển gấp  sang làn số 2."],"a":"3, 4","imgs":["img_0125.jpg"],"t":"사진형"},{"n":854,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Đi về phía làn đường bên trái để tránh va chạm với xe đạp.","Giảm tốc vừa đủ trước khi đến gần vị trí xe đạp.","Tăng tốc để tạo thuận lợi cho xe phía sau.","Giảm tốc và quan sát người đi bộ để đề phòng người đi  bộ tiến vào đường xe chạy.","Đi sát mép đường để bảo vệ người đi bộ."],"a":"2, 4","imgs":["img_0126.jpg"],"t":"사진형"},{"n":855,"b":"Hai cách lái xe nào là an toàn nhất trong tình huống  sau?","c":["Đi theo xe trước để đảm bảo giao thông thuận lợi.","Tăng tốc nhanh hơn tốc độ của xe đạp để đi qua.","Dừng lại ở vạch dừng ngay trước vạch sang đường.","Người đi bộ đã băng qua đường xong nên nhanh chóng  đi qua.","Giảm tốc để đề phòng xe đang dừng đột ngột xuất phát."],"a":"3, 5","imgs":["img_0127.jpg"],"t":"사진형"},{"n":856,"b":"Trong tình huống sau, hai cách lái xe an toàn nhất là  gì?","c":["Lái xe sát bên trái xe đạp để cản không cho rẽ trái.","Vượt xe đạp bằng cách lấn vạch giữa đường.","Giảm tốc độ và chờ đợi cho đến khi xe đạp rời khỏi đường  một cách an toàn.","Giữ khoảng cách an toàn vì xe đạp có thể rẽ trái.","Bấm còi để giục xe đạp di chuyển nhanh hơn."],"a":"3, 4","imgs":["img_0128.jpg"],"t":"사진형"},{"n":857,"b":"Trong tình huống sau, hai cách lái xe an toàn nhất là  gì?","c":["Nhanh chóng vượt qua trước khi đèn tín hiệu giao thông  chuyển sang đỏ.","Dừng lại tại vạch dừng ngay trước vạch sang đường.","Có vạch sang đường nâng cao cho phép xe đạp băng qua  nên cần chú ý khi đi qua.","Đi nhanh qua bằng cách đi vào khu vực an toàn (khu vực  dành cho người đi bộ).","Cần chú ý vì có thể có trẻ em chạy ra từ phía sau xe tải."],"a":"2, 5","imgs":["img_0129.jpg"],"t":"사진형"},{"n":858,"b":"Hai phương pháp lái xe an toàn nhất trong tình  huống sau đây là gì?","c":["Vì xe đỗ có thể bất ngờ xuất phát, nên liên tục bấm còi  và đi qua nhanh.","Vì có thể có người đi bộ bất ngờ xuất hiện giữa các xe  đỗ, nên chú ý và lái xe chậm.","Liên tục bấm còi để thúc giục xe đạp phía trước đi  nhanh hơn.","Lái xe cẩn thận, gờ giảm tốc phía trước, người điều  khiển xe đạp và tình huống khó đảm bảo tầm nhìn.","Vì khoảng cách với xe đạp phía trước đủ, nên có thể  tăng tốc và vượt nhanh."],"a":"2, 4","imgs":["img_0130.jpg","img_0131.jpg"],"t":"사진형"},{"n":859,"b":"Trong số các cách sau, hai cách lái xe an toàn nhất là gì?","c":["Vượt lên xe màu đen từ phía bên phải.","Đi song song với xe màu đen trên cùng một làn đường.","Chuyển ngay sang làn thứ 3 để đi hướng Goyang.","Giảm tốc độ và giữ khoảng cách an toàn vì xe màu trắng  có thể chuyển làn.","Đi đến đoạn vạch kẻ đường trắng đứt quãng để có thể  chuyển vào làn thứ 3."],"a":"4, 5","imgs":[],"t":"문장형"},{"n":860,"b":"Hai cách lái xe nào là an toàn nhất khi muốn tiến  vào làn đường số 1 trong tình huống sau?","c":["Chú ý quan sát xe đang lưu thông trên làn đường số  1 bằng gương chiếu hậu bên trái.","Bật đèn pha trước để cảnh báo không cho xe ô tô con  phía trước đổi sang làn đường số 1.","Xe máy nông nghiệp có thể tiến vào đường nên  nhanh chóng đổi sang làn đường số 1.","Vì là đường lên dốc nên tăng tốc.","Xe hai bánh phía trước có thể đổi sang làn đường số  1 nên duy trì khoảng cách an toàn."],"a":"1, 5","imgs":["img_0132.jpg"],"t":"사진형"},{"n":861,"b":"Hai cách lái xe nào là an toàn nhất?","c":["Dừng xe mép phải đường mà không cản trở lối đi của xe đạp.","Đi chậm và cẩn thận với người đi bộ vì có vạch sang  đường phía trước.","Đi với tốc độ 50km/h vì được phép chạy quá tốc độ khi  vượt xe.","Chuyển sang làn đường số 1 và giữ khoảng cách an toàn  với xe đạp.","Bấm còi để giục xe đạp đi sát lề đường."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":862,"b":"Hai cách lái xe an toàn nhất khi điều khiển xe đạp là gì?","c":["Dừng xe trước người đi bộ ở phía trước.","Vì xe đạp có quyền ưu tiên nên bấm còi để vượt qua.","Nguy cơ va chạm với người đi bộ phía trước cao nên đi  vào khu vực dành cho người đi bộ.","Có khả năng va chạm với người đi bộ bên phải nên dắt xe  đi bộ.","Xe đạp không bị giới hạn tốc độ nên chạy nhanh qua  đoạn nguy hiểm."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":863,"b":"Hai cách băng qua đường an toàn của người điều  khiển xe đạp ở khu vực sau là gì?","c":["Vẫn ngồi trên xe đạp, chờ cho đến khi đèn giao thông ở  vạch sang đường bật xanh thì lái xe băng qua đường.","Vì có người điều khiển xe đạp khác đang băng qua  đường nên nhanh chóng băng qua luôn.","Vì có khả năng va chạm với xe đạp khác nên xuống xe và  chờ ở nơi an toàn trên vỉa hè (lề đường).","Nếu người điều khiển xe đạp là trẻ em hoặc người cao  tuổi thì lái xe băng qua đường khi đèn giao thông của  người đi bộ bật xanh.","Dắt xe đạp băng qua đường khi đèn giao thông ở vạch  sang đường bật xanh."],"a":"3, 5","imgs":[],"t":"문장형"},{"n":864,"b":"Hai cách điều khiển xe an toàn nhất trong tình huống  sau là gì?","c":["Dự đoán trước người đi bộ phía trước có thể đột ngột  băng qua đường bên trái nên chuẩn bị dừng lại.","Trường hợp định đi thẳng, vì không có xe ở đường giao  nhau phía trước nên đi chậm và băng qua.","Tạm dừng trước khi tiến vào đường giao nhau và phải  kiểm tra xe đang tiến đến ở hai bên trái phải.","Liên tục nhấn còi để thông báo có xe đi qua cho người đi  bộ và xe đạp xung quanh.","Phải bám sát bên phải để hướng người đi bộ phía trước  đi sát vào mép đường."],"a":"1, 3","imgs":["img_0133.jpg"],"t":"사진형"},{"n":865,"b":"Hai cách lưu thông an toàn khi người điều khiển  Kickboard điện muốn rẽ trái trong tình huống sau là gì?","c":["Sau khi điều khiển Kickboard điện tiến vào vạch sang  đường A thì chờ tại điểm B cho đến khi đèn chỉ hướng D  bật xanh.","Dắt Kickboard điện đi vào vạch sang đường A, sau đó chờ  tại điểm B cho đến khi đèn chỉ hướng D bật xanh.","Điều khiển Kickboard điện rẽ trái về hướng trung tâm của  đường giao nhau để đi về hướng E.","Điều khiển Kickboard điện đi thẳng đến điểm B, sau đó  chờ đèn chỉ hướng D const S=['①','②','③','④','⑤'];
const TN={"문장형": "📝 Văn bản", "사진형": "📷 Ảnh", "표지판형": "🚸 Biển báo", "동영상형": "🎬 Video"};
const BTN_SHOW="Xem đáp án",BTN_HIDE="Ẩn đáp án";
const VID_MSG="🎬 Câu hỏi này cần xem video.",NOT_FOUND=" không tìm thấy.",LABEL_ANS="Đáp án";
let cT='all',cR='all',F=Q.slice(),R=0,B=25;
function apply(){F=Q.filter(q=>{let ok=true;if(cT!=='all')ok=ok&&q.t===cT;if(cR!=='all'){const[a,b]=cR.split('-').map(Number);ok=ok&&q.n>=a&&q.n<=b;}return ok;});R=0;document.getElementById('ql').innerHTML='';batch();}
function card(q){let mid='';if(q.t==='사진형'&&q.imgs.length)mid=`<div class="qb">${q.b}</div>`+q.imgs.map(f=>`<div class="qp"><img src="images/${f}" loading="lazy"></div>`).join('');else if(q.t==='표지판형'&&q.imgs.length)mid=`<div class="sr"><div class="sp">${q.imgs.map(f=>`<img src="images/${f}" loading="lazy">`).join('')}</div><div class="st">${q.b}</div></div>`;else if(q.t==='동영상형')mid=`<div class="qb">${q.b}</div><div class="vb">${VID_MSG}</div>`;else mid=`<div class="qb">${q.b}</div>`;const ch=q.c.map((c,i)=>`<div class="ci"><span class="cn">${S[i]||''}</span><span>${c}</span></div>`).join('');return `<div class="cd" id="q${q.n}"><div class="ch"><span class="qn">${q.n}</span><span class="tp ${q.t}">${TN[q.t]||q.t}</span></div>${mid}<div class="cs">${ch}</div><button class="ab" onclick="tog(this)">${BTN_SHOW}</button><div class="ax"><div class="al">${LABEL_ANS}</div><div class="av">${q.a}</div></div></div>`;}
function batch(){const l=document.getElementById('ql'),e=Math.min(R+B,F.length);let h='';for(let i=R;i<e;i++)h+=card(F[i]);l.insertAdjacentHTML('beforeend',h);R=e;document.getElementById('ct').innerHTML='<b>'+F.length+'</b> câu, hiển thị <b>'+R+'</b>';}
function go(){const n=parseInt(document.getElementById('si').value);if(!n)return;cT='all';cR='all';document.querySelectorAll('.tab,#rg button').forEach(b=>b.classList.remove('on'));document.querySelector('.tab[data-f="all"]').classList.add('on');document.querySelector('#rg button[data-r="all"]').classList.add('on');F=Q.slice();R=0;document.getElementById('ql').innerHTML='';const idx=F.findIndex(q=>q.n===n);if(idx<0){alert(n+NOT_FOUND);return;}while(R<=idx+3&&R<F.length)batch();const el=document.getElementById('q'+n);if(el){el.scrollIntoView({behavior:'smooth',block:'start'});el.classList.add('hl');setTimeout(()=>el.classList.remove('hl'),2500);}}
function tog(b){const x=b.nextElementSibling;x.classList.toggle('show');b.textContent=x.classList.contains('show')?BTN_HIDE:BTN_SHOW;}
document.getElementById('tp').addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');cT=b.dataset.f;apply();});
document.getElementById('rg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('#rg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cR=b.dataset.r;apply();});
window.addEventListener('scroll',()=>{document.getElementById('tt').style.display=scrollY>400?'block':'none';if(innerHeight+scrollY>=document.body.offsetHeight-500&&R<F.length)batch();});
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
function hash(){const h=location.hash.replace('#','');if(h&&!isNaN(h)){document.getElementById('si').value=h;setTimeout(go,300);}}
batch();hash();addEventListener('hashchange',hash);
</script>
