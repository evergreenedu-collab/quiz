ạch sang đường dành cho người đi bộ không có đèn giao thông và nằm trong khu vực bảo vệ trẻ em, nếu  không có người đi bộ sang đường thì người ","Người điều khiển xe không được cản trở lưu thông của người đi bộ đang băng qua đoạn đường giao nhau không có  điều khiển giao thông."],"a":"3","imgs":[],"t":"문장형"},{"n":161,"b":"Giải thích nào là không đúng nhất về đường ưu tiên cho người đi bộ?","c":["Trên đường ưu tiên cho người đi bộ, người đi bộ chỉ được đi sát mép đường bên phải.","Người lái xe có nghĩa vụ phải bảo vệ người đi bộ như đi chậm, dừng tạm thời, v.v.","Trường hợp không chấp hành đúng nghĩa vụ bảo vệ người đi bộ thuộc đối tượng bị phạt tiền vi phạm giao thông  40.000 won và trừ 10 điểm phạt đối với ô ","Sở trưởng Sở Cảnh sát nếu xét thấy là cần thiết để bảo vệ người đi bộ thì có thể giới hạn tốc độ lưu thông của xe là  tối đa 20km/giờ."],"a":"1","imgs":[],"t":"문장형"},{"n":162,"b":"Khi bạn đang đi với tốc độ 50 km/giờ trên đường nội thành thì phát hiện người đi bộ qua đường trái luật.  Cách xử lý hợp lý nhất là gì?","c":["Người đi bộ đang qua đường nên phanh gấp và dừng lại.","Phán đoán di chuyển của người đi bộ và đi chen vào giữa.","Giảm tốc và chuẩn bị dừng lại, bật đèn nháy khẩn cấp để báo hiệu cho xe đằng sau rồi dừng xe lại một cách an toàn.","Dùng còi báo hiệu cho người đi bộ, tăng tốc một chút rồi vượt qua."],"a":"3","imgs":[],"t":"문장형"},{"n":163,"b":"Giải thích nào là không đúng liên quan đến bảo vệ người đi bộ theo Luật Giao thông đường bộ?","c":["Trong trường hợp có người đi bộ ở khu vực an toàn được bố trí trên đường xe chạy và trường hợp đi qua bên cạnh  người đi bộ trên đường hẹp không phân ","Khi có người đi bộ đang băng qua đường không có vạch sang đường dành cho người đi bộ, phải giữ khoảng cách,  tạm dừng để người đi bộ có thể qua đường ","Nếu cản trở lưu thông của người đi bộ trên đường không phân chia vỉa hè và lòng đường trên đường không có vạch  phân luồng giữa, thì phải đi chậm hoặc","Trước vạch sang đường dành cho người đi bộ không có đèn giao thông trong khu vực bảo vệ trẻ em (Trường hợp có  vạch dừng là trước vạch dừng đó), phải "],"a":"4","imgs":[],"t":"문장형"},{"n":164,"b":"Theo Pháp lệnh Giao thông đường bộ, trường hợp trẻ em dưới 13 tuổi đi (       ) thì phải đeo dụng cụ bảo  vệ tính mạng để đảm bảo an toàn cho trẻ. Nội dung nào không đúng với phần trong (  )?","c":["Xe trượt điện Kickboard","Xe đạp 1 bánh","Giày trượt patin một hàng bánh (Inline Skate)","Ván trượt (Skate Board)"],"a":"2","imgs":[],"t":"문장형"},{"n":165,"b":"Giải thích đúng về nghĩa vụ bảo vệ người đi bộ?","c":["Không cần bảo vệ người say rượu băng qua đường trái phép.","Tại đoạn đường có đèn tín hiệu giao thông, cho dù cản trở việc lưu thông của người đi bộ đang băng qua đường thì  cũng không có vấn đề gì.","Trong trường hợp đèn xanh dành cho người đi bộ nhấp nháy thì xe có thể đi tiếp cũng không sao.","Trường hợp muốn rẽ phải tại đoạn đường giao nhau có đèn tín hiệu giao thông thì không được cản trở người đi bộ  đang đi theo tín hiệu đèn giao thông."],"a":"4","imgs":[],"t":"문장형"},{"n":166,"b":"Giải thích nào đúng về việc người hoặc đoàn người có thể đi lại ở giữa đường?","c":["Đoàn người diễu hành trên đường trong các sự kiện xã hội quan trọng.","Người đang dắt động vật to như ngựa, bò v.v đi cùng.","Người đang quét dọn đường, sửa chữa đường.","Dòng người đưa tang cầm cờ hoặc băng rôn."],"a":"1","imgs":[],"t":"문장형"},{"n":167,"b":"Cách điều khiển xe nào của người lái xe ô tô là an toàn nhất khi đi qua lối sang đường dành cho người đi bộ  không có đèn tín hiệu giao thông?","c":["Dù không có người sang đường thì vẫn phải quan sát kỹ trái phải và xung quanh, đồng thời giảm tốc độ.","Vì không có người sang đường nên cứ thế đi qua.","Khi không có người sang đường thì nhanh chóng đi qua.","Vì có thể có người sang đường nên nhấn còi và cứ thế đi qua."],"a":"1","imgs":[],"t":"문장형"},{"n":168,"b":"Cách xử lý không đúng của người lái xe trong trường hợp đang đi qua khúc giao đường sắt thì bị hỏng xe  nên không thể đi qua?","c":["Lập tức sơ tán hành khách đi cùng.","Sử dụng tín hiệu khẩn cấp.","Thông báo cho nhân viên đường sắt.","Nhanh chóng kiểm tra nguyên nhân hư hỏng của phương tiện."],"a":"4","imgs":[],"t":"문장형"},{"n":169,"b":"Người điều khiển xe muốn băng qua vỉa hè để rẽ vào tòa nhà. Thứ tự đúng mà người điều khiển xe phải thực  hiện là?","c":["Đi chậm → Bật đèn xi nhan báo rẽ → Nhanh chóng rẽ vào tòa nhà","Tạm dừng → Bấm còi → Nhanh chóng rẽ vào tòa nhà","Đi chậm → Kiểm tra trái phải → Từ từ rẽ vào tòa nhà","Tạm dừng → Kiểm tra trái phải → Từ từ rẽ vào tòa nhà"],"a":"4","imgs":[],"t":"문장형"},{"n":170,"b":"Giải thích nào sau đây là không đúng về cách qua đường của người đi bộ theo Luật Giao thông đường bộ?","c":["Không được sang đường ngay sát phía trước hoặc phía sau mọi loại xe.","Ngay cả người khuyết tật cũng bắt buộc phải sử dụng lối sang đường để qua đường.","Không sang đường trên các đoạn đường có biển báo cấm sang đường.","Phải sang đường bằng khoảng cách ngắn nhất trên những đoạn đường không có lối sang đường."],"a":"2","imgs":[],"t":"문장형"},{"n":171,"b":"Vị trí nào dễ xảy ra hiện tượng \"hiện tượng lóa mắt\" tạm thời không nhìn thấy chướng ngại vật hay người đi  bộ trên đường vào ban đêm?","c":["Bên lề của đường đối diện","Bên phải đường xe chạy","Chỗ gần dải phân cách giữa đường","Bên lề bên phải của đường"],"a":"3","imgs":[],"t":"문장형"},{"n":172,"b":"Giải thích nào là đúng về việc lưu thông của người đi bộ?","c":["Khi qua đường, người đi bộ phải đi qua ngay sát phía trước hoặc phía sau xe thật nhanh.","Nếu trên đường có lối sang đường cho người đi bộ, người khuyết tật phải qua đường bằng lối sang đường đó.","Người đi bộ phải đi sang đường thật nhanh ở những nơi cấm sang đường theo chỉ dẫn của biển báo an toàn.","Người đi bộ khi sang đường ở nơi không có lối sang đường thì phải sang đường ở chỗ có khoảng cách ngắn nhất."],"a":"4","imgs":[],"t":"문장형"},{"n":173,"b":"Câu nào giải thích đúng nguyên tắc đi trên vỉa hè của người đi bộ?","c":["Đi phía bên phải của vỉa hè","Đi phía bên trái của vỉa hè","Đi chính giữa của vỉa hè","Không có quy định riêng về cách đi trên vỉa hè"],"a":"1","imgs":[],"t":"문장형"},{"n":174,"b":"Hai hành động đúng của người điều khiển xe trước vạch sang đường dành cho người đi bộ không có đèn  giao thông trong khu vực bảo vệ trẻ em (Trường hợp có vạch dừng thì dừng trước vạch đó) là?","c":["Khi người đi bộ dự định băng qua vạch sang đường dành cho người đi bộ, phải kiểm tra an toàn của người đi bộ rồi  đi chậm qua.","Khi người đi bộ dự định băng qua vạch sang đường dành cho người đi bộ, phải tạm dừng để bảo đảm an toàn cho  người đi bộ sang đường.","Đi chậm qua bất kể có người đi bộ băng qua đường hay không.","Tạm dừng bất kể có người đi bộ băng qua đường hay không."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":175,"b":"Theo Luật Giao thông đường bộ, 2 giải thích nào là đúng về việc bảo vệ người đi bộ?","c":["Người đang dắt xe đạp đi bộ không được xem là người đi bộ.","Ở đường giao nhau không được phân luồng giao thông, xe ô tô tiến vào trước có quyền ưu tiên đi trước so với  người đi bộ.","Giám đốc Sở Cảnh sát tỉnh - thành phố có thể bố trí đường dành riêng cho người đi bộ trên đường để bảo đảm việc  đi lại của người đi bộ.","Có thể kéo xe đẩy trẻ em trên đường dành riêng cho người đi bộ."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":176,"b":"Chọn 2 câu giải thích đúng về việc lưu thông của người đi bộ.","c":["Trường hợp người đi bộ phải đi trên đường của xe ô tô thì phải lưu thông ở phía bên trái đường.","Khi diễu hành trong các sự kiện mang tính xã hội quan trọng, người đi bộ có thể lưu thông ở giữa đường.","Người khuyết tật không thể sử dụng các cơ sở hạ tầng để sang đường thì có thể đi sang đường mà không cần sử  dụng lối sang đường dành cho người đi bộ.","Trong trường hợp không có cơ sở hạ tầng để sang đường, người đi bộ phải sang đường ở nơi có khoảng cách dài  nhất để giữ an toàn."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":177,"b":"Mức phạt nào dưới đây dành cho người lái xe ô tô con vi phạm phương pháp lái xe băng ngang qua vỉa hè  theo Pháp lệnh Giao thông đường bộ?","c":["30.000 Won","40.000 Won","50.000 Won","60.000 Won"],"a":"4","imgs":[],"t":"문장형"},{"n":178,"b":"Hành vi vi phạm nào sau đây của người lái xe ô tô con liên quan đến bảo vệ người đi bộ có mức phạt tiền  khác theo Pháp lệnh Giao thông đường bộ? (Ngoại trừ khu vực bảo vệ riêng)","c":["Cản trở người đi bộ sang đường theo tín hiệu giao thông","Vi phạm lưu thông trên đường dành riêng cho người đi bộ","Hành vi ném đồ vật ra khỏi xe đang lưu thông trên đường","Vi phạm nguyên tắc bảo vệ trẻ em, người không thể nhìn thấy phía trước, v.v."],"a":"3","imgs":[],"t":"문장형"},{"n":179,"b":"Thái độ đúng đắn của người lái xe đối với người đi bộ là gì?","c":["Người đi bộ qua đường trái phép không cần được bảo vệ.","Không cần phải chú ý đến người đi bộ ở phía bên cạnh xe.","Người đi bộ phải tránh xe ô tô.","Người lái xe cần ưu tiên bảo vệ cho người đi bộ."],"a":"4","imgs":[],"t":"문장형"},{"n":180,"b":"Theo Luật Giao thông đường bộ, phần đường có biển báo an toàn để người đi bộ có thể băng qua đường  được gọi là gì?","c":["Vỉa hè","Khu vực mép lề đường","Vạch đi bộ sang đường","Đường dành riêng cho người đi bộ"],"a":"3","imgs":[],"t":"문장형"},{"n":181,"b":"Cách xử lý sai của người lái xe đối với người đi bộ?","c":["Phải chú ý trẻ em có thể bất ngờ chạy ra tại khu vực có biển báo \"Bảo vệ trẻ em\".","Phải bảo vệ người đi bộ bằng cách đi chậm ngay trước khi lái xe qua vỉa hè.","Phải bảo vệ cả những người đi bộ qua đường không đúng nơi quy định.","Phải tạm dừng khi có trẻ em qua đường mà không có người bảo hộ."],"a":"2","imgs":[],"t":"문장형"},{"n":182,"b":"Giải thích nào là không đúng về cách người đi bộ sang đường?","c":["Người đi bộ cần chọn đường đi ngắn nhất khi sang đường ở nơi không có lối sang đường.","Người đi bộ không được sang đường ở ngay sát phía trước hay phía sau của tất cả các phương tiện.","Người đi bộ có thể qua đường bằng cách trèo qua dải phân cách làn đường được lắp đặt nhằm ngăn chặn qua  đường trái phép.","Người đi bộ có thể đi dưới lòng đường nếu vỉa hè đang trong quá trình xây dựng."],"a":"3","imgs":[],"t":"문장형"},{"n":183,"b":"Đối tượng nào dưới đây không được xếp vào “người không nhìn thấy phía trước”?","c":["Trẻ sơ sinh và trẻ em","Người tàn tật phải di chuyển bằng chân giả","Người gặp khó khăn trong việc giữ thăng bằng cơ thể","Người điếc"],"a":"1","imgs":[],"t":"문장형"},{"n":184,"b":"Người lái xe ô tô con vi phạm tín hiệu giao thông vào khoảng thời gian từ ( ) đến ( ) trong khu vực bảo vệ  trẻ em bị nhận gấp đôi mức điểm phạt theo Pháp lệnh Giao thông đường bộ. Thứ tự thời gian đú","c":["6 giờ sáng, 6 giờ tối.","7 giờ sáng, 7 giờ tối.","8 giờ sáng, 8 giờ tối.","9 giờ sáng, 9 giờ tối."],"a":"3","imgs":[],"t":"문장형"},{"n":185,"b":"Mức phạt nào đối với người lái xe tải 4,5 tấn vi phạm đỗ xe trong khu vực bảo vệ người cao tuổi từ 10 giờ  đến 11 giờ sáng theo Pháp lệnh Giao thông đường bộ?","c":["40.000 Won","50.000 Won","90.000 Won","100.000 Won"],"a":"3","imgs":[],"t":"문장형"},{"n":186,"b":"Cách nào dưới đây không đúng đối với người đi bộ khi lưu thông?","c":["Nguyên tắc đi bộ về phía bên trái của vỉa hè.","Trên đường dành riêng cho người đi bộ, người đi bộ có thể lưu thông trên toàn bộ con đường.","Trên các con đường mà vỉa hè và làn đường được phân cách rõ ràng, người đi bộ phải đi trên vỉa hè.","Trên các con đường có vạch trung tâm mà không phân cách rõvỉa hè và làn đường, người đi bộ phải đi sát mép  đường."],"a":"1","imgs":[],"t":"문장형"},{"n":187,"b":"Trường hợp nào không phải là trường hợp một người hay đoàn người được cho phép di chuyển dưới lòng  đường theo Pháp lệnh Giao thông đường bộ?","c":["Khi thực hiện công việc như dọn vệ sinh hoặc tu sửa trên đường","Khi cưỡi các động vật lớn như ngựa, bò đi trên đường","Người kéo xe đẩy em bé","Khi diễu hành tang lễ"],"a":"3","imgs":[],"t":"문장형"},{"n":188,"b":"Người lái xe đỗ lấn vạch dừng khi đèn giao thông đã chuyển sang màu đỏ phải đối mặt với hình phạt vi phạm  nào sau đây?","c":["Vi phạm cách đi qua đường giao nhau","Vi phạm quy định tạm dừng","Vi phạm tín hiệu giao thông","Vi phạm quy định đi chậm"],"a":"3","imgs":[],"t":"문장형"},{"n":189,"b":"Cách lái xe nào là đúng khi bạn nhìn thấy một người không nhìn thấy phía trước đang sang đường cùng với  chó dẫn đường?","c":["Tiếp tục đi nếu đây là khu vực không được dừng đỗ.","Tạm dừng xe lại.","Dừng lại ngay và giúp người khiếm thị quay lại chỗ ban đầu.","Bấm còi cảnh báo để bảo vệ họ."],"a":"2","imgs":[],"t":"문장형"},{"n":190,"b":"Người điều khiển tất cả loại xe trong Luật Giao thông đường bộ, trước vạch sang đường dành cho người đi  bộ không có đèn giao thông trong khu vực bảo vệ trẻ em, phải (          ) bất kể có người đi bộ","c":["Đi chậm","Tạm dừng","Đi chậm hoặc tạm dừng","Đi giảm tốc độ"],"a":"2","imgs":[],"t":"문장형"},{"n":191,"b":"Giải thích nào là đúng về việc bảo vệ người đi bộ sang đường?","c":["Không có nghĩa vụ bảo vệ người đi bộ trên đường ở ngoài đường giao nhau.","Không có nghĩa vụ bảo vệ người đi bộ sang đường trái luật, vi phạm tín hiệu giao thông.","Bảo vệ người đi bộ, kể cả khi họ sang đường trái luật.","Không có nghĩa vụ bảo vệ người đi bộ sang đường trái luật ở đường một chiều."],"a":"3","imgs":[],"t":"문장형"},{"n":192,"b":"Theo quy định của Pháp lệnh Giao thông đường bộ, người nào không được phép lưu thông trên đường xe  chạy?","c":["Người đi bằng xe dạng ghế dùng hỗ trợ đi lại","Người đi bộ diễu hành trên đường trong sự kiện xã hội quan trọng","Người làm công việc vệ sinh hoặc tu sửa trên đường","Người vận chuyển đồ vật có thể cản trở lưu thông của người đi bộ ví dụ như thang"],"a":"1","imgs":[],"t":"문장형"},{"n":193,"b":"Cách nào dưới đây là đúng nhất để người đi bộ sang đường khi đèn xanh dành cho người đi bộ sang đường  đang nhấp nháy?","c":["Người đi bộ vẫn chưa tiến vào lối sang đường phải chờ lượt đèn xanh tiếp theo để sang đường.","Đứng yên ở giữa lối sang đường.","Sang đường mà không cần chờ tín hiệu tiếp theo.","Có thể sang đường bất cứ lúc nào miễn là trước khi chuyển sang đèn đỏ."],"a":"1","imgs":[],"t":"문장형"},{"n":194,"b":"Giải thích nào sau đây là đúng về người đi bộ đi trên vỉa hè theo Luật Giao thông đường bộ?","c":["Người đi xe máy hai bánh dưới 125cc trên vỉa hè có thể được coi là người đi bộ.","Người đi xe đạp có thể được coi là người đi bộ.","Người sử dụng xe y tế hỗ trợ đi lại có thể được coi là người đi bộ.","Người đi xe đạp có gắn động cơ 49cc có thể được coi là người đi bộ."],"a":"3","imgs":[],"t":"문장형"},{"n":195,"b":"Theo Luật Giao thông đường bộ, 2 giải thích nào sau đây là đúng về đường dành riêng cho người đi bộ?","c":["Người lái các phương tiện được phép lưu thông phải lái xe bằng với tốc độ bước đi của người đi bộ.","Về nguyên tắc, người lái các phương tiện có thể lưu thông trên đường dành cho người đi bộ.","Khi Giám đốc Sở Cảnh sát công nhận là trường hợp đặc biệt cần thiết thì các phương tiện không được lưu thông.","Người lái các phương tiện được phép lưu thông phải tạm thời dừng lại khi gây nguy hiểm cho người đi bộ."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":196,"b":"Hai hình phạt dành cho người lái ô tô gây thương tích cho người đi bộ do hàng hóa rơi từ xe của mình và  phải nằm viện 2 tuần là gì??","c":["Bị xử phạt hình sự bất kể người bị thiệt hại có mong muốn xử phạt hay không.","Không bị xử phạt nếu thoả thuận được với người bị thiệt hại.","Không bị xử phạt nếu đã tham gia loại bảo hiểm có thể bồi thường toàn bộ thiệt hại.","Bị xử phạt hình sự bất kể đã tham gia loại bảo hiểm có thể bồi thường toàn bộ thiệt hại."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":197,"b":"Cách đi bộ qua đường đúng nhất đối với đường không có vạch sang đường theo Luật Giao thông đường bộ?","c":["Băng qua đường ngay phía sau chiếc xe vừa đi qua.","Đi qua nhanh khi không có xe lưu thông.","Vì là nơi không có lối đi bộ qua đường nên có thể băng qua ở bất kỳ vị trí nào.","Băng qua ở nơi có khoảng cách ngắn nhất trên đường."],"a":"4","imgs":[],"t":"문장형"},{"n":198,"b":"Theo Luật Giao thông đường bộ, giải thích nào sau đây là không đúng về cách đi bộ qua vạch đi bộ sang  đường?","c":["Vừa dắt phương tiện di chuyển cá nhân vừa băng qua đường.","Có thể băng qua đường cùng với xe dạng ghế dùng hỗ trợ đi bộ.","Có thể vừa đi xe đạp vừa băng qua đường.","Có thể cùng đẩy xe đẩy trẻ em khi băng qua đường."],"a":"3","imgs":[],"t":"문장형"},{"n":199,"b":"Trong các giải thíchvề phương pháp lưu thông của các phương tiện giao thông theo Luật Giao thông đường  bộ. Câu nào không đúng?","c":["Ở những đoạn đường phân chia thành vỉa hè và lòng đường xe chạy thì phải lưu thông trên lòng đường xe chạy.","Trước khi băng qua vỉa hè, phải đi chậm lại, nhìn kỹ bên trái bên phải rồi băng qua sao cho không cản trở việc lưu  thông của người đi bộ.","Phải đi về phía bên phải của tâm đường.","Nếu là đường một chiều, có thể đi giữa đường hoặc phần phía bên trái."],"a":"2","imgs":[],"t":"문장형"},{"n":200,"b":"Trong các giải thích về bảo vệ người đi bộ trong Luật Giao thông đường bộ. Câu nào không đúng?","c":["Khi có người đi bộ đang đi trên lối đi bộ qua đường thì phải tạm dừng ngay trước vạch đó.","Không được cản trở việc lưu thông của người đi bộ đang băng qua đường theo tín hiệu hoặc chỉ thị của cảnh sát  giao thông.","Không được cản trở việc lưu thông của người đi bộ đang băng qua đường ở đoạn đường giao nhau.","Khi người đi bộ đang băng qua đường ở đường không có lối đi bộ qua đường, phải chạy chậm lại và duy trì khoảng  cách an toàn."],"a":"4","imgs":[],"t":"문장형"},{"n":201,"b":"Cách đi qua vạch sang đường đúngkhi đang lái xe mà tất cả các đèn tín hiệu của xe và đèn tín hiệu giao  thông dành cho người đi bộ ở lối sang đườngbị?","c":["Nếu có người đi bộ sang đường thì phải chạy qua thật chậm.","Nếu không có người đang đi bộ trên lối sang đường thì không cần đi chậm lại mà băng qua nhanh chóng.","Nếu chức năng của lối sang đường bị mất do hỏng đèn giao thông thì không cần đi chậm lại.","Nếu có người đi bộ qua đường thì phải tạm dừng ngay trước lối sang đường."],"a":"4","imgs":[],"t":"문장형"},{"n":202,"b":"Phương pháp nào là phù hợp nhất để người đi bộ lưu thông trên đoạn đường không phân chia vỉa hè và  lòng đường nhưng có vạch trung tâm ở giữa theo Luật Giao thông đường bộ","c":["Đi bộ ở giữa lòng đường.","Đi bộ bên phải lòng đường.","Đi bộ ở sát mép đường.","Đi bộ thoải mái trên toàn bộ đường."],"a":"3","imgs":[],"t":"문장형"},{"n":203,"b":"Phương pháp lưu thông nào là đúng của người lái các phương tiện được phép lưu thông trên đường dành  riêng cho người đi bộ theo Luật Giao thông đường bộ?","c":["Nếu có người đi bộ thì đi chậm lại.","Vừa bấm còi xe vừa đi.","Chạy với tốc độ bằng tốc độ bước chân của người đi bộ hoặc tạm dừng xe.","Nếu không có người đi bộ thì đi nhanh qua."],"a":"3","imgs":[],"t":"문장형"},{"n":204,"b":"Theo luật Giao thông đường bộ, phần đường nào cho phép người đi bộ đi qua bằng cách đánh dấu ranh giới  bằng vạch kẻ đường, biển báo an toàn hoặc công trình nhân tạo theo Luật Giao thông đường bộ?","c":["Vỉa hè","Khu vực mép đường","Lối đi bộ qua đường","Lối xe đạp qua đường"],"a":"1","imgs":[],"t":"문장형"},{"n":205,"b":"Theo Pháp lệnh Giao thông đường bộ, Cách  đi qua đường không đúng khi đèn tín hiệu cho người đi bộ  đang nhấp nháy?","c":["Người đi bộ không được bắt đầu băng qua đường.","Người đang đi bộ qua đường phải nhanh chóng qua đường.","Dừng qua đường và quay trở lại vỉa hè.","Dừng qua đường và đợi tín hiệu tiếp theo ngay tại chỗ."],"a":"4","imgs":[],"t":"문장형"},{"n":206,"b":"Theo Luật Giao thông đường bộ, trường hợp nào sau đây người lái xe ô tô phải đi chậm lại?","c":["Khi phát hiện thấy một người dắt xe đạp và băng qua lối đi bộ qua đường","Khi đi qua bên cạnh một người đang đi bộ trên đoạn đường hẹp không chia làn","Khi thấy người đi bộ đang băng qua lối sang đường","Khi nhìn thấy người đi bộ đang đi sang đường trên đoạn đường không có lối sang đường"],"a":"2","imgs":[],"t":"문장형"},{"n":207,"b":"Theo Pháp lệnh Giao thông đường bộ, lối đi bộ sang đường có chiều cao bằng vỉa hè được lắp đặt ở những  đoạn đường cần hạn chế tốc độ từ ( ) km/giờ trở xuống. Đáp án nào đúng với (     )?","c":["10","20","30","50"],"a":"3","imgs":[],"t":"문장형"},{"n":208,"b":"Theo Pháp lệnh Giao thông đường bộ, đáp án nào không phải là tình huống phải tạm dừng khi đang lái xe?","c":["Khi trẻ em băng qua đường không có người giám hộ","Khi đèn tín hiệu là đèn đỏ đang nhấp nháy","Khi có trẻ em đang ngồi hoặc đứng trên đường","Khi đèn tín hiệu là đèn vàng đang nhấp nháy"],"a":"4","imgs":[],"t":"문장형"},{"n":209,"b":"Cách lưu thông nào là đúng của các phương tiện giao thông đi qua khi đèn tín hiệu đi bộ ở vạch qua đường  chéo chuyển màu xanh, theo Pháp lệnh Giao thông đường bộ?","c":["Nếu muốn đi thẳng thì phải dừng lại ngay trước vạch dừng.","Nếu không có người đi bộ thì có thể tăng tốc và rẽ phải.","Nếu không có người đi bộ thì có thể tăng tốc và rẽ trái.","Có thể đi về hướng không có người đi bộ sang đường."],"a":"1","imgs":[],"t":"문장형"},{"n":210,"b":"Theo Luật Giao thông đường bộ, việc người lái xe tạm thời làm cho bánh xe dừng hẳn có nghĩa là gì?","c":["Đi chậm lại","Dừng xe","Đỗ xe","Tạm dừng"],"a":"4","imgs":[],"t":"문장형"},{"n":211,"b":"Khu vực nào sau đây là nơi mà xe lăn điện y tế không được phép lưu thông theo Luật Giao thông đường bộ?","c":["Đường dành riêng cho xe đạp","Khu vực lề đường","Vỉa hè","Mép đường"],"a":"1","imgs":[],"t":"문장형"},{"n":212,"b":"Cách nào là chính xác nhất để rẽ trái tại đường giao nhau không có điều khiển giao thông?","c":["Trên đường thông thường, bật đèn xi nhan ngay trước đoạn đường giao nhau định rẽ trái rồi sau đó rẽ trái.","Đi từ từ theo vạch phân cách giữa đường trước rồi rẽ trái sang phía ngoài của khu vực chính giữa đường giao nhau.","Không thể sử dụng phía ngoài của khu vực chính giữa đường giao nhau để rẽ trái ngay cả khi Giám đốc Sở Cảnh sát  tỉnh - thành phố chỉ định.","Bắt buộc phải đi từ từ, còn việc có dừng tạm thời hay không thì người lái xe sẽ phán đoán và thực hiện tuỳ theo  từng tình huống."],"a":"4","imgs":[],"t":"문장형"},{"n":213,"b":"Theo Pháp lệnh Giao thông đường bộ, các làn đường được bố trí phải rộng trên ( ) mét. Trong trường hợp  này, khi được coi là trường hợp bất đắc dĩ, chẳng hạn như việc bố trí làn đường chỉ rẽ trái, thì","c":["5, 300","4, 285","3, 275","2, 265"],"a":"3","imgs":[],"t":"문장형"},{"n":214,"b":"Trường hợp nào là đúng để có thể vượt xe khác khi chiều rộng của phần đường bên phải không đủ 6m?","c":["Trường hợp không thể kiểm tra phần đường bên trái","Trường hợp có thể gây cản trở giao thông cho hướng ngược lại","Trường hợp xe phía trước chạy với tốc độ thấp và đảm bảo được khoảng cách an toàn với các phương tiện khác","Trường hợp có biển báo an toàn hạn chế hoặc cấm vượt"],"a":"3","imgs":[],"t":"문장형"},{"n":215,"b":"Theo Luật Giao thông đường bộ, với đường có lượng xe lưu thông ở hai hướng khác biệt rõ rệt theo khung  thời gian, thì làn đường được chỉ dẫn hướng  đi bằng đèn tín hiệu để có thể tăng số lượng làn xe","c":["Làn đường có thể thay đổi","Làn đường dành riêng cho xe buýt","Làn đường tăng tốc","Làn xe vượt"],"a":"1","imgs":[],"t":"문장형"},{"n":216,"b":"Theo Pháp lệnh Giao thông đường bộ người điều khiển tất cả loại xe khi muốn (   ) trên đường giao nhau,  phải đi chậm ở mép phải của đường trước rồi (   ). Trong trường hợp này, người điều khiển xe tr","c":["Rẽ phải - Rẽ phải - Rẽ phải","Rẽ trái - Rẽ trái - Rẽ trái","Rẽ phải - Rẽ trái - Rẽ phải","Rẽ trái - Rẽ phải - Rẽ trái"],"a":"1","imgs":[],"t":"문장형"},{"n":217,"b":"Theo Luật Giao thông đường bộ, giải thích nào là đúng về việc đổi làn đường?","c":["Do trên cầu là nơi nguy hiểm nên có nhiều trường hợp hạn chế đổi làn đường bằng vạch liền màu trắng.","Khu vực hạn chế đổi làn đường được biểu thị bằng vạch đứt màu trắng.","Tại khu vực cấm đổi làn đường, không được đổi làn đường cho dù không thể lưu thông do có chướng ngại vật  chẳng hạn như công trường đang xây dựng.","Mặc dù là khu vực cấm đổi làn đường nhưng nếu đổi làn đường một cách an toàn thì không bị coi là vi phạm quy  định."],"a":"1","imgs":[],"t":"문장형"},{"n":218,"b":"Trong các câu sau, hành vi vi phạm nào là đúng về “đuổi theo xe phía trước”, tức hành vi tiến vào đường  giao nhau khi đèn xanh và không thể đi qua khi tín hiệu đèn chuyển màu làm cản trở lưu thông củ","c":["Vi phạm cách lưu thông trên đường giao nhau","Vi phạm quy định tạm dừng","Vi phạm cách đổi làn đường đi thẳng","Vi phạm biện pháp giảm thiểu tắc nghẽn"],"a":"1","imgs":[],"t":"문장형"},{"n":219,"b":"Giải thích nào là đúng về làn đường tăng tốc trên đường cao tốc?","c":["Là làn đường dành cho những xe đang đi trên đường cao tốc để chuyển làn để ra khỏi cao tốc","Là làn đường giúp cho các xe tiến vào đường cao tốc có thể lấy lại tốc độ cần thiết.","Là làn đường dành cho xe tăng tốc khi muốn vượt xe khác trên đường cao tốc.","Là làn đường dùng để làm giảm ảnh hưởng của việc các xe to giảm tốc khi lên dốc."],"a":"2","imgs":[],"t":"문장형"},{"n":220,"b":"Hành động phù hợp nhất khi biết mình đã vào nhầm đường cao tốc?","c":["Dừng ở lề đường, bật đèn báo khẩn cấp để nhờ sự giúp đỡ của cảnh sát tuần tra.","Vì đã đi vào rồi nên cứ đi cho đến lối ra tiếp theo.","Bật đèn báo khẩn cấp và lùi từ từ trên đường mình đã đi vào.","Nếu làn xe lúc tiến vào là từ làn số 2 trở lên thì quay đầu xe lại để đi ra."],"a":"2","imgs":[],"t":"문장형"},{"n":221,"b":"Theo Pháp lệnh Giao thông đường bộ, kết nối nào là không đúng về màu sắc vạch kẻ đường đã lắp đặt?","c":["Màu vàng biểu thị việc phân luồng giao thông hai chiều trong khu vực an toàn","Màu xanh biểu thị làn đường dành riêng cho xe buýt","Màu hồng, màu xanh lá cây nhạt hoặc màu xanh lá cây biểu thị hướng đi theo màu sắc trên mặt đường","Đường viền màu trắng biểu thị hạn chế tốc độ được vẽ trong khu vực bảo vệ trẻ em"],"a":"4","imgs":[],"t":"문장형"},{"n":222,"b":"Theo Pháp lệnh Giao thông đường bộ, loại xe nào là đúng để có thể đi ở làn đường bên trái trên các tuyến  đường ngoài đường cao tốc?","c":["Xe ô tô con và xe ô tô buýt chở người dạng vừa và nhỏ, nhỏ gọn","Xe khách cỡ lớn","Xe tải chở hàng","Xe ô tô chuyên dụng và xe máy 2 bánh"],"a":"1","imgs":[],"t":"문장형"},{"n":223,"b":"Ký hiệu nào trên mặt đường cho phép quay đầu xe khi điều khiển xe ô tô? (Nơi có ký hiệu quay đầu xe)","c":["Ký hiệu trên mặt đường được lắp đặt dưới dạng vạch kẻ liền màu vàng ở giữa đường","Ký hiệu trên mặt đường được lắp đặt dưới dạng vạch kẻ liền màu trắng ở giữa đường","Ký hiệu trên mặt đường được lắp đặt dưới dạng vạch kẻ chấm màu trắng ở giữa đường","Ký hiệu trên mặt đường được lắp đặt dưới dạng vạch kẻ liền màu xanh dương ở giữa đường"],"a":"3","imgs":[],"t":"문장형"},{"n":224,"b":"Nội dung giải thích về phân loại giao thông theo làn đường theo Pháp lệnh Giao thông đường bộ. Nội dung  nào là sai?","c":["Khi đếm thứ tự làn đường thì tính từ làn đường ở trung tâm là làn đường số 1.","Trường hợp đang đi với tốc độ chậm và có nguy cơ cản trở việc lưu thông bình thường của một phương tiện khác thì  phải lái xe sang làn đường bên phải ","Trên đường một chiều, làn đường số 1 được tính từ phía bên phải của con đường.","Về nguyên tắc, tất cả các xe ô tô phải đi trên làn đường số 2 ở trên đường cao tốc có 2 làn đường một chiều."],"a":"3","imgs":[],"t":"문장형"},{"n":225,"b":"Theo Pháp lệnh Giao thông đường bộ, trường hợp tầm nhìn xa của người lái xe ô tô dưới 50m do mưa to thì  phải lưu thông với tốc độ giảm (           ) thấp hơn tốc độ tối đa. Nội dung nào là đúng trong","c":["50%","40%","30%","20%"],"a":"1","imgs":[],"t":"문장형"},{"n":226,"b":"Theo Pháp lệnh Giao thông đường bộ, hai tiêu chuẩn nào là đúng để xe ô tô có thể đi trên làn đường dành  riêng cho xe khách?","c":["Xe ô tô chở 3 người trở lên","Xe tải chở 3 người trở lên","Xe khách chở 3 người trở lên","Xe máy chở 2 người trở lên"],"a":"1, 3","imgs":[],"t":"문장형"},{"n":227,"b":"Theo Luật Giao thông đường bộ, khi bố trí làn đường trên đoạn đường không có phân chia vỉa hè và lòng  đường thì cần phải lắp đặt gì ở hai bên đường để người đi bộ có thể đi qua một cách an toàn?","c":["Khu vực an toàn","Biểu thị vạch hạn chế thay đổi làn đường","Lề đường","Khu vực mép đường"],"a":"4","imgs":[],"t":"문장형"},{"n":228,"b":"Theo Pháp lệnh Giao thông đường bộ, cách lưu thông nào là đúng trên đường giao nhau có làn xe 1 - làn  xe 2 là làn rẽ trái?","c":["Xe ô tô con chỉ được sử dụng làn xe thứ nhất để rẽ trái.","Xe ô tô con chỉ được sử dụng làn xe thứ hai để rẽ trái.","Xe ô tô chở khách cỡ lớn chỉ được sử dụng làn xe thứ nhất để rẽ trái.","Xe ô tô chở khách cỡ lớn chỉ được sử dụng làn xe thứ hai để rẽ trái."],"a":"4","imgs":[],"t":"문장형"},{"n":229,"b":"Giải thích nào không đúng về cách thức và tốc độ di chuyển của các phương tiện giao thông theo Pháp lệnh  Giao thông đường bộ?","c":["Khi muốn rẽ trái ở đoạn đường giao nhau không có đèn tín hiệu mà có xe khác đang đi thẳng thì phải nhường  đường cho xe đang đi thẳng.","Khi dừng xe ô tô tại đoạn đường không phân biệt lòng đường và vỉa hè thì phải duy trì khoảng cách tối thiểu 50cm  tính từ lề đường bên phải đến tâm đư","Trường hợp xe phía trước muốn rẽ phải ở đoạn đường giao nhau và bật đèn tín hiệu thì xe phía sau không được cản  trở xe phía trước.","Tốc độ tối thiểu trên đường dành riêng cho xe ô tô là 40 km/giờ."],"a":"4","imgs":[],"t":"문장형"},{"n":230,"b":"Theo Pháp lệnh Giao thông đường bộ, tốc độ tối đa của một chiếc xe tải với tải trọng 3 tấn là bao nhiêu khi đi  trên đường cao tốc bốn làn xe có tốc độ tối đa 100 km/giờ?","c":["60 km/giờ","70 km/giờ","80 km/giờ","90 km/giờ"],"a":"3","imgs":[],"t":"문장형"},{"n":231,"b":"Trương hợp nào là đúng khi người lái xe không được đi về bên trái đường?","c":["Trường hợp hạn chế vượt bằng biển báo an toàn","Trường hợp đường một chiều","Trường hợp không thể đi ở phía bên phải đường do đường đang thi công","Trường hợp chiều rộng của phần đường bên phải không đủ để xe lưu thông"],"a":"1","imgs":[],"t":"문장형"},{"n":232,"b":"Nội dung nào khác xa nhất với các quy tắc đi qua giao lộ và khu vực tiến thoái lưỡng nan (Dilemma Zone)?","c":["Kiểm tra tình hình giao thông trước khi đi vào giao lộ và dự đoán mọi tình huống bằng cách duy trì khoảng cách an  toàn, giảm tốc độ và lái xe cẩn trọ","Đi vào giao lộ khi tín hiệu đèn đỏ là vi phạm đèn tín hiệu.","Khi đèn tín hiệu chuyển từ màu xanh sang màu vàng, nếu bánh trước đã lấn vào vạch dừng thì quan sát tình hình  giao thông tại giao lộ và nhanh chóng đ","Theo quy định của Luật Giao thông đường bộ, bằng cách công nhận \"vùng lưỡng nan\" (Dilemma Zone), nếu đèn tín  hiệu giao thông chuyển sang màu vàng trư"],"a":"4","imgs":[],"t":"문장형"},{"n":233,"b":"Sau đây là các giải thích về khoảng cách giữa các xe. Mô tả nào đúng?","c":["Khoảng cách phản xạ nhanh là khoảng cách từ lúc phát hiện nguy hiểm, giẫm bàn đạp phanh cho đến khi phanh bắt  đầu hoạt động.","Khoảng cách phanh là khoảng cách không bị đâm vào xe trước khi xe trước dừng đột ngột.","Khoảng cách an toàn là khoảng cách từ khi khởi động phanh cho đến khi xe dừng hoàn toàn.","Khoảng cách đạp phanh là khoảng cách từ khi nhận thấy nguy hiểm đến khi xe dừng lại hẳn."],"a":"1","imgs":[],"t":"문장형"},{"n":234,"b":"Khu vực nào sau đây có thể vượt?","c":["Giao lộ","Vạch phân cách (vạch chấm màu vàng)","Trong đường hầm (làn đường có vạch kẻ liền màu trắng)","Trên cầu (làn đường có vạch kẻ liền màu trắng)"],"a":"2","imgs":[],"t":"문장형"},{"n":235,"b":"Theo Luật Giao thông đường bộ, giải thích nào sau đây là hợp lý nhất về việc chạy xe chậm trên đường giao  nhau?","c":["Chạy với tốc độ chậm có thể dừng xe ngay lập tức.","Chạy và duy trì tốc độ 30 km/giờ.","Chạy với tốc độ chậm không thể gây ra tai nạn.","Chạy với tốc độ đủ để tránh khi xe phía trước dừng đột ngột."],"a":"1","imgs":[],"t":"문장형"},{"n":236,"b":"Tiêu chuẩn xử phạt nào là đúng khi điều khiển xe ô tô (ngoại trừ phương tiện di chuyển cá nhân) vi phạm tốc  độ tối đa trên đường?","c":["Người lái xe với tốc độ quá 100 km/giờ 3 lần trở lên sẽ bị phạt tiền hình sự tối đa 5 triệu Won hoặc bị tạm giam.","Người lái xe với tốc độ quá 100 km/giờ 3 lần trở lên sẽ bị phạt tù tối đa 1 năm hoặc phạt tiền hình sự tối đa 5 triệu  Won.","Người lái xe với tốc độ quá 100 km/giờ 2 lần sẽ bị phạt tiền hình sự tối đa 3 triệu Won.","Người lái xe với tốc độ quá 80 km/giờ sẽ bị phạt tiền hình sự tối đa 500.000 Won hoặc bị tạm giam."],"a":"2","imgs":[],"t":"문장형"},{"n":237,"b":"Cách xử lý đúng khi định rẽ phải ở đường giao nhau không có đèn giao thông?","c":["Nhanh chóng rẽ phải với tốc độ cao nếu có thể.","Rẽ phải sau khi chiếc xe đang đi vào đường giao nhau ở phía trước đã đi qua.","Nếu có xe ở phía đối diện đang rẽ trái thì chú ý an toàn rồi rẽ phải.","Khi rẽ phải từ đường rộng sang đường hẹp thì không cần chú ý đến xe khác."],"a":"2","imgs":[],"t":"문장형"},{"n":238,"b":"Khi muốn rẽ phải tại đoạn đường giao nhau có tín hiệu đèn giao thông và không có tín hiệu phụ trợ riêng  cho xe. Theo Pháp lệnh Giao thông đường bộ , hành vi nào sau đây là không đúng ?","c":["Nếu tín hiệu của xe bật sáng màu đỏ thì tạm dừng ngay trước vạch dừng, bất kể tín hiệu dành cho người đi bộ tại lối  qua đường là gì.","Nếu tín hiệu của xe bật sáng màu xanh lá cây thì không tạm dừng ở ngay trước vạch dừng mà rẽ phải luôn.","Nếu đèn tín hiệu cho xe là tín hiệu rẽ trái, thì phải dừng tạm thời ở trước vạch dừng bất kể tín hiệu đèn dành cho  người đi bộ ở vạch sang đường.","Không tạm dừng ở ngay trước vạch dừng mà rẽ phải luôn, miễn là không cản trở sự lưu thông của xe khác và bất kể  tín hiệu của xe."],"a":"4","imgs":[],"t":"문장형"},{"n":239,"b":"Giải thích đúng nhất về cách rẽ trái và rẽ phải ở đường giao nhau?","c":["Khi định rẽ phải thì phải chú ý đến xe đạp và người đi bộ đang đi hoặc đang dừng theo tín hiệu giao thông và đi  qua một cách nhanh chóng.","Khi định rẽ trái, luôn luôn phải đi qua phía ngoài của phần trung tâm giữa đường giao nhau.","Khi định rẽ phải, phải đi chậm lại dọc theo mép đường bên phải trước.","Trong trường hợp định rẽ trái ở đường giao nhau không có đèn tín hiệu, nếu có người đi bộ đang đi qua thì nhanh  chóng đi qua phía trước người đó."],"a":"3","imgs":[],"t":"문장형"},{"n":240,"b":"Giải thích nào đúng về khoảng cách phanh?","c":["Là khoảng cách dừng hẳn sau khi người lái xe đạp phanh.","Là khoảng cách để tránh tai nạn khi xe trước dừng đột ngột.","Là khoảng cách từ khi lái xe phát hiện nguy hiểm và đạp phanh cho đến khi xe dừng lại trên thực tế.","Là khoảng cách từ lúc người lái xe nhận thức ra sự nguy hiểm và phản xạ đạp phanh cho đến trước khi phanh thực  sự hoạt động."],"a":"3","imgs":[],"t":"문장형"},{"n":241,"b":"Cách lưu thông đúng ở đường giao nhau?","c":["Trong trường hợp đèn tín hiệu màu đỏ nhấp nháy thì đi chậm chậm.","Trong trường hợp đèn tín hiệu màu vàng nhấp nháy thì đi qua thật nhanh.","Không vượt lên trước ở đường giao nhau.","Khi đến gần đường giao nhau thì luôn bật đèn pha hướng lên và tiến vào."],"a":"3","imgs":[],"t":"문장형"},{"n":242,"b":"Sau đây là giải thích và cách sử dụng làn đường Hi-pass. Nội dung nào đúng nhất?","c":["Làn đường Hi-pass luôn là làn đường số 1 nên phải chuyển từ làn đường thông thường sang làn đường Hi-pass  trước rồi đi qua một cách an toàn.","Vạch chỉ dẫn làn đường Hi-pass của xe chở hàng có màu xanh dương, đây là làn đường chuyên dành cho xe chở  hàng nên có thể giữ nguyên tốc độ khi đi qu","Tốc độ đi qua khu vực Hi-pass của tất cả làn đường giới hạn tối đa là 30 km/giờ nên phải giảm tốc rồi đi chậm qua.","Ở đoạn đường có nhiều làn Hi-pass thì phải tuân thủ tốc độ quy định và do thiết bị đọc thẻ Hi-pass bị hỏng nên  không thể nhận biết được thông tin, th"],"a":"4","imgs":[],"t":"문장형"},{"n":243,"b":"Điều nào sau đây là đúng về tốc độ tối đa của ô tô chở khách trên đường dành riêng cho ô tô theo Luật Giao  thông Đường bộ?","c":["Tốc độ tối đa 60 km/h.","Tốc độ tối đa 70 km/h.","Tốc độ tối đa 80 km/h.","Tốc độ tối đa 90 km/h."],"a":"4","imgs":[],"t":"문장형"},{"n":244,"b":"Theo Pháp lệnh Giao thông đường bộ, tốc độ có thể giới hạn trên đường thông thường trong khu vực dân cư,  khu vực thương mại và khu vực công nghiệp là bao nhiêu km/giờ?","c":["Trong phạm vi 20 km/giờ","Trong phạm vi 30 km/giờ","Trong phạm vi 40 km/giờ","Trong phạm vi 50 km/giờ"],"a":"4","imgs":[],"t":"문장형"},{"n":245,"b":"Để giảm thiểu tai nạn giao thông, chính sách an toàn giao thông nào là đúng về việc hạn chế tốc độ tối đa  trong trung tâm thành phố là 50 km/giờ, và đường nhánh trong khu dân cư được điều chỉnh hạ xu","c":["Chính sách kinh tế mới New Deal","Tốc độ an toàn 5030","Đại hội chung sức giảm thiểu tai nạn giao thông","Hệ thống giao thông thông minh (ITS)"],"a":"2","imgs":[],"t":"문장형"},{"n":246,"b":"Điều nào sau đây là đúng về hành vi của người lái xe khi muốn rẽ trái tại ngã tư không có đèn tín hiệu ưu  tiên?","c":["Phải rẽ trái khi đèn xanh và không có xe đi ngược chiều.","Rẽ trái bất cứ lúc nào, bất kể tín hiệu nào, miễn là không có cản trở từ xe ngược chiều.","Khi có tín hiệu đi thẳng hai chiều, phải rẽ trái an toàn trong phạm vi không cản trở dòng xe ngược chiều.","Nếu xảy ra tai nạn khi rẽ trái không có đèn tín hiệu ưu tiên tại đèn đỏ, sẽ bị xử phạt vì vi phạm nghĩa vụ lái xe an  toàn."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":247,"b":"Xe đang chạy trên làn đường giữa dành riêng cho xe buýt trong nội thành. Hai cách điều khiển xe an toàn  nhất là?","c":["Liên tục nhấn còi để xe khác không chen ngang vào.","Người đi bộ bên phải có thể băng qua đường ở chỗ không có vạch nên phải chú ý khi lưu thông.","Người đi bộ có thể đi ra từ trạm xe buýt ở bên trái nên phải đi chậm.","Đèn giao thông có thể chuyển sang màu đỏ nên cần nhanh chóng đi qua."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":248,"b":"Theo Luật Giao thông đường bộ, 2 phương pháp lái xe an toàn khi thay đổi làn đường là gì?","c":["Khi thay đổi làn đường, phải thực hiện nhanh nhất có thể.","Chỉ có thể thực hiện ở đoạn đường có vạch liền màu trắng.","Đổi làn đường khi không gây cản trở cho việc lưu thông của xe đang đi.","Chỉ có thể thực hiện ở đoạn đường có vạch đứt màu trắng."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":249,"b":"Hai hành động lái xe an toàn nhất khi rẽ phải ở đường giao nhau là gì?","c":["Bật đèn xi nhan sau tối thiểu trước điểm rẽ phải 30m.","Nếu có đường vạch liền màu trắng thì cần phải chú ý và đổi hướng sang bên phải.","Rẽ phải mà không gây ảnh hưởng tới các xe đang tiến lên từ phía bên trái.","Chú ý đến các phương tiện giao thông khác và rẽ phải thật nhanh."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":250,"b":"Hai phương pháp lái xe nào là đúng khi vượt lên trước của người lái xe ô tô con?","c":["Cần phải bảo đảm đầy đủ không gian bên trái khi bắt đầu vượt lên trước.","Phải vượt lên trước trong phạm vi tốc độ giới hạn của đoạn đường đang chạy.","Có thể vượt lên trước phía bên phải trong trường hợp đã xác định an toàn.","Sau khi đã đi qua phía bên trái của xe trước và không thấy có xe ở phía bên phải trong gương chiếu hậu thì tiến vào  nhanh."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":251,"b":"Hai phương pháp lái xe nào là an toàn khi đi trên đường?","c":["Khi đỗ xe thì cần đỗ xe ở vùng an toàn.","Khi đèn chuyển màu vàng, dừng xe ở trước đường giao nhau để tuân thủ tín hiệu.","Luôn giữ khoảng cách có thể tránh va chạm khi xe phía trước phanh đột ngột.","Khi vượt lên thì vượt lên phía bên trái của xe đi trước."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":252,"b":"Loại xe ô tô nào sau đây không có nghĩa vụ phải lắp đặt hoặc trang bị bình chữa cháy?","c":["Xe ô tô con có từ 5 chỗ ngồi trở lên","Xe chở khách","Xe chở hàng","Xe máy 2 bánh"],"a":"4","imgs":[],"t":"문장형"},{"n":253,"b":"Theo Luật Giao thông đường bộ, nội dung người lái xe cần tuân thủ nào là là đúng khi xe cứu hộ khẩn cấp  lưu thông với mục đích khẩn cấp đang tiến đến gần?","c":["Phải tạm dừng ở lề trái trên giao lộ khi xe cứu hộ khẩn cấp tới gần giao lộ.","Phải nhường đường để xe cứu hộ khẩn cấp được ưu tiên lưu thông ở các nơi ngoài giao lộ.","Đi với tốc độ cao hơn xe cứu hộ khẩn cấp để đi qua nhanh chóng.","Tạm dừng tại vị trí đó và chờ cho đến khi xe cứu hộ khẩn cấp đi qua."],"a":"2","imgs":[],"t":"문장형"},{"n":254,"b":"Cách lái xe nào là an toàn nhất khi đang rẽ phải trên đường giao nhau thì có xe cứu hỏa bật đèn tín hiệu và  hú còi đang tiến đến gần?","c":["Phải tạm dừng để tránh giao lộ.","Dừng ngay lập tức tại vị trí hiện tại.","Đi chậm rồi rẽ phải.","Đi nhanh qua giao lộ rồi tiếp tục chạy."],"a":"1","imgs":[],"t":"문장형"},{"n":255,"b":"Theo Luật Giao thông đường bộ, nội dung nào sau đây mà xe khẩn cấp không được áp dụng ngoại lệ?","c":["Hạn chế tốc độ của xe ô tô","Cấm vượt","Cấm chen ngang","Bảo vệ người đi bộ"],"a":"4","imgs":[],"t":"문장형"},{"n":256,"b":"Xe khẩn cấp thì phải có cấu trúc của xe khẩn cấp, bật còi hú và đèn nhấp nháy để báo hiệu đang làm nhiệm  vụ khẩn cấp. Xe nào không báo hiệu khẩn cấp mà vẫn được công nhận là xe khẩn cấp?","c":["Xe đi bắt các xe đỗ xe trái phép","Xe cứu hỏa","Xe cấp cứu","Xe cảnh sát truy bắt xe vi phạm tốc độ"],"a":"4","imgs":[],"t":"문장형"},{"n":257,"b":"Trường hợp xe cứu hỏa hay xe cấp cứu cần vượt lên trước trong khu vực cấm vượt hoặc vượt quá tốc độ thì  phải làm thế nào để được hưởng ngoại lệ?","c":["Vừa lái xe vừa bấm còi.","Đảm bảo có trang bị các cấu trúc cần thiết cho việc lái xe an toàn theo Luật Quản lý xe ô tô và bấm còi báo động  hoặc bật đèn khẩn cấp.","Bật đèn trước và đi.","Có thể được hưởng ngoại lệ mà không cần thực hiện bất kỳ biện pháp đặc biệt nào."],"a":"2","imgs":[],"t":"문장형"},{"n":258,"b":"Khi xe ô tô thường chở bệnh nhân nguy kịch thì cần xử lý như thế nào để được công nhận là xe khẩn cấp?","c":["Phải nhận được giấy phép của đồn trưởng đồn cảnh sát.","Bật đèn pha trước hoặc đèn báo khẩn cấp.","Vì có bệnh nhân đang nguy cấp nên không cần làm gì đặc biệt.","Nhất định phải có xe hộ tống đi cùng."],"a":"2","imgs":[],"t":"문장형"},{"n":259,"b":"Theo Pháp lệnh Giao thông đường bộ, 2 loại xe nào dưới đây được xem là xe khẩn cấp?","c":["Xe cứu hoả đang đi tới xưởng bảo dưỡng ô tô để sửa chữa hỏng hóc","Xe ô tô đang vận chuyển máu để truyền máu cho bệnh nhân hoặc người bị thương đang nguy hiểm tính mạng","Xe cấp cứu chở bệnh nhân xuất viện","Xe ô tô được sử dụng để chở bưu phẩm khẩn cấp theo chỉ định của Giám đốc Sở Cảnh sát tỉnh - thành phố"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":260,"b":"Theo Luật Giao thông đường bộ, người lái xe cấp cứu đang lưu thông với mục đích khẩn cấp có thể thực hiện  2 điều nào dưới đây?","c":["Khi gây ra tai nạn giao thông, có thể tiếp tục lưu thông mà không cần xử lý cấp cứu cho người thương vong.","Có thể tiếp tục lưu thông dù có gây trở ngại cho người đi bộ sang đường.","Có thể lưu thông ra giữa hoặc sang bên trái đường.","Có thể chen ngang ở đường đang bị tắc nghẽn."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":261,"b":"Theo Pháp lệnh Giao thông đường bộ, nội dung nào sau đây người điều khiển xe cứu hỏa đang đi làm nhiệm  vụ không được áp dụng là trường hợp ngoại lệ đối với xe khẩn cấp?","c":["Không thắt dây an toàn","Lái xe khi đã uống rượu","Chèn lên vạch phân luồng ở giữa","Vi phạm đèn tín hiệu"],"a":"2","imgs":[],"t":"문장형"},{"n":262,"b":"Theo Pháp lệnh Giao thông đường bộ, người lái xe khẩn cấp phải tham gia chương trình giáo dục an toàn  giao thông định kỳ ( ) năm một lần. Chọn câu phù hợp với ( ).","c":["1","2","3","5"],"a":"3","imgs":[],"t":"문장형"},{"n":263,"b":"Giải thích nào là không đúng về trường hợp ngoại lệ đối với xe khẩn cấp theo Pháp lệnh Giao thông đường  bộ?","c":["Có thể vượt lên trước ở những nơi cấm vượt.","Có thể chen ngang ở những nơi cấm chen ngang.","Ngay cả khi có người đi bộ đang sang đường ở lối qua đường dành cho người đi bộ, vẫn có thể lưu thông mà  không cần bảo vệ người đi bộ.","Có thể chạy nhanh hơn tốc độ tối đa của lưu thông đường bộ."],"a":"3","imgs":[],"t":"문장형"},{"n":264,"b":"Theo Luật Giao thông đường bộ, khu vực trong phạm vi ( ) mét tính từ các cơ sở cung cấp nước chữa cháy,  hệ thống chữa cháy khẩn cấp, cơ sở chữa cháy là nơi cấm dừng và đỗ xe. Số nào đúng khi điền vào","c":["5","6","8","10"],"a":"1","imgs":[],"t":"문장형"},{"n":265,"b":"Phương tiện nào sau đây có thể được Giám đốc Sở Cảnh sát tỉnh - thành phố chỉ định là xe khẩn cấp theo  đăng ký của cá nhân hoặc cơ quan v.v?","c":["Xe cứu hỏa","Phương tiện dùng cho kinh doanh gas được sử dụng để xử lý khẩn cấp ứng phó rò rỉ khí gas","Xe cấp cứu","Xe chở máu cung cấp"],"a":"2","imgs":[],"t":"문장형"},{"n":266,"b":"Phương tiện nào sau đây không phải là xe khẩn cấp có thể được Giám đốc Sở Cảnh sát tỉnh - thành phố chỉ  định theo đăng ký của cá nhân hoặc cơ quan v.v?","c":["Xe dùng cho cảnh sát được sử dụng để kiểm soát giao thông","Xe được sử dụng để vận chuyển bưu phẩm khẩn cấp","Xe được sử dụng để sửa chữa điện thoại khẩn cấp","Xe dùng cho cơ quan để thực thi công việc dân phòng như điều động để khắc phục khẩn cấp"],"a":"1","imgs":[],"t":"문장형"},{"n":267,"b":"Theo Pháp lệnh Giao thông đường bộ, ngoại trừ mục đích khẩn cấp, trường hợp nào xe khẩn cấp không được  sử dụng đèn cảnh báo?","c":["Trường hợp xe cứu hoả tuần tra công tác phòng cháy, cứu trợ và cấp cứu.","Trường hợp xe cứu hoả di chuyển khẩn cấp để bảo trì bảo dưỡng.","Trường hợp xe chuyên dùng cho nhiệm vụ dân phòng tham gia huấn luyện liên quan tới mục đích sử dụng khẩn cấp  vốn có.","Trường hợp xe cảnh sát tuần tra để ngăn ngừa và trấn áp tội phạm."],"a":"2","imgs":[],"t":"문장형"},{"n":268,"b":"Theo Luật Giao thông đường bộ, điều nào là đúng về việc xe khẩn cấp đang đi làm nhiện vụ khẩn cấp vi  phạm quy định giao thông?","c":["Lưu thông với tốc độ 100 km/giờ trên đường thông thường có 2 làn một chiều.","Vượt lên trước trong đường hầm đã được chia làn bằng vạch liền màu trắng.","Chen ngang tại đường giao nhau để rẽ sang phải.","Ngay cả khi xảy ra tai nạn giao thông thiệt hại về người, vẫn tiếp tục lái xe mà không cần  xử lý hoặc khai báo cần  thiết do đang được điều động khẩn"],"a":"4","imgs":[],"t":"문장형"},{"n":269,"b":"Trường hợp nào mà xe khẩn cấp không thể dùng đèn báo hiệu khẩn cấp ngoài mục đích khẩn cấp?","c":["Xe cứu hỏa đi tuần tra để phòng ngừa hỏa hoạn","Xe chuyên dùng để quản lý đường bộ đi tuần tra để phòng ngừa nguy hiểm trên đường","Xe cứu thương đang tham gia huấn luyện liên quan đến mục đích cấp cứu khẩn cấp","Xe cảnh sát đi tuần tra nhằm phòng ngừa tội phạm"],"a":"2","imgs":[],"t":"문장형"},{"n":270,"b":"Hai nội dung nào là đúng về cách nhường đường cho xe cứu hộ khẩn cấp đang lưu thông với mục đích khẩn  cấp?","c":["Theo nguyên tắc thì tất cả các xe ô tô phải tấp vào lề đường bên trái.","Nếu xe cứu hộ khẩn cấp đang lên dốc hẹp theo hướng ngược chiều thì phải tấp vào lề bên phải để tránh và nhường  đường cho xe.","Phải tạm dừng để tránh đường giao nhau ở khu vực gần khúc giao.","Trường hợp nếu xe cứu hộ khẩn cấp đến gần các khu vực ngoài đường giao nhau hoặc lân cận thì phải nhường  đường để xe cứu hộ khẩn cấp được ưu tiên lưu"],"a":"3, 4","imgs":[],"t":"문장형"},{"n":271,"b":"Hai loại xe nào dưới đây phù hợp với xe khẩn cấp?","c":["Là xe được xe cảnh sát điều khiển với mục đích khẩn cấp","Là xe của cơ quan điều tra nhưng được dùng cho mục đích không liên quan đến điều tra","Là xe cứu hộ đã hoàn thành công tác cứu hộ và đang quay về","Là xe đang chở bệnh nhân hay người bị thương nguy kịch tính mạng hoặc chở máu để đi truyền"],"a":"1, 4","imgs":[],"t":"문장형"},{"n":272,"b":"Giải thích nào là không đúng về nghĩa vụ của người lái và người điều hành xe buýt đưa đón trẻ theo Pháp  lệnh Giao thông đường bộ?","c":["Người điều khiển xe buýt đưa đón trẻ chỉ bật đèn hiệu khi có trẻ em và trẻ nhỏ lên xuống xe.","Người điều khiển xe buýt đưa đón trẻ phải chờ cho tất cả trẻ em và trẻ nhỏ đang trên xe đều đã thắt dây an toàn rồi  mới xuất phát.","Người điều hành xe buýt đưa đón trẻ phải dán biển báo có người bảo hộ đi cùng nếu có người bảo hộ cùng đi trên  xe buýt đưa đón trẻ.","Người điều hành xe buýt đưa đón trẻ không cần phải ghi chép lại lịch sử lái xe an toàn nếu có người bảo hộ cùng đi  trên xe."],"a":"4","imgs":[],"t":"문장형"},{"n":273,"b":"Khu vực nào bắt buộc phải tạm dừng bất kể có người đi bộ lưu thông hay không theo Pháp lệnh Giao thông  đường bộ?","c":["Đường không có vạch trung tâm và không phân chia lòng đường và vỉa hè","Trước vạch sang đường dành cho người đi bộ không có đèn giao thông trong khu vực bảo vệ trẻ em","Đường ưu tiên cho người đi bộ","Nơi nằm ngoài đường đi"],"a":"2","imgs":[],"t":"문장형"},{"n":274,"b":"Trên đoạn đường một chiều có 2 làn, xe buýt đưa đón trẻ em đi học đang chạy ở làn số 1 với trạng thái  thông báo đang chở trẻ em hoặc trẻ nhỏ. Phương pháp lái xe nào là an toàn nhất?","c":["Dù làn số 2 có trống cũng không vượt lên trước.","Vượt lên và đi ở làn đường số 2.","Bấm còi yêu cầu xe phía trước tránh đường.","Quan sát xe đi ngược chiều, lấn vạch phân cách giữa đường để vượt lên trước."],"a":"1","imgs":[],"t":"문장형"},{"n":275,"b":"Giải thích nào đúng về khu vực bảo vệ trẻ em theo Pháp lệnh giao thông đường bộ?","c":["Được bố trí trước trường mẫu giáo hoặc trường trung học cơ sở.","Thị trưởng có thể cấm xe cộ lưu thông.","Trẻ em trong khu vực bảo vệ trẻ em là trẻ dưới 12 tuổi.","Hạn chế tốc độ lưu thông của xe ô tô dưới 30 km/giờ."],"a":"4","imgs":[],"t":"문장형"},{"n":276,"b":"Theo Luật Đặc biệt về xử lý tai nạn giao thông, hình phạt nào cho người lái xe với vận tốc 40km/giờ trong  khu vực bảo vệ trẻ em và làm cho trẻ bị thương?","c":["Chỉ bị xử phạt hình sự khi nạn nhân yêu cầu truy cứu trách nhiệm hình sự.","Bị truy cứu trách nhiệm hình sự bất kể ý kiến của nạn nhân.","Không bị truy cứu trách nhiệm hình sự trong trường hợp có tham gia bảo hiểm tổng hợp.","Nếu thỏa thuận được với nạn nhân thì không bị truy cứu trách nhiệm hình sự."],"a":"2","imgs":[],"t":"문장형"},{"n":277,"b":"Tiêu chuẩn nào là đúng về số người được chở trên xe ô tô có thể đăng ký làm xe buýt đưa đón học sinh theo  Pháp lệnh Giao thông đường bộ? (1 trẻ em được coi là 1 hành khách đi xe)","c":["Từ 11 chỗ trở lên","Từ 16 chỗ trở lên","Từ 17 chỗ trở lên","Từ 9 chỗ trở lên"],"a":"4","imgs":[],"t":"문장형"},{"n":278,"b":"Khi người lái xe ô tô con vượt quá tốc độ giới hạn tối đa 25 km/h tại khu vực bảo vệ trẻ em vào khoảng  08:30 thì bị phạt bao nhiêu điểm?","c":["10 điểm","15 điểm","30 điểm","60 điểm"],"a":"3","imgs":[],"t":"문장형"},{"n":279,"b":"Nếu người lái xe ô tô con vượt lên trước chiếc xe buýt đưa đón trẻ em đi học đang lưu thông trên đường có  gắn biển báo đang chở trẻ em thì bị phạt bao nhiêu điểm?","c":["10 điểm","15 điểm","30 điểm","40 điểm"],"a":"3","imgs":[],"t":"문장형"},{"n":280,"b":"Theo Pháp lệnh Giao thông đường bộ, quy định nào đúng về thời gian đào tạo dành cho đối tượng phải đào  tạo an toàn về xe buýt đưa đón trẻ em?","c":["Từ 1 giờ trở lên","Từ 3 giờ trở lên","Từ 5 giờ trở lên","Từ 6 giờ trở lên"],"a":"2","imgs":[],"t":"문장형"},{"n":281,"b":"Độ tuổi đúng của thiếu nhi và trẻ nhỏ trong Luật Giao thông đường bộ?","c":["Thiếu nhi là từ 13 tuổi trở xuống","Trẻ nhỏ là dưới 6 tuổi","Thiếu nhi là dưới 15 tuổi","Trẻ nhỏ là dưới 7 tuổi"],"a":"2","imgs":[],"t":"문장형"},{"n":282,"b":"Khi người lái xe ô tô con vi phạm tín hiệu giao thông ở khu vực bảo vệ trẻ em vào lúc khoảng 13:00 thì tiền  phạt sẽ là bao nhiêu?","c":["50.000 Won","70.000 Won","120.000 Won","150.000 Won"],"a":"3","imgs":[],"t":"문장형"},{"n":283,"b":"Phương pháp lái xe nào là đúng nhất trong trường hợp trẻ em đang chơi trên đường mà không có người  bảo hộ?","c":["Không quan tâm và đi qua bởi đây là lỗi của trẻ nhỏ.","Bấm còi để dọa trẻ và tiếp tục đi.","Phải dừng lại tạm thời.","Cẩn thận với trẻ nhỏ và đi qua thật nhanh."],"a":"3","imgs":[],"t":"문장형"},{"n":284,"b":"Khi có trẻ em đang đi trên vạch sang đường dành cho người đi bộ, nội dung nào đúng với quy định và hành  động của người điều khiển xe theo Pháp lệnh Giao thông đường bộ?","c":["Khi phát hiện trước người đi bộ đang băng qua đường tại vạch qua đường dành cho người đi bộ, phải kiểm tra an  toàn và đi chậm qua.","Đối với vạch sang đường dành cho người đi bộ trên đường thông thường không có đèn giao thông, nếu lỡ lấn qua  vạch dừng thì chỉ cần không lấn quá sâu ","Đối với vạch sang đường dành cho người đi bộ trên đường thông thường không có đèn giao thông, vì không có đèn  giao thông nên cần đi chậm qua ở phía s","Biển báo vạch sang đường dành cho người đi bộ được đặt ở hai bên đường, tại vị trí cần thiết của nơi đã vẽ vạch  sang đường, người điều khiển xe phải "],"a":"4","imgs":[],"t":"문장형"},{"n":285,"b":"Khi xe buýt đưa đón trẻ em dừng lại ở đường một chiều có 1 làn đường và bật sang đèn báo hiệu có trẻ em  đang lên xuống xe thì người lái xe đang chạy ở hướng ngược lại phải làm gì?","c":["Phải tạm thời dừng lại, kiểm tra an toàn rồi đi chậm qua.","Vừa đi chậm vừa kiểm tra an toàn rồi mới đi qua.","Cứ thế đi qua.","Bấm còi xe và đi qua."],"a":"1","imgs":[],"t":"문장형"},{"n":286,"b":"Hành động nào là đúng nhất của người lái xe \"trong trường hợp va phải trẻ em\" khi đang lái xe?","c":["Người điều khiển xe máy hai bánh hỏi trẻ em có bị thương không, nếu trẻ không nói gì thì phán đoán là không bị  thương và cho xe đi tiếp.","Người điều khiển xe ô tô dừng xe ngay, quan sát trẻ bằng mắt thường và đánh giá không có chỗ nào bị thương thì  cho xe đi tiếp.","Người điều khiển xe tải đánh giá rằng trẻ không bị thương sau khi thấy trẻ ngã rồi đứng dậy được luôn và cho xe đi  tiếp.","Người điều khiển xe đạp sau khi nhìn thấy trẻ bị ngã vụt đứng dậy và chạy thì cần báo cho đồn cảnh sát và chờ ở tại  hiện trường."],"a":"4","imgs":[],"t":"문장형"},{"n":287,"b":"Xe ô tô xảy ra va chạm với trẻ đột ngột chạy ra từ đường hẻm, nhìn bên ngoài trẻ không bị thương gì và trẻ  cũng nói là không sao. Hành động đúng của người điều khiển xe trong trường hợp này là?","c":["Đây là “tội không bị xử phạt trái ý muốn của nạn nhân”, nên người điều khiển xe có thể tiếp tục đi.","Trẻ em không bị thương nên không phải là tai nạn giao thông, vì thế có thể rời khỏi hiện trường mà không cần có  bất kỳ xử lý nào.","Bắt buộc phải thực hiện các xử lý cần thiết như liên lạc với bố mẹ v.v... rồi mới rời khỏi hiện trường.","Đây là lỗi của trẻ nên người điều khiển xe chỉ cần lấy liên lạc của trẻ rồi đi về."],"a":"3","imgs":[],"t":"문장형"},{"n":288,"b":"Theo Pháp lệnh Giao thông đường bộ, ai là người có quyền chỉ định và quản lý các khu vực bảo vệ trẻ em?","c":["Cục trưởng Cục Cảnh sát","Thị trưởng","Giám đốc Sở Cảnh sát tỉnh - thành phố","Bộ trưởng Bộ Giáo dục"],"a":"2","imgs":[],"t":"문장형"},{"n":289,"b":"Hai câu giải thích nào là đúng về khu vực bảo vệ trẻ em theo Pháp lệnh Giao thông đường bộ?","c":["Khu vực bảo vệ trẻ em là một khu vực nhất định thuộc các đường nằm trong vòng 100m xung quanh cổng chính của  trường tiểu học.","Trường hợp vi phạm dừng và đỗ xe trong khu vực bảo vệ trẻ em từ 8 giờ sáng cho đến 8 giờ tối thì sẽ bị tăng mức  tiền phạt vi phạm giao thông.","Thời gian qua đường của các đèn giao thông được lắp đặt trong khu vực bảo vệ trẻ em được căn cứ vào tốc độ đi  bộ nhanh nhất của trẻ em.","Nếu không chấp hành việc bảo vệ người đi bộ trong khu vực bảo vệ trẻ em từ 8 giờ sáng đến 8 giờ tối thì điểm phạt  sẽ tăng lên gấp 2 lần."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":290,"b":"Hai giải thích đúng về việc bảo vệ đặc biệt xe buýt đưa đón trẻ em đi học?","c":["Cách vượt lên trước xe buýt đưa đón trẻ em đi học cũng giống như cách vượt lên trước những loại xe khác.","Khi trẻ em đang lên xuống xe buýt, xe đang đến từ hướng đối diện trên đường không có vạch phân cách cũng phải  kiểm tra sự an toàn rồi đi chậm lại.","Khi trẻ em đang lên xuống xe buýt, xe đang đến từ hướng đối diện ở đường một chiều có 1 làn đường cũng phải  tạm dừng để kiểm tra tính an toàn, sau đó","Khi trẻ em đang lên xuống xe buýt, xe ô tô của làn đường đó và xe ô tô ở làn đường ngay bên cạnh làn đường đó  phải tạm dừng để kiểm tra tính an toàn,"],"a":"3, 4","imgs":[],"t":"문장형"},{"n":291,"b":"Dưới đây là mô tả về phương pháp điều khiển xe đạp theo Luật Giao thông đường bộ. Câu nào sai?","c":["Ở nơi có đường dành riêng cho xe đạp thì phải đi trên đường dành riêng cho xe đạp đó.","Ở nơi không có đường dành riêng cho xe đạp thì phải đi ở mép phải của đường.","Người điều khiển xe đạp có thể đi ở phần mép đường (ngoại trừ khu vực cấm xe đạp có biển báo an toàn).","Người điều khiển xe đạp có thể vừa đạp xe vừa băng qua đường trên lối sang đường cho người đi bộ."],"a":"4","imgs":[],"t":"문장형"},{"n":292,"b":"Theo Luật Giao thông đường bộ, cơ quan bộ ngành nào cùng đưa ra các quy định cần thiết liên quan đến  “Tiêu chuẩn và Quy trình chỉ định Khu vực bảo vệ”?","c":["Khu vực bảo vệ trẻ em được chỉ định bởi quy định bộ ngành chung của Bộ Hành chính & An toàn, Bộ Phúc lợi & Y  tế, Bộ Giao thông & Địa chính.","Khu vực bảo vệ người cao tuổi được chỉ định bởi quy định bộ ngành chung của Bộ Hành chính & An toàn, Bộ Giao  thông & Địa chính, Bộ Môi trường.","Khu vực bảo vệ người khuyết tật được chỉ định bởi quy định bộ ngành chung của Bộ Hành chính & An toàn, Bộ Phúc  lợi & Y tế, Bộ Giao thông & Địa chính.","Khu vực bảo vệ người di chuyển khó khăn trong giao thông được chỉ định bởi quy định bộ ngành chung của Bộ  Hành chính & An toàn, Bộ Môi trường, Bộ Gia"],"a":"3","imgs":[],"t":"문장형"},{"n":293,"b":"Cách lưu thông nào là đúng của người lái xe để bảo vệ đặc biệt cho xe buýt đưa đón trẻ em đi học?","c":["Trên đường một chiều có 1 làn đường, người lái xe đang đi ở hướng đối diện cũng phải tạm dừng trước khi đến gần  xe buýt đưa đón trẻ đi học để kiểm tr","Nếu xe buýt đưa đón trẻ em đi học bật đèn báo hiệu trẻ em đang lên xuống xe, bạn phải nhanh chóng đi qua bằng  làn đường không phải làn mà xe buýt đó ","Nếu không có vạch phân cách giữa đường, xe đang đi ở hướng đối diện vẫn phải tiếp tục giữ nguyên tốc độ.","Tất cả các lái xe của mọi loại xe đều có thể vượt lên trước xe buýt đưa đón trẻ em đi học, ngay cả khi xe này đang  báo hiệu có trẻ em đang ở trên xe."],"a":"1","imgs":[],"t":"문장형"},{"n":294,"b":"Hai nội dung nào dưới đây giải thích đúng về việc đăng ký xe buýt đưa đón học sinh theo Pháp lệnh Giao  thông đường bộ?","c":["Nếu muốn điều khiển xe đưa đón trẻ em, phải khai báo trước lên Cơ quan Giao thông đường bộ Hàn Quốc và xin  cấp Giấy chứng nhận khai báo.","Về nguyên tắc, xe buýt đưa đón học sinh phải là xe ô tô có khả năng chở từ 9 hành khách trở lên (1 trẻ em được coi  là 1 hành khách đi xe).","Khi đăng ký lại vì giấy đăng ký xe buýt đưa đón học sinh bị rách không thể sử dụng được, phải nộp kèm chứng nhận  đăng ký đã rách không thể sử dụng cù","Giấy đăng ký xe buýt đưa đón học sinh phải dán ở nơi dễ nhìn, phía trên bên trái cửa kính xe ô tô ở mặt trước của  xe ô tô đó."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":295,"b":"Phương pháp nào là đúng mà người lái xe buýt đưa đón học sinh cho trẻ nhỏ lên xuống xe?","c":["Trường hợp trẻ nhỏ đang lên xe phải bật đèn hiệu và đảm bảo an toàn.","Trường hợp giao thông phức tạp, tạm thời tắt đèn hiệu rồi cho trẻ lên xe.","Cho trẻ em xuống quanh xe buýt đưa đón học sinh rồi khởi hành luôn.","Ở khu vực bảo vệ trẻ em không cần thắt dây an toàn ở ghế ngồi cũng được."],"a":"1","imgs":[],"t":"문장형"},{"n":296,"b":"Giải thích nào không đúng về khu vực bảo vệ trẻ em theo Pháp lệnh Giao thông đường bộ?","c":["Tiền phạt đối với hành vi vi phạm đỗ xe cũng giống với khu vực bảo vệ người cao tuổi.","Biển báo \"đi chậm\" có thể được lắp đặt trong khu vực bảo vệ trẻ em.","Cấm đỗ và dừng xe trong khu vực bảo vệ trẻ em.","Bạn có thể bị xử phạt hình sự nếu gây tai nạn làm trẻ em bị thương, bất kể mọi hình thức thỏa thuận."],"a":"1","imgs":[],"t":"문장형"},{"n":297,"b":"Trong khu vực bảo vệ trẻ em có thiếu nhi đi cùng với trẻ nhỏ băng qua đường. Cách nào là cách lưu thông  đúng của người lái xe?","c":["Tạm dừng xe để bảo vệ thiếu nhi và trẻ nhỏ.","Vì em thiếu nhi đang vừa bảo vệ em bé vừa sang đường nên người lái xe đi chậm lại.","Vì thiếu nhi và trẻ nhỏ vẫn đang ở phía làn đường đối diện nên đi nhanh qua.","Vì bước chân của thiếu nhi và trẻ nhỏ chậm nên phải giữ khoảng cách an toàn và tránh sang bên cạnh để lưu thông."],"a":"1","imgs":[],"t":"문장형"},{"n":298,"b":"Giải thích nào đúng liên quan đến khu vực bảo vệ trẻ em theo Luật Giao thông đường bộ?","c":["Trường hợp xảy ra tai nạn giao thông do trẻ em băng qua đường không đúng nơi quy định thì lái xe được miễn toàn  bộ trách nhiệm.","Trường hợp người đi xe đạp va vào trẻ em khi đang đi xe thì chỉ tồn tại trách nhiệm dân sự vì xe đạp không phải là  xe cơ giới.","Nếu nhìn thấy trẻ em bất ngờ chạy vào làn đường thì không được đi chậm mà phải tạm dừng.","Giám đốc Sở Cảnh sát có thể chỉ định tốc độ lưu thông của xe ô tô trong phạm vi 50 km/giờ."],"a":"3","imgs":[],"t":"문장형"},{"n":299,"b":"Sau đây là giải thích và cách lưu thông ở khu vực bảo vệ trẻ em. Hai nội dung nào đúng?","c":["Trường hợp cần bảo vệ trẻ em, có thể giới hạn tốc độ lưu thông tối đa là 30 km/giờ và khi lưu thông, luôn phải đi  chậm trong tốc độ giới hạn.","Đối tượng bị giới hạn tốc độ trong khu vực bảo vệ trẻ em bao gồm xe ô tô, xe đạp điện, xe điện mặt đất và phải tạm  dừng khi có trẻ em băng qua đường.","Xung quanh trường học đặc biệt hoặc trường dành cho người nước ngoài không phải là đối tượng chỉ định khu vực  bảo vệ trẻ em, nên nếu có trẻ qua đường","Ưu tiên giới hạn tốc độ và lắp đặt biển báo an toàn báo hiệu vạch sang đường ở khu vực bảo vệ trẻ em, khi có trẻ  đang đứng ở xung quanh vạch phân các"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":300,"b":"Điều nào sau đây không thuộc hành vi vi phạm nghĩa vụ bảo vệ đặc biệt đối với xe buýt đưa đón trẻ em?  (Trường hợp đường một chiều một làn)","c":["Vượt không tạm dừng khi trẻ em hoặc trẻ sơ sinh đang xuống xe.","Vượt chậm khi tài xế của xe đi từ hướng ngược chiều đến chỗ xe buýt đưa đón trẻ em.","Vừa bấm còi vừa vượt khi trẻ em hoặc trẻ sơ sinh đang lên xuống xe an toàn.","Không vượt qua xe buýt đưa đón trẻ em đang lưu thông trên đường trong trạng thái có biển báo chở trẻ em hoặc  trẻ sơ sinh."],"a":"4","imgs":[],"t":"문장형"},{"n":301,"b":"Giải thích nào là đúng về quy định đối với thiếu nhi & trẻ nhỏ và nghĩa vụ của người lái xe buýt đưa đón trẻ  theo Pháp lệnh Giao thông đường bộ?","c":["Thiếu nhi là trẻ từ 13 tuổi trở xuống, khi có thiếu nhi lên xuống xe, bắt buộc phải kiểm tra an toàn rồi mới xuất phát.","Trước khi xuất phát, trừ trẻ nhỏ dưới 6 tuổi thì tất cả trẻ em/thiếu nhi đều phải thắt dây an toàn rồi mới được xuất  phát.","Khi có trẻ em/thiếu nhi xuống xe, phải cho trẻ xuống ở nơi trẻ yêu cầu một cách an toàn rồi mới xuất phát chạy tiếp.","Trẻ nhỏ là trẻ dưới 6 tuổi, khi có trẻ nhỏ lên xuống xe phải bật đèn hiệu."],"a":"4","imgs":[],"t":"문장형"},{"n":302,"b":"Theo Pháp lệnh Giao thông đường bộ, giải thích nào là đúng về cách bật đèn tín hiệu vàng và đỏ gắn trên xe  đưa đón học sinh khi có thiếu nhi và trẻ nhỏ lên xuống xe?","c":["Khi dừng xe, đèn báo màu đỏ phải nhấp nháy.","Khi phanh, đèn báo màu đỏ phải nhấp nháy.","Khi muốn dừng xe trên đường, đèn báo màu vàng phải nhấp nháy.","Khi đỗ xe, đèn báo màu vàng và đèn báo màu đỏ phải đồng thời nhấp nháy."],"a":"3","imgs":[],"t":"문장형"},{"n":303,"b":"Theo Pháp lệnh Giao thông đường bộ, luật nào sau đây không phải là cơ sở để chỉ định khu vực bảo vệ trẻ em?","c":["Luật Giáo dục trẻ em","Luật Giáo dục tiểu học - trung học","Pháp luật liên quan đến thành lập - vận hành trung tâm dạy thêm và giảng dạy ngoài giờ","Luật Phúc lợi trẻ em"],"a":"4","imgs":[],"t":"문장형"},{"n":304,"b":"Sau đây là giải thích về khu vực bảo vệ trẻ em. Câu nào không đúng?","c":["Tai nạn giao thông tại khu vực này có thể thuộc trường hợp ngoại lệ không áp dụng quy định đặc biệt theo Luật  xử lý đặc biệt các vụ tai nạn giao thôn","Có thể giới hạn vận tốc lưu thông của xe ô tô, v.v là tối đa 30km/giờ.","Mức phạt tiền vi phạm giao thông và trừ điểm cao gấp 3 lần đường thông thường.","Cấm đỗ và dừng xe."],"a":"3","imgs":[],"t":"문장형"},{"n":305,"b":"Trẻ em nào sau đây đang đi bộ không an toàn theo Pháp lệnh Giao thông đường bộ?","c":["Trẻ em đang đi bộ trên mép đường của lòng đường xe chạy trên đoạn đường có phân chia vỉa hè và lòng đường.","Trẻ em vừa đi bộ vừa nhìn về hướng có xe đang chạy tới từ mép đường của đường một chiều.","Trẻ em đang đi bộ theo hướng đối diện với hướng của xe đang chạy tới trên lề đường của đoạn đường không phân  chia vỉa hè và lòng đường.","Trẻ em đi bộ về phía bên phải trên vỉa hè."],"a":"1","imgs":[],"t":"문장형"},{"n":306,"b":"Dưới đây là giải thích về bảo vệ trẻ em theo Pháp lệnh Giao thông đường bộ. Câu nào không đúng?","c":["Nếu có trẻ em đang băng qua đoạn đường không có lối sang đường thì phải chạy chậm lại.","Nếu có trẻ em đang đứng trong khu vực có vạch an toàn thì phải đi chậm lại và giữ khoảng cách an toàn.","Nếu có trẻ em đang đi trên con hẻm hẹp thì phải đi chậm lại và giữ khoảng cách an toàn.","Nếu có trẻ em đang lưu thông trên lối sang đường thì phải tạm dừng ở phía trước lối đi sang đường."],"a":"1","imgs":[],"t":"문장형"},{"n":307,"b":"Giải thích nào là đúng về nghĩa vụ của người lái xe về việc bảo vệ đặc biệt xe buýt đưa đón học sinh theo  Pháp lệnh Giao thông đường bộ?","c":["Nếu đang lưu thông trên làn đường ngay bên cạnh làn đường mà xe buýt đưa đón học sinh đang đỗ và bật đèn đỏ  nhấp nháy, thì phải tạm dừng lại.","Không được vượt tất cả các xe buýt đưa đón trẻ em đi học đang lưu thông trên đường.","Nếu vi phạm nghĩa vụ này sẽ bị phạt 15 điểm trừ vào giấy phép lái xe.","Trường hợp xe buýt đưa đón trẻ em đi học đang dừng lại và nhấp nháy đèn đỏ trên đường có 1 làn đường một  chiều thì nghĩa vụ này được ngoại trừ."],"a":"1","imgs":[],"t":"문장형"},{"n":308,"b":"Theo Pháp lệnh Giao thông đường bộ, trường hợp nào mà người bảo hộ trẻ em bị phạt tiền hành chính?","c":["Người giám hộ để trẻ em đi xe đạp trên đường của xe chạy","Người giám hộ để trẻ em đi xe trượt điện Kickboard trong khu vui chơi","Người giám hộ để trẻ em đi xe trượt điện Kickboard trên đường của xe chạy","Người giám hộ để trẻ em đi xe đạp trong khu vui chơi"],"a":"3","imgs":[],"t":"문장형"},{"n":309,"b":"Điều nào sau đây là đúng về tiêu chuẩn xử phạt hình sự theo Luật về tăng nặng hình phạt đối với một số tội  phạm cụ thể khi gây thương tích cho trẻ em trong khu vực bảo vệ trẻ em trong lúc lái xe?","c":["Phạt tù từ 1 năm đến 15 năm hoặc phạt tiền từ 5 triệu Won đến 30 triệu Won","Phạt tù chung thân hoặc phạt tù từ 5 năm trở lên","Phạt tù lên đến 2 năm hoặc phạt tiền lên đến 5 triệu Won","Phạt tù lên đến 5 năm hoặc phạt tiền lên đến 20 triệu Won"],"a":"1","imgs":[],"t":"문장형"},{"n":310,"b":"Giải thích nào không đúng về nghĩa vụ của người điều khiển xe buýt đưa đón học sinh theo Pháp lệnh Giao  thông đường bộ?","c":["Khi chở trẻ em trên xe buýt đưa đón học sinh phải chỉ định người giám hộ là người lớn.","Sau khi kết thúc chuyến xe buýt đưa đón học sinh, phải kiểm tra để xác nhận rằng tất cả trẻ em đã xuống xe.","Phải lập và lưu hồ sơ kiểm tra việc thắt dây an toàn và xác nhận người giám
