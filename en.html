ohibited on the edge of a road marked with yellow broken lines."],"a":"2","imgs":[],"t":"문장형"},{"n":345,"b":"According to the Road Traffic Act, which of the following is NOT true about idling and parking restrictions for a  personal mobility device?","c":["An area located within 10 m from the edge of an intersection or an area located within 5 m from the corner of a road","An area located within 10 m from a crosswalk or an area located within 10 m from the edge of a railway crossing","An area located within 10 m from any side of a safety zone or an area located within 10 m from bus stop columns","An area located within 5 m from a place where emergency firefighting equipment is installed or an area located within  5 m from a fire-extinguishing w"],"a":"1","imgs":[],"t":"문장형"},{"n":346,"b":"What is the administrative fine for parking a non-EV in the charging area of an eco-friendly vehicle?","c":["KRW 30,000","KRW 50,000","KRW 70,000","KRW 100,000"],"a":"4","imgs":[],"t":"문장형"},{"n":347,"b":"Which of the following correctly describes a Dutch Reach (method of opening the door) when exiting a  vehicle?","c":["When exiting the vehicle, grab the handle with the hand farthest from the window, check if there is oncoming traffic  from the rear, and open the door","When exiting the vehicle, grab the handle with the hand closest to the window, check if there is oncoming traffic from  the front, and open the door.","The Dutch Reach prevents the driver from moving the vehicle with a door open.","The Dutch Reach is a traffic safety campaign started in the UK."],"a":"1","imgs":[],"t":"문장형"},{"n":348,"b":"How long can an EV or a plug-in hybrid vehicle park at a charging station after commencing charging?","c":["1 hour","2 hours","3 hours","4 hours"],"a":"1","imgs":[],"t":"문장형"},{"n":349,"b":"Which of the following statements about parking and stopping on a slope under the Road Traffic Act is incorrect?","c":["When parking, operate the parking brake and use wheel chocks or blocks to prevent the vehicle from slipping.","When stopping, if the driver remains seated and directly operates the brake, no additional anti-slip measures are required.","When parking, operate the parking brake and turn the steering wheel toward the road.","The parking brake alone is insufficient when stopping and leaving the driver’s seat temporarily; rubber or plastic must be  used to prevent the vehicl"],"a":"3","imgs":[],"t":"문장형"},{"n":350,"b":"Which one of the following is the correct amount of administrative fine imposed on those who stack objects on  or obstruct the entry to parking spaces reserved for persons with disabilities?","c":["KRW 40,000","KRW 200,000","KRW 500,000","KRW 1,000,000"],"a":"3","imgs":[],"t":"문장형"},{"n":351,"b":"Which of the following are TWO statements correctly describe how a driver should behave?","c":["The passenger is responsible for his/her safety when exiting the vehicle.","Even when parking temporarily to buy something, the driver must turn off the engine.","Before exiting a vehicle, the driver must turn off the engine and check that it is safe.","When parking in an area other than a parking lot, the parking brake must be left released so that the vehicle can be  moved if necessary."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":352,"b":"Which of the following are the TWO safest methods of parking on a steeply sloped road?","c":["Engage the parking brake and put the vehicle into reverse gear, regardless of the direction of the slope.","Engage the parking brake and turn the steering wheel toward the roadside (meaning toward the side closest to the vehicle).","Engage the parking brake and place a wheel stopper or other device that can prevent the vehicle from slipping in the  downhill direction.","For manual transmission vehicles, engage the parking brake and leave the gear in neutral."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":353,"b":"Which of the following are TWO correct statements about stopping/parking?","c":["When stopping on a road with a separate sidewalk, park at the far right edge of the roadway.","There is no need to follow the stopping/parking instructions shown on safety signs.","In the case of manual vehicles, you may leave the vehicle in 1st or reverse gear without using the parking brake when  parking on level ground.","On sloped roads, engage the parking brake and place a wheel stopper."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":354,"b":"Which TWO constitute parking?","c":["A vehicle remaining stationary after breaking down","A temporary stop after recognizing a safety hazard","A stopped vehicle that is left unattended by the driver so that it cannot be driven immediately, even if it is for less than  five minutes","Stopping briefly near a subway station to drop off a friend"],"a":"1, 3","imgs":[],"t":"문장형"},{"n":355,"b":"Which TWO constitute stopping?","c":["A taxi stopping at a taxi stand for the driver to go to the restroom","A vehicle that is left unattended by its driver who is away to pick up a load to transport","The vehicle stops while waiting for a traffic signal.","The driver stops the car to ask a passerby for directions."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":356,"b":"According to the Road Traffic Act, which of the following are TWO locations that allow a motor vehicle to make  a stop or park?","c":["Within 50 m from the main entrance in a school zone","Within 10 m from a crosswalk","Within a distance of 5 m from where emergency fire-extinguishing equipment is installed","Within 10 m from a safety zone in all four directions"],"a":"3, 4","imgs":[],"t":"문장형"},{"n":357,"b":"According to the Road Traffic Act, which of the following are TWO locations that allow a motor vehicle to park?","c":["5 m from the corner of a road","At a distance of 7 m or more from where a fire-extinguishing water facility is installed","At a distance of 7 m or more from where emergency fire-extinguishing equipment is installed","5 m from a safety zone"],"a":"2, 3","imgs":[],"t":"문장형"},{"n":358,"b":"At an intersection with no traffic control, what is the safest method of turning left?","c":["Drive slowly and turn left with care even if there are other vehicles that have entered the intersection ahead of you.","Yield to cars entering from wider roads.","Yield to cars passing through straight across, but take the right of way over cars trying to turn right.","Go slowly along the centerline of the road beforehand and turn left using the outside center of the intersection."],"a":"2","imgs":[],"t":"문장형"},{"n":359,"b":"Which of the following INCORRECTLY describes a safe method of using a roundabout?","c":["Slow down before entering a roundabout.","Stop temporarily at the yield line and enter slowly.","A vehicle entering the roundabout has the right of way, so the vehicle making a turn in the roundabout must yield.","Turn counterclockwise."],"a":"3","imgs":[],"t":"문장형"},{"n":360,"b":"A vehicle that has entered an intersection without traffic lights ahead of you is turning left. What should you do?","c":["Proceed with caution if you are going to pass straight through.","If you are going to turn right, do so at low speed.","If you are going to go straight through or turn right, yield to vehicles turning left.","If you are driving on a narrow road, pass through the intersection at low speed."],"a":"3","imgs":[],"t":"문장형"},{"n":361,"b":"What is the most appropriate method of turning left at an intersection under the Road Traffic Act?","c":["Slow down along the centerline and turn left through the inner side of the intersection’s center.","Left turns are allowed at a red light at a signalized intersection if there is an “unprotected left turn” sign.","At a signalized intersection, a left-turning vehicle has priority over a vehicle traveling straight ahead.","On a one-way road with three lanes, turning left from the right lane is allowed if the traffic is light."],"a":"1","imgs":[],"t":"문장형"},{"n":362,"b":"Which of the following is the proper method of passing through an intersection without traffic control?","c":["Drive slowly when it is impossible to check the sides.","A vehicle turning left has the right of way over a vehicle traveling straight.","A vehicle turning right has the right of way over a vehicle traveling straight.","You should drive slowly when the intersection is wider than the road you are on."],"a":"4","imgs":[],"t":"문장형"},{"n":363,"b":"In which of the following locations is the installation of a roundabout recommended for ensuring smooth traffic  flow and safety on the road?","c":["Locations where traffic volumes are not very high, but there are many intersection accidents","Locations where there are one or more access roads at the intersection with three or more lanes in one direction","Locations where the traffic volume at the roundabout exceeds its capacity","Locations where the presence of a roundabout in a segment necessary for signal coordination would reduce the  effectiveness of coordination"],"a":"1","imgs":[],"t":"문장형"},{"n":364,"b":"Which of the following statements correctly describes a roundabout?","c":["Roundabouts have more conflicting points than signalized intersections.","When entering, you must wait at the yield line until there is enough space within the roundabout.","Traffic lights are installed at a roundabout to guide vehicles and facilitate traffic flow through the intersection.","A vehicle that has already entered a roundabout must yield to an entering vehicle."],"a":"2","imgs":[],"t":"문장형"},{"n":365,"b":"What is the term used to refer to the road surface markings of white broken lines designed to guide left turns  at intersections?","c":["Turn guidelines","Extension lines","Instruction lines","Regulation lines"],"a":"1","imgs":[],"t":"문장형"},{"n":366,"b":"Which of the following are the TWO correct methods of turning left safely at an intersection?","c":["Watch out for stopping vehicles from the opposite direction.","Watch out for right-turning vehicles from the opposite direction.","Watch out for right-turning vehicles from the same direction.","Watch out for left-turning vehicles in the lane to your side."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":367,"b":"Which of the following are the TWO safest methods of turning left/right at an intersection?","c":["To turn right, take the rightmost lane of the road and slowly turn right.","To turn left on a congested road, disregard the turn guidelines on the left and drive quickly.","To turn left, drive slowly along the centerline and turn left along the inner part of the intersection.","To turn left at an intersection marked with turn guidelines, turn with the left tires passing through the inside of the turn  guidelines."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":368,"b":"Which of the following is a correct guideline with regard to passing through a roundabout?","c":["A car inside the roundabout has the right of way.","A car about to enter the roundabout has the right of way.","A car exiting the roundabout has the right of way.","There are no set rules on who has the right of way."],"a":"1","imgs":[],"t":"문장형"},{"n":369,"b":"Which of the following is NOT prohibited at a roundabout?","c":["Stopping","Parking","Driving slowly and stopping temporarily","Overtaking"],"a":"3","imgs":[],"t":"문장형"},{"n":370,"b":"Which of the following vehicles are granted the right of way at a roundabout?","c":["Vehicles moving on the section of the road within the roundabout","Vehicles trying to turn left before entering the roundabout","Vehicles trying to turn right before entering the roundabout","Vehicles trying to turn left or right before entering the roundabout"],"a":"1","imgs":[],"t":"문장형"},{"n":371,"b":"Which of the following is an INCORRECT guideline on how to use roundabouts?","c":["Vehicles must approach the roundabout slowly.","A car inside the roundabout has the right of way.","Vehicles may continually enter the roundabout as there are no signals.","Turn clockwise in the roundabout."],"a":"4","imgs":[],"t":"문장형"},{"n":372,"b":"Which of the following are the most appropriate ways of navigating a roundabout? (Select TWO)","c":["Before entering a roundabout, come to a complete stop and enter when there are no approaching vehicles from the left.","At a roundabout, the traffic circulates clockwise.","There is no need to use turn signals when entering or exiting a roundabout.","Even after entering a roundabout, you should continue to be cautious of other vehicles and proceed with care."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":373,"b":"Which of the following is a place where you should stop temporarily while driving?","c":["Near a curve on a road","Descent on a steep slope","Near the top of a slope","At an intersection with no traffic control and heavy traffic"],"a":"4","imgs":[],"t":"문장형"},{"n":374,"b":"According to the Road Traffic Act, which of the following is a place where you should stop temporarily?","c":["An intersection without a traffic control officer where traffic to the left and right cannot be checked","An intersection where the lights have turned green","A busy bridge/tunnel","In the vicinity of a curve or the highest point on a slope"],"a":"1","imgs":[],"t":"문장형"},{"n":375,"b":"Which of the following is a place where you should stop temporarily pursuant to the Road Traffic Act?","c":["Inside a tunnel and on a bridge","At a busy intersection with no traffic lights","On a descending section of a steep hill","A curved section of a road"],"a":"2","imgs":[],"t":"문장형"},{"n":376,"b":"Which of the following is NOT correct regarding the variable speed limit section?","c":["It is an active system that changes the regulated speed in accordance with the situation.","It uses an electric sign that can display different speeds by changing the numbers.","When the maximum speed is set with a variable speed limit sign, it must be followed.","When the maximum speed determined by the variable speed limit sign and the maximum speed of the safety sign  show different values, the maximum speed "],"a":"4","imgs":[],"t":"문장형"},{"n":377,"b":"According to the Road Traffic Act, the driver of (   ) must (   ) in front of a railway crossing and then pass  through after confirming that it is safe to cross. Which of the following best fills the","c":["any vehicle - slow down","any motor vehicle or heavy equipment - slow down","any vehicle or tank - stop","any vehicle or tram - stop"],"a":"4","imgs":[],"t":"문장형"},{"n":378,"b":"Which of the following is the safest method of driving at an expressway interchange?","c":["As interchanges tend to be congested, apply sudden brakes to discourage vehicles behind you from following closely  and prevent potential accidents ac","As drivers tend to become less aware of speed at an interchange, stop momentarily before continuing.","If the desired interchange has already been passed, use the next interchange.","Accelerate quickly to enter an interchange."],"a":"3","imgs":[],"t":"문장형"},{"n":379,"b":"Which of the following is the most correct action to take when the driver of the vehicle ahead stretches his/her  arm horizontally out of the left side of the vehicle?","c":["Slow down as the front vehicle is expected to turn right.","Switch to an upper lane as the front vehicle is expected to cross.","Overtake the front vehicle as it is expected to make a U-turn.","Slow down as the front vehicle is expected to change lanes."],"a":"4","imgs":[],"t":"문장형"},{"n":380,"b":"Which of the following hand signals is used to indicate your intent to turn right?","c":["Extend your left arm out to the left and bend your forearm vertically upward.","Extend your left arm out to the left, parallel to the road.","Extend your right arm out to the right and hold it parallel to the road, and wave the extended arm forwards and  backwards.","Stick your left arm out of the vehicle and bend your forearm downward at an angle of 45°."],"a":"1","imgs":[],"t":"문장형"},{"n":381,"b":"As a vehicle is about to enter an intersection according to the traffic signal, a police officer gives a hand signal  to stop. In this scenario, which of the following is the safest way to drive?","c":["Stop just before the stop line.","Decelerate suddenly to slow down.","Proceed according to the signal from the traffic light.","Enter the intersection slowly."],"a":"1","imgs":[],"t":"문장형"},{"n":382,"b":"Which of the following is true about overtaking on a road with a combination of dotted yellow and solid yellow  centerlines?","c":["Overtaking is not allowed from either the yellow broken line or the yellow solid line.","Overtaking is allowed from the side of the yellow broken line.","Overtaking is allowed from the sides of both yellow broken line and yellow solid line if it is clear that it is safe.","Overtaking is allowed from the side of the yellow solid line."],"a":"2","imgs":[],"t":"문장형"},{"n":383,"b":"Which of the following is the correct method of driving through a railway crossing?","c":["Drive through if there are no trains coming.","Come to a stop, check that it is safe, and drive through.","Drive through at a speed above the speed limit.","Drive at an increased speed if the crossing gate is about to close."],"a":"2","imgs":[],"t":"문장형"},{"n":384,"b":"Which of the following is the correct method of turning left?","c":["Turn on the left turn signal at least 30m (100m on expressways) away from where you want to turn left.","Turn on the left turn signal at least 10m (100m on expressways) away from where you want to turn left.","Turn on the left turn signal at least 20m (80m on expressways) away from where you want to turn left.","Turn on the left turn signal when you reach the location where you want to turn left."],"a":"1","imgs":[],"t":"문장형"},{"n":385,"b":"According to the Road Traffic Act, which of the following is NOT a correct statement regarding the speed of  motor vehicles, etc.?","c":["Separate legal speed limits are applied to various roads depending on whether it is a general road, an automobile road,  or an expressway, and on the ","There are no minimum speed limits on regular roads.","You must drive at a reduced speed in poor weather conditions.","If the speed limit set by the variable speed limit sign and the speed limit set by a speed limit safety sign are different,  the latter must be follow"],"a":"4","imgs":[],"t":"문장형"},{"n":386,"b":"According to the Road Traffic Act, which of the following is NOT a correct statement regarding the speed of  motor vehicles, etc.?","c":["Speed limits are set because the likelihood of traffic accidents increases at higher vehicle speeds.","Minimum speed limits are set to maintain the efficiency of automobile roads and expressways.","Provisional speed limits can be set by the commissioner general of the Korean National Police Agency, or the  commissioner of the City/Do (Province) p","For the setting of speed limits on expressways, the commissioner of the City/Do (Province) police agency has  jurisdiction; for all other roads, the c"],"a":"4","imgs":[],"t":"문장형"},{"n":387,"b":"Which TWO constitute a violation of a traffic signal?","c":["Stopping over the stop line at a red light","Entering an intersection when the lights have already turned yellow","When there is a yellow flashing light, you must drive carefully while being mindful of other traffic markings or safety  signs","Stopping temporarily in front of the stop line when the lights are blinking red, before driving through carefully"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":388,"b":"Which of the following are the correct methods of turning right at an intersection on a road with three lanes in  one direction? (Select TWO)","c":["When turning right, you should turn on the turning signal at the intersection just before proceeding to indicate your  intended direction of travel.","Even if the cross light at the right-side crosswalk is green, you can proceed if there are no pedestrians.","If the right-turn signal is red, you cannot proceed even if there are no pedestrians.","It is safer to turn right from the second lane on a road with three lanes in one direction."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":389,"b":"According to the Motor Vehicle Management Act, which of the following are true about the criteria for a bus  and the precautions when turning left behind a bus? (Select TWO)","c":["A bus refers to a vehicle with seating capacity of 36 or more persons. When driving behind a bus, you must drive slowly,  keeping a safe distance from","A mini-bus refers to a vehicle with seating capacity of 16 ~ 35 persons. When you are driving behind a mini-bus and the  mini-bus driver turns on a tu","A van refers to a vehicle with seating capacity of 15 or fewer persons. Since vans are more prone to overturning due to their  high center of gravity ","A light van refers to a vehicle with engine displacement below 1,200 cc. Although light vans have the same center of gravity  as passenger vehicles, y"],"a":"1, 3","imgs":[],"t":"문장형"},{"n":390,"b":"Which TWO correctly describe how to change lanes?","c":["Change lanes while maintaining speed if the car behind you in the lane you are about to enter is far back enough.","Slow down when changing lanes if the car behind you in the lane you are about to enter is far back enough.","Let the car behind you in the lane you are about to enter pass if it is approaching.","Change lanes quickly if the car behind you in the lane you are about to enter is approaching."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":391,"b":"Which of the following are TWO correct statements about the lines that separate lanes?","c":["Where a solid line and a broken line run parallel, you cannot change from the lane near the solid-line to the lane near  the broken-line.","Where a solid line and a broken line run parallel, you can change from the lane near the solid line to the lane near the  broken line.","Where a solid line and a broken line run parallel, you cannot change from the lane near the broken line to the lane  near the solid line.","Where a solid line and a broken line run parallel, you can change from the lane near the broken line to the lane near  the solid line."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":392,"b":"According to the Road Traffic Act, what does a flashing red light indicate?","c":["Vehicles and horses must drive slowly while looking out for traffic.","Vehicles and horses may proceed while looking out for traffic.","Vehicles and horses may reverse while looking out for safety signs.","Vehicles and horses must temporarily stop right before the stop line and then proceed while looking out for traffic."],"a":"4","imgs":[],"t":"문장형"},{"n":393,"b":"Which of the following instructions about an intersection with an unprotected left-turn sign is correct?","c":["You can turn left regardless of the signal as long as you look out for traffic.","You can turn left at a red light while looking out for traffic.","You can turn left at a green light while looking out for traffic.","You can turn left at a yellow light while looking out for traffic."],"a":"3","imgs":[],"t":"문장형"},{"n":394,"b":"According to the Road Traffic Act, which of the following is a correct statement regarding the speed of motor  vehicles?","c":["The minimum speed limit on expressways is 50 km/h.","Automobile roads have a maximum speed limit, but no minimum speed limit.","There are maximum and minimum speed limits on normal roads.","The maximum speed limit on expressways with more than two lanes in one direction is the same for all types of  vehicles."],"a":"1","imgs":[],"t":"문장형"},{"n":395,"b":"Which of the following statements regarding overtaking is correct?","c":["You can overtake a vehicle that is in the process of overtaking another vehicle.","You must overtake on the right when in a tunnel.","Overtaking on a road with one lane in one direction is permitted only in an area with solid yellow lines.","Overtaking is prohibited in intersections."],"a":"4","imgs":[],"t":"문장형"},{"n":396,"b":"Which of the following statements regarding the centerline on a road is correct?","c":["Overtaking is allowed if the center is marked with a yellow solid line.","The centerline of a reversible lane is the leftmost yellow broken line in the direction of traffic indicated by traffic signals.","A bus stopped on a provincial road with one lane in one direction can be overtaken by crossing the yellow solid  centerline.","A centerline can be installed on roads at least 4.75 m wide."],"a":"2","imgs":[],"t":"문장형"},{"n":397,"b":"According to the Road Traffic Act, which of the following vehicles may drive along the second lane ofan  expressway with three lanes in one direction?","c":["Trucks","Special vehicles","Vehicles fitted with construction equipment","Small and mid-sized passenger vehicles"],"a":"4","imgs":[],"t":"문장형"},{"n":398,"b":"Under the Road Traffic Act, on an expressway with two lanes in one direction, if the first lane must inevitably be  used with speed limit set to less than (    ) km/h due to an increase in traffic vol","c":["80","90","100","110"],"a":"1","imgs":[],"t":"문장형"},{"n":399,"b":"Which of the following is true about using an expressway shoulder?","c":["If drowsy while driving, you can pull over on the shoulder to take a rest.","You can park on the shoulder to appreciate a good sunrise.","You can drive on the shoulder when the freeway is congested.","The traffic penalty for driving on the shoulder without good cause is a fine of KRW 60,000."],"a":"4","imgs":[],"t":"문장형"},{"n":400,"b":"According to the Road Traffic Act, on an expressway with five lanes in one direction, up to which lane is  considered the left lane based on the standard of traffic flow in each lane? (Assuming smooth","c":["Lanes 1 to 2","Lanes 2 to 3","Lanes 1 to 3","The second lane only"],"a":"2","imgs":[],"t":"문장형"},{"n":401,"b":"According to the Road Traffic Act, which of the following is NOT true about a designated lane on an expressway?  (Assuming smooth traffic flow and no exclusive bus lanes)","c":["Lane 1 of an expressway with three lanes in one direction can be used by passenger vehicles, light vans, vans, mini-buses,  and buses to overtake othe","You can use the lane on the left of the designated lane to overtake another vehicle.","All vehicles can use the lane on the left of their respective designated lanes.","The penalty for not using the designated lane for drivers of passenger vehicles is 10 points."],"a":"3","imgs":[],"t":"문장형"},{"n":402,"b":"Under the Road Traffic Act, which of the following statements regarding the method of overtaking by passenger  cars on a smoothly flowing three-lane one-way highway is INCORRECT? (No exclusive bus lan","c":["To overtake, a passenger car switches to Lane 1 and continues in Lane 1.","A large passenger vehicle in Lane 3 switches to Lane 2 in order to overtake.","A small van driving in the second lane should move into Lane 1 in order to overtake.","A 5-ton truck uses Lane 2 to overtake."],"a":"1","imgs":[],"t":"문장형"},{"n":403,"b":"Which of the following is an INCORRECT guideline for the use of the right traffic lanes on roadways?","c":["All vehicles may use the right lane of the designated lane.","A passenger car overtaking another vehicle shall use the lane to the immediate right of the lane designated by traffic  standards.","On a general road with four lanes in one direction, a passenger car may drive in any of the lanes.","On an expressway with four lanes in one direction, a large truck is to use the lane on the right."],"a":"2","imgs":[],"t":"문장형"},{"n":404,"b":"Which among the following is permitted to use the exclusive bus lane on a general roadway?","c":["A 12-seater passenger vehicle carrying 6 passengers","A passenger vehicle for domestic tourists that is transporting 25 tourists","A 12-seater commuter passenger vehicle carrying employees on designated routes","A taxi temporarily using the lane so that passengers can board/leave the taxi"],"a":"4","imgs":[],"t":"문장형"},{"n":405,"b":"According to the Road Traffic Act, a passenger car with 9 seats can take the exclusive bus lane on the  expressway if (    ) or more people are on the vehicle. Which of the following is correct?","c":["3","4","5","6"],"a":"4","imgs":[],"t":"문장형"},{"n":406,"b":"What is the standard for driving on an expressway with three lanes in one direction? (Assuming smooth traffic  flow and no exclusive bus lanes)","c":["Passenger cars are to use Lane 1 so they must use only Lane 1.","A small passenger vehicle whose designated lane is Lane 2 should use Lane 1 when overtaking.","Large vans must use the first lane.","A truck with maximum load weight of 1.5 tons or less must drive in Lane 1."],"a":"2","imgs":[],"t":"문장형"},{"n":407,"b":"A passenger vehicle is driving in Lane 2 on an expressway with three lanes in one direction according to the  Road Traffic Act. What is the correct lane for overtaking? (Assuming smooth traffic flow a","c":["The first lane","The second lane","The third lane","Any of the above"],"a":"1","imgs":[],"t":"문장형"},{"n":408,"b":"Which of the following is NOT correct regarding overtaking according to the Road Traffic Act?","c":["To overtake another vehicle, you must pass on the left lane of the vehicle in front.","If the centerline is a yellow broken line, it is possible to overtake when there is no vehicle in the opposite direction.","In case of a reversible lane, overtaking is not allowed on the leftmost yellow broken line in the direction indicated by a  traffic light.","On an expressway with four lanes in one direction, vehicles driving on the right lane can move up to the first lane."],"a":"4","imgs":[],"t":"문장형"},{"n":409,"b":"Below are explanations of the standard for driving according to the lane under the Road Traffic Act. Which of  the following is NOT true? (Expressways with smooth traffic flow and no exclusive bus lan","c":["When proceeding at a low speed, the driver may use the lane to the right of the current lane in which he/she has been  driving.","The first lane of an expressway with two lanes in one direction may be used by all motor vehicles to overtake.","On a one-way traffic road, the rightmost lane is considered the first lane.","The right lane of an expressway with three lanes in one direction is to be used by a truck to drive."],"a":"3","imgs":[],"t":"문장형"},{"n":410,"b":"According to the Road Traffic Act, which of the following is true about the standard for driving on an  expressway with three lanes in one direction? (Assuming smooth traffic flow and no exclusive bus","c":["The first lane is the lane for overtaking a passenger car driving on the second lane.","The first lane is the driving lane for a van.","The roadside is the driving lane for emergency vehicles and tow vehicles.","When operating an exclusive bus lane, the first lane is the driving lane for trucks."],"a":"1","imgs":[],"t":"문장형"},{"n":411,"b":"According to the definition provided by the Road Traffic Act and its Enforcement Decree, which of the following  is NOT a type of exclusive lane?","c":["An exclusive lane for buses","An exclusive lane for high-occupancy vehicles","An exclusive lane for motor vehicles","An exclusive lane for bicycles"],"a":"3","imgs":[],"t":"문장형"},{"n":412,"b":"Which of the following describes aquaplaning most appropriately?","c":["You must change tires with wider widths to reduce the risks associated with aquaplaning.","Aquaplaning is more common in snow than rain. You must reduce speed.","Tires with worn-down treads will experience less aquaplaning due to reduced traction.","Underinflation can cause the tires to aquaplane more, especially at higher speeds."],"a":"4","imgs":[],"t":"문장형"},{"n":413,"b":"Which of the following is the safe method of driving when a vehicle loses control on a frozen road?","c":["Steer into the skid.","In the case of a car with manual transmission, shift to high gear.","Operate the steering wheel in the opposite direction of the skid.","Stop the car using the parking brake."],"a":"1","imgs":[],"t":"문장형"},{"n":414,"b":"Which of the following is the safest method of driving a vehicle on a foggy road?","c":["On a curved road or at an intersection, honk to warn other vehicles to make way and proceed quickly.","In dense fog, keep the high-beam headlights on to secure visibility.","On a foggy road, switch on the fog light only.","When visibility is secured to some extent, drive slowly while monitoring the guard rail, centerline, and traffic lane to stay  aware of the vehicle's "],"a":"4","imgs":[],"t":"문장형"},{"n":415,"b":"Which of the following is the safest method of stopping on a snowy/icy road?","c":["Apply the brake hard.","Stop quickly using the foot brake and the parking brake at the same time.","Use the engine brake only to slow down until the car comes to a complete stop.","After slowing down with the engine brake, step lightly on the brake pedal several times."],"a":"4","imgs":[],"t":"문장형"},{"n":416,"b":"Which of the following is the most desirable attitude for a driver who drives through an underpass on a road in  heavy rain?","c":["All roads are well-drained, so there are no hazards.","Respond to hazards while listening to disaster information such as disaster broadcasts and checking information boards.","Take a rest by stopping at the roadside of the underpass until the heavy rain sides.","Drive faster than the designated speed because high speed is required at that moment."],"a":"2","imgs":[],"t":"문장형"},{"n":417,"b":"Which of the following is the most correct explanation of a frozen/icy road in winter?","c":["It occurs mainly in tunnels, and the road surface becomes an icy road as the fog particles freeze.","Black ice often occurs on bridges, at tunnel entrances, and on shady roads.","Black ice occurs when snow contaminated with vehicle fumes accumulates on the road surface.","When passing through an icy road, reduce speed as much as possible by not operating the steering wheel and braking  suddenly."],"a":"2","imgs":[],"t":"문장형"},{"n":418,"b":"Which of the following is the most inappropriate way to respond when your car has been flooded during  localized heavy rainfall?","c":["Try to escape by opening the door on the opposite side of the rushing currents.","If the car door won't open, use a sharp object (such as headrest, seatbelt lock, etc.) to strike the edge of the window to  break it and attempt to es","If you cannot break the window, do not panic; call 911 and quickly open the door to escape when the water levels inside  and outside of the vehicle be","Once you have escaped, take shelter in the lowest ground or hide under the vehicle."],"a":"4","imgs":[],"t":"문장형"},{"n":419,"b":"Which of the following is the most appropriate action to take when the brakes are not working on a downhill  road?","c":["Turn the ignition off at once.","Jump out of the car after shifting to low gear.","Reduce speed by zigzagging.","Run the car into a guard rail or a wall after reducing speed by shifting to low gear."],"a":"4","imgs":[],"t":"문장형"},{"n":420,"b":"If you witness a fire caused by a traffic accident while driving inside a tunnel, which of the following is the most  appropriate method of responding?","c":["It is safe to stop your vehicle even if traffic is still flowing.","If traffic is at a standstill, stop the vehicle and wait inside until the fire is extinguished.","If traffic is at a standstill, stop the vehicle and leave the scene with your car keys.","If there is a lot of smoke after disembarking, lower your body as much as possible and move in the opposite direction  of the smoke following the emer"],"a":"4","imgs":[],"t":"문장형"},{"n":421,"b":"Which of the following is the correct explanation when driving on a sharp curve?","c":["Drive through the curve at the same speed as that before entering the curve.","After entering a curve, it is better to increase the change gear ratio to reduce the centrifugal force.","A rear-wheel drive vehicle may experience understeer on a curved road.","In order to reduce oversteer on a curved road, the steering wheel should be turned slightly in the opposite direction of  the steering direction."],"a":"4","imgs":[],"t":"문장형"},{"n":422,"b":"What do you call a problem that occurs when the brakes do not work due to bubbles that form in the brake  fluid overheated by excessive braking?","c":["A standing wave","A vapor lock","A road holding","An understeering"],"a":"2","imgs":[],"t":"문장형"},{"n":423,"b":"Which of the following is NOT a proper way of driving in fog?","c":["Honk when driving around a curve or on a hill.","If the visibility in fog is less than 70 m, reduce speed to less than half of the speed limit.","Try to maximize visibility by turning on fog lamps and high-beam headlights.","Even in case of vehicle failure or minor accident, move the vehicle to the side of the road."],"a":"3","imgs":[],"t":"문장형"},{"n":424,"b":"Which of the following is not a correct explanation of black ice in winter?","c":["It is a phenomenon wherein a thin ice film forms like a coating on the road surface.","It is a phenomenon wherein pollutants in the air are mixed with snow and moisture on the asphalt surface, absorbed,  and then frozen into black ice.","It occurs mainly in places with low temperatures during the winter season, such as on bridges, tunnel entrances, shady  roads, and in the shade of mou","It refers to the phenomenon wherein the snow melts and seeps into the sunny road, and the black color of the road is  reflected by sunlight and sparkl"],"a":"4","imgs":[],"t":"문장형"},{"n":425,"b":"Which of the following is NOT true about icy roads during winter months?","c":["Icy roads are more common on concrete roads than on asphalt.","Ice melts slower on asphalt roads than on concrete.","The friction coefficient of an asphalt surface increases to 1.6 when dry.","Under the same conditions, the road friction coefficients of frozen concrete and asphalt surfaces are equal."],"a":"3","imgs":[],"t":"문장형"},{"n":426,"b":"Which of the following is the least appropriate measure for a driver to take when an earthquake occurs?","c":["Increase your vehicle's speed and quickly pass through the area.","If it is impossible to move using a vehicle, park the vehicle to the side and take shelter.","Be prepared to move the parked vehicle later by keeping the key in the ignition, and take shelter.","Turn on the radio to listen to the disaster broadcast."],"a":"1","imgs":[],"t":"문장형"},{"n":427,"b":"Which of the following are TWO descriptions of the correct method of driving in strong winds or storms?","c":["Firmly hold the steering wheel with both hands and stay in your current lane.","Ignore the gusting winds and speed up.","Park near a sign, the traffic lights, or a roadside tree.","Be particularly careful in areas vulnerable to strong winds, such as mountainous areas, bridges, and tunnel exits."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":428,"b":"Which of the following are the TWO most appropriate explanations regarding driving on a gravel road?","c":["Hold the steering wheel as loosely as possible to minimize impact on the arm.","Increase speed while driving to ensure that the wheels are in contact with the road surface as much as possible.","Slow down to ensure that gravel is not projected onto pedestrians or other vehicles or horses.","Slightly lower tire pressure is better for driving than the appropriate level of air pressure."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":429,"b":"Two vehicles are driving in the rain, and the rear vehicle sees the front vehicle stopping and applies the brakes.  Which of the following are NOT correct? (Select TWO)","c":["Hard braking can cause the vehicle to nose dive due to increased friction between the road surface and tires.","Free running distance is increased due to reduced friction of the road surface.","Aquaplaning and partial braking may occur simultaneously, causing the vehicle to slide out of the lane.","The higher the tire wear rate, the shorter the braking distance."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":430,"b":"A vehicle is approaching near the top of an uphill. Which of the following are TWO are safe ways of driving?","c":["Increase engine RPM (revolutions per minute) to reduce fuel consumption.","At the top of the uphill, be sure to stop temporarily before starting.","Maintain a safe distance from the front vehicle.","Drive in a lower gear than a higher gear."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":431,"b":"When you drive downhill, which of the following are the TWO safest methods to drive?","c":["Only use the foot brake because shifting gears is not necessary.","If an emergency situation occurs, use the parking brake immediately.","Use the same gear you used when driving up the slope.","Use both the foot brake and engine brake properly."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":432,"b":"Which of the following statements is the least appropriate regarding safe driving under icy road conditions in  winter?","c":["When driving on roads in winter, you should check the weather information and traffic conditions in advance before  driving.","Extra caution should be exercised when driving through tunnels and bridge sections that are vulnerable to icing.","If de-icing agents have been applied before and after snowfall near tunnels and bridges, it is possible to drive at the  usual speed limit safely.","Some city or provincial police agencies have regulations requiring the use of winter equipment when driving on snowy  or icy roads."],"a":"3","imgs":[],"t":"문장형"},{"n":433,"b":"Which of the following statements about potholes is correct?","c":["Potholes generally form during torrential rain.","Driving faster will prevent tire damage from potholes.","Sudden braking by larger vehicles is likely to occur near crosswalks when the temperature of the road surface increases.","Potholes are readily visible when the road is dry and you can just drive over them."],"a":"1","imgs":[],"t":"문장형"},{"n":434,"b":"Which of the following approaches to driving in heavy rainfall is the least safe?","c":["Drive with the headlights and taillights on.","Turn on the heater in internal air circulation mode.","Check the tires for wear to prevent aquaplaning.","Maintain double the usual safe distance on wet roads."],"a":"2","imgs":[],"t":"문장형"},{"n":435,"b":"Which of the following is NOT an appropriate action by a driver while driving on a road during a typhoon  accompanied by strong winds and heavy rain?","c":["Maintain at least double the normal distance from the car in front, as the braking distance is longer.","Upon passing the flooded area, it is better to pass without stopping.","Avoid areas with a high risk of flooding such as riversides and streams when parking.","It is safe to park a vehicle by a wall or under a large sign."],"a":"4","imgs":[],"t":"문장형"},{"n":436,"b":"Which of the following is an INCORRECT method of driving on snowy roads?","c":["Just clearing the windshield of piled up snow is enough for safe driving.","The foot brake and engine brake must be used together.","For safety, drive at 30km/h or below with snow chains on.","Maintain a longer safe distance than usual."],"a":"1","imgs":[],"t":"문장형"},{"n":437,"b":"Which of the following is NOT safe driving in rain?","c":["You must reduce speed to less than half of the speed limit depending on the driving condition.","You must drive with reasonable consideration so as not to splash water on pedestrians.","It is not good to drive in idle creep (a state where the tires move either forward or in reverse even when the accelerator and  brake pedals are not a","It is safer to drive with the headlights and taillights on even during the day."],"a":"3","imgs":[],"t":"문장형"},{"n":438,"b":"Which of the following is NOT a safe method of driving on a foggy road?","c":["Turn on the sidelights, taillights, and headlights to indicate your position to other drivers.","Turn the high-beam headlights on to indicate your position to oncoming traffic.","Maintain a safe distance and reduce speed.","If moisture is formed on the windshield, use the wipers to secure visibility."],"a":"2","imgs":[],"t":"문장형"},{"n":439,"b":"According to the Road Traffic Act, at which reduced speed should a vehicle drive on an automobile road with  two lanes in one direction when it is wet due to rain?","c":["80 km/h","90 km/h","72 km/h","100 km/h"],"a":"3","imgs":[],"t":"문장형"},{"n":440,"b":"Which of the following are TWO are safe methods to drive when lightning strikes?","c":["Park your vehicle under a large tree.","Keep windows closed and stay in the car.","Keep away from the outer walls of buildings as electricity may conduct down the wet surface.","Evacuate the vehicle to avoid being in it if it gets hit by lightning."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":441,"b":"Which of the following is the most appropriate course of action in the event of an accident?","c":["It is not necessary to turn on the hazard lights and open the trunk to indicate an emergency situation.","Take photos of the accident scene within the road and wait inside the vehicle.","There is no need to exit the accident scene; wait inside the vehicle.","From a safe location outside the vehicle, report the accident to 119 or 112, and state the number of the streetlight or  traffic signal post to give a"],"a":"4","imgs":[],"t":"문장형"},{"n":442,"b":"Which of the following is the right method of avoiding glare caused by the headlights of an oncoming car at  night?","c":["Do not look directly at the headlights but at the road directly in front of your car.","Do not look directly at the headlights but to the right edge of the road.","Squint your eyes and look at the road directly in front of your car.","Squint your eyes and look to the left edge of the road."],"a":"2","imgs":[],"t":"문장형"},{"n":443,"b":"Under the Road Traffic Act, which of the following is not an appropriate action on the part of a driver if the car  is unable to operate due to a breakdown on the expressway at night?","c":["A red flashing signal, electric lantern or spark signal that can be identified from 500 m in all directions must be installed.","When installing a sign, it must be installed in a location where the driver of a vehicle approaching from the rear can see  it.","The driver must take necessary measures, such as moving the vehicle off the expressway.","The safety tripod sign must be installed 200 m from the point where the broken-down vehicle is located."],"a":"4","imgs":[],"t":"문장형"},{"n":444,"b":"According to the Road Traffic Act, which of the following describes a situation in which a driver of a  non-commercial vehicle is required to turn on the headlights, sidelights, taillights, and licens","c":["When stopping on a road at nighttime","When stopping on a road with minimal visibility due to fog","When the vehicle is being towed away due to a parking violation","While driving inside a tunnel"],"a":"4","imgs":[],"t":"문장형"},{"n":445,"b":"Which of the following is the MOST appropriate action in case of vehicle failure on an expressway?","c":["Turn on the emergency flashing light immediately, stop the car on the road, and notify the insurance company.","Open the trunk, check the broken part quickly, and call a rescue vehicle.","If it is not possible to move, install a safety tripod 500 m in front of the broken vehicle.","If the vehicle can move, turn on the hazard lights, pull over to the shoulder, and move to a safe area."],"a":"4","imgs":[],"t":"문장형"},{"n":446,"b":"Which of the following is NOT true about preventing a tire puncture and measures taken while driving?","c":["You must regularly check the tires for nails.","You must regularly check tire pressures and tread depths.","If the steering wheel pulls to one side, it is likely that a rear tire is punctured.","While keeping the steering wheel straight ahead and in the driving gear state, use the engine brake to induce deceleration."],"a":"3","imgs":[],"t":"문장형"},{"n":447,"b":"If your vehicle breaks down on an expressway at night, in addition to a safety tripod sign, etc. you must install  road flare signals to provide visibility for (   ) and alert other motorists that you","c":["200 m in every direction.","300 m in every direction.","400 m in every direction.","500 m in every direction."],"a":"4","imgs":[],"t":"문장형"},{"n":448,"b":"Which of the following is the correct method of handling a tire that explodes while driving?","c":["If the vehicle is pulled to one side suddenly, press the brakes to prevent an accident.","Firmly grasp the steering wheel, drive straight, and avoid sudden braking. Use the engine brake to stop in a safe  location.","Turn the steering wheel in the direction the vehicle is pulled in.","Use the parking brake to stop the vehicle as the brake pedal won't work."],"a":"2","imgs":[],"t":"문장형"},{"n":449,"b":"In the event of a traffic accident on an expressway, what is the most appropriate measure for preventing  secondary accidents?","c":["First and foremost take photos of the accident for insurance purposes.","Explicitly let the other driver know that he/she is at fault and claim for insurance accordingly.","The vehicle must be stopped at the rightmost edge of the road, and a warning sign must be placed in accordance with  the regulations prescribed by the","Turn on the hazard lights and call the relevant authority inside your vehicle."],"a":"3","imgs":[],"t":"문장형"},{"n":450,"b":"Which of the following is NOT a correct statement regarding the expressway construction section?","c":["In the case of construction that blocks a lane, caution is required due to expected congestion.","In the case of a truck, drowsiness and neglecting to look forward can lead to a major accident.","Various types of construction work including moving construction and stationary construction can be performed.","The speed limit is set to 80 km/h."],"a":"4","imgs":[],"t":"문장형"},{"n":451,"b":"Which of the following are the most appropriate actions to take if the Hi-Pass device malfunctions and fails to  read? (Select TWO)","c":["Turn on the emergency flashers, temporarily stop your vehicle, and have a toll ticket issued in a non-automated toll lane.","Upon reaching the toll gate of your destination, explain where you entered the expressway to the toll collector and pay  the toll.","Use the Hi-Pass lane and go through the toll gate of your destination, and the toll will be automatically collected.","Detach the card from your Hi-Pass device at the toll gate of your destination and hand it over to the toll collector to  pay the toll."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":452,"b":"Which of the following is the safest action in the event of a fire in a tunnel?","c":["Lock the car's doors to prevent theft and evacuate the tunnel.","Stay in the car as the tunnel will be filled with smoke from the fire.","Switch off the engine, leave the key in the ignition to allow for the car to be moved if necessary, and quickly evacuate  to safety.","Make a U-turn and drive away from the exit."],"a":"3","imgs":[],"t":"문장형"},{"n":453,"b":"From a safety perspective, which of the following is the most inappropriate way of driving when passing  through a tunnel?","c":["Before entering the tunnel, remove your sunglasses to allow your eyes to adapt to the light, and turn on your  headlights as you would at nighttime.","If the lanes inside the tunnel are marked with solid white lines, do not change lanes while in the tunnel.","Keep a safe following distance from the car ahead, and be ready for sudden stops.","Before entering the tunnel, check the road information at the entrance to the tunnel."],"a":"1","imgs":[],"t":"문장형"},{"n":454,"b":"Which of the following statements regarding braking in an emergency situation that occurs while driving is  correct?","c":["If aquaplaning occurs, the braking force of the brakes gets stronger.","Utilizing an impact-absorbing barrier in an emergency situation is one way of preventing a fatal accident.","If the road surface is wet, the vehicle always slides straight forward upon pressing the brake suddenly.","ABS-equipped vehicles have longer braking distances than non-ABS vehicles."],"a":"2","imgs":[],"t":"문장형"},{"n":455,"b":"Which of the following are the TWO correct safety measures to take during an earthquake?","c":["Drive as quickly as possible out of the area affected by the earthquake.","Maintain a safe distance from other vehicles and pull over to the right-hand side of the road.","Turn off the engine if you need to get out of the car to take cover.","Ignore the earthquake and drive on."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":456,"b":"You are driving on an expressway and there is ongoing construction ahead. Which of the following are NOT true?  (Select TWO)","c":["Stay cautious when driving toward and by a construction site.","Drive faster than what is indicated on the construction speed limit sign.","Try to refrain from excessive overtaking or cutting in front of cars.","Drive at the same speed when approaching the construction site so as not to cause unnecessary traffic disruptions.","In areas where the speed limit changes, turn on the hazard lights to alert the other vehicles."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":457,"b":"Which of the following are the TWO correct measures to take when a fire starts inside a tunnel that you are  driving in?","c":["Turn off the engine if you are getting out of the car to evacuate.","Stand with your back to the wind when using a fire extinguisher.","If you are unable to drive out of the tunnel, stop the car as close to the centerline as possible.","Take the key out of the ignition if you are getting out of the car to evacuate."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":458,"b":"Which of the following are the TWO correct statements regarding a vehicle skid?","c":["Skidding mostly occurs when the brakes are applied suddenly while driving at high speed.","Skidding mostly occurs when driving at low speed in the rain.","Skid marks left on a road surface do not provide any clues as to why an accident occurred.","Sudden steering can also cause skidding."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":459,"b":"Which of the following are the TWO situations wherein a vehicle is most likely to deviate from the road?","c":["When driving on an uphill road","When the driver abruptly turns the steering wheel on a curved road","When driving on a downhill road","When the road surface is slippery"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":460,"b":"If the hood of the car starts generating smoke and catches fire on an expressway, which of the following are the  TWO most appropriate measures to take?","c":["Stop immediately when you notice that there is a problem.","Move to the roadside, turn off the engine, and evacuate the vehicle.","If it is early enough to extinguish the fire, use the fire extinguisher fitted in the vehicle.","If you fail to extinguish the fire, call 119 and wait right next to the vehicle."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":461,"b":"At which point do lanes start decreasing in the zone requiring lane changes for safe passage due to road  construction?","c":["Starting point of a warning zone","Starting point of a transition zone","Starting point of a work zone","Starting point of a termination zone"],"a":"2","imgs":[],"t":"문장형"},{"n":462,"b":"Which of the following is the MOST correct description regarding driving at night?","c":["It is possible to secure a wide view at night if you have the front window tinted.","On a clear day, the braking distance is longer during daytime than at night.","It is better to secure a front view when driving at night with the fog light on rather than headlights.","If you look at the light from the opposite vehicle directly, it may be hard to secure a front view due to the glare."],"a":"4","imgs":[],"t":"문장형"},{"n":463,"b":"Which of the following is a correct statement regarding the glare effect (cases wherein you are unable to see  ahead due to the glare from the vehicle’s headlights) during nighttime?","c":["The glare effect will disappear if you turn off your headlights immediately when it occurs.","The glare effect frequently occurs when two vehicles facing each other both have their high-beam headlights on.","The glare effect tends to occur when driving through busy downtown streets at nighttime.","The glare effect refers to the condition of momentary invisibility caused by bright lights upon entering a tunnel at  nighttime."],"a":"2","imgs":[],"t":"문장형"},{"n":464,"b":"Which of the following statements regarding a driver’s \"Hypovigilance in driving\" at nighttime is correct?","c":["Cognitive ability is better than usual.","Eye movements become more active.","It often occurs when driving on congested roads in a city.","The eyes become used to a monotonous view and experience a type of sensory paralysis."],"a":"4","imgs":[],"t":"문장형"},{"n":465,"b":"Which of the following is NOT a measure to be taken by a driver when the sun begins to set and it becomes  dark?","c":["Turn on the sidelights and taillights.","Drive slower than you would during the day.","The eyes need some time to adjust to the darkness after the sun sets.","Driving is easier compared to daytime driving because of greater visibility."],"a":"4","imgs":[],"t":"문장형"},{"n":466,"b":"Which of the following statements regarding the EV charging cable coupler is INCORRECT?","c":["It should have separate polarity and grounding electrode as it has a structure that cannot be replaced with other wiring  equipment.","The grounding electrode should have a structure that is connected last when starting and separated first upon shutoff.","It should have a mechanical device for locking or an attachment/detachment to prevent unintended load shedding.","It should have an interlock function that suspends the power supply of charging cable when the connector of an EV is  separated from the connection po"],"a":"2","imgs":[],"t":"문장형"},{"n":467,"b":"Which of the following is the best method of preventing vehicle fires?","c":["Alter the wiring arrangement to install an amplifier in the vehicle.","Avoid generating static electricity while filling up in wintertime.","LPG vehicles should carry a disposable butane gas tank in preparation for an emergency.","A lighter can be stored inside the vehicle in summer."],"a":"2","imgs":[],"t":"문장형"},{"n":468,"b":"Which of the following is the best method of preventing the risk of collision caused by the sudden braking of a  vehicle ahead?","c":["Step on the brake pedal to slow down.","Turn the steering wheel sharply to the left and drive over the centerline to avoid hitting the vehicle ahead.","Close your eyes to minimize the impact.","Turn on both the wipers and the high-beam headlights."],"a":"","imgs":[],"t":"문장형"},{"n":469,"b":"Which of the following are TWO phenomena caused by the tires of a vehicle driving at high speed?","c":["Vapor lock","Standing wave","Fading","Aquaplaning"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":470,"b":"Which of the following statements regarding wearing a seat belt is correct?","c":["Fix the seat belt above the waist to protect against the shock from a traffic accident.","Firefighters who are dispatched to suppress fire need not wear a seat belt.","It is safest for children to take the front seat and wear a seat belt.","If a driver does not ensure that children under the age of 13 wear a seat belt, an administrative fine of KRW 30,000 is  imposed."],"a":"2","imgs":[],"t":"문장형"},{"n":471,"b":"Which of the following should you adjust before you start driving in order to minimize injuries to the head and  neck?","c":["Distance of the seat from the pedals","Angle of the backrest","Height of the headrest","Seat height"],"a":"3","imgs":[],"t":"문장형"},{"n":472,"b":"Which of the following statements regarding safe driving in a tunnel is correct?","c":["Turn on the left-turn signal and use the left lane for overtaking.","The sense of distance from the front vehicle is reduced in a tunnel.","When entering the tunnel, be careful of the light adaptation.","At the exit of a tunnel, dark adaptation occurs."],"a":"2","imgs":[],"t":"문장형"},{"n":473,"b":"Which of the following is true about using turn signals?","c":["It is not a violation to change lanes without signaling if it does not obstruct the other vehicles.","You must keep the turn signal on for a while after changing lanes.","The traffic penalty for failure to signal lane change for passenger vehicles and buses is a fine of KRW 30,000.","When changing lanes on an expressway, turn on the turn signal from 30 m before and keep it on until you have completed  changing lanes."],"a":"3","imgs":[],"t":"문장형"},{"n":474,"b":"In which of the following situations is a driver allowed to overtake a vehicle?","c":["When the vehicle ahead is overtaking another vehicle","When the vehicle ahead stops or it is driving slowly to prevent a dangerous situation","When the vehicle ahead is driving next to another vehicle in the left lane","When the vehicle ahead is driving slowly to secure a safe distance from another vehicle"],"a":"4","imgs":[],"t":"문장형"},{"n":475,"b":"Which of the following statements regarding the speed limit of a vehicle trying to overtake another vehicle is  correct?","c":["There is no speed limit applied to a vehicle overtaking another one.","A vehicle overtaking another vehicle can exceed the legal speed limit of the road by 50%.","Vehicles are allowed to overtake other vehicles regardless of the speed limit, depending on the driver's driving skill.","Overtaking other vehicles is allowed only when performed within the speed limit of the road."],"a":"4","imgs":[],"t":"문장형"},{"n":476,"b":"Idling or parking on an expressway is prohibited as it may cause rear-end collisions. Which of the following is  NOT true?","c":["A fire truck can idle or park on an expressway to perform emergency operations.","You can temporarily idle or park at the instruction of a police officer or to prevent a hazardous situation.","Motor vehicles can idle on the toll road to pay their tolls.","Only emergency vehicles such as police cars and fire trucks can idle or park at the emergency parking area inside a tunnel."],"a":"4","imgs":[],"t":"문장형"},{"n":477,"b":"When you sense danger while driving and step on the brake pedal, which TWO will lead to the longest stopping  distance? (i.e., the distance from the point where you press the brake pedal to the point ","c":["Relatively light vehicle weight","Relatively higher speed","Right after installing new tires","Fatigue or drunk driving"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":478,"b":"Which of the following are the TWO correct statements regarding the number of passengers in a vehicle?","c":["On expressways, it is not allowed to carry more people than the defined number of passengers for the vehicle.","The number of passengers specified on the vehicle registration certificate is the number of passengers excluding the  driver.","When permission is obtained from the head of the police station having jurisdiction over the place of departure, the  vehicle may operate in excess of","If the number of passengers is exceeded, permission must be obtained from the head of the police station having  jurisdiction over the destination."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":479,"b":"When a vehicle driving in front brakes suddenly due to a traffic accident ahead, which of the following are the  TWO safest measures to avoid colliding with the vehicle?","c":["Maintain a longer distance from the vehicle ahead than the stopping distance.","Turn on the emergency flashers and follow an emergency vehicle.","Reduce speed and maintain sufficient distance from the vehicle ahead to prevent a collision.","When there is danger, use both the foot brake and parking brake to shorten the braking distance."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":480,"b":"Which of the following are true about wearing seat belts? (Select TWO)","c":["The penalty for a driver failing to wear a seat belt is an administrative fine of KRW 30,000.","Whiplash injuries are more common with two-point seat belts.","The penalty for a child under the age of 13 not wearing a seat belt is a traffic penalty of KRW 60,000.","There are two, three, and four-point seat belts."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":481,"b":"Which of the following are the TWO correct statements regarding wearing a seat belt?","c":["You need not wear a seat belt when driving to a place close by.","Passengers in a car should wear a seat belt for safety.","It is safe to make a child sit in the passenger seat so that the parents can help the child wear a seat belt.","Except when there is an emergency, the driver of an emergency vehicle should also wear a seat belt."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":482,"b":"A person seems to be suffering from a fractured spine after an accident. Which of the following is the most  appropriate measure you can take?","c":["Check if the person is conscious and perform cardiopulmonary resuscitation immediately.","Move the person to a safe place and call 119.","Apply the Heimlich maneuver to prevent upper airway obstruction.","Unless urgent, do not move the person. If moving is inevitable, use a spine splint and assist the person in moving to a safe  place."],"a":"4","imgs":[],"t":"문장형"},{"n":483,"b":"When you are involved in a traffic accident, what should you do first to check if an injured person is conscious?","c":["Check his/her pulse.","Try to start a conversation or gently pat his/her shoulders.","Find the location of any wound that is bleeding heavily.","Look into the mouth to check if anything is blocking the airway."],"a":"2","imgs":[],"t":"문장형"},{"n":484,"b":"Which TWO vehicles are allowed to continue driving while asking a passenger to take actions during a traffic  accident?","c":["A passenger car that is carrying an injured person to a hospital","A fire truck returning to the fire station after extinguishing a fire","A tow vehicle going to the scene of a traffic accident","A postal vehicle transporting mail."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":485,"b":"According to the Road Traffic Act, which of the following are the TWO correct statements regarding a vehicle  that is allowed to continue driving despite a traffic accident?","c":["The ambulance driver who was transporting an urgent patient had the passenger take the necessary measures and kept  driving.","The driver who was traveling to attend an urgent meeting had the passenger take the necessary actions and kept  driving.","The driver of the vehicle transporting urgent mail made the passenger take the necessary measures and kept driving.","The ambulance driver who was transporting urgent medicines had the passengers take the necessary actions and kept  driving."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":486,"b":"Which of the following is NOT appropriate for preventing road kill at night?","c":["Reduce speed when traveling on national or mountain roads with fewer vehicles or people.","If you spot an animal on the road, slow down or stop on the shoulder to avoid a collision.","If you spot an animal on the road, turn off the headlights and honk lightly to scare it away.","To spot animals on the road more easily, drive closer along the shoulder."],"a":"4","imgs":[],"t":"문장형"},{"n":487,"b":"Which of the following organizations provides free towing service over a set distance in the event of an  emergency?","c":["Korea Road Traffic Authority","Korea Expressway Corporation","Police agency","Korea Transportation Safety Authority"],"a":"2","imgs":[],"t":"문장형"},{"n":488,"b":"Which of the following is NOT a proper way to respond after a road kill?","c":["Do not touch the animal carcass to prevent exposure to potential diseases.","Call any wildlife rescue center or a local government call center (area code + 120).","Load the animal carcass on your vehicle to prevent a secondary accident.","There is no need to file a report if necessary measures have been taken to prevent a secondary accident and facilitate   traffic flow."],"a":"3","imgs":[],"t":"문장형"},{"n":489,"b":"Which of the following is true about anger control techniques for preventing road rage and car crashes?","c":["An anger control technique that is a mindfulness-based practice designed to help you defuse stress is called the STOP  technique.","An anger control technique during which you try to push out the negative thoughts and focus on happy thoughts for  1–2 minutes is called the time-out ","An anger control technique during which you question your passive recognition of the belief system and distorted  thoughts that trigger anger is calle","An anger control technique during which you repeatedly contract and relax your arms, legs, abdomen, chest, shoulders,  and other body parts is called "],"a":"4","imgs":[],"t":"문장형"},{"n":490,"b":"Which of the following is the safest method of driving when the underground road ahead is submerged in  water due to heavy rainfall?","c":["Drive through slowly. You can make it as long as the wheels are not completely submerged in water.","Get through the water as fast as you can.","Take another road to bypass the water.","Drive through. If the engine stops, start it back immediately and drive through."],"a":"3","imgs":[],"t":"문장형"},{"n":491,"b":"Which of the following is NOT a correct description of the actions to take when responding to an emergency  situation such as a traffic accident?","c":["Check the risk.","Check the response of a patient.","Secure the airway and check the breathing.","Check the destination and identification of a patient."],"a":"4","imgs":[],"t":"문장형"},{"n":492,"b":"Which of the following is NOT a correct method of handling a dangerous situation while driving?","c":["Firmly grasp the steering wheel if it vibrates hard and keep driving.","If smoke comes out of the vehicle, pull over where it is safe and turn off the engine.","If a tire explodes, hold the steering wheel firmly and pull over to a safe location.","If the engine stops while crossing a railroad, evacuate the vehicle immediately and contact the authorities."],"a":"1","imgs":[],"t":"문장형"},{"n":493,"b":"Which of the following are proper ways to take photographs at the scene of an accident? (Select TWO)","c":["If there is a black box that successfully captured the accident, there is no need to take any photos.","Photos of spilled engine oil and coolant are not needed as their stains will last a long time on the road.","Take photos of the overall accident scene from a distance and work your way toward the point of collision, taking  photos along the way.","Mark the scene by spray painting or taking photos of the direction of the tires."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":494,"b":"Which TWO things must be inspected before starting a long-distance drive?","c":["Cleanliness of the vehicle","DMB operation status","Oils and fluids","Tires"],"a":"3, 4","imgs":[],"t":"문장형"},{"n":495,"b":"Which of the following constitutes grounds for revocation of a driver's license?","c":["When 6 months have lapsed after the expiration date of the regular aptitude test","When a motorist is booked without detention for assaulting a law enforcement officer (policeman or local government  official)","When a motorist drives his/her car without affixing a license plate after registration","When 2 years have lapsed without renewal of a Class II driver’s license for an ordinary motor vehicle"],"a":"2","imgs":[],"t":"문장형"},{"n":496,"b":"If a person notified to pay a traffic penalty fails to make the payment during the first designated period, which  of the following is the correct amount that he/she has to pay within 20 days?","c":["Original traffic penalty + 10% late penalty","Original traffic penalty + 20% late penalty","Original traffic penalty + 30% late penalty","Original traffic penalty + 40% late penalty"],"a":"2","imgs":[],"t":"문장형"},{"n":497,"b":"Which of the following is the correct standard for the revocation of a driver's license based on cumulative  demerit points?","c":["100+ points within 1 year","191+ points within 2 years","271+ points within 3 years","301+ points within 5 years"],"a":"3","imgs":[],"t":"문장형"},{"n":498,"b":"Which of the following statements regarding the standards for demerit points based on the effects of a traffic  accident is correct?","c":["As for the personal injury of the driver who will receive an administrative punishment, demerit points will be imposed  based on the rules regarding t","In an accident between a car and a pedestrian, demerit points will not be imposed if the accident occurred due to  mistakes committed by both parties.","If the accident was unavoidable or had been caused clearly by a mistake of the injured, demerit points will be halved.","In an accident between cars, demerit points are imposed only on the driver who committed a serious violation that  caused the accident."],"a":"4","imgs":[],"t":"문장형"},{"n":499,"b":"According to the Road Traffic Act, which of the following statements regarding the administrative fine for  parking violations is correct?","c":["The owner of a passenger car involved in a parking violation should pay an administrative fine of KRW 30,000.","The owner of a van involved in a parking violation should pay an administrative fine of KRW 70,000.","No administrative fine is imposed even if you do not pay the fine within the designated period.","For parking violations that continue for more than two hours at the same location, additional administrative fines are  imposed."],"a":"4","imgs":[],"t":"문장형"},{"n":500,"b":"Which of the following is a scenario where the exemption according to the Act on Special Cases Concerning the  Settlement of Traffic Accidents is applied because the driver who caused the accident has","c":["When the driver has violated his/her duty to drive safely, resulting in car damage or minor accident","When the driver has caused an accident that resulted in loss of human life","When the driver has fled the scene after causing an accident without attending to the injured","When the driver has violated traffic signals, causing an accident involving minor injuries"],"a":"1","imgs":[],"t":"문장형"},{"n":501,"b":"Seven people riding together in four vehicles on the road and causing harm to others were criminally charged  according to the Road Traffic Act. Which of the following is NOT true about their punishme","c":["Imprisonment with labor for not more than 2 years or criminal fine of not more than KRW 5 million","Immediate license suspension upon apprehension","License revocation if detained","A penalty of 40 points if prosecuted"],"a":"2","imgs":[],"t":"문장형"},{"n":502,"b":"The driver of an automobile is arrested for reckless driving. Which of the following is the correct administrative  disposition on the driver’s license?","c":["Revocation of the driver’s license","100-day suspension of the driver’s license","60-day suspension of the driver’s license","40-day suspension of the driver’s license"],"a":"4","imgs":[],"t":"문장형"},{"n":503,"b":"According to the Road Traffic Act and its Enforcement Decree, what is the punishment for riding a bicycle while  intoxicated?","c":["No punishment","Notification of a traffic penalty of KRW 30,000","Punished through an administrative fine of KRW 40,000","Punished through a criminal fine of not more than KRW 100,000 or by detention"],"a":"2","imgs":[],"t":"문장형"},{"n":504,"b":"According to the Road Traffic Act, what is the punishment for a bicycle rider who is deemed to be intoxicated  and who refuses a police officer's lawful request for a field sobriety test?","c":["No punishment","Punished through an administrative fine of KRW 70,000","Notification of a traffic penalty of KRW 100,000","Punished through a criminal fine of not more than KRW 100,000 or by detention"],"a":"3","imgs":[],"t":"문장형"},{"n":505,"b":"Which of the following are the TWO situations subject to criminal prosecution in accordance with the Act on  Special Cases Concerning the Settlement of Traffic Accidents?","c":["A driver without comprehensive insurance reaches a settlement with the victim after causing an accident resulting in  property damage.","A taxi driver who is a member of the Taxi Mutual Aid Association causes a traffic accident resulting in injury or death  after driving over the center","A driver with comprehensive insurance causes a traffic accident resulting in injury or death after committing a violation  of a traffic signal.","A truck covered by cooperative insurance causes injury due to careless driving."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":506,"b":"You fail to pay a traffic penalty for which you have been notified in writing even by its second deadline. Which  TWO are applicable?","c":["You must request a summary judgment immediately.","Your license will be suspended for 40 days if no summary judgment is reached.","An administrative fine will be charged.","No summary judgment needs to be requested if you pay the traffic penalty along with an additional 30% as delay  penalty."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":507,"b":"What will happen if the driver of a passenger car causes a traffic accident that damages only parked or stopped  vehicles and, even upon becoming aware of the situation, fails to provide personal info","c":["No punishment","An administrative fine of KRW 100,000 is imposed.","A traffic penalty of KRW 120,000 is notified.","A criminal fine of up to KRW 300,000 or detention is imposed."],"a":"3","imgs":[],"t":"문장형"},{"n":508,"b":"According to the Road Traffic Act, what is the correct penalty for a person who drives a passenger car with a  blood alcohol concentration (BAC) of 0.03 percent or higher but less than 0.08 percent (f","c":["Imprisonment for up to 1 year or criminal fine of up to KRW 5 million","Imprisonment for up to 2 years or criminal fine of up to KRW 10 million","Imprisonment for up to 3 years or criminal fine of up to KRW 15 million","Imprisonment in the range of 2 years - 5 years or criminal fine of KRW 10 million or more (up to KRW 20 million)"],"a":"1","imgs":[],"t":"문장형"},{"n":509,"b":"Under the Road Traffic Act, which set of words correctly completes ㉠–㉢? - On a steep narrow road, when two non-emergency vehicles come face to face with each other, the (㉠) vehicle must  yield by movi","c":["㉠ uphill ㉡ left ㉢ right","㉠ downhill ㉡ left ㉢ right","㉠ downhill ㉡ right ㉢ left"],"a":"2","imgs":[],"t":"문장형"},{"n":510,"b":"If a driver with a student license drives in inebriated state with blood alcohol content of at least ( ) percent,  his/her student license shall be revoked. Which answer fits in ( )?","c":["0.03","0.05","0.08","0.10"],"a":"1","imgs":[],"t":"문장형"},{"n":511,"b":"Which of the following is the punishment imposed on a driver who has been criminally charged for assaulting a  traffic police officer?","c":["40 demerit points","100 demerit points","Revocation of the driver’s license","Request for a summary trial"],"a":"3","imgs":[],"t":"문장형"},{"n":512,"b":"Each time a driver (if not a victim of a traffic accident) arrests or reports to arrest a driver of a vehicle that has  caused a traffic accident involving personal injury and fled, a benefit of ( ) s","c":["10 points","20 points","30 points","40 points"],"a":"4","imgs":[],"t":"문장형"},{"n":513,"b":"Which of the following is an incorrect pairing of traffic penalties and violations by the driver of an automobile?","c":["KRW 120,000 for a speed violation (exceeding 60 km/h)","KRW 60,000 for a signal violation","KRW 60,000 for driving over the centerline","KRW 50,000 for a violation of the period or place when/where overtaking is prohibited"],"a":"4","imgs":[],"t":"문장형"},{"n":514,"b":"According to the Road Traffic Act and its Enforcement Decree, what is the traffic penalty imposed on the driver  of an automobile parked within 5 m of the transmission valve of a fire department stand","c":["KRW 40,000","KRW 30,000","KRW 20,000","No penalty is imposed."],"a":"1","imgs":[],"t":"문장형"},{"n":515,"b":"According to the Road Traffic Act, which of the following violations involves a different criterion for demerit  points?","c":["Driving while neglecting disorderly conduct by a pas
