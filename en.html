<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--kb:#003FA2;--kg:#00923F;--kd:#00204D;--bg:#F3F4F8;--card:#FFF;--txt:#1A1D2E;--txt2:#6E7191;--bdr:#E2E5EF;--ok:#0D7C3F;--ok-bg:#E6F4EC;--t-txt:#3366CC;--t-txt-bg:#EBF0FA;--t-photo:#D35400;--t-photo-bg:#FDF0E6;--t-sign:#7D3C98;--t-sign-bg:#F3EBF9;--t-vid:#117A65;--t-vid-bg:#E5F5F1;--shadow:0 1px 4px rgba(0,20,60,.05);--r:12px}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);line-height:1.65;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent}
.lsw{display:flex;gap:4px;padding:6px 12px;background:var(--kd);overflow-x:auto;-webkit-overflow-scrolling:touch}.lsw::-webkit-scrollbar{display:none}

.hd{background:var(--kb);color:#fff;padding:12px 16px 10px;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,32,77,.2)}
.hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hd h1{font-size:15px;font-weight:800;letter-spacing:-.5px}

.sb input::placeholder{color:rgba(255,255,255,.4)}.sb input:focus{background:rgba(255,255,255,.22)}
.sb button{padding:9px 16px;background:var(--kg);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
.tabs{display:flex;background:#fff;border-bottom:1px solid var(--bdr);overflow-x:auto;-webkit-overflow-scrolling:touch}.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:60px;padding:10px 4px 8px;border:none;background:none;font-family:inherit;font-size:11px;font-weight:600;color:var(--txt2);cursor:pointer;text-align:center;border-bottom:2.5px solid transparent;transition:all .15s}
.tab .ic{font-size:17px;display:block;margin-bottom:1px}.tab .num{font-size:9px;font-weight:400;opacity:.5;display:block}
.tab.on{color:var(--kb);border-bottom-color:var(--kb)}

.tab[data-f="표지판형"].on{color:var(--t-sign);border-bottom-color:var(--t-sign)}
.tab[data-f="동영상형"].on{color:var(--t-vid);border-bottom-color:var(--t-vid)}
.rng{display:flex;gap:5px;padding:8px 12px;overflow-x:auto;-webkit-overflow-scrolling:touch}.rng::-webkit-scrollbar{display:none}
.rng button{padding:5px 11px;border:1.5px solid var(--bdr);border-radius:16px;background:var(--card);font-size:11px;font-family:inherit;cursor:pointer;white-space:nowrap;color:var(--txt2);flex-shrink:0;font-weight:500}
.rng button.on{background:var(--kb);color:#fff;border-color:var(--kb)}
.ct{padding:6px 16px;font-size:11px;color:var(--txt2)}.ct b{color:var(--kb)}
.ls{padding:0 10px 90px}
.cd{background:var(--card);border-radius:var(--r);margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--bdr);scroll-margin-top:150px;overflow:hidden}.cd.hl{box-shadow:0 0 0 3px var(--kg)}.kw-hl{background:#FFEB3B;color:#000;padding:0 2px;border-radius:3px;font-weight:700}
.ch{display:flex;align-items:center;gap:7px;padding:12px 14px 6px}
.qn{background:var(--kb);color:#fff;font-size:11px;font-weight:700;padding:2px 8px;border-radius:5px}
.tp{font-size:9px;padding:2px 7px;border-radius:6px;font-weight:600}
.tp.문장형{background:var(--t-txt-bg);color:var(--t-txt)}.tp.사진형{background:var(--t-photo-bg);color:var(--t-photo)}.tp.표지판형{background:var(--t-sign-bg);color:var(--t-sign)}.tp.동영상형{background:var(--t-vid-bg);color:var(--t-vid)}
.qb{padding:0 14px 10px;font-size:13.5px;font-weight:500;line-height:1.55}
.qp{padding:0 10px 10px}.qp img{width:100%;border-radius:8px;border:1px solid var(--bdr);display:block}
.sr{display:flex;gap:10px;padding:0 14px 10px;align-items:flex-start}.sp{display:flex;gap:5px;flex-wrap:wrap;flex-shrink:0}.sp img{width:68px;height:auto;border-radius:5px;border:1px solid var(--bdr);image-rendering:crisp-edges}.st{flex:1;font-size:13.5px;font-weight:500;line-height:1.55}
.vb{margin:0 14px 10px;padding:8px 12px;background:var(--t-vid-bg);border-radius:8px;font-size:11px;color:var(--t-vid);font-weight:600}
.cs{padding:0 14px 10px}.ci{display:flex;gap:8px;padding:7px 0;font-size:12.5px;border-bottom:1px solid #F0F1F5;align-items:flex-start;line-height:1.5}.ci:last-child{border-bottom:none}.cn{color:var(--kb);font-weight:700;flex-shrink:0;min-width:18px;font-size:13px}
.ab{display:block;width:calc(100% - 28px);margin:0 14px 12px;padding:10px;background:var(--bg);border:none;border-radius:8px;font-size:12.5px;font-family:inherit;cursor:pointer;text-align:center;color:var(--txt2);font-weight:600}.ab:active{background:#E6E8EE}
.ax{display:none;margin:0 14px 12px;padding:12px;background:var(--ok-bg);border-radius:8px;border-left:3px solid var(--ok)}.ax.show{display:block}
.al{font-size:10px;font-weight:700;color:var(--ok);margin-bottom:3px;letter-spacing:.5px}.av{font-size:15px;font-weight:900;color:var(--ok)}
.tt{position:fixed;bottom:16px;right:16px;width:42px;height:42px;background:var(--kb);color:#fff;border:none;border-radius:50%;font-size:16px;cursor:pointer;box-shadow:0 3px 10px rgba(0,32,77,.25);display:none;z-index:50}
.ft{text-align:center;padding:20px 16px;font-size:10px;color:#aaa}
@media(min-width:640px){.ls{max-width:640px;margin:0 auto}.hd{padding:12px calc(50% - 310px) 10px}.tabs{justify-content:center}.tab{flex:none;padding:10px 18px 8px;min-width:80px}.rng{justify-content:center}.ct,.ft{max-width:640px;margin-left:auto;margin-right:auto}.sp img{width:85px}}
</style>

<script>
const Q=[{"n":1,"b":"Which of the following procedures is correct when applying for a mobile driver’s license?","c":["Applications can be made using any app.","Applications must be made using a smartphone under the applicant’s name with identity verification.","Applications can only be made at the traffic civil service office of a police station.","A mobile driver’s license cannot be issued at a driver’s license test center."],"a":"2","imgs":[],"t":"문장형"},{"n":3,"b":"What is the validity period for an international driver's license issued by the commissioner of the City/Do  (Province) police agency from the date of issuance?","c":["1 year","2 years","3 years","4 years"],"a":"1","imgs":[],"t":"문장형"},{"n":4,"b":"According to the Road Traffic Act, which of the following is a prerequisite for driving an emergency passenger  vehicle with prescribed seating capacity of no more than 15 persons?","c":["Class I driver’s license for ordinary motor vehicles; 3 hours of traffic safety education","Class I driver’s license for special motor vehicles (large towing vehicles); 2 hours of traffic safety education","Class I driver’s license for special motor vehicles (recovery vehicles); 2 hours of traffic safety education","Class II driver’s license for ordinary motor vehicles; 3 hours of traffic safety education"],"a":"1","imgs":[],"t":"문장형"},{"n":5,"b":"What is the period of validity of a learner’s permit according to the Road Traffic Act?","c":["6 months from the date of issuance","1 year from the date of issuance","2 years from the date of issuance","3 years from the date of issuance"],"a":"2","imgs":[],"t":"문장형"},{"n":6,"b":"According to the Road Traffic Act, which of the following should NOT be indicated in a driver’s license regarding  the special conditions for allowance of driver’s license?","c":["A: Manual transmission","E: Deaf sign and convex mirror","G: Specially produced and approved car","H: Right direction indicator"],"a":"1","imgs":[],"t":"문장형"},{"n":7,"b":"A vehicle with total weight of 780 kg is to be towed with an 11-seater passenger vehicle. Which of the following  driver’s license(s) must the driver hold?","c":["Class I driver’s license for ordinary motor vehicles and for small towing vehicles","Class II driver’s license for ordinary motor vehicles and Class I driver’s license for small towing vehicles","Class I driver’s license for ordinary motor vehicles and for recovery vehicles","Class II driver’s license for ordinary motor vehicles and Class I driver’s license for recovery vehicles"],"a":"1","imgs":[],"t":"문장형"},{"n":8,"b":"Which TWO statements are correct regarding the types of vehicles that can be driven by specific types of driver's  license?","c":["An asphalt distributor may be driven by a driver holding a Class I driver’s license for large motor vehicles.","A dump truck may be driven by a driver holding a Class I driver’s license for ordinary motor vehicles.","A 250 cc two-wheeled vehicle may be driven by a person holding a Class II driver’s license for ordinary motor vehicles.","A motorcycle may be driven by a person holding a Class II driver’s license for small motor vehicles."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":9,"b":"One intends to drive a 12-seater passenger vehicle. Which of the following driver’s license types must one obtain  to do so?","c":["Class I driver’s license for large towing vehicles","Class I driver’s license for recovery vehicles","Class I driver’s license for ordinary motor vehicles","Class II driver’s license for ordinary motor vehicles"],"a":"3","imgs":[],"t":"문장형"},{"n":10,"b":"Which of the following people can obtain a Class II driver's license for ordinary motor vehicles?","c":["Those who are blind in one eye but possess visual acuity of 0.5 in the other eye","Those who cannot differentiate red, green, and yellow colors (color blind)","Those who are 17 years old","Those who are deaf"],"a":"4","imgs":[],"t":"문장형"},{"n":11,"b":"Which of the following is a correct definition (standard) of a “motorcycle” under the Road Traffic Act?","c":["Displacement of up to 50 cc; maximum rated output power of up to 0.59 kW","Displacement of less than 50 cc; maximum rated output power of less than 0.59 kW","Displacement of up to 125 cc; maximum rated output power of up to 11 kW","Displacement of less than 125 cc; maximum rated output power of less than 11 kW"],"a":"3","imgs":[],"t":"문장형"},{"n":12,"b":"According to the Road Traffic Act, which of the following are the qualifications for taking a test for Class I  driver's license for a large motor vehicle? (Excluding experience in driving a two-wheel","c":["A person who has been driving a vehicle for at least 6 months and who is 18 years or older","A person who has been driving a vehicle for at least 1 year and who is 18 years or older","A person who has been driving a vehicle for at least 6 months and who is 19 years or older","A person who has been driving a vehicle for at least 1 year and who is 19 years or older"],"a":"4","imgs":[],"t":"문장형"},{"n":13,"b":"Which of the following is an incorrect description of postponing the driver's license aptitude test under the Road  Traffic Act when traveling abroad?","c":["You must submit an application to postpone the aptitude test before leaving the country.","You cannot have an agent apply for a postponement of the aptitude test on your behalf after you leave the country.","You must provide supporting documents of your departure such as an E-ticket to apply for a postponement of the  aptitude test.","If your application is approved, you must take the aptitude test within three months of your return."],"a":"2","imgs":[],"t":"문장형"},{"n":14,"b":"A person who fails the road driving test may retake the test (  ) after the date of failure. Which of the following  belongs in (  )?","c":["1 day","3 days","5 days","7 days"],"a":"2","imgs":[],"t":"문장형"},{"n":15,"b":"What are TWO inappropriate explanations for the \"Good Driving Mileage\" system?","c":["It is a system that provides practical incentives to those who comply with and practice traffic laws.","If a driver receives a suspension order, the penalty can be deducted from the accumulated points.","Those who have not paid the traffic penalty or administrative fine can participate in the no-violation, no-accident  pledge of the mileage system.","In case of causing a traffic accident or violating traffic laws during the pledge period, the person cannot take the  pledge again."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":16,"b":"Which of the following is NOT the correct definition of personal mobility devices (PMDs) in motorcycle form?","c":["The ascent angle is less than 25 degrees.","The device must weigh less than 30 kg.","The term \"bicycles, etc.\" means bicycles and personal mobility devices.","The motor should not operate when driving at a speed of 25 km/h or more."],"a":"1","imgs":[],"t":"문장형"},{"n":17,"b":"Below are explanations of the standard for personal mobility devices (PMDs) according to the Road Traffic Act.  Which one is correct?","c":["For vehicles with a motor, the motor should stop when the device reaches or exceeds a speed of 20 km/h.","It includes electric bicycles that cannot move solely by motor power (PAS: Pedal Assist System).","It is a vehicle with maximum rated output power of 11 kW or less, which weighs less than 35 kg.","The weight of the vehicle should be less than 30 kg."],"a":"4","imgs":[],"t":"문장형"},{"n":18,"b":"Which TWO actions would cause someone to be barred from acquiring a driver's license for 2 years? (If given a  penalty more severe than a criminal fine)","c":["Driving without a license three times","When taking a driver’s license test on behalf of another person.","When charged for assaulting a police officer during an inspection, resulting in the revocation of one’s license.","When causing three or more traffic accidents while driving under the influence of alcohol."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":19,"b":"According to the Road Traffic Act, which of the following is NOT true about an English driver’s license? (Limited  to countries that have ratified the Geneva Convention or the Vienna Convention)","c":["When driving in a country where an English driver’s license is recognized, it is possible to drive without a separate  notarized translation.","The English driver's license can be used regardless of the length of stay in a country where an English driver’s license is  recognized.","You should bring your Korean driver's license, an international driver's license, and your passport in a country where an  English driver’s license is","It is a license wherein the content of the driver's license is written in English on the back of the driver's license."],"a":"","imgs":[],"t":"문장형"},{"n":20,"b":"Under the Road Traffic Act, a motorcycle is defined as a two-wheeled vehicle with maximum rated output of  (  ) or less when powered by electricity. Which of the following belongs in (  )?","c":["11 kW","9 kW","5 kW","0.59 kW"],"a":"1","imgs":[],"t":"문장형"},{"n":21,"b":"Which of the following is the correct definition of \"line of curbstones\" as stipulated in the Road Traffic Act?","c":["A line indicating the direction of the thoroughfare for vehicles and horses","A line for guiding vehicles to drive in a single line through a set part of the road","A line consisting of rocks or other material for distinguishing roadways from sidewalks","A line indicating separate lanes"],"a":"3","imgs":[],"t":"문장형"},{"n":22,"b":"Which of the following statements regarding personal mobility devices under the Road Traffic Act is correct?","c":["It is possible to drive a PMD with more riders than the permitted capacity.","A person over the age of 65 who has returned his/her driver’s license can drive a PMD.","A person over the age of 13 can drive a PMD without a driver’s license.","When using a crosswalk, you must get off the personal mobility device and push or carry it while walking."],"a":"4","imgs":[],"t":"문장형"},{"n":23,"b":"According to the Road Traffic Act, which of the following is the age standard for individuals whose driver's  license renewal and aptitude test interval is 3 years?","c":["Individuals aged 65 or older","Individuals aged 70 or older","Individuals aged 75 or older","Individuals aged 80 or older"],"a":"3","imgs":[],"t":"문장형"},{"n":24,"b":"Below are descriptions of the verification process for identifying individuals wishing to obtain a driver’s license  according to the Road Traffic Act and its Enforcement Decree. Which of the followin","c":["If the resident registration card has been lost, identification can be performed via the confirmation of application for  the issuance of a resident r","An individual who cannot be verified by either identification certificate or fingerprint information is not permitted to  take the test.","Fingerprint information may be compared and verified using an electronic method without the applicant's consent.","If the applicant refuses to verify his/her own identity, the issuance of a driver’s license may be denied."],"a":"3","imgs":[],"t":"문장형"},{"n":25,"b":"Which of the following government authorities provides special education to those intending to get a license for  fuel cell electric buses (FCEBs; seating capacity of 35 or more)?","c":["Korea Gas Safety Corporation","Korea Occupational Safety and Health Agency","Korea Road Traffic Authority","Korea Expressway Corporation"],"a":"1","imgs":[],"t":"문장형"},{"n":26,"b":"Whom must the person likely to have his/her driver’s license suspended due to a violation of traffic laws  according to the Road Traffic Act request when wishing to receive the recommended special tra","c":["Chairperson of the Korea Road Traffic Authority","Head of the local government having jurisdiction over one's domicile","Head of a driver licensing office","Commissioner of a City/Do police agency"],"a":"4","imgs":[],"t":"문장형"},{"n":27,"b":"According to the Road Traffic Act and its Enforcement Decree, if a person who is blind in one eye intends to  obtain a Class I driver's license for ordinary motor vehicles, the visual acuity of his/he","c":["0.5, 50","0.6, 80","0.7, 100","0.8, 120"],"a":"4","imgs":[],"t":"문장형"},{"n":28,"b":"How often is a person between 65 and 75 years of age with a Class I driver’s license (excluding persons who  have lost sight in only one eye) required to take a regular aptitude test?","c":["Every 3 years","Every 5 years","Every 10 years","Every 15 years"],"a":"2","imgs":[],"t":"문장형"},{"n":29,"b":"When should drivers return their driver's license to the commissioner of the City/Do (Province) police agency?  (Select TWO)","c":["When they have their driver's license revoked","When they have their driver's license suspended","When they are notified that they should take an occasional aptitude test","If they fail to take a regular aptitude test for 6 months"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":31,"b":"According to the Road Traffic Act, which of the following cannot be issued an English driver's license?","c":["A person who has passed the driver’s license test and who applies for a driver’s license","A person who has passed the driver’s license aptitude test and who applies for a driver’s license","A person who applies for exchanging a foreign driver’s license with a domestic driver’s license","A person who applies with a student license"],"a":"4","imgs":[],"t":"문장형"},{"n":32,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is not allowed to be driven  with a Class II driver’s license for ordinary motor vehicles?","c":["A recovery vehicle","A passenger vehicle with seating capacity of less than 10","A passenger car","A truck with loading weight of 2.5 tons"],"a":"1","imgs":[],"t":"문장형"},{"n":33,"b":"A person whose driver’s license test result becomes invalidated due to cheating shall be prohibited from taking  the relevant examination for ( ) from the date of imposition. Which answer fits in ( )?","c":["2 years","3 years","4 years","5 years"],"a":"1","imgs":[],"t":"문장형"},{"n":34,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is NOT a valid reason for  postponing license renewal or the regular aptitude test?","c":["If the person is staying overseas","If the person is unable to move due to an illness","If the person is serving as a noncommissioned officer or higher in the Army, Navy, or Air Force pursuant to the Military  Personnel Management Act","If the person falls victim to a disaster or a calamity"],"a":"3","imgs":[],"t":"문장형"},{"n":35,"b":"According to the Road Traffic Act and its Enforcement Decree, a person who has received an extension of the  period for renewal of a driver's license must renew and obtain a driver's license within ( ","c":["1 month","3 months","6 months","12 months"],"a":"2","imgs":[],"t":"문장형"},{"n":36,"b":"According to the High-pressure Gas Safety Control Act, which of the following are required to take special  education?","c":["Drivers of fuel cell passenger vehicles","Drivers of large FCEBs (seating capacity of 36 or more)","Drivers of fuel cell trucks","Drivers of special-purpose FCEVs"],"a":"2","imgs":[],"t":"문장형"},{"n":37,"b":"Which of the following is correct regarding the obligations of a driver who has obtained a conditional driver’s  license upon installing an ignition interlock device under the Road Traffic Act?","c":["A person who has obtained a conditional driver’s license upon installing an ignition interlock device and who drives without  registering it with the ","A person who has driven a vehicle without an ignition interlock device or with such device that fails to meet the installation  standards shall be ord","A person who drives a motor vehicle with an ignition interlock device, etc. knowing that the device is less effective as it was  dismantled, tampered ","After the period of license disqualification due to drunk driving, a person may only drive a vehicle with an ignition  interlock device from the time "],"a":"4","imgs":[],"t":"문장형"},{"n":38,"b":"What is the standard for penalties imposed on a driver who knowingly uses a fake petroleum product as vehicle  fuel?","c":["An administrative fine between KRW 50,000 and 100,000","An administrative fine between KRW 500,000 and 1 million","An administrative fine between KRW 2 million and 20 million","No penalties"],"a":"3","imgs":[],"t":"문장형"},{"n":39,"b":"Which of the following is NOT correct regarding charging stations of electric vehicles (EVs)?","c":["Common-use chargers refer to chargers installed in rest areas, large marts, and public offices.","For the charging method of EVs, there are slow-charging methods using alternating current and fast-charging methods using  direct current.","Only pre-registered vehicles can use common-use chargers.","If one possesses land or lot, one can install a personal charging facility."],"a":"3","imgs":[],"t":"문장형"},{"n":40,"b":"Which of the following is NOT a problem that can occur in cars when refueling with fake petroleum products?","c":["Increased engine noise due to corrosion and damage of the fuel supply device","Reduced power and fuel efficiency due to damage to the injector that injects fuel","Reduced power due to reduction of engine friction caused by increased lubricity","Power-downs due to damage to the high-pressure fuel pump supplying fuel"],"a":"3","imgs":[],"t":"문장형"},{"n":41,"b":"Which TWO items should you check before getting in a vehicle?","c":["Condition of tire wear","Whether there are obstacles in front of or behind your car","Whether the dashboard readings are working properly","Whether the brake pedal works normally"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":42,"b":"What is the color generally displayed on the inspection screen when the life of a maintenance-free (MF) battery  expires?","c":["Yellow","White","Black","Green"],"a":"2","imgs":[],"t":"문장형"},{"n":43,"b":"Which of the following CANNOT be considered a fake petroleum product for use as vehicle fuel?","c":["Gasoline mixed with methanol","A product that contains less than 5% high-grade gasoline mixed with normal gasoline","Diesel oil mixed with kerosene","A product with less than 5% water mixed with diesel"],"a":"4","imgs":[],"t":"문장형"},{"n":44,"b":"Which of the following is not the correct method of checking for hydrogen gas leaks?","c":["Measurement using a flammable gas detector","Confirmation through soapy water","Confirmation by smelling gas","Confirmation using a hydrogen detector"],"a":"3","imgs":[],"t":"문장형"},{"n":45,"b":"Which of the following is NOT correct regarding the safety rules for hydrogen vehicles?","c":["Switch off the vehicle power before charging.","Smoking should be done at a distance from the vehicle.","When hydrogen gas leaks, request the safety supervisor from the charging station for a safety check.","After a traffic accident involving the collision of a hydrogen vehicle, drive the vehicle after undergoing a gas safety  inspection."],"a":"2","imgs":[],"t":"문장형"},{"n":46,"b":"Which of the following is not necessary when checking for leaks in hydrogen vehicles?","c":["Connection between valve and container","Regulator","Gas hose and pipe connection","Boost inverter of fuel cell"],"a":"4","imgs":[],"t":"문장형"},{"n":47,"b":"Which of the following is NOT an appropriate method of charging an EV?","c":["When charging, use a charger and an adapter that are compatible with the specifications.","During charging, do not disconnect the charging connector arbitrarily. End charging with the charging completion  button.","Be careful not to use the charger with wet hands; prevent water from entering the charging device.","When using a portable charger to charge, you can use a household power strip or an extension cord."],"a":"4","imgs":[],"t":"문장형"},{"n":48,"b":"Which of the following is the correct pairing of light and color?","c":["Reverse light – Amber","License plate light – Blue","Taillight – White","Brake light – Red"],"a":"4","imgs":[],"t":"문장형"},{"n":49,"b":"Which of the following is NOT correct regarding the characteristics of the fuel used in an LPG vehicle?","c":["It burns in a gaseous state, allowing the engine to operate smoothly.","LPG for motor vehicles has a distinct odor.","It is generally lighter than air and less explosive.","It has a lower energy density compared to gasoline or diesel, resulting in lower output and lower fuel efficiency for   vehicles equipped with an engi"],"a":"3","imgs":[],"t":"문장형"},{"n":50,"b":"Which of the following is NOT a cause of reducing the braking force of a vehicle?","c":["Master cylinder failure","Defective wheel cylinder","Deformation of release fork","Occurrence of vapor lock"],"a":"3","imgs":[],"t":"문장형"},{"n":51,"b":"Which of the following is NOT correct regarding the method of driving a vehicle equipped with a driving  assistance device?","c":["When using a driving assistance device, check frequently whether the device is operating while driving.","In case of a driving intervention warning, wait until the driving assistance device is released before intervening.","When fully or partially releasing the driving assistance device, check whether it works.","Even if the driving assistance system is in operation, be ready to intervene at short notice."],"a":"2","imgs":[],"t":"문장형"},{"n":52,"b":"Which of the following is NOT true about a driver-assistance system?","c":["Lane Following Assist (LFA) is a system designed to assist the driver in driving to stay within the lane on the road.","Adaptive Smart Cruise Control (ASCC) is a system that automatically adjusts the vehicle speed to maintain a safe distance  from vehicles ahead.","Active Blind Spot Detection (ABSD) is a system that assists drivers in changing lanes by warning them of vehicles in their  blind spots.","Autonomous Emergency Braking (AEB) is a system that prevents the wheels from locking up and reduces the braking  distance."],"a":"4","imgs":[],"t":"문장형"},{"n":53,"b":"Which of the following is incorrect regarding provisions on autonomous driving systems?","c":["The Road Traffic Act stipulates that “driving” does not include the use of an autonomous driving system in accordance with  the original use of motor ","The prohibition of using a mobile phone does not apply to drivers driving a vehicle operated under an autonomous driving  system.","The traffic penalty for a driver who fails to respond promptly to the take-over request from the autonomous driving system  is a fee of KRW 40,000.","An “autonomous driving system” encompasses a variety of automated apparatus, software, and peripheral devices that allow   a vehicle to move by recogn"],"a":"1","imgs":[],"t":"문장형"},{"n":54,"b":"Which of the following is NOT a crucial component of an FCEV?","c":["A fuel cell","A traction motor","An engine","A battery"],"a":"3","imgs":[],"t":"문장형"},{"n":55,"b":"What is the rotational force (instantaneous force) generated from the crankshaft of an internal combustion  engine of a vehicle?","c":["Torque","Fuel economy","Displacement","Horsepower"],"a":"1","imgs":[],"t":"문장형"},{"n":56,"b":"According to the Act on the Promotion of and Support for Commercialization of Autonomous Vehicles, which of  the following is NOT true about autonomous vehicles?","c":["The types of autonomous vehicles can be divided into fully autonomous vehicles and semi-autonomous vehicles.","Fully autonomous vehicles refer to vehicles that can operate solely on autonomous driving systems without the need  for a driver or any intervention f","Semi-autonomous vehicles refer to vehicles that cannot operate solely on autonomous driving systems or which require  continuous attention from the dr","Autonomous vehicles are limited to passenger vehicles, and this law does not apply to buses or trucks."],"a":"4","imgs":[],"t":"문장형"},{"n":57,"b":"Which two statements are NOT correct regarding the management of EVs?","c":["The valid period for the vehicle inspection of non-commercial passenger vehicles is 6 years.","When driving long distances, check and charge the battery in advance.","Refrain from accelerating or suddenly stopping immediately after charging.","It is more efficient to use an air heater than a heated seat or a heated handle."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":58,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is subject to regulations  regarding the permeability of visible rays through the window glass of motor vehicles (e","c":["Window glass on the side of the back seat","Front windshield, window glass on the right and left sides of the driver's seat","Front windshield, window glass on the right and left sides of the driver's seat, and rear windshield","All windows"],"a":"2","imgs":[],"t":"문장형"},{"n":59,"b":"According to the Motor Vehicle Management Act and its Enforcement Decree, a passenger car is a motor vehicle  suitably manufactured to transport up to how many people?","c":["10 people or fewer","12 people or fewer","15 people or fewer","18 people or fewer"],"a":"1","imgs":[],"t":"문장형"},{"n":60,"b":"Under the Motor Vehicle Management Act and its Enforcement Decree, what is the validity period for the initial  inspection conducted on a new non-commercial passenger car?","c":["1 year","2 years","4 years","5 years"],"a":"4","imgs":[],"t":"문장형"},{"n":61,"b":"Which TWO are considered types of vehicles according to the Motor Vehicle Management Act?","c":["Construction machinery","Truck","Tractor","Special motor vehicle"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":62,"b":"What is the color scheme of the license plates attached to EVs and hydrogen fuel cell vehicles used for  non-commercial or rental purposes (apart from hybrid vehicles)?","c":["Black letters on yellow background","Black letters on blue background","White letters on royal blue background","Black letters on purple background"],"a":"2","imgs":[],"t":"문장형"},{"n":63,"b":"Which of the following vehicles CANNOT use the Hi-pass lanes?","c":["A dump truck with loading weight of 16 tons","A double-decker bus that operates between Seoul and Suwon","A fire vehicle with vehicle width of 3.7m in case of a single lane","A large recovery vehicle weighing 10 tons"],"a":"3","imgs":[],"t":"문장형"},{"n":64,"b":"Under the Motor Vehicle Management Act, what is the period of validity for the inspection of a small  non-commercial van (registered in or after 2001) that is over 4 years old?","c":["6 months","1 year","2 years","4 years"],"a":"2","imgs":[],"t":"문장형"},{"n":65,"b":"Under the Motor Vehicle Management Act, what is the period of validity for the inspection of a small  non-commercial truck that is no more than 4 years old?","c":["6 months","1 year","2 years","4 years"],"a":"3","imgs":[],"t":"문장형"},{"n":66,"b":"Under the Motor Vehicle Management Act and its Enforcement Decree, what is the standard validity period of a  temporary driving permit issued when purchasing a new car?","c":["Within 10 days","Within 15 days","Within 20 days","Within 30 days"],"a":"1","imgs":[],"t":"문장형"},{"n":67,"b":"Which of the following is NOT accepted as a reason for change of registration of a vehicle in accordance with the  Motor Vehicle Management Act and its Enforcement Decree?","c":["The main use address of the car has been changed.","The vehicle's identification number has been changed.","Ownership has been changed.","The name of the corporation has been changed."],"a":"3","imgs":[],"t":"문장형"},{"n":68,"b":"Which of the following is NOT a desirable mindset for drivers of autonomous vehicles?","c":["Since it is an autonomous vehicle, the drivers can drive even under the influence of alcohol.","The driver must not drive an autonomous vehicle in an exhausted state.","Even drivers of autonomous vehicles can take psychoactive medication and drive.","The driver may use a mobile phone while driving an autonomous vehicle."],"a":"1","imgs":[],"t":"문장형"},{"n":69,"b":"According to the Trucking Transport Business Act, the operator of a trucking transport business has to keep  operation records in the tachograph for ( ). Which answer fits in ( )?","c":["3 months","6 months","1 year","2 years"],"a":"2","imgs":[],"t":"문장형"},{"n":70,"b":"Under the Motor Vehicle Management Act and its Enforcement Decree, a person who wishes to register the  transfer of a vehicle must finish the registration within (  ) of the date of purchase. What bel","c":["15 days","20 days","30 days","40 days"],"a":"1","imgs":[],"t":"문장형"},{"n":71,"b":"According to the Motor Vehicle Management Act, the period for regular vehicle inspection is from ( ) days before  to ( ) days after the expiration date of the inspection validity. Which of the followi","c":["90, 31","80, 41","60, 51","50, 61"],"a":"1","imgs":[],"t":"문장형"},{"n":72,"b":"Under the Guarantee of Compulsory Motor Vehicle Liability Security Act, what is the punishment criterion for a  car owner who fails to purchase mandatory insurance? (When the car has not been operated","c":["An administrative fine of up to KRW 3 million","An administrative fine of up to KRW 5 million","Up to 1 year of imprisonment or a criminal fine of up to KRW 10 million","Up to 2 years of imprisonment or a criminalfine of up to KRW 20 million"],"a":"1","imgs":[],"t":"문장형"},{"n":73,"b":"According to the Motor Vehicle Management Act, what is the registration that needs to be done when the  ownership of a car is changed through inheritance or other means?","c":["New registration","Transfer of ownership registration","Modification registration","Cancellation registration"],"a":"2","imgs":[],"t":"문장형"},{"n":74,"b":"According to the Motor Vehicle Management Act and its Enforcement Decree, which of the following is NOT a  type of vehicle inspection that a vehicle owner should do?","c":["Repair inspection","Special inspection","Inspection of tuning","Provisional inspection"],"a":"2","imgs":[],"t":"문장형"},{"n":75,"b":"Which of the following processes the registration of transfer for a vehicle sale?","c":["Korea Road Traffic Authority","Si, Gun, or Gu district office","Korea Transportation Safety Authority","City/Do (Province) police agency"],"a":"2","imgs":[],"t":"문장형"},{"n":76,"b":"Which TWO are NOT types of vehicle registration?","c":["Registration of revision","Registration of rights","Registration of patent rights","Registration of cancellation"],"a":"2, 3","imgs":[],"t":"문장형"},{"n":77,"b":"Which of the following is the appropriate permeability of visible rays through the front windshield of motor  vehicles (other than children’s school buses)?","c":["40%","50%","60%","70%"],"a":"4","imgs":[],"t":"문장형"},{"n":78,"b":"What is the proper sequence of applying brakes while driving?","c":["Identify hazard → make judgment → order action → apply brakes","Identify hazard → order action → make judgment → apply brakes","Make judgment → identify hazard → order action → apply brakes","Order action → identify hazard → make judgment → apply brakes"],"a":"1","imgs":[],"t":"문장형"},{"n":79,"b":"Which of the following is NOT a required condition for an airbag?","c":["Tensile strength and heat resistance at a high temperature","Tensile strength and heat resistance at a low temperature","Rupture strength, wear resistance, flexibility","Maximizing the impact energy in contact with a driver"],"a":"4","imgs":[],"t":"문장형"},{"n":80,"b":"Which of the following is correct regarding the precautions to take when getting in and out of a car?","c":["When getting in or out, check if there is a car coming from behind.","Get out of the car immediately after completely opening the door.","When a person exits a vehicle from the back seat, the driver should look straight forward.","When leaving the driver's seat temporarily, you need not turn off the car's engine."],"a":"1","imgs":[],"t":"문장형"},{"n":81,"b":"According to the Road Traffic Act, which of the following correctly connects the situation and the proper action  that drivers must take?","c":["School zone - Honk to inform children of the vehicle passing by.","Railroad crossing - Increase speed to pass quickly when a crossing barrier is about to go down.","Intersection without signals - When turning right, drive slowly along the right side of the road and turn right.","Night driving - Adjust the headlights to high beam to caution drivers coming from the opposite direction."],"a":"3","imgs":[],"t":"문장형"},{"n":82,"b":"Which of the following statements about overtaking is correct under the Road Traffic Act?","c":["Inside tunnels, overtaking is allowed during daytime but banned during nighttime.","Drivers can overtake the car ahead either on its left or on its right after turning on the headlights and honking.","Overtaking is not allowed on bridges or at intersections.","A driver may stop, proceed slowly, or overtake a vehicle as directed by a police officer."],"a":"3","imgs":[],"t":"문장형"},{"n":83,"b":"Which of the following is NOT a desirable driver attitude?","c":["Because the traffic situation is not changing, there is no need to make plans ahead.","Equip the vehicle with a fire extinguisher to take action immediately in case of fire.","Remove lighters and other flammable items from the vehicle.","Drive courteously, especially for novice drivers."],"a":"1","imgs":[],"t":"문장형"},{"n":84,"b":"Which of the following is the most appropriate driving behavior for a driver?","c":["Drowsy driving entails the risk of a traffic accident, so it is important to stop the car on a roadside to rest when you are  drowsy.","Novice drivers should continuously drive in the overtaking lane on an expressway.","Install and operate a device that interferes with the functions of traffic regulation equipment.","Upon identifying a risk to traffic safety, inform others with emergency lights."],"a":"4","imgs":[],"t":"문장형"},{"n":85,"b":"Which of the following is NOT a desirable driver attitude?","c":["Always drive while obeying traffic rules, such as driving under the speed limit.","Drive on the shoulder in the event of traffic congestion.","Compliance with traffic laws and regulations is a mutual commitment among drivers.","Put pedestrian safety first before increasing the vehicle speed."],"a":"2","imgs":[],"t":"문장형"},{"n":86,"b":"In case of an accident, which of the following is NOT considered the responsibility of the driver?","c":["Criminal liability","Administrative liability","Civil liability","Notification liability"],"a":"4","imgs":[],"t":"문장형"},{"n":87,"b":"Which of the following is NOT a correct response by a driver to a traffic accident while driving on an expressway?","c":["Take first-aid measures depending on the severity of a passenger's injury.","Turn on the hazard lights to alert trailing drivers of the danger.","Control the traffic at the rear part of the vehicle until a police officer arrives.","Move to a safer place to prevent secondary accidents."],"a":"3","imgs":[],"t":"문장형"},{"n":88,"b":"Which of the following actions is the correct behavior of a driver driving a passenger vehicle with an infant?","c":["An adult in the passenger seat sits with an infant and wears the same seat belt.","A seat belt is enough for an infant sitting in the back seat; an infant safety harness is not necessary.","To appease a crying infant while driving, it is OK to let the infant sit together with the driver in the driver’s seat and   wear the same seatbelt.","When riding with an infant, always use an infant safety harness with a seat belt fastened, regardless of the road taken by the        driver."],"a":"4","imgs":[],"t":"문장형"},{"n":89,"b":"Which TWO are the responsibilities of a driver?","c":["Stop the vehicle if there is risk of a traffic accident involving children.","You must slow down when riding over a puddle so as not to splash others.","Apply dark tinting since the brightness of vehicle windows is not regulated.","Drive at a reduced speed when pedestrians are crossing a crosswalk."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":90,"b":"Which of the following are desirable behaviors when driving on a freeway? (Select TWO)","c":["If you are drowsy or exhausted from driving, pull the vehicle over on the shoulder to take a rest or a nap.","You can watch entertaining videos while driving.","You should take a rest and ventilate the vehicle regularly to stay awake.","You should constantly check for hazards along the route before departure and even while taking a rest."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":91,"b":"Which of the following is NOT desirable regarding a driver's necessary preparation for safe driving?","c":["Control your body condition so that your attention is not diverted.","Wear clothes that are comfortable and suitable for driving.","Prepare emergency signaling devices such as flare.","In order to save fuel, preheat the engine by turning it on 10 minutes before departure."],"a":"4","imgs":[],"t":"문장형"},{"n":92,"b":"Which TWO are correct regarding concentration while driving?","c":["Continuously chatting with a passenger while driving improves the driver's concentration.","It is better to remove stickers that can block the driver’s view.","Concentration while driving has nothing to do with safe driving.","TVs or DMBs should be installed where they can be seen only by passengers in the back seat."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":93,"b":"According to the Road Traffic Act, if an infant is on board a vehicle (except for two-wheeled vehicles), using an  infant safety harness is required. Which of the following is the age criteria for an ","c":["8 years or below","Below 8 years","Below 6 years","6 years or below"],"a":"3","imgs":[],"t":"문장형"},{"n":94,"b":"According to the Road Traffic Act, which of the following is NOT true about regulations and proper operation of   PMDs?","c":["The driver must turn on headlights and daytime running lights when driving at night.","Among the PMDs, not more than one person can drive an electric kick scooter.","A personal mobility device includes self-balancing scooters, electric kick scooters, electric bicycles, electric unicycles,   and mobility scooters.","An electric bicycle powered by a motor can carry two persons."],"a":"3","imgs":[],"t":"문장형"},{"n":95,"b":"Which of the following is true regarding wearing a seat belt before driving a vehicle (excluding two-wheeled       vehicles)?","c":["If the passenger is a child under 13 years old and is not wearing a seat belt, the driver will be slapped with an  administrative fine of KRW 100,000.","If the passenger is 13 years old or above and is not wearing a seat belt, the driver will be slapped with an  administrative fine of KRW 30,000.","Only the driver and front passenger are obligated to wear seat belts when driving on general roads.","All passengers are obligated to wear seat belts, but a child under 3 years old can be placed on the lap of the guardian."],"a":"2","imgs":[],"t":"문장형"},{"n":96,"b":"Which of the following is a good driving attitude for accident prevention?","c":["Using indicators to make sure that the others know the driver’s path of travel","Frequently making sudden maneuvers and braking","Driving to get through traffic as advantageously as possible for oneself","Retribution for aggressive driving by other drivers"],"a":"1","imgs":[],"t":"문장형"},{"n":97,"b":"Which of the following actions is NOT desirable for a driver?","c":["Drive according to the flow of traffic within the speed limit.","If you are a novice driver, use the shoulder on the expressway and do not interfere with the traffic flow.","Do not fight without stopping your car on the road first.","A student license holder should drive with a companion according to the law."],"a":"2","imgs":[],"t":"문장형"},{"n":98,"b":"According to the Road Traffic Act, which of the following best describes \"yielding\"?","c":["When driving continuously at slow speed, the driver must yield the lane by moving to the far left side of the road.","When an emergency vehicle is approaching from behind, the driver must proceed quickly.","At an intersection without a traffic light, the driver must yield the right of way to vehicles approaching from the left.","Vehicles driving on a road with a yield sign must yield the lane to vehicles on other roads."],"a":"4","imgs":[],"t":"문장형"},{"n":99,"b":"According to the Act on the Promotion of Transportation Convenience of Mobility Disadvantaged Persons, who  among the following are NOT considered “mobility disadvantaged persons”?","c":["The elderly","Pregnant women","Persons accompanied by infants","Persons with pets"],"a":"4","imgs":[],"t":"문장형"},{"n":100,"b":"Under the Act on the Promotion of Transportation Convenience of Mobility Disadvantaged Persons, which of  the following is not considered a “pedestrian safety facility” for mobility disadvantaged pers","c":["Speed reduction facility","Bicycle lane","Transportation information facilities such as public traffic information system","Traffic signal for pedestrians' right of way"],"a":"2","imgs":[],"t":"문장형"},{"n":101,"b":"According to the Road Traffic Act, which of the following cases requires driving at a slow speed?","c":["When the traffic signal at the intersection is flashing in red","Upon passing an intersection where traffic is not controlled and is frequent","Upon passing an intersection where traffic is not controlled","Upon changing lanes near an intersection"],"a":"3","imgs":[],"t":"문장형"},{"n":102,"b":"What is the best way of proceeding when turning left at a congested intersection?","c":["If possible, enter the intersection while following the car in front.","You may enter the intersection if the traffic light is green.","If there is space available, you may enter the intersection even if the traffic light is red.","Do not enter the intersection even when there is a green arrow."],"a":"4","imgs":[],"t":"문장형"},{"n":103,"b":"Which of the following is the correct method of entering a travel lane from an acceleration lane of an  expressway?","c":["Stop temporarily to check the traffic flow, and then quickly enter the expressway.","Stop temporarily before entering the expressway and abruptly enter when there are vehicles passing on the road.","Enter the expressway even if there is not much space to enter, in consideration of the vehicle behind.","Use the acceleration lane, maintaining a certain speed, and enter the expressway when enough space is secured."],"a":"4","imgs":[],"t":"문장형"},{"n":104,"b":"Vehicle A is moving slowly on the right side of the expressway's main lane. In this case, what is the best method  of entering the main lane?","c":["Slowly increase the speed and enter, but make sure you do so after Vehicle A passes.","Accelerate and enter using an empty roadside.","Stop at the end of the acceleration lane and enter after Vehicle A passes.","Continue driving on the acceleration lane at the same speed as Vehicle A."],"a":"1","imgs":[],"t":"문장형"},{"n":105,"b":"Which of the following is the most appropriate driving behavior when a driver notices a child crossing the road  without a guardian?","c":["Repeatedly honk so that the child can cross quickly.","Ensure the safety of the child crossing the road by moving slowly.","Temporarily stop and ensure the safety of the child crossing the road.","Ensure the safety of the child crossing the road by passing quickly."],"a":"3","imgs":[],"t":"문장형"},{"n":106,"b":"What is the safest driving method when entering an intersection with no traffic lights and where both the left  and right sides are not visible?","c":["Drive slowly depending on the surrounding situation and pass through the intersection after checking that it is safe.","Enter while honking and flashing headlights, and drive slowly while passing through.","Make a temporary stop to make sure that it is safe, and then pass through the intersection according to right-of-way  standards.","Since a vehicle entering the intersection first has priority, quickly pass through the intersection while checking the  surroundings."],"a":"3","imgs":[],"t":"문장형"},{"n":107,"b":"Which of the following would cause the biggest safety hazard when turning left at an intersection?","c":["A pedestrian crossing a crosswalk on the right side of the intersection","A motorcycle approaching at high speed from the rear in the right roadway","A passenger car turning right from the left side of the intersection","A bicycle turning right from the opposite side"],"a":"4","imgs":[],"t":"문장형"},{"n":108,"b":"Under the Road Traffic Act, which of the following describes the safest attitude for a person driving a personal  mobility device?","c":["When passing on a sidewalk, drive away from pedestrians.","When driving after drinking alcohol, special attention is required.","If there are a crosswalk and a bicycle crossing, use the bicycle crossing.","When driving the device on a crosswalk, avoid pedestrians on the crosswalk."],"a":"","imgs":[],"t":"문장형"},{"n":109,"b":"Which of the following is correct regarding the traffic safety policy referred to as Safety Speed 5030?","c":["Within 50 km per hour on the automobile road and 30 km per hour on the back road in a residential area in a city","Within 50 km per hour on the main road in a city and 30 km per hour on the back road in a residential area in a city","Within 50 km per hour on the automobile road and 30 km per hour in a school zone","Within 50 km per hour on the main road in a city and 30 km per hour on the bicycle track"],"a":"2","imgs":[],"t":"문장형"},{"n":110,"b":"According to the Road Traffic Act, what are TWO situations or locations where driving at slow speed is required?","c":["An intersection without any traffic signals","A road with children crossing without a guardian","A road where you see a blind person crossing using a white cane","The start of a winding road"],"a":"1, 4","imgs":[],"t":"문장형"},{"n":111,"b":"Which of the following are the proper ways of driving around a roundabout? (Select TWO)","c":["Vehicles already in the roundabout have priority.","Enter a roundabout as quickly as possible.","Turn on the hazard lights when entering a roundabout.","The driving direction in a roundabout is counterclockwise."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":112,"b":"Which TWO statements are correct regarding driving on an expressway?","c":["All passengers must wear seat belts on an expressway.","A vehicle driving on an expressway must yield to merging vehicles.","When driving on an expressway, you are not obliged to yield even if an emergency vehicle approaches.","A vehicle breakdown sign (including a safety tripod sign) must be carried in the vehicle."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":113,"b":"Which TWO descriptions are correct?","c":["The road surface marking for the \"yield\" instruction is indicated as a white ＂△＂ sign.","Cars driving in a lane with the yield mark must yield to cars driving in other lanes.","On a road, you must give a lane change signal 30 m before changing lanes.","In order to maintain smoother traffic flow, you must narrow the distance with the car in front of you by increasing your  speed."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":114,"b":"Which TWO statements are correct regarding yielding at an intersection with no traffic control?","c":["When turning left, you must yield to vehicles going straight or turning right at the intersection.","If you are about to enter the intersection, you are not required to yield to any vehicles that are already inside the  intersection and which are turn","If you are about to enter the intersection, you must not yield to any vehicles that are about to enter the intersection  from a narrower road.","When multiple vehicles assigned the same priority are about to enter the intersection at the same time, the vehicles on  the right have the right of w"],"a":"1, 4","imgs":[],"t":"문장형"},{"n":115,"b":"According to the Road Traffic Act and its Enforcement Decree, which TWO statements are NOT correct  regarding personal mobility devices (PMDs)?","c":["The electric motor must not operate when traveling at speeds of over 25 km/h, and the device must weigh less than 30 kg.","Anyone aged 13 or older may operate one without a license.","A motor-driven bicycle powered solely by a motor is classified as a personal mobility device under the law.","Personal mobility devices may freely use both bicycle lanes and sidewalks."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":116,"b":"Which of the following drivers is most likely to cause an accident?","c":["A driver who is focused only on driving","A driver with a habit of sudden starts, sudden braking, and sudden lane changes","A driver who keeps a safe distance from bicycles and two-wheeled vehicles","A driver who is a patient"],"a":"2","imgs":[],"t":"문장형"},{"n":117,"b":"Which of the following is NOT desirable driving behavior?","c":["Keep in mind that a police officer's hand signals overrule traffic lights.","Stay updated with the ever-changing traffic laws and regulations.","Upon identifying an emergency vehicle, immediately stop the vehicle regardless of your location, and make way.","Watch out for potholes when driving on a road where heavy rainfall is common or during the rainy season."],"a":"3","imgs":[],"t":"문장형"},{"n":118,"b":"You are about to enter an uncontrolled intersection to drive straight through. When a vehicle turning left from  the opposite lane has already entered the intersection, what is the correct way of driv","c":["Yield to the other vehicle already in the intersection.","Straight traffic takes the right of way over turning traffic. Drive through.","Ignore the vehicle in the intersection; check both sides and quickly drive through.","If your lane is wider than that of another vehicle in the intersection, you have the right of way."],"a":"1","imgs":[],"t":"문장형"},{"n":119,"b":"According to the Road Traffic Act, which of the following is NOT true about the passenger capacity of personal  mobility devices?","c":["An electric kick scooter can carry one person.","A self-balancing scooter can carry one person.","An electric bicycle powered by a motor can carry one person.","The traffic fine for violating the passenger capacity of a personal mobility device is KRW 40,000."],"a":"3","imgs":[],"t":"문장형"},{"n":120,"b":"Which of the following is a good attitude for a driver?","c":["Respect for communication and safety","Giving precedence to cars over people","Prioritizing his/her own car over others' vehicles","Accidents are a product of bad luck, not unlawful driving"],"a":"1","imgs":[],"t":"문장형"},{"n":121,"b":"According to the Road Traffic Act, which of the following is incorrect regarding drivers who have been issued a  conditional driver’s license requiring the installation of an alcohol ignition interloc","c":["When intending to drive a vehicle, the driver must install an alcohol ignition interlock device and register it with the  commissioner of the city or ","Driving a vehicle that is not equipped with an alcohol ignition interlock device is prohibited.","Driving a vehicle with an alcohol ignition interlock device that does not meet the installation standards is permitted.","The driver must submit the driving records of the vehicle with the alcohol ignition interlock device to the commissioner  of the city or provincial po"],"a":"3","imgs":[],"t":"문장형"},{"n":122,"b":"According to the Road Traffic Act, which of the following correctly describes the penalty imposed on a driver  who cannot operate a vehicle properly due to fatigue (including drowsy driving)?","c":["No penalty","Criminal fine of up to KRW 100,000 or detention","Criminal fine of up to KRW 200,000 or detention","Criminal fine of up to KRW 300,000 or detention"],"a":"4","imgs":[],"t":"문장형"},{"n":123,"b":"Fatigue affects a driver's driving performance. Which of the following correctly describes the influence of  fatigue on a driver?","c":["The response time of a driver to stimuli in his/her surroundings quickens.","The vision of the driver deteriorates and his/her view widens.","A driver's ability to recognize objects and drive safely deteriorates.","A driver's driving performance becomes more meticulous and planned."],"a":"3","imgs":[],"t":"문장형"},{"n":124,"b":"Which of the following is NOT a correct explanation of the punishment criteria for drunk driving?","c":["In case of the first violation, if the blood alcohol concentration is 0.2% or more, imprisonment for 2 to 5 years or  criminal fine of KRW 10 million ","Refusing a field sobriety test once may result in imprisonment with labor for 1 year or more but not more than 5 years,  or criminal fine of KRW 5 mil","In case of a second violation involving a blood alcohol concentration of 0.05%, imprisonment for up to 1 year or  criminal fine of up to KRW 5 million","Upon the first violation at a blood alcohol level of at least 0.08% but less than 0.2%: imprisonment with labor for at  least 1 year but not more than"],"a":"3","imgs":[],"t":"문장형"},{"n":125,"b":"If you drive when you are tired, you will not be able to sense correctly the speed at which you are driving.  Which of the following is correct?","c":["On a narrow road, you will feel as if you are going slower than you actually are.","On roads with wide-open views, you will feel as if you are going faster than you actually are.","You could underestimate the speed of a car coming toward you from far away and end up in an accident.","There is no possibility of you mistaking a car stopped ahead on an expressway to be moving."],"a":"3","imgs":[],"t":"문장형"},{"n":126,"b":"Which TWO may affect free running distance when driving a car?","c":["Driving on a rainy day","Driving under the influence of alcohol","Driving when the vehicle has insufficient brake fluid","Driving when tired"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":127,"b":"Which TWO statements are correct regarding penalties imposed on drunk drivers?","c":["Fully inebriated drivers with a blood alcohol concentration of 0.08% or higher will have their driver's license revoked  and receive punishment in acc","Those who refuse to take the alcohol breathalyzer test or who have caused fatalities or injuries while driving with a  blood alcohol concentration of ","Those who are caught driving with a blood alcohol concentration of at least 0.03 percent but less than 0.08 percent will  have their driver's license ","In a case wherein the driver causes an accident for the first time resulting in property damage while driving with a  blood alcohol concentration of a"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":128,"b":"Which TWO statements are correct regarding drunk driving?","c":["If a person disagrees with the result of a breathalyzer test, he/she may undergo the test again.","The Road Traffic Act does not contain any provision for punishing acts that interfere with alcohol testing.","A person who interferes with an alcohol test after riding a bicycle while drunk may be subject to punishment.","A driver of a motor vehicle who refuses to comply with a police officer’s request to take an alcohol test, despite being  reasonably suspected of bein"],"a":"3, 4","imgs":[],"t":"문장형"},{"n":129,"b":"Which of the following are true about drowsy and/or fatigued driving? (Select TWO)","c":["If drowsy while driving, you must consume more caffeine and change lanes more often to avoid monotonous driving.","Your alertness improves on roads with fewer variations and potential hazards, thereby reducing the risk of drowsy driving.","Avoid driving if you have taken cold medicines since they may cause drowsiness.","Alcohol deactivates certain cerebral functions and increases the chance of drowsiness."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":130,"b":"What penalty is a driver subjected to if caught by the police while driving in a physical state of being unable to  drive normally (due to illness or fatigue)?","c":["Administrative fine","Suspension of the driver's license","Detention or criminal fine","No penalty"],"a":"3","imgs":[],"t":"문장형"},{"n":131,"b":"Under the Act on Special Cases Concerning the Settlement of Traffic Accidents, what is the correct legal  responsibility of a driver who causes a traffic accident resulting in injury or death while dr","c":["The driver will be criminally charged despite being covered by liability car insurance and even after having settled  with  the accident victim(s).","The driver will be exempted from criminal charges if he/she is covered by car insurance.","The driver will be exempted from criminal charges if he/she is covered by comprehensive insurance.","The driver will be exempted from criminal charges if he/she is covered by comprehensive insurance and he/she has  settled  with the accident victim(s)"],"a":"1","imgs":[],"t":"문장형"},{"n":132,"b":"Driver A, with blood alcohol concentration of over 0.03%, is rear-ended by Driver B while waiting at a red light.  What happens next?","c":["Since drunk driving is a serious offense, Driver A should be penalized.","Although Driver B needs to be penalized for the accident, Driver A is also penalized separately for drunk driving.","Driver A is the victim in this accident and will not be subject to administrative penalties.","Driver B receives no demerit points regardless of the cause or result of the accident."],"a":"2","imgs":[],"t":"문장형"},{"n":133,"b":"According to the Road Traffic Act, a driver with blood alcohol concentration of ( ) or more is prohibited from  driving. Select one of the following to fill in the brackets:","c":["0.01% or higher","0.02% or higher","0.03% or higher","0.08% or higher"],"a":"3","imgs":[],"t":"문장형"},{"n":134,"b":"Which of the following are TWO correct descriptions with regard to fatigued driving and driving under the  influence of drugs?","c":["Fatigued driving is not likely to lead to falling asleep at the wheel.","Fatigued driving is dangerous because it leads to poor focus, judgment, and reflexes.","Driving under the influence of drugs and causing an accident resulting in injury are subject to punishment.","If your driver's license is revoked because of a hit-and-run event while driving under the influence of drugs, it is  possible to get the license back"],"a":"2, 3","imgs":[],"t":"문장형"},{"n":135,"b":"Which of the following is NOT an appropriate method of preventing retaliatory driving?","c":["Turn on the emergency flashers in case of emergency braking.","Turn off the head-beam headlights when a car approaches from the opposite direction.","Turn on the high-beam headlights when driving at high speed.","Wait for three seconds if the vehicle in front does not start moving right away."],"a":"3","imgs":[],"t":"문장형"},{"n":136,"b":"Which of the following is NOT an appropriate way of reporting retaliatory driving?","c":["Calling 120","Calling 112","Reporting to the smartphone app Safety e-Report","Reporting the incident to the Cyber Police Agency"],"a":"1","imgs":[],"t":"문장형"},{"n":137,"b":"According to the Road Traffic Act, drivers of (   ) are prohibited from driving their motor vehicles and the like  in a row or side by side without good cause and in a manner that endangers other pers","c":["self-balancing scooters - imprisonment with labor for not more than 1 year or criminal fine of not more than KRW 5 million","two-wheeled vehicles - imprisonment with labor for not more than 6 months or criminal fine of not more than KRW 3  million","special-purpose vehicles -imprisonment with labor for not more than 2 years or criminal fine of not more than KRW 5 million","motorcycles - imprisonment with labor for not more than 6 months or criminal fine of not more than KRW 3 million"],"a":"3","imgs":[],"t":"문장형"},{"n":138,"b":"You may be subject to a penalty according to the Criminal Act if you overtake a vehicle over the centerline or  perform any retaliatory driving such as sudden braking. In this case, what is the correc","c":["You will be sentenced to imprisonment for up to 7 years or criminal fine of not more than KRW 10 million.","You will be sentenced to imprisonment for up to 10 years or criminal fine of not more than KRW 20 million.","You will be sentenced to imprisonment for a limited term of more than 1 year.","You will be sentenced to imprisonment for a limited term of more than 18 months."],"a":"1","imgs":[],"t":"문장형"},{"n":139,"b":"If a passenger vehicle driver responds to a lane-change dispute by suddenly braking in front of the pursuing  vehicle, leading to a subsequent collision with an unaware cargo truck and resulting in in","c":["You will be sentenced to imprisonment for a limited term in the range of 1 year - 10 years.","You will be sentenced to imprisonment for a limited term in the range of 1 year - 20 years.","You will be sentenced to imprisonment for a limited term in the range of 2 years - 10 years.","You will be sentenced to imprisonment for a limited term in the range of 2 years - 20 years."],"a":"1","imgs":[],"t":"문장형"},{"n":140,"b":"Which of the following is not subject to legal action for reckless driving under the Road Traffic Act?","c":["Violating the maximum speed limit","Violating a prohibition of crossing the road, making a U-turn, or moving backward","Cutting in a lane","Honking continuously"],"a":"3","imgs":[],"t":"문장형"},{"n":141,"b":"A driver of a motor vehicle (excluding personal mobility devices) threatening another driver by committing the  acts below in a repeated manner will be punished for reckless driving. Which of the foll","c":["Violation of traffic signals or instructions","Violation of prohibitions on crossing, making a U-turn, and driving backward","Creating noise without reasonable cause","Violating a designated lane of an expressway"],"a":"4","imgs":[],"t":"문장형"},{"n":142,"b":"According to the Road Traffic Act, which of the following is the correct punishment for reckless driving?","c":["Notice for payment of traffic penalty of KRW 60,000","Administrative fine of KRW 30,000","Imprisonment for up to 6 months or criminal fine of not more than KRW 2 million","Imprisonment for up to 1 year or criminal fine of not more than KRW 5 million"],"a":"4","imgs":[],"t":"문장형"},{"n":143,"b":"What is the most incorrect action by the driver when a vehicle's cargo (including the driver's vehicle) falls into  the lane while driving on an expressway?","c":["Stop the vehicle in a safe place while checking for vehicles behind.","Report the case promptly to the relevant authorities such as expressway management agency.","Stop the vehicle in a safe place and check the cargo loading status.","Conduct retaliatory driving against the driver who dropped the cargo."],"a":"4","imgs":[],"t":"문장형"},{"n":144,"b":"According to the Road Traffic Act, which of the following cannot be construed as reckless driving for a  motorcycle (excluding personal mobility devices)?","c":["The driver repeatedly ignored traffic signals three times.","The driver committed successive violations of exceeding the speed limit and disobeying instructions.","The driver committed successive violations of ignoring traffic signals and crossing the centerline.","The driver committed successive violations of crossing the centerline as well as the duty to protect pedestrians."],"a":"4","imgs":[],"t":"문장형"},{"n":145,"b":"Which of the following is correct regarding reckless driving and retaliatory driving?","c":["A motorcycle driver who generates noise without just cause to threaten many unspecified drivers can be penalized for  retaliatory driving.","The driver of a passenger car who drives over the centerline and exceeds the speed limit repeatedly to threaten many  unspecified drivers can be penal","The driver of a large truck who intentionally overtakes a car and brakes suddenly can be penalized for reckless driving.","A bus driver who repeatedly violates the legal way of overtaking a car, thereby increasing the risk of traffic accident, can  be penalized for retalia"],"a":"2","imgs":[],"t":"문장형"},{"n":146,"b":"Causing harm to the life and safety of others by repeatedly driving over the centerline or causing risk in the  traffic flow are (    ) according to the Road Traffic Act. Which of the following fits i","c":["joint risky behavior","reckless driving","violent driving","retaliatory driving"],"a":"2","imgs":[],"t":"문장형"},{"n":147,"b":"A driver of a motor vehicle (excluding personal mobility devices) threatening another driver by committing the  acts below in a repeated manner on a general road will be punished for reckless driving.","c":["Violating a designated lane on a general road","Driving over the centerline and violating the prohibition on sudden braking","Not complying with the safe distance, violating lane-changing prohibitions","Improperly overtaking a car on a general road"],"a":"1","imgs":[],"t":"문장형"},{"n":148,"b":"A driver of a motor vehicle (excluding personal mobility devices) threatening another person by repeatedly  committing a series of two or more of the acts below will be punished for reckless driving. ","c":["Not keeping the eyes forward; operating a video display device while driving","Exceeding the speed limit while overtaking a car on his/her right side","Not securing sufficient safe distance and repeating sudden braking","Exceeding the speed limit to obstruct a trailing car that is attempting to pass by"],"a":"1","imgs":[],"t":"문장형"},{"n":149,"b":"A driver of a motor vehicle (excluding personal mobility devices) threatening another driver by repeatedly  committing the acts below will be punished for reckless driving. Which of the following is N","c":["Violation of traffic signals and instructions, driving over the centerline","Not securing sufficient safe distance, violating the prohibition on sudden braking","Violating the prohibition on obstructing attempts to pass, improperly overtaking a car","Violating the prohibition on passage, using a mobile phone while driving"],"a":"4","imgs":[],"t":"문장형"},{"n":150,"b":"Which of the following is an act of reckless driving for which you can be penalized?","c":["Stopping or parking on the roadside of an expressway","Driving while under the influence of alcohol","Driving in an exclusive lane on a general road","Driving over the centerline"],"a":"4","imgs":[],"t":"문장형"},{"n":151,"b":"Which of the following is NOT considered reckless driving for which you can be penalized?","c":["Violation of a traffic signal","Violation of speed limit","Violation of prohibition on driving motor vehicles in poor condition","Violation of prohibition of changing course"],"a":"3","imgs":[],"t":"문장형"},{"n":152,"b":"A driver was arrested for causing special injury under the Criminal Act using vehicles, etc. (retaliatory driving).  What is the administrative action for this person's driver's license?","c":["Cancellation of driver's license","Suspension of driver's license for 100 days","Suspension of driver's license for 60 days","No actions to be taken"],"a":"1","imgs":[],"t":"문장형"},{"n":153,"b":"According to the Road Traffic Act, what do you call the offense when the drivers of two or more cars (excluding  personal mobility devices) drive side by side or in tandem on a road without valid reas","c":["Dangerous collective conduct","Intersection tailgating","Cutting in","Disorderly conduct"],"a":"1","imgs":[],"t":"문장형"},{"n":154,"b":"According to the Road Traffic Act, which of the following is NOT subject to penalty for reckless driving?","c":["A driver who repeatedly brakes suddenly, causing danger in traffic","A driver who continually fails to maintain a safe distance from other drivers","A driver who repeatedly overtakes other vehicles in an illegal manner on the expressway","A driver who turns off his/her headlights and parks on the shoulder of the freeway at night, posing a danger to others"],"a":"4","imgs":[],"t":"문장형"},{"n":155,"b":"Which of the following is NOT a desirable driving habit?","c":["Turn off the engine while refueling.","Unless there is an urgent situation, do not apply the brake suddenly, instigating other vehicles to do the same.","To predict potential hazards and practice defensive driving, observe the speed limit and keep a safe distance.","To ensure driving stability, tire pressure should be 10% higher than the recommended standard regardless of the season."],"a":"4","imgs":[],"t":"문장형"},{"n":156,"b":"A driver was arrested for committing special violence under the Criminal Act using vehicles, etc. (retaliatory  driving). What is the administrative action for this person's driver's license?","c":["Cancellation of driver's license","Suspension of driver's license for 100 days","Suspension of driver's license for 60 days","No administrative actions"],"a":"2","imgs":[],"t":"문장형"},{"n":157,"b":"According to the Road Traffic Act, which of the following is NOT true about a pedestrian?","c":["A person using a handcart (not motorized) that is 1 m or less in width is not considered a pedestrian.","A person using a rollator that is 1 m or less in width is considered a pedestrian.","A person riding a bicycle is not considered a pedestrian.","A person using a walking frame that is 1 m or less in width is considered a pedestrian."],"a":"1","imgs":[],"t":"문장형"},{"n":158,"b":"Which of the following is NOT a desirable attitude for a driver using a drive-thru store?","c":["Follow the safety instructions of the attendant at the drive-thru store.","Follow the instructions on the signage installed at the drive-thru store.","Stop by encroaching upon a crosswalk while waiting in line for the drive-thru store.","Exercise caution while navigating the entrance and exit areas of the drive-thru store, paying attention to safety facilities."],"a":"3","imgs":[],"t":"문장형"},{"n":159,"b":"Which of the following is NOT true about a driver's duty to protect pedestrians?","c":["A traffic penalty  will be imposed on the driver who fails to slow down or stop on a pedestrian-first road and obstructs the  pedestrians.","The duty to protect pedestrians also applies to drivers driving on a place other than a road.","A driver who sees pedestrians crossing a crosswalk must come to a full stop before he/she reaches the crosswalk.","The driver must slow down when driving across a crosswalk in a school zone with no traffic lights."],"a":"4","imgs":[],"t":"문장형"},{"n":160,"b":"Which of the following is NOT true about a driver's duty to protect pedestrians?","c":["A driver who sees pedestrians crossing a crosswalk must come to a full stop before he/she reaches the crosswalk.","The driver must slow down while keeping a safe distance when passing by pedestrians on a narrow road with no markings.","If a crosswalk in a school zone has no traffic lights, the driver has no duty to stop if there are no pedestrians crossing.","The driver should not obstruct pedestrians crossing an intersection with no traffic lights."],"a":"3","imgs":[],"t":"문장형"},{"n":161,"b":"Which of the following is NOT true about pedestrian-first roads?","c":["On a pedestrian-first road, pedestrians can only walk along the right edge of the road.","Drivers are obligated to exercise various forms of pedestrian protection such as slowing down and coming to a  complete stop.","A driver who fails to fulfill his/her duty to protect pedestrians is subject to a traffic penalty of KRW 40,000 and a penalty  of 10 points based on t","If deemed necessary for pedestrian protection, the chief of a police station can limit the vehicle speed to 20 km/h or  less."],"a":"1","imgs":[],"t":"문장형"},{"n":162,"b":"While driving at 50 km/h on a city road, you find a pedestrian jaywalking. Which of the following is the most  appropriate measure to take?","c":["Brake suddenly because the pedestrian is crossing the road.","Go past the pedestrian by predicting his/her movement.","Slow down your car, turn on the emergency flashers to notify the car behind you, and stop safely.","Slightly increase the speed to pass while warning the pedestrian by honking."],"a":"3","imgs":[],"t":"문장형"},{"n":163,"b":"According to the Road Traffic Act, which of the following is NOT true about a driver's duty to protect  pedestrians?","c":["The driver must slow down while keeping a safe distance when pedestrians are passing through a safety zone set up on the  road and when he/she passes ","A driver who sees a pedestrian jaywalking must stop the vehicle at a distance for the pedestrian to cross the road safely.","A driver who is driving on a road with no centerline and where the roadway and sidewalk are not distinguishable must  slow down or stop for pedestrian","If a crosswalk in a school zone has no traffic light, the driver has to slow down in front of the crosswalk (a stop line if  there is any) even if the"],"a":"4","imgs":[],"t":"문장형"},{"n":164,"b":"According to the Road Traffic Act, a child below the age of 13 should wear protective gear for safety when  riding (  ). Which of the following does NOT fit in (  )?","c":["Scooter","Unicycles","In-line skates","Skateboard"],"a":"2","imgs":[],"t":"문장형"},{"n":165,"b":"Which of the following is correct regarding the duty to protect pedestrians?","c":["There is no need to protect a drunken pedestrian who is jaywalking.","It is okay to impede the passage of a pedestrian crossing a road with traffic signals.","When the green light for pedestrians is flashing, a car can proceed.","When turning right at an intersection with traffic signals, the driver shall not impede the passage of a pedestrian who is  obeying the signal."],"a":"4","imgs":[],"t":"문장형"},{"n":166,"b":"Which of the following persons or processions can pass through the center of a road?","c":["A parade for an important social event","A person riding a large animal such as a horse or a cow","A person cleaning or repairing the road","A funeral procession holding flags or banners"],"a":"1","imgs":[],"t":"문장형"},{"n":167,"b":"Which of the following is the safest way of driving a motor vehicle when passing through a crosswalk without  traffic lights?","c":["Even if there are no pedestrians crossing, the driver should carefully check the front and the surroundings and reduce  speed.","Since there are no pedestrians crossing, proceed without taking any action.","When there are no pedestrians crossing, proceed quickly.","Honk while driving through to ala
