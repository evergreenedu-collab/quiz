senger inside the vehicle","Violating the method of passing a railroad crossing","Violation of passage on a shoulder in an expressway","Violation of the obligation to present a driver's license, etc."],"a":"1","imgs":[],"t":"문장형"},{"n":516,"b":"When a driver subject to summary judgment pays the total sum of the due penalty in addition to ( ) of the  traffic penalty and submits a document confirming the payment before the announcement of the ","c":["20/100","30/100","50/100","70/100"],"a":"3","imgs":[],"t":"문장형"},{"n":517,"b":"According to the Road Traffic Act, what is the correct penalty for a driver who, despite having reasonable  grounds to be considered under the influence of alcohol, refuses to comply with a breath alc","c":["Imprisonment for at least one year but no more than two years, or criminal fine of up to KRW 5 million","Imprisonment for at least one year but no more than three years, or criminal fine of up to KRW 10 million","Imprisonment for at least one year but no more than four years, or criminal fine in the range of KRW 5 million - KRW  10 million","Imprisonment for at least one year but no more than five years, or criminal fine in the range of KRW 5 million - KRW  20 million"],"a":"4","imgs":[],"t":"문장형"},{"n":518,"b":"Which of the following is the appropriate penalty for driving a vehicle while covering the license plate?","c":["Imprisonment with labor for not more than 1 year or criminal fine of not more than KRW 10 million","Imprisonment with labor for not more than 1 year or criminal fine of not more than KRW 20 million","Imprisonment with labor for not more than 2 years or criminal fine of not more than KRW 10 million","Imprisonment with labor for not more than 2 years or criminal fine of not more than KRW 20 million"],"a":"1","imgs":[],"t":"문장형"},{"n":519,"b":"According to the Road Traffic Act and its Enforcement Decree, the driver of a vehicle is traveling on an  expressway without carrying a vehicle breakdown sign (safety tripod sign) inside the vehicle. ","c":["An administrative fine of KRW 20,000 will be charged.","A traffic penalty of KRW 30,000 will be imposed.","A criminal fine of up to KRW 300,000 will be charged.","No fine or penalty will be imposed."],"a":"1","imgs":[],"t":"문장형"},{"n":520,"b":"Which of the following is the correct pairing of traffic penalty and speed range imposed on the driver of an  automobile caught speeding on an expressway?","c":["For exceeding the speed limit by over 60 km/h to 80 km/h: traffic penalty of KRW 120,000","For exceeding the speed limit by over 40 to 60 km/h: traffic penalty of KRW 80,000","For exceeding the speed limit by over 20 to 40 km/h: traffic penalty of KRW 50,000","For exceeding the speed limit by less than 20 km/h: traffic penalty of KRW 20,000"],"a":"1","imgs":[],"t":"문장형"},{"n":521,"b":"Which of the following is the correct statement regarding the demerit points applied to a driver who causes an  accident?","c":["When a traffic accident involving one death (within 72 hours) occurs due to the violation of a signal, a penalty of 105  demerit points is incurred.","Demerit points are also applied for losses suffered by passengers of the victim's vehicle and the driver of the offending  vehicle.","Demerit points are calculated based on the cause of the accident, casualties if any, and damage to property.","If the accident involves two vehicles, no demerit points are applied if both vehicles are responsible for the accident."],"a":"1","imgs":[],"t":"문장형"},{"n":522,"b":"According to the Road Traffic Act, the medical checkup result report that determines whether a driver is eligible  for an aptitude test or not should be the document issued within (   ) of the driver'","c":["1 year","2 years","3 years","4 years"],"a":"2","imgs":[],"t":"문장형"},{"n":523,"b":"According to the Road Traffic Act and its Enforcement Decree, if you object to the revocation of your driver's  license, when can you submit an application to the Objections Deliberation Committee of ","c":["Within 90 days of the revocation","Within 90 days of becoming aware of the revocation","Within 60 days of the revocation","Within 60 days of becoming aware of the revocation"],"a":"3","imgs":[],"t":"문장형"},{"n":524,"b":"When a person holding a student license practices driving on a road, which of the following is the disposition  given to the driver if he/she drives by him/herself without being accompanied by a perso","c":["Disposition of notification","Imposition of an administrative fine","Suspension of the student license","Revocation of the student license"],"a":"4","imgs":[],"t":"문장형"},{"n":525,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is the correct punishment  if a driver drives a personal mobility device (PMD) without receiving a driver's license","c":["A criminal fine of up to KRW 200,000 or detention, or minor criminal fine","A criminal fine of up to KRW 300,000 or detention","A criminal fine of up to KRW 500,000 or detention","Up to 6 months' imprisonment or criminal fine of up to KRW 2 million"],"a":"","imgs":[],"t":"문장형"},{"n":526,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is an incorrect pairing of  violations and administrative fines imposed on the employers of drivers of automobiles?","c":["Crossing the centerline: Administrative fine of KRW 90,000","Traffic signal violation: Administrative fine of KRW 70,000","Driving on a sidewalk: Administrative fine of KRW 70,000","Speeding (not more than 20 km/h): Administrative fine of KRW 50,000"],"a":"","imgs":[],"t":"문장형"},{"n":527,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following actions are punishable  with demerit points?","c":["Throwing an object out of a moving vehicle","Not signaling before a change of lane","Driving a vehicle with illegal accessories","Violating the intersection traffic rules"],"a":"","imgs":[],"t":"문장형"},{"n":528,"b":"Which of the following statements regarding a reduction of demerit points through an accident-free and  violation-free driving pledge (Good Driving Mileage System) is correct?","c":["Special points of 40 points are issued.","Two years without any traffic accidents or violations are required to earn special points.","Except in certain cases, if a driver receives a suspension order, special benefit points are deducted from his or her  accumulated points.","A driver must visit a driver licensing office and submit a written pledge."],"a":"3","imgs":[],"t":"문장형"},{"n":529,"b":"Which two statements about ignition interlock devices (IIDs) are correct?","c":["An “ignition interlock device” is a device that prevents a vehicle from starting if the driver is intoxicated, as prescribed  by the Minister of Inter","Drivers holding a conditional license with IID restrictions must install the device on their vehicle and register it with the  provincial or municipal","The period of the device’s installation begins from the date on which the driver’s period of disqualification ends.","In cases where a person drives a personal mobility device after drinking, if he/she receives another license revocation  for drunk driving within five"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":530,"b":"Which of the following is subject to mandatory education on special traffic safety?","c":["A first-time applicant seeking to obtain a driver's license","A driver with 30 demerit points","A driver who completed proactive driving training","A driver whose license is suspended for reckless driving"],"a":"4","imgs":[],"t":"문장형"},{"n":532,"b":"Which of the following is NOT a valid reason for revocation of a driver's license?","c":["Failing to take the regular aptitude test for one year","Being arrested for retaliatory driving","Driving twice at a speed exceeding the speed limit by 100 km/h.","Using vehicles to kidnap, induce, or detain another person"],"a":"3","imgs":[],"t":"문장형"},{"n":533,"b":"What is the penalty for a driver who, upon being stopped for drink driving, and who is known to have refused a  breathalyzer test 3 years previously, refuses to comply once again?","c":["Imprisonment with labor for at least 1 year but not more than 6 years, or criminal fine of at least KRW 5 million but not  more than KRW 30 million","Imprisonment with labor for at least 2 years but not more than 6 years, or criminal fine of at least KRW 5 million but  not more than KRW 20 million","Imprisonment with labor for at least 3 years but not more than 5 years, or criminal fine of KRW at least 10 million but  not more than KRW 30 million","Imprisonment with labor for at least 1 year but not more than 5 years, or criminal fine of at least KRW 5 million but not  more than KRW 20 million"],"a":"1","imgs":[],"t":"문장형"},{"n":534,"b":"What is the penalty for driving with a BAC of between 0.08% and 0.2% (for a first offense within 10 years)?","c":["Imprisonment for up to 2 years or criminal fine of up to KRW 5 million","Imprisonment for up to 3 years or criminal fine between KRW 5 million and 10 million","Imprisonment for 1-2 years or criminal fine between KRW 5 million and 10 million","Imprisonment for 2-5 years or criminal fine between KRW 10 million and 20 million"],"a":"3","imgs":[],"t":"문장형"},{"n":535,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following are the demerit points  given to an automobile driver who flees after causing a traffic accident involving property","c":["15 points","20 points","30 points","40 points"],"a":"1","imgs":[],"t":"문장형"},{"n":536,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is the traffic penalty  imposed if measures are not taken to prevent freight from falling off a 4.5-ton truck?","c":["KRW 50,000","KRW 40,000","KRW 30,000","KRW 20,000"],"a":"1","imgs":[],"t":"문장형"},{"n":537,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is true about using  designated lanes?","c":[" eing under the influence and who uses substances such as medicine that  may affect the blood alcohol concentr","A person who is reasonably suspected of being under the influence and who commits an act of obstructing the alcohol  test after riding a bicycle is no"],"a":"2, 4","imgs":[],"t":"문장형"},{"n":554,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following are considered TWO  violations of the legal speed limit by passenger cars?","c":["Driving at a speed of 85 km/h on a general road with two lanes in one direction.","Driving at a speed of 90 km/h on Seohaean Expressway.","Driving at a speed of 95 km/h on an automobile road.","Driving at a speed of 75 km/h on an expressway with one lane in one direction."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":555,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following are the TWO correct  statements regarding roadside area?","c":["Borders need not be marked.","It is installed in order to secure the safety of pedestrians.","It is installed on roads without separate sidewalks.","It is not a road."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":556,"b":"Which of the following is the correct explanation on the Act on Special Cases Concerning the Settlement of  Traffic Accidents?","c":["If a driver who commits a crime of gross negligence while driving a vehicle has comprehensive automobile insurance, a  case cannot be filed unconditio","It is possible to institute public action against a driver responsible for occupational negligence even against the will of  the victim.","If the driver of a car is subject to criminal punishment, he/she is subject to imprisonment without prison labor for not  more than five years or crim","If personal injury is sustained due to driving at a speed of 20km per hour above the speed limit, but the driver has  comprehensive insurance, a case "],"a":"3","imgs":[],"t":"문장형"},{"n":557,"b":"According to the Road Traffic Act, which of the following cannot be regarded as a mobility aid chair vehicle (i.e.  a vehicle with a width of no more than 1 meter)?","c":["A manual wheelchair","An electric wheelchair","A mobility scooter","An electric bicycle"],"a":"4","imgs":[],"t":"문장형"},{"n":558,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following statements regarding  novice drivers is correct?","c":["Novice drivers are defined only for Class 1 regular licenses.","Refers to someone who has received only a motorized bicycle license for which less than 2 years have passed since the  date of issuance.","If a driver's license is revoked before 2 years have passed after the date of issuing the first driver's license and then  reissued, the record of dri","A person with a driver’s license issued no more than two years previosuly is considered a novice driver."],"a":"4","imgs":[],"t":"문장형"},{"n":559,"b":"Which of the following is correct regarding a motorized bicycle under the Road Traffic Act?","c":["The term \"motorcycle\" refers to all two-wheeled vehicles.","Under the Automobile Management Act, a motorcycle is defined as a two-wheeled vehicle with displacement of up to  250 cc.","A car embedding a motor with displacement of 150 cc or more is considered to be a motorcycle.","In the case of electricity-powered vehicles, a vehicle using a motor with maximum rated output of 11 kW or less  (excluding electric bicycles) is cons"],"a":"4","imgs":[],"t":"문장형"},{"n":560,"b":"Which of the following is NOT considered a traffic accident as defined in the Act on Special Cases Concerning  the Settlement of Traffic Accidents?","c":["A 4.5-ton truck collides with a car and injures its driver.","Injury of a pedestrian hit by a train on a railroad crossing","If a pedestrian crossing a crosswalk is hit by a car that violated the signal","Collision of a bicycle with a pedestrian on a sidewalk, resulting in injury to the pedestrian"],"a":"2","imgs":[],"t":"문장형"},{"n":561,"b":"According to the Road Traffic Act he Road Traffic Act and its Enforcement Decree, which of the following is the correct order of  horizontal traffic lights in a four-color scheme?","c":["From the right: red, green arrow, yellow, and green","From the left: red, yellow, green arrow, and green","From the left: yellow, red, green arrow, and green","From the right: green arrow, yellow, red, and green"],"a":"2","imgs":[],"t":"문장형"},{"n":566,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is NOT a required  document for the verification of aptitude test requirements?","c":["A health examination report as per the National Health Insurance Act","A written diagnosis issued by a doctor in accordance with the Medical Service Act","Notice of Physical Examination Results for Military Service under the Military Service Act","An eyesight test report issued by the president of the Korean Optometric Association"],"a":"4","imgs":[],"t":"문장형"},{"n":567,"b":"Which of the following can be designated as an emergency vehicle by the commissioner of the City/Do  (Province) police agency at the request of the organization or the person intending to use the vehi","c":["A blood bank vehicle","A police vehicle used for criminal investigation, traffic control, and other emergency police activities","A vehicle used for radio wave monitoring","A vehicle used for criminal investigation among vehicles belonging to investigation agencies"],"a":"3","imgs":[],"t":"문장형"},{"n":568,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following are the TWO correct  statements regarding emergency vehicles?","c":["An emergency vehicle used for the control of speeding violations must have a structure defined in the \"Standards on  the Safe Operation of Vehicles.\"","Emergency vehicles used for security services for domestic and foreign VIPs are not required to use a siren or a light  bar.","A normal vehicle is not considered an emergency vehicle even if its headlights and eme 1","imgs":[],"t":"문장형"},{"n":572,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is NOT true about drivers  of personal mobility devices (PMDs)?","c":["A driver's license is not required to operate a PMD.","It is not allowed to have more riders than the permitted capacity on a PMD.","Drivers of PMDs must wear protective gear to operate the device.","Drivers of PMDs must use the bicycle lane if there is any."],"a":"1","imgs":[],"t":"문장형"},{"n":573,"b":"According to the Road Traffic Act, which of the following persons may NOT use a sidewalk while riding a bicycle?","c":["A person registered as physically handicapped according to the Act on the Welfare of Persons with Disabilities","A child","A person with a plaster cast due to a bodily injury","A person of distinguished service to the state with Disability Rating 1 through 7 according to the Act on the Honorable  Treatment of and Support for "],"a":"3","imgs":[],"t":"문장형"},{"n":574,"b":"There is a pedestrian walking his/her bicycle to cross the street ahead of you. Which of the following is the  safest way to approach?","c":["Swiftly drive past the pedestrian from whichever side is more open.","Use the headlights and horn to let the pedestrian know you are approaching.","Fully stop the vehicle at a certain distance from the pedestrian.","Make the pedestrian stop as you have the right of way."],"a":"3","imgs":[],"t":"문장형"},{"n":575,"b":"Which of the following is the amount of penalty imposed on a person who rides a bicycle on a narrow road  within a school zone where a lane is not installed and who does not slow down while passing by","c":["KRW 100,000","KRW 80,000","KRW 40,000","KRW 20,000"],"a":"3","imgs":[],"t":"문장형"},{"n":576,"b":"Which of the following is not a high-risk personal mobility device/sports equipment stipulated by the Ordinance  of the Ministry of Interior and Safety to require children to wear protective gear when","c":["Kick scooters","Self-balancing scooters (segway)","Roller skates","Skateboards"],"a":"2","imgs":[],"t":"문장형"},{"n":577,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following are the TWO correct  statements regarding cycling?","c":["Unless allowed by a safety sign, two or more cyclists must not ride side by side on a road.","When crossing a crosswalk, a cyclist must dismount and push his/her bicycle across.","A cyclist must not use a sidewalk even if the road is not accessible due to damage, construction, or other interferences.","Where there is no bicycle track, a cyclist must ride close to the center of the road."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":578,"b":"According to the Act on the Promotion of Bicycle Riding, a guardian must not allow a child under the age of (   ) to operate an electric bicycle. Which of the following fills in the (   ) correctly?","c":["10","13","15","18"],"a":"2","imgs":[],"t":"문장형"},{"n":579,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is NOT the correct way to  ride a bicycle?","c":["Turn left on the leftmost lane.","Pass through the sidewalk as there was construction to repair damage on the roadway.","When using a crosswalk, get off and drag across.","Slow down to prevent pedestrian accidents."],"a":"1","imgs":[],"t":"문장형"},{"n":580,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is the correct behavior of  a cyclist?","c":["If the bicycle impedes the passage of pedestrians, slow down or stop temporarily.","A child riding a bicycle is not allowed to do so on the sidewalk.","Dragging a bicycle is not allowed in sections where the passage of bicycles is prohibited.","Up to two bicycles can pass side by side in the roadside area."],"a":"1","imgs":[],"t":"문장형"},{"n":581,"b":"Which of the following is NOT an advisable practice for cyclists (excluding electric bicycles)?","c":["A child riding a bicycle on a sidewalk","Cycling on a sidewalk with a safety sign indicating that cyclists are allowed","Cycling on a sidewalk because the road is damaged","Cycling along the middle of the road as there are no cars around"],"a":"4","imgs":[],"t":"문장형"},{"n":582,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is NOT true about drivers  of personal mobility devices?","c":["When crossing a crosswalk, get off the device and walk by either carrying or pushing the device.","If there is no bicycle lane, ride the device on the far right side of the road.","A self-balancing scooter is designed to carry more than 1 person.","When driving at night, turn on the headlights and tail lights or wear other light-emitting devices."],"a":"3","imgs":[],"t":"문장형"},{"n":583,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is the correct method for  a cyclist to turn left at an intersection?","c":["Ride slowly along the right edge of the road before turning left around the edge of the intersection.","Ride slowly along the left edge of the road before turning left around the edge of the intersection.","Ride slowly down the middle of the first lane of the road before turning left through the middle of the intersection.","Ride slowly down the far-right lane of the road before turning left through the center of the intersection."],"a":"1","imgs":[],"t":"문장형"},{"n":584,"b":"According to the Road Traffic Act and its Enforcement Decree, what is the penalty imposed on the driver of a  passenger car if he/she is caught driving on an exclusive bicycle track?","c":["Imprisonment for up to 1 year","A criminal fine of not more than KRW 3 million","Notification of traffic penalty of KRW 40,000","No penalty"],"a":"3","imgs":[],"t":"문장형"},{"n":585,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is NOT true about the  criteria for electric bicycles that can travel on bicycle tracks?","c":["The gross weight of the bicycle, including the weight of attached devices, is less than 30 kg.","The electric motor must not operate if the speed exceeds 25 km/h.","The bicycle must not move solely by the electric motor.","Electric bicycle with maximum rated output of more than 11 kW."],"a":"4","imgs":[],"t":"문장형"},{"n":586,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is NOT true about riding a  bicycle at night?","c":["Frequently use the bicycle bell or horn.","Turn on the headlights and tail lights.","Wear a reflective vest.","Wear a light-emitting device."],"a":"1","imgs":[],"t":"문장형"},{"n":587,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is NOT subject to a traffic  penalty if a bicycle rider violates traffic laws?","c":["Violating traffic lights","Crossing the centerline","Obstructing pedestrians on a crosswalk","Exceeding the speed limit"],"a":"4","imgs":[],"t":"문장형"},{"n":588,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following describe the INCORRECT  use of the bicycle lane? (Select TWO)","c":["A senior person can ride a bicycle on the sidewalk.","Motorcycles are not allowed on exclusive bicycle tracks.","Personal mobility devices are not allowed on exclusive bicycle tracks.","According to the Road Traffic Act, exclusive bicycle tracks are not considered roads."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":589,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following statements regarding the  names of the roads/lanes that can be used by bicycles are INCORRECT? (Select TWO)","c":["Exclusive bicycle track","Bicycle priority lane","Bicycle and motorcycle lane","Bicycle priority road"],"a":"2, 3","imgs":[],"t":"문장형"},{"n":590,"b":"Which of the following driving methods results in the highest fuel efficiency?","c":["Driving at the highest speed","Driving at the lowest speed","Driving at an economical speed","Driving at a safe speed"],"a":"3","imgs":[],"t":"문장형"},{"n":591,"b":"Which of the following is the best approach to eco-friendly, economical driving?","c":["Accelerate as fast as possible.","Turn off the engine as you enter a downhill road.","Lower the air pressure of tires.","Avoid rapid deceleration, if possible."],"a":"4","imgs":[],"t":"문장형"},{"n":592,"b":"Which of the following correctly describes how an air-conditioner in a vehicle should be used and maintained?","c":["Turn on the air-conditioner to full and then turn it down to a lower level.","Replace the coolant every six months.","The ideal temperature setting for an air-conditioner is 16°C.","Operate the air-conditioner in outer air inflow mode for greater cooling efficiency."],"a":"1","imgs":[],"t":"문장형"},{"n":593,"b":"Which of the following is the most appropriate method of improving a vehicle’s fuel efficiency?","c":["Always fill up the fuel tank completely.","When replacing engine oil, replace the oil filter and the air filter as well.","When making a stop, step on the brake pedal once with strong force.","Frequently use the accelerator and brake pedals."],"a":"2","imgs":[],"t":"문장형"},{"n":594,"b":"Which of the following is a brake/gear that helps bring down a car's speed when the driver takes his/her foot  off the accelerator or downshifts?","c":["Neutral gear","Foot brake","Parking brake","Engine brake"],"a":"4","imgs":[],"t":"문장형"},{"n":595,"b":"Which of the following is the most advisable method of driving in order to improve a vehicle’s fuel efficiency?","c":["Drive with various tools and parts loaded so that you are prepared for a possible breakdown.","Maintain a steady speed while driving.","Perform quick starts, quick acceleration, and quick braking frequently.","Drive with your tire pressure reduced by 30 percent for improved fuel efficiency."],"a":"2","imgs":[],"t":"문장형"},{"n":596,"b":"Which of the following is NOT an eco-friendly, economical way of driving through the improvement of driving  habits?","c":["Keep the vehicle fuel at the full level.","Start the car smoothly.","Keep driving at a constant speed.","Comply with the economical speed."],"a":"1","imgs":[],"t":"문장형"},{"n":597,"b":"Which of the following is an eco-friendly, economical method of driving?","c":["Reduce air pressure in the tires.","Start the air-conditioner at a low level","Do not replace the oil filter and air filter when replacing the engine oil.","Keep the fuel tank filled to about half its capacity."],"a":"4","imgs":[],"t":"문장형"},{"n":598,"b":"Which of the following is NOT true about an FCEV?","c":["When the vehicle catches fire, quickly evacuate and move far from the fire for safety.","If the hydrogen leak detector turns on, immediately park in a safe location and turn off the engine.","The driver of an FCEV is not required to take safety education.","The driver of an FCEV can manipulate equipment at the hydrogen charging station."],"a":"4","imgs":[],"t":"문장형"},{"n":599,"b":"Which of the following is the least desirable driving habit in terms of economical driving?","c":["Do not step on the accelerator pedal when driving downhill.","Use similar fuels for economic savings.","Start slowly and do not stop suddenly.","Check the tire pressure regularly."],"a":"2","imgs":[],"t":"문장형"},{"n":600,"b":"According to the Act on the Promotion of Development and Distribution of Environment-friendly Motor Vehicles,  which of the following vehicles is NOT allowed to park in an EV parking space?","c":["EV","Solar vehicle","Hybrid vehicle","FCEV"],"a":"2","imgs":[],"t":"문장형"},{"n":601,"b":"Which of the following is true about an FCEV?","c":["Hydrogen is highly flammable, and all drivers of FCEVs must complete special education as stipulated in the High-pressure  Gas Safety Control Act.","FCEVs burn hydrogen, causing air pollution.","FCEVs are not equipped with safety equipment that is used to prevent explosions in case of an emergency such as fire.","The driver of an FCEV must regularly inspect the vehicle to ensure safety and drive safely."],"a":"4","imgs":[],"t":"문장형"},{"n":602,"b":"Which of the following is the most appropriate method of reducing fine dust from vehicle exhaust gases?","c":["When starting, step hard on the accelerator pedal.","Start smoothly instead of accelerating quickly.","When driving, accelerate and stop on a frequent, repeated basis.","When stopping or parking, keep the engine running."],"a":"2","imgs":[],"t":"문장형"},{"n":603,"b":"Which of the following is NOT a crucial component of an FCEV?","c":["A fuel cell stack","A hydrogen tank","An internal combustion engine generator","A traction motor"],"a":"3","imgs":[],"t":"문장형"},{"n":604,"b":"Which of the following are the TWO correct descriptions of eco-friendly driving practices?","c":["It is related to the Kyoto Protocol, which stipulates targets for reducing greenhouse gas emissions.","Substances that cause air pollution include hydrocarbons, carbon monoxide, carbon dioxide, and nitrogen oxides.","To increase the temperature inside the vehicle, start the engine and let it idle for a long time.","Inspect the vehicle frequently and replace the engine oil every 2,000km driving distance."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":605,"b":"Which of the following vehicle types discharges the highest amount of hazardous exhaust gases?","c":["EV","Hydrogen fuel cell vehicle","LPG vehicle","Old diesel vehicle"],"a":"4","imgs":[],"t":"문장형"},{"n":606,"b":"Which of the following is NOT a measure that can help reduce fuel consumption for economical, eco-friendly  driving?","c":["Take your foot off the accelerator pedal before entering an intersection and use the engine brake.","Do not reduce speed on level roads but keep pressing down on the accelerator pedal.","Use the engine brake as necessary while driving downhill.","Take advantage of inertia by accelerating before driving onto an uphill road."],"a":"2","imgs":[],"t":"문장형"},{"n":607,"b":"Which of the following gaseous substances is primarily controlled by a vehicle’s Exhaust Gas Recirculation (EGR)  system?","c":["Nitrogen oxides (NOx)","Hydrocarbon (HC)","Carbon monoxide (CO)","Carbon dioxide (CO2)"],"a":"1","imgs":[],"t":"문장형"},{"n":608,"b":"Which of the following is NOT true about an FCEV inspection?","c":["Hydrogen is a flammable gas; therefore, FCEVs require regular inspection.","FCEV inspections must be conducted in a well-ventilated area.","During an inspection, it is crucial to check for hydrogen leak in the gas pipeline and charging inlet.","The driver of an FCEV is not responsible for conducting safety inspections of the vehicle."],"a":"4","imgs":[],"t":"문장형"},{"n":609,"b":"Which of the following is NOT true about using a hydrogen charging station?","c":["You are not allowed to smoke near a hydrogen charging station.","You are allowed to move your vehicle while charging.","You must turn off the engine while charging.","You must not operate the charger when the station operator is not present."],"a":"2","imgs":[],"t":"문장형"},{"n":610,"b":"Which of the following is NOT appropriate when charging an FCEV?","c":["Turning off the engine before charging","Smoking a cigarette near the hydrogen charging station","Not operating charging equipment on your own","Starting the engine after charging your car"],"a":"2","imgs":[],"t":"문장형"},{"n":611,"b":"Which of the following is the safest method of driving a loaded dump truck when going down a hill?","c":["Save fuel by driving in neutral gear.","Because stepping on the brake pedal several times does not produce the desired braking effect, step on it all at once.","Maintain adequate distance from the vehicle driving ahead to guard against sudden stopping.","Honk loudly and increase speed."],"a":"3","imgs":[],"t":"문장형"},{"n":612,"b":"Which of the following is the correct method of preventing traffic accidents caused by poor cargo loading?","c":["Put a cover over the cargo you are carrying.","There is no need to check fixed attachments such as spare tires.","Keep the cargo tied down loosely so you can get it on and off quickly.","There is no need to tie down the cargo if you are not going too far."],"a":"1","imgs":[],"t":"문장형"},{"n":613,"b":"Which of the following is the LEAST appropriate method of loading freight onto a truck?","c":["Freight is to be loaded starting at the center of the freight container to the left and right.","The center of gravity of a truck is in the front, so freight should be loaded starting from the back.","Relatively heavier freight is to be loaded on the bottom of the freight container.","After loading all of the freight, fix the freight so that it does not fall out of the truck."],"a":"2","imgs":[],"t":"문장형"},{"n":614,"b":"Which of the following is NOT true regarding the braking characteristics of large and special motor vehicles?","c":["The characteristics vary depending on changes in load.","The braking distance changes if the inflation pressure and tread of the tires are not even.","The characteristics vary depending on the weight of the vehicle.","The actual braking distance shortens with increase in the weight of items loaded inside the vehicle."],"a":"4","imgs":[],"t":"문장형"},{"n":615,"b":"Which of the following statements regarding a low-floor bus is INCORRECT?","c":["A low-floor bus can be boarded easily by the elderly or the disabled.","The floor of a low-floor bus is lower than the floor on normal buses.","A ramp is installed at the entrance and exit instead of stairs.","The height of a low-floor bus is half that of normal buses."],"a":"4","imgs":[],"t":"문장형"},{"n":616,"b":"Which of the following is the punishment regulation applicable to a driver who drives a special recovery vehicle  (limited to vehicles compliant with the Trucking Transport Business Act) that is not e","c":["Administrative fine of KRW 100,000","Traffic penalty of KRW 100,000","Administrative fine of KRW 70,000","Traffic penalty of KRW 70,000"],"a":"4","imgs":[],"t":"문장형"},{"n":617,"b":"Which of the following is NOT the correct explanation on preventing loads on a truck from falling?","c":["For cargo that is easy to roll, use fixed neck or cargo support.","When loading construction equipment, etc., use wires and ropes.","When there is space in the front, rear, and on the left and right sides of the loading box, use a detent, etc.","Traffic penalty of KRW 50,000 and demerit of 10 points are imposed for violation of fall prevention of the load."],"a":"4","imgs":[],"t":"문장형"},{"n":618,"b":"Which of the following is mandatory for the driver of a commercial truck registered for a transport business?","c":["A vehicle maintenance qualification","A truck operator's qualification","A taxi driver's license","A Class I driver's license for special motor vehicles"],"a":"2","imgs":[],"t":"문장형"},{"n":619,"b":"Which of the following statements regarding the characteristics of a large truck is correct?","c":["The turning radius and stability of a large truck can be dramatically affected by different cargo types.","The stability of a large truck is greatly reduced due to the long wheelbase.","The steering wheel recovery of a large truck is better than that of a passenger car.","Although a large truck is lightweight, it is larger in size than a passenger car."],"a":"1","imgs":[],"t":"문장형"},{"n":620,"b":"Which of the following is the appropriate conduct for the driver of a freight business vehicle that must be  equipped with a tachometer according to the Road Traffic Act?","c":["Drive without a tachometer.","Drive with a tachometer that is not in working condition due to a breakdown.","Drive with a tachometer that is used for purposes other than the intended use.","Drive with a tachometer that has been regularly maintained to prevent malfunctions."],"a":"4","imgs":[],"t":"문장형"},{"n":621,"b":"Which of the following is the minimum hearing level required for the acquisition of a Class I driver’s license for  large motor vehicles (excluding persons using hearing aids)?","c":["25 dB","35 dB","45 dB","55 dB"],"a":"4","imgs":[],"t":"문장형"},{"n":622,"b":"Which of the following statements regarding the characteristics of a large truck is correct?","c":["The center of gravity of a large truck varies depending on the load position and height.","The center of gravity of a large truck does not move up or down.","The height of the center of gravity has no effect on the vibration generated by a large truck.","Compared to passenger cars, large trucks produce very little vibration."],"a":"1","imgs":[],"t":"문장형"},{"n":623,"b":"Which of the following statements regarding the driving characteristics of a large truck is correct?","c":["The stability of a large truck is reduced by the heavy weight and long wheelbase.","The straight-driving stability of a large truck can be momentarily reduced at high speeds due to vehicle body vibration.","The steering wheel recovery of a large truck is better than that of a compact passenger car.","The higher driving position in a large truck enables improved field of vision in poor weather conditions."],"a":"2","imgs":[],"t":"문장형"},{"n":624,"b":"Which of the following statements regarding blind spots and load change when braking a large truck is correct?","c":["The blind spots are not much different in the case of a vehicle with a hood and a vehicle without it.","The braking force applied to the front and rear wheels is not influenced by change of load.","The blind spot on the left side of the driver is much larger than the one on the right in the case of a large truck.","The braking power of a large truck will vary depending on the cargo load."],"a":"4","imgs":[],"t":"문장형"},{"n":625,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following vehicles violates the safety  standards of a truck's loading capacity?","c":["Length calculated by adding 2/10 of the vehicle length","Width within the range of rearview for rear visibility","3.9 m above the ground","105% of payload depending on construction and performance"],"a":"1","imgs":[],"t":"문장형"},{"n":626,"b":"Which of the following is the correct description of a Class I driver’s license for special motor vehicles?","c":["A person holding a driver’s license for small towing vehicles may drive a special towing vehicle with 3.5-ton loading  weight.","A driver’s license for small towing vehicles may be used to drive a truck with 4-ton loading weight.","A driver’s license for recovery vehicles authorizes one to drive a 12-seater passenger vehicle.","A person holding a driver’s license for large towing vehicles may drive a truck with 10-ton loading weight."],"a":"2","imgs":[],"t":"문장형"},{"n":627,"b":"Which of the following is NOT true about the driving characteristics of large vehicles?","c":["Despite having a great level of stability due to their heavy weight and long wheelbase, the steering recovery is slow for  large vehicles compared to ","Because the driver’s seat in a large vehicle is located higher than that of a small vehicle, the driver drives by looking  only at the immediate front","Cornering characteristics change significantly depending on the type and load placement of the cargo.","The stability of a large vehicle varies significantly depending on the type and load placement of the cargo."],"a":"2","imgs":[],"t":"문장형"},{"n":628,"b":"According to the Rules on the Performance and Standards of Automobiles and Automotive Parts, the length of  a vehicle shall not exceed ( ) meters. Select the correct answer to fill in the ( ).","c":["10","11","12","13"],"a":"4","imgs":[],"t":"문장형"},{"n":629,"b":"Which of the following is the penalty imposed on the driver of a large bus who fails to control a passenger  dancing inside the vehicle?","c":["Traffic penalty of KRW 90,000 and 30 demerit points","Traffic penalty of KRW 100,000 and 40 demerit points","Traffic penalty of KRW 110,000 and 50 demerit points","Traffic penalty of KRW 120,000 and 60 demerit points"],"a":"2","imgs":[],"t":"문장형"},{"n":630,"b":"Which of the following is the traffic penalty imposed on the driver of a 4.5-ton truck for driving with a person  in the freight container?","c":["KRW 50,000","KRW 40,000","KRW 30,000","KRW 20,000"],"a":"1","imgs":[],"t":"문장형"},{"n":631,"b":"Which of the following combinations correctly describes which lights of an express bus must be switched on  when driving at night on an expressway?","c":["Headlights, sidelights, taillights, license plate lights, indoor lighting","Headlights, taillights","Taillights, sidelights, license plate lights","Taillights, sidelights"],"a":"1","imgs":[],"t":"문장형"},{"n":632,"b":"According to the Road Traffic Act, which of the following is NOT true about getting on or loading in a vehicle?","c":["The driver must not load more persons than the number prescribed by the Presidential Decree in the vehicle that he/she is  driving.","The driver must ensure the safety of passengers, such as making sure that the doors are properly closed so that no one falls  off the vehicle while dr","The driver must tightly fasten or cover all cargo on his/her vehicle to prevent them from falling off.","For safety reasons, the driver must place an infant or an animal on his/her lap while driving."],"a":"4","imgs":[],"t":"문장형"},{"n":633,"b":"Which of the following is NOT true about preventing cargo from falling from trucks?","c":["Mount a closed container on the truck for transportation.","For transportation efficiency, a truck must not exceed 120% of the load capacity.","Loaded cargo must be securely fastened or covered to prevent them from falling off during hard braking or turning.","When loading coils weighing over 7 tons, use a lever hoist to fasten 2 rows or more and use at least 2 anchor points."],"a":"2","imgs":[],"t":"문장형"},{"n":634,"b":"Which of the following is the trucks' threshold load capacity that determines the scope of load that can be  transported by a driver with a Class I driver’s license for large motor vehicles and a driv","c":["Below 12 tons","Below 10 tons","4 tons or below","2 tons or below"],"a":"1","imgs":[],"t":"문장형"},{"n":635,"b":"In order for a person with a Class I driver’s license for ordinary motor vehicles to be authorized to tow another  vehicle with total weight between 705 kilograms and 3 tons, which of the following sh","c":["Class I driver’s license for small towing vehicles","Class II driver’s license for ordinary motor vehicles","Class I driver’s license for large motor vehicles","Class I driver’s license for recovery vehicles"],"a":"1","imgs":[],"t":"문장형"},{"n":636,"b":"Which of the following driver's licenses does NOT authorize you to tow a vehicle that weighs less than 750kg?","c":["Class I driver’s license for ordinary motor vehicles","Class I ordinary student license","Class I driver’s license for large motor vehicles","Class II driver’s license for ordinary motor vehicles"],"a":"2","imgs":[],"t":"문장형"},{"n":637,"b":"What is the maximum permitted speed when a passenger vehicle with total weight of 5,000 kg is towing a  vehicle with total weight of 1,500 kg on a road that is not an expressway?","c":["50 km/h","40 km/h","30 km/h","20 km/h"],"a":"3","imgs":[],"t":"문장형"},{"n":638,"b":"Which of the following is NOT a correct description of towing a vehicle?","c":["When towing a vehicle weighing over three tons, the driver must possess a driver’s license to operate a tow truck and a  class 1 large towing vehicle ","When a motor vehicle with gross weight of less than 2,000 kilograms is being towed by another vehicle whose gross  weight is at least thrice that of t","When towing a vehicle on a normal road using a vehicle that is not a tow truck, the driver can drive at a speed equal  to the speed limit.","When towing a vehicle using a vehicle that is not a tow truck, the driver must possess a driver's license for that vehicle."],"a":"3","imgs":[],"t":"문장형"},{"n":639,"b":"Which of the following is a driver’s license that allows the driving of a special motor vehicle with total weight of  less than 3.5 tons (excluding recovery vehicles, etc.) and manufactured to perform","c":["A Class I ordinary student license","A Class II ordinary student license","A Class II driver’s license for ordinary motor vehicles","A Class I driver’s license for small motor vehicles"],"a":"3","imgs":[],"t":"문장형"},{"n":640,"b":"According to the Road Traffic Act, which of the following applies to the driver of a small towing vehicle?","c":["The driver of a small towing vehicle need not fasten his/her seat belt as he/she is on emergency duty.","The driver of a small towing vehicle is allowed to use a mobile phone for his/her routine work while driving.","The driver of a small towing vehicle is required to obtain a Class I driver’s license for special licenses (small towing  vehicles) and carry it at al","The driver of a small towing vehicle may exceed the speed limit when in transit to an accident site."],"a":"3","imgs":[],"t":"문장형"},{"n":641,"b":"Which of the following is the lane to be used by a towing vehicle on an expressway with three lanes in one  direction? (There is no bus-only lane)","c":["The first lane","The second lane","The third lane","Any of the above"],"a":"3","imgs":[],"t":"문장형"},{"n":642,"b":"Which of the following terms refers to the phenomenon wherein a towed vehicle pushes the tow truck that is in  front in a linear motion during rapid deceleration or sudden braking, and the joints are ","c":["Swing-out","Jack knife","Hydroplaning","Vapor lock"],"a":"2","imgs":[],"t":"문장형"},{"n":643,"b":"Which of the following is NOT a correct description of towing a vehicle according to the Road Traffic Act?","c":["A driver may tow a two-wheeled vehicle using a large towing vehicle with a Class 1 driver’s license for large motor  vehicles.","A driver may drive a special vehicle for towing that weighs 3.5 tons or less with a small tow truck license.","A driver may tow a broken down passenger car using a 10-ton truck with a Class 1 driver’s license for ordinary motor  vehicles.","A driver may tow a 1,500 kg vehicle using a 5,000 kg vehicle driving at 30 km/h."],"a":"1","imgs":[],"t":"문장형"},{"n":644,"b":"Which of the following statements regarding a trailer is correct?","c":["When turning left, a trailer must maintain a turning angle similar to the one used for passenger cars.","Shift to neutral when driving downhill to prevent sliding.","The difference of radius between the inner wheels of a trailer is larger than that of a passenger car.","The wheelbase of a trailer is shorter than that of a passenger car."],"a":"3","imgs":[],"t":"문장형"},{"n":645,"b":"Which of the following is the safest way to drive a trailer truck loaded with cargo, traveling at a speed of 50  km/h on a road with one lane in one direction that curves to the right?","c":["Slowing down can cause the vehicle to overturn. It is safer to drive at an increased speed into the curve.","Drive into the other lane to reduce the turning radius.","Drive into the curve at the current speed so as not to hold up the traffic behind.","Slow down and safely enter the curve to prevent the vehicle from rolling over due to centrifugal force."],"a":"4","imgs":[],"t":"문장형"},{"n":646,"b":"Which of the following is NOT a type of special vehicle defined by the Motor Vehicle Management Act?","c":["The towing type","The rescue type","The general type","The special-purpose type"],"a":"3","imgs":[],"t":"문장형"},{"n":647,"b":"Which of the following types is NOT classified as a trailer?","c":["A pull trailer","A low-bed trailer","A semi-trailer","A tractor-trailer"],"a":"4","imgs":[],"t":"문장형"},{"n":648,"b":"What is the definition of vehicle weight according to the Regulations on the Performance and Standards of  Vehicles and Automotive Parts?","c":["The weight of an empty vehicle","The weight of a loaded vehicle","The axle weight of an empty vehicle","The axle weight of a loaded vehicle"],"a":"1","imgs":[],"t":"문장형"},{"n":649,"b":"When driving a vehicle towed using a camping trailer on the road, which of the following is the phenomenon  wherein the towed vehicle shakes like a fish tail due to physical factors such as cross-wind","c":["Jack knife phenomenon","Swaying","Hydroplaning","Wheel alignment"],"a":"2","imgs":[],"t":"문장형"},{"n":650,"b":"Which of the following must be displayed on the back or right side of a special vehicle for towing?","c":["Total vehicle weight and maximum permitted cargo weight","Weight calculated by adding the vehicle's weight and maximum seating capacity","Weight calculated by adding the total vehicle weight and maximum seating capacity","Total vehicle weight, maximum permitted cargo weight, maximum permitted cargo volume, and cargo manifest"],"a":"2","imgs":[],"t":"문장형"},{"n":651,"b":"Which of the following is the part that connects the tractor and the trailer of a tow truck?","c":["A coupler","A kingpin","An outrigger","A boom"],"a":"1","imgs":[],"t":"문장형"},{"n":652,"b":"What is the length limit prescribed for connected vehicles according to the Regulations on the Performance and  Standards of Vehicles and Automotive Parts?","c":["13.5 m","16.7 m","18.9 m","19.3 m"],"a":"2","imgs":[],"t":"문장형"},{"n":653,"b":"Which of the following is a towed motor vehicle designed for the transport of extremely large cargo as a single  or a combined double unit, and equipped with a device for weight balancing?","c":["A semi-trailer","A low-bed trailer","A module trailer","A center-axle trailer"],"a":"3","imgs":[],"t":"문장형"},{"n":654,"b":"Which of the following is a towing vehicle designed in such a way that a towed vehicle is partially loaded so  that most of the vehicle weight and its cargo weight are shifted to the towing vehicle?","c":["A pull trailer","A semi-trailer","A low-bed trailer","A center-axle trailer"],"a":"2","imgs":[],"t":"문장형"},{"n":655,"b":"Which of the following statements regarding the characteristics of a trailer is correct?","c":["The heavy weight of a trailer makes its braking distance shorter than that of passenger cars.","A trailer has a high risk of rolling over during sudden lane changes.","The high seating position of a trailer makes vehicles ahead appear to be closer than they actually are.","The large size of a trailer has no impact on the difference of radius between the inner wheels."],"a":"2","imgs":[],"t":"문장형"},{"n":656,"b":"Which of the following statements regarding the turning and vibration characteristics of a large truck is correct?","c":["Centrifugal force does not have much influence on the vibration level.","A vehicle's height of gravitational center does not have much influence on the vibration level.","The turning radius and stability of a large truck can change dramatically depending on the cargo type and position.","Accidents involving collisions are more likely due to the vibration level of a large truck being lower than that of  passenger cars."],"a":"3","imgs":[],"t":"문장형"},{"n":657,"b":"Which of the following correctly describes a rule that should be followed by the driver of a trailer?","c":["Routine inspection of the vehicle must take place only at the end of a shift.","Transport of cargo must not be refused unless there is a valid reason.","The vehicle should be kept clean only when carrying high-priced cargo.","Be sure to check the placement of covers and packaging used to hold cargo in place when the destination is reached."],"a":"2","imgs":[],"t":"문장형"},{"n":658,"b":"Which lane is to be used by a recovery vehicle on an expressway with three lanes in one direction?","c":["The first lane","The left lane","The right lane","Any lane"],"a":"3","imgs":[],"t":"문장형"},{"n":659,"b":"Which of the following is the most appropriate method for a recovery vehicle to tow an all-wheel drive vehicle?","c":["Tow the vehicle from behind using another vehicle.","Tow by lifting the all-wheel drive vehicle entirely off the ground.","The drive system and the towing method are unrelated.","The parking brakes of all vehicles being towed must be in braking state."],"a":"2","imgs":[],"t":"문장형"},{"n":660,"b":"Which of the following describes a special recovery vehicle as defined by the Motor Vehicle Management Act?","c":["A vehicle that is structurally designed to tow other vehicles","A vehicle that is structurally designed to tow and salvage other vehicles","A vehicle that is structurally designed to salvage and tow a vehicle rendered immobile by a malfunction or an accident","A vehicle that is designed to perform special tasks other than the three above"],"a":"3","imgs":[],"t":"문장형"},{"n":661,"b":"According to the Regulations on the Performance and Standards of Vehicles and Automotive Parts, what is the  maximum length of a motor vehicle? (Not referring to connected cars)","c":["13 m","14 m","15 m","16 m"],"a":"1","imgs":[],"t":"문장형"},{"n":662,"b":"Which of the following is the most appropriate action for the driver of a recovery vehicle upon arrival at the  scene of an accident?","c":["Collect the driver's license belonging to the driver of the vehicle that was involved in the accident.","Immediately upon arrival, tow the vehicle involved in the accident to a maintenance shop.","Negotiate the cost of repairs with the driver of the vehicle that was involved in the accident.","Check the driver of the vehicle involved in the accident for any injuries, and take safety measures to prevent further  accidents."],"a":"4","imgs":[],"t":"문장형"},{"n":663,"b":"Which of the following is the most desirable action for a recovery vehicle driver?","c":["Reach the location of a vehicle breakdown as soon as possible and tow the vehicle immediately.","When towing a vehicle, obey the laws and safely proceed with towing.","Drive safely only when the towing cost by distance is expensive.","Ignore signals while on the way to the location of a breakdown."],"a":"2","imgs":[],"t":"문장형"},{"n":664,"b":"Which of the following is the most important consideration when a recovery vehicle is towing a broken-down  vehicle from the shoulder to the travel lane?","c":["On an expressway, pay attention to vehicles maintaining constant speed ahead.","Ensure the safety of people in the towed vehicle.","Watch out for fast-moving vehicles in the main lane.","There is no need to pay much attention to tow trucks as they are highly visible."],"a":"3","imgs":[],"t":"문장형"},{"n":665,"b":"Which of the following is an inappropriate measure on the part of the driver of a recovery vehicle at the scene  of an accident with injured persons?","c":["Check the injured for consciousness.","Check the injured for breathing.","Check the injured for bleeding.","Load the crashed vehicle onto the towing vehicle and negotiate the towing cost."],"a":"4","imgs":[],"t":"문장형"},{"n":666,"b":"Which of the following is a correct description of equipment attached to a recovery vehicle?","c":["The arm structure hung from the main body of the crane is called a hook.","The device used to connect the recovery vehicle to a structure when towing is called the PTO switch.","The structure attached to the front and rear sides in order to secure stability during tasks is called an outrigger.","The device installed on the crane and on which a weighted item is hooked with a wire rope is called a boom."],"a":"3","imgs":[],"t":"문장형"},{"n":667,"b":"Which of the following is the most appropriate method for the driver of a recovery vehicle to tow a broken  down vehicle with an FF layout (Front engine Front wheel drive)?","c":["Tow by lifting the front part of the vehicle.","Tow by lifting the rear part of the vehicle.","It does not matter which part is lifted.","Tow by lifting the entire vehicle."],"a":"1","imgs":[],"t":"문장형"},{"n":668,"b":"The following are measures that the driver of a recovery vehicle may take at the scene of an accident. Which  one is the most advisable?","c":["Advise the parties involved in the accident to pursue a civil settlement.","Immediately tow the crashed vehicle without consulting the parties involved in the accident.","Just prepare for towing without taking any safety measures, as visibility is good in daytime.","Help the driver of the vehicle that crashed to calm down."],"a":"4","imgs":[],"t":"문장형"},{"n":669,"b":"Which of the following is the most appropriate measure for the driver of a recovery vehicle to take if he/she  finds an injured person at the scene of an accident?","c":["Try to start a conversation or gently tap the injured person’s shoulders to check the state of consciousness.","If the injured person is not conscious, attempt CPR.","For a person with a fracture, immediately support the fractured area with a splint and wait until an ambulance arrives.","For severe bleeding, position the bleeding area below the heart."],"a":"1","imgs":[],"t":"문장형"},{"n":670,"b":"Which of the following is not a reason why the driver of a recovery vehicle arriving at the scene of an accident  should perform emergency first-aid measures on an injured person(s)?","c":["To facilitate the speedy transport of the victim","To protect the life of the injured.","To protect the victim's assets","To increase the chances of the victim's survival"],"a":"3","imgs":[],"t":"문장형"},{"n":671,"b":"Which of the following terms refers to the phenomenon wherein the rear of a vehicle shakes from side to side  during driving or sudden braking?","c":["Fishtailing","Hydroplaning","Standing wave","Vapor lock"],"a":"1","imgs":[],"t":"문장형"},{"n":672,"b":"Which of the following actions is appropriate for the driver of a recovery vehicle?","c":["Carry a fire extinguisher within the vehicle for early suppression of fire.","Drive past the centerline to rush to the scene of an accident.","In a minor accident, persuade the drivers to settle the issue.","Take both the driver and the passenger, and then tow the vehicle involved in the accident."],"a":"1","imgs":[],"t":"문장형"},{"n":673,"b":"A recovery vehicle was caught driving at 145 km/h on an expressway with a 100 km/h speed limit. Which of the  following corresponds to the correct demerit points and traffic penalty?","c":["70 demerit points and traffic penalty of KRW 140,000","60 demerit points and traffic penalty of KRW 130,000","30 demerit points and traffic penalty of KRW 100,000","15 demerit points and traffic penalty of KRW 70,000"],"a":"2","imgs":[],"t":"문장형"},{"n":674,"b":"Which of the following may be painted or marked on a recovery vehicle?","c":["Vehicle painting and signs similar to those used on a traffic control vehicle","Vehicle painting and signs similar to those used on a crime investigation vehicle","Vehicle painting and signs similar to those used on an emergency vehicle","Indication of the driver's phone number to be called in case of an emergency"],"a":"4","imgs":[],"t":"문장형"},{"n":675,"b":"Which of the following is the most appropriate method for the driver of a recovery vehicle to tow a broken  down vehicle with an RR layout (Rear engine Rear wheel drive)?","c":["Tow by lifting the front part of the vehicle.","Tow by lifting the rear part of the vehicle.","It does not matter which part is lifted.","Tow by lifting the entire vehicle."],"a":"2","imgs":[],"t":"문장형"},{"n":676,"b":"Which of the following is the most desirable way to drive a recovery vehicle when responding to an accident  scene?","c":["Speedy arrival is the foremost priority, so it is acceptable to drive on the opposite side.","It is acceptable to drive over the speed limit because a recovery vehicle is classified as an emergency vehicle.","On a congested expressway, drive along the roadside while honking loudly.","Drive safely to prevent more accidents, while striving to get to the scene of the accident as quickly as possible."],"a":"4","imgs":[],"t":"문장형"},{"n":677,"b":"Which of the following does NOT correspond to the classification of special motor vehicle types under the  Motor Vehicle Management Act?","c":["Vehicle used for towing","Vehicle used for special operation","Vehicle used for recovery","Vehicle used for emergency gas recovery"],"a":"4","imgs":[],"t":"문장형"},{"n":678,"b":"Which of the following statements regarding the driving skills test for a Class I driver’s license for small towing  vehicles is correct?","c":["The participant is required to score at least 90 out of 100 to pass.","The participant is required to pass the bent course, curved course, change of direction, and driving tests.","The pass criteria for the small towing vehicle test course is within 5 minutes for each course.","The participant will lose 5 points every time he or she fails to touch the confirmation line on each test course."],"a":"1","imgs":[],"t":"문장형"},{"n":679,"b":"When a recovery vehicle is towing a vehicle that has broken down, which of the following lights should the  vehicle being towed turn on?","c":["Headlights and emergency flashers","Headlights and taillights","Taillights, sidelights, and license plate lights","Left turn indicator"],"a":"3","imgs":[],"t":"문장형"},{"n":680,"b":"Which of the following is an appropriate action for the driver of a recovery vehicle?","c":["In some instances, it is permissible for the driver of a recovery vehicle to use a police radio scanner.","The driver of a recovery vehicle must obey the Road Traffic Act.","A recovery vehicle may violate the speed limit when it is on the way to the scene of an accident.","In the event of an accident, a recovery vehicle may proceed without regard for traffic signals."],"a":"2","imgs":[],"t":"문장형"},{"n":681,"b":"Which of the following are incorrect ways to drive  in the given situation? (Select TWO)","c":["When intending to go straight, proceed at the green  traffic light.","When intending to turn left, proceed at the green traffic  light while paying attention to oncoming traffic.","When intending to turn left, proceed at the green  left-turn arrow.","When intending to turn right from the first lane, stop  temporarily before the stop line, and then proceed  slowly.","When intending to turn right, proceed slowly along the  far-right lane of the road before making the turn."],"a":"3, 4","imgs":["img_0000.jpg"],"t":"사진형"},{"n":682,"b":"Which of the following are incorrect ways to drive  in the given situation? (Select TWO)","c":["Accelerate as much as possible to pass through the  intersection before the traffic light changes.","Continue driving in the first lane to turn right at the  4-way intersection.","You can go straight or turn right at the green traffic  light.","You should stop your car before the stop line at the red  traffic light.","After stopping before the stop line, you can turn right at  the red traffic light."],"a":"1, 2","imgs":["img_0001.jpg"],"t":"사진형"},{"n":683,"b":"Which of the following are incorrect ways to drive  in the given situation? (Select TWO)","c":["In the first lane, you can turn right at the green traffic  light.","In the first lane, you can turn left at the green left-turn  signal.","In the second lane, you can go straight at the green  traffic light.","In the third lane, you should stop before the stop line  and turn right at the red traffic light.","In the third lane, go straight at the green traffic light  and stop at the safety zone installed within the  intersection."],"a":"1, 5","imgs":["img_0002.jpg"],"t":"사진형"},{"n":684,"b":"Which of the following are incorrect information  that you can learn from the given situation? (Select  TWO)","c":["There is a crosswalk ahead.","The traffic light ahead is green.","There is an exclusive bicycle track on the right side of  the road.","The road speed limit is 30 km/h.","The cars ahead are operating their brake pedals."],"a":"4, 5","imgs":["img_0003.jpg"],"t":"사진형"},{"n":685,"b":"Which of the following pairings of information from  the given situation and appropriate driving methods  are incorrect? (Select TWO)","c":["Crosswalk – Pay attention to both sides, be cautious of  pedestrians.","Pedestrians on the roadway – Slow down and drive with  caution for safety.","Horizontal dual-color traffic lights – Continue driving on  the lane marked with a red X.","Reversible lane – Lane direction may change depending  on the situation.","Broken yellow centerline – This line cannot be crossed  even when trying to overtake a vehicle."],"a":"3, 5","imgs":["img_0004.jpg"],"t":"사진형"},{"n":686,"b":"Which of the following pairings of information from  the given situation and appropriate driving methods  are incorrect? (Select TWO)","c":["A crosswalk sign – Drive carefully as there is a crosswalk  ahead.","A section marked with double solid yellow lines on the  right side of the lane – Stopping across the sidewalk is  permitted.","Frozen road surface – Drive at a speed reduced to 20% of the speed limit.","A snow removal vehicle ahead  –  Drive while  maintaining a safe distance from the snow removal  vehicle.","A truck stopped on the right side ahead - Drive with  caution as pedestrians may unexpectedly come out to  the driveway."],"a":"2, 3","imgs":["img_0005.jpg"],"t":"사진형"},{"n":687,"b":"Which of the following are inappropriate ways to  drive in the given situation? (Select TWO)","c":["If intending to turn left, the bicycle rider must wait for  the left-turn signal in the first lane.","If intending to turn left, the personal mobility device  (PMD) driver must wait for the left-turn signal in the  second lane.","If intending to turn left, the two-wheeled vehicle driver  must wait for the left-turn signal in the second lane.","If intending to turn right, the passenger vehicle driver  must turn right while paying attention to pedestrians.","If intending to turn right, the truck driver must use the  right edge of the road in advance to turn right."],"a":"1, 2","imgs":["img_0006.jpg"],"t":"사진형"},{"n":688,"b":"Which of the following are the safest ways to drive in the  given situation? (Select TWO)","c":["Drive at a speed of less than 30 km/h.","To enter the underground parking lot of a commercial  building 10 meters ahead on the right, stop temporarily  and drive slowly to ensure safety.","To enter the underground parking lot of a commercial  building 10 meters ahead on the left, stop temporarily  and drive slowly to ensure safety.","When intending to turn left, turn on the turn signal in  advance, drive slowly, and turn left using the outer part  of the intersection's center.","To drive a personal mobility device (PMD) at the  downtown area, drive on the sidewalk."],"a":"1, 2","imgs":["img_0007.jpg"],"t":"사진형"},{"n":689,"b":"Which of the following pairings of information and  interpretations from the given situation are incorrect?  (Select TWO)","c":["School zone sign – Indicates a school zone where  children are especially protected.","Maximum speed limit sign – Drivers are required to  drive at a speed of less than 30 km/h.","Crosswalk sign – Drive with caution for pedestrians.","Flashing red traffic light – Drive slowly.","Cars parked on the right side of the road – Take caution  as pedestrians may suddenly come out from between  parked cars."],"a":"1, 4","imgs":["img_0008.jpg"],"t":"사진형"},{"n":690,"b":"In the given road situation, which of the following  are the two safest ways of driving?","c":["Since the traffic signal is red, wait patiently.","Since the pedestrians are crossing slowly, sound the  horn to incite them to walk faster.","Stop past the stop line in front of the adjacent vehicle  to ensure a smooth change of lane.","Anticipate the signal change and accelerate to make a  quick start and allow a smooth flow of traffic.","Stop at the stop line and wait for the signal."],"a":"1, 5","imgs":[],"t":"문장형"},{"n":691,"b":"In the given situation, which of the following are  the two safest ways of proceeding?","c":["Turn right at the intersection without stopping before  the stop line or crosswalk, proceeding slowly.","Wait until the pedestrian has finished crossing.","Sound the horn and turn right quickly if a pedestrian is  running into the crosswalk.","Stop on the crosswalk to ensure a clear field of vision  when turning right.","Since the traffic signal ahead is red, make sure you stop,  let the pedestrians pass, and then turn right slowly."],"a":"2, 5","imgs":["img_0009.jpg"],"t":"사진형"},{"n":692,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Drive slowly or stop temporarily before proceeding so  that the pedestrians on the road can walk safely.","Continue driving with caution, as pedestrians may  appear between parked vehicles.","Drivers are not required to protect pedestrians as it is  not a school zone.","Parking briefly at the intersection corner is possible  when visiting the store on the left.","Keep honking to pass through, as there are many  parked cars and pedestrians on the unlaned roads of  residential areas."],"a":"1, 2","imgs":["img_0010.jpg"],"t":"사진형"},{"n":693,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["When intending to drive straight while driving on the  right turn only lane, you may change lanes in the section  marked with solid white lines.","Even if the right-turn signal is red, you can make the  turn if there are no pedestrians on the crosswalk.","The driver must stop as the right-turn signal is red, and  turning is allowed only when the light changes to green.","If intending to turn right while traveling in a straight  lane, turning right is allowed in a lane other than the  right turn only lane.","Even if the right-turn signal is green, you should turn  while ensuring safety as there can be pedestrians."],"a":"3, 5","imgs":["img_0011.jpg"],"t":"사진형"},{"n":694,"b":"Which of the following descriptions about traffic  safety signs are correct in the given situation? (Select  TWO)","c":["An automobile road sign means that no vehicles other  than a car are allowed.","An unprotected left-turn sign means you can turn left  safely regardless of the traffic light.","The double solid yellow lines on the right indicate that  parking is possible for a brief time.","The blue sign depicting a car ahead on the right side is  an instructional sign among traffic safety signs.","The solid white line before the stop line at the  intersection is a mark indicating that there is an  intersection ahead."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":695,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Proceed quickly as there are no vehicles in the same  direction.","Slow down before entering the intersection as it is  difficult to see the situation ahead on a downhill road  curved to the left.","Drive while being cautious of vehicles that may come  out of the apartment onto the roadway.","If a car on the opposite side is turning left, honk as a  warning as vehicles going straight always have the right  of way.","Honk and speed up to drive quickly as you pass the  apartment driveway when you do not see any  pedestrians crossing the area."],"a":"2, 3","imgs":["img_0012.jpg"],"t":"사진형"},{"n":696,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Pass through the road quickly, as there are pedestrians  on the right side of the road.","Check the traffic situation via the road mirror for areas  that are difficult to see.","Look carefully before entering the intersection and drive  slowly, as there are vehicles in the alley on the left.","Keep honking to warn others when driving on an uphill  road that curves to the right as it is difficult to see what  is ahead.","Even if there is a vehicle coming down the road from  the opposite direction, the vehicle going uphill has the  right of way, so proceed without slowi"],"a":"2, 3","imgs":["img_0013.jpg"],"t":"사진형"},{"n":697,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["You should slow down and stop before the stop line  safely as the traffic light ahead is red.","There is no need to pay special attention to children's  safety on the current road, as there is a sign indicating  the end of the school zone.","When intending to turn left, watch out for trailing  vehicles in the first lane in advance and change lanes  safely.","When i e 1 to make a U-turn.","Let the white vehicle and the bus in lanes 4 and 5 pass  you before changing lanes to turn right.","Do not change lanes as you are driving on a section of  road marked by a solid white line.","Accelerate to follow the vehicle ahead as the signal  ahead is yellow."],"a":"1, 4","imgs":["img_0017.jpg"],"t":"사진형"},{"n":701,"b":"Which of the following are incorrect ways to drive  in the given situation? (Select TWO)","c":["Stop just before the stop line to travel straight.","To make a U-turn, make the turn safely from the second  lane through the intersection if there are no vehicles  ahead.","Stop briefly before the crosswalk to drop off a passenger.","To turn right, stop before the stop line and slowly turn  right.","If you are using a crosswalk, you must dismount from  the bicycle and walk with it."],"a":"2, 3","imgs":["img_0018.jpg"],"t":"사진형"},{"n":702,"b":"Which of the following pairings of information and  interpretations from the given situation are incorrect?  (Select TWO)","c":["A vehicle parked on the right side of the road - This is a  parking violation.","A pedestrian crossing – There is a crosswalk ahead.","Solid yellow line on the right side of the road - Parking  is prohibited, but stopping is allowed.","Sidewalk - Bicycle riders must ride on the sidewalk.","Speed bump - It is advisable to slow down."],"a":"3, 4","imgs":["img_0019.jpg"],"t":"사진형"},{"n":703,"b":"Which of the following are correct in the given  situation? (Select TWO)","c":["The driver can use a mobile phone while driving slowly.","The driver can use a mobile phone during a stop.","The driver cannot use a mobile phone but can operate a  display device while traveling slowly.","The driver is obligated to wear a seat belt in downtown  streets.","Passengers are not obligated to wear a seat belt in  downtown streets."],"a":"2, 4","imgs":["img_0020.jpg"],"t":"사진형"},{"n":704,"b":"Which of the following are incorrect driving  behaviors for each driver in the given situation
