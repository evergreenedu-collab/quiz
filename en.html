rm the pedestrians."],"a":"1","imgs":[],"t":"문장형"},{"n":168,"b":"If a vehicle is stopped on the railroad crossing due to vehicle failure while passing through, which of the  following is NOT proper behavior by the driver?","c":["Immediately evacuate all passengers.","Use emergency signal devices.","Notify a railway official.","Quickly check the cause of the vehicle’s failure."],"a":"4","imgs":[],"t":"문장형"},{"n":169,"b":"A vehicle is about to go across a sidewalk to enter a building. Which of the following is the correct sequence?","c":["Slow down → turn on the turn signal → enter quickly","Stop → honk → enter quickly","Slow down → check both sides → enter slowly","Stop → check both sides → enter slowly"],"a":"4","imgs":[],"t":"문장형"},{"n":170,"b":"According to the Road Traffic Act, which of the following is an INCORRECT description of safe pedestrian  crossing?","c":["Do not walk right in front of or behind cars to cross the road.","You must cross the road by using a crosswalk or such facilities even if you have a disability.","Do not cross the road at a section marked with a safety sign or one that specifically instructs pedestrians not to cross.","When there is no crosswalk, cross the road at its shortest section."],"a":"2","imgs":[],"t":"문장형"},{"n":171,"b":"Where does \"disappearance\"—a phenomenon wherein pedestrians or objects on roads vanish temporarily from  the driver’s sight—occur most frequently?","c":["Edge of the opposite lane","Right side of the driver's lane","Around the centerline of the road","Right edge of the road"],"a":"3","imgs":[],"t":"문장형"},{"n":172,"b":"Which of the following is correct regarding safe pedestrian crossing?","c":["Pedestrians must walk quickly around the front or rear of vehicles to cross the street.","Disabled pedestrians must cross the road using road-crossing facilities where such facilities are present.","Where a sign prohibiting road crossing is present, pedestrians must cross the road quickly.","On a road with no crosswalk, pedestrians must cross using the shortest line of travel possible."],"a":"4","imgs":[],"t":"문장형"},{"n":173,"b":"Which of the following is the correct part of a footpath that pedestrians should walk on?","c":["The right side","The left side","Along the middle","No pedestrian traffic rules on the sidewalk"],"a":"1","imgs":[],"t":"문장형"},{"n":174,"b":"A vehicle is about to drive across a crosswalk in a school zone with no traffic lights. Which of the following are  the correct actions of the driver? (Select TWO)","c":["When there are pedestrians crossing, the driver must drive across the crosswalk slowly and ensure pedestrian safety.","When there are pedestrians crossing, the driver must stop the vehicle and wait until all pedestrians have crossed.","The driver must drive across the crosswalk slowly regardless of pedestrians crossing.","The driver must stop the vehicle regardless of pedestrians crossing."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":175,"b":"According to the Road Traffic Act, which of the following are TWO correct explanations of pedestrian protection?","c":["A cyclist walking his/her bicycle is not considered a pedestrian.","A vehicle that is the first to enter an intersection where there is no traffic control has the right of way over pedestrians.","The commissioner of the City/Do (Province) police agency can install a pedestrian-only road for pedestrians for their  protection.","Baby carriages are allowed on the exclusive road for pedestrians."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":176,"b":"Which of the following are TWO good pedestrian behaviors?","c":["A pedestrian using a road must always walk using the left side of the road.","A pedestrian taking part in a parade for a special social event can walk in the middle of a road.","A disabled person who is unable to use road-crossing facilities can cross a road anywhere.","A pedestrian must take the longest route to cross the road if there are no road-crossing facilities."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":177,"b":"Which of the following is the traffic penalty imposed on the driver of a passenger car for illegal driving on a  sidewalk?","c":["KRW 30,000","KRW 40,000","KRW 50,000","KRW 60,000"],"a":"4","imgs":[],"t":"문장형"},{"n":178,"b":"According to the Road Traffic Act, which is a case of violations by passenger vehicle drivers related to  pedestrian safety and which have a different traffic penalty amount compared to other cases? (","c":["Interrupting pedestrians crossing the road when the walk signal is lit","Entering a pedestrian-only road","Throwing an object onto the road from a moving vehicle","Failing to protect children, visually impaired, etc."],"a":"3","imgs":[],"t":"문장형"},{"n":179,"b":"Which of the following is the right attitude that a driver should adopt toward pedestrians?","c":["Jaywalkers need not be protected.","There is no need to pay attention to pedestrians on the side of the vehicle.","It is the pedestrians' responsibility to dodge vehicles.","The driver must prioritize pedestrian safety."],"a":"4","imgs":[],"t":"문장형"},{"n":180,"b":"According to the Road Traffic Act, the part of the road marked with road safety signs that allow pedestrians to  cross the road is called ( ).","c":["Sidewalk","Roadside area","Crosswalk","Pedestrian-only road"],"a":"3","imgs":[],"t":"문장형"},{"n":181,"b":"Which of the following is NOT appropriate behavior on the part of a driver toward pedestrians?","c":["Watch out for children in areas with the \"school zone\" sign.","Drive slowly to protect pedestrians who are about to cross a crosswalk.","Pedestrians crossing the road illegally must also be protected.","Stop if there is a child crossing the road without a guardian."],"a":"2","imgs":[],"t":"문장형"},{"n":182,"b":"Which of the following is an INCORRECT method of crossing the road for a pedestrian?","c":["Pedestrians must take the shortest route when crossing a road without a crosswalk.","Pedestrians must not cross the road around the front or rear of a vehicle.","Pedestrians can climb over a lane partition placed to prevent illegal crossing on the road.","Pedestrians can walk on the road if the sidewalk is closed for construction."],"a":"3","imgs":[],"t":"문장형"},{"n":183,"b":"Which of the following is NOT classified as a person corresponding to one who is visually impaired?","c":["Infant or child","An individual who is unable to walk without a prosthetic limb","An individual who has trouble maintaining bodily balance","A deaf person"],"a":"1","imgs":[],"t":"문장형"},{"n":184,"b":"The driver of a passenger car who commits a violation of a traffic signal between ( ) and ( ) in a school zone  receives double the demerit points. Which of the following belongs in the pair of bracke","c":["6 AM, 6 PM","7 AM, 7 PM","8 AM, 8 PM","9 AM, 9 PM"],"a":"3","imgs":[],"t":"문장형"},{"n":185,"b":"What is the administrative fine imposed on the driver of a 4.5-ton truck parked illegally in a silver zone between  10 AM and 11 AM?","c":["KRW 40,000","KRW 50,000","KRW 90,000","KRW 100,000"],"a":"3","imgs":[],"t":"문장형"},{"n":186,"b":"Which of the following is an INCORRECT method of traveling for a pedestrian?","c":["Walk on the left side of a sidewalk.","Pedestrians are allowed to use any part of the pedestrian-first road.","Pedestrians must walk on the sidewalk on roads where the sidewalk and roadways are separated.","For roads without a clear distinction of the sidewalks but have a centerline, pedestrians must use the roadside area to  walk."],"a":"1","imgs":[],"t":"문장형"},{"n":187,"b":"Which of the following is NOT permitted to travel on a roadway?","c":["Cleaning or maintenance personnel working on roads","A person driving a large animal such as horse or cattle","A person who is pushing a stroller","A funeral procession"],"a":"3","imgs":[],"t":"문장형"},{"n":188,"b":"What are the grounds for the penalty faced by a driver who stops over the stop line when the traffic light has  turned red?","c":["Violation of intersection thoroughfare","Failure to stop","Violation of traffic signal","Violation of slow driving"],"a":"3","imgs":[],"t":"문장형"},{"n":189,"b":"Which of the following is the right method of driving when you spot a visually impaired person crossing the  road with a guide dog?","c":["Keep going if stopping or parking is not allowed in the area.","Stop momentarily.","Stop and help the person go back the way he/she came.","Protect the person by honking."],"a":"2","imgs":[],"t":"문장형"},{"n":190,"b":"According to the Road Traffic Act, the driver of any type of vehicle must (   ) before reaching a crosswalk in a  school zone with no traffic lights, regardless of pedestrians crossing. Which of the f","c":["slow down","stop","slow down or stop","reduce speed"],"a":"2","imgs":[],"t":"문장형"},{"n":191,"b":"Which of the following is correct regarding the protection of pedestrians crossing roads?","c":["You have no responsibility to protect pedestrians on sections of a road other than an intersection.","You have no responsibility to protect pedestrians crossing the road illegally.","You have to protect pedestrians even when they are crossing the road illegally.","You have no responsibility to protect pedestrians crossing a one-way road illegally."],"a":"3","imgs":[],"t":"문장형"},{"n":192,"b":"Who is NOT allowed to drive on the road according to the Road Traffic Act?","c":["A person using a wheelchair to aid his/her movement","A person marching on the streets for an important social event","A person cleaning or doing maintenance work on a road","A person carrying an object that can hinder pedestrian thoroughfare, such as a ladder"],"a":"1","imgs":[],"t":"문장형"},{"n":193,"b":"Which of the following is the best method of crossing the road for a pedestrian when the green light at the  crosswalk is flashing?","c":["A pedestrian who is not yet in the crosswalk must wait for the next green light to start crossing.","Stand still in the middle of the crosswalk.","Cross the road without waiting for the next signal.","The pedestrian can start crossing the road as long as the light does not turn red."],"a":"1","imgs":[],"t":"문장형"},{"n":194,"b":"According to the Road Traffic Act, which of the following is correct regarding pedestrians using the sidewalk?","c":["A person who rides a two-wheeled vehicle up to 125cc on the sidewalk can be considered a pedestrian.","A person riding a bicycle can be considered a pedestrian.","A person who uses a wheelchair can be considered a pedestrian.","A person who rides a 49cc motorcycle can be considered a pedestrian."],"a":"3","imgs":[],"t":"문장형"},{"n":195,"b":"According to the Road Traffic Act, which TWO correctly describe the rules for a pedestrian-only road?","c":["The driver of a motor vehicle or a horse allowed on a pedestrian-only road must travel at the same speed as the  pedestrians.","In principle, the driver of a motor vehicle or a horse may use a pedestrian-only road.","The driver of a motor vehicle or a horse may not be allowed to enter a pedestrian-only road if and when deemed  necessary by the chief of police.","If there is a possibility that pedestrians could be exposed to danger, the driver of a motor vehicle or a horse on a  pedestrian-only road must stop a"],"a":"1, 4","imgs":[],"t":"문장형"},{"n":196,"b":"When a cargo falls from a vehicle and injures a pedestrian, necessitating a two-week period of hospitalization,  which two penalties among the following will be imposed on the driver?","c":["Criminal offense charges are imposed on the driver regardless of the victim’s wishes to file charges.","No charges are filed if the driver comes to an agreement with the victim.","No charges are filed if the driver has a full-coverage insurance policy.","The driver is charged with a criminal offense regardless of the presence of a full-coverage insurance policy."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":197,"b":"According to the Road Traffic Act, which of the following is the most appropriate method of crossing a road  without a crosswalk for a pedestrian?","c":["Cross the road right behind a passing vehicle.","Cross the road quickly when there are no cars passing by.","Cross anywhere as there is no crosswalk.","Cross the road using the shortest distance."],"a":"4","imgs":[],"t":"문장형"},{"n":198,"b":"According to the Road Traffic Act, which of the following is NOT a correct explanation of how to traverse a  crosswalk?","c":["A person may cross the crosswalk while pushing a personal mobility device.","A person may cross the crosswalk while on a motorized chair.","A person may cross the crosswalk while riding a bicycle.","A person may cross the crosswalk while pushing a stroller."],"a":"3","imgs":[],"t":"문장형"},{"n":199,"b":"According to the Road Traffic Act, which of the following methods of passage used by motor vehicles or horses  is NOT correct?","c":["When the roadway and sidewalk are separated, be sure to use the roadway.","Drive slowly just before crossing a crosswalk, check left and right, and cross in a manner that does not impede the  passage of pedestrians.","Be sure to use the right-side roadway.","When it is a one-way road, you can drive in the center or left portion of the road."],"a":"2","imgs":[],"t":"문장형"},{"n":200,"b":"According to the Road Traffic Act, which of the following guidelines for the protection of pedestrians is NOT  correct?","c":["When a pedestrian is using the crosswalk, the driver must make a temporary stop before the crosswalk.","The driver shall not impede the passage of pedestrians who are crossing the road according to the signals or directions  given by a police officer.","A driver shall not impede the passage of pedestrians who are crossing the road at an intersection.","When a pedestrian is crossing a road without a crosswalk, the driver must drive slowly while maintaining a safe distance."],"a":"4","imgs":[],"t":"문장형"},{"n":201,"b":"Which of the following is the correct method of passing through a crosswalk for a vehicle if traffic signals for  both vehicles and pedestrians are out of order?","c":["If a pedestrian is crossing, pass through at a slow speed.","If there are no pedestrians on the crosswalk, do not slow down but be sure to pass through quickly.","The driver need not drive slowly, as the crosswalk has lost its function due to the breakdown of the signal lights.","If a pedestrian is crossing, make a temporary stop just in front of the crosswalk."],"a":"4","imgs":[],"t":"문장형"},{"n":202,"b":"According to the Road Traffic Act, which of the following is the most appropriate method of using a road with  no clear distinction of a sidewalk but has a centerline for a pedestrian?","c":["Walk along the center of the roadway.","Walk along the right side of the roadway.","Walk along the roadside area.","Use all areas of the road to walk on."],"a":"3","imgs":[],"t":"문장형"},{"n":203,"b":"According to the Road Traffic Act, which of the following is the correct method of passing for a motor vehicle  or a horse that is permitted to pass through a pedestrian-only road?","c":["If there are any pedestrians, proceed slowly.","Proceed while honking.","Drive at the walking speed of pedestrians or make a temporary stop.","If there are no pedestrians, proceed quickly."],"a":"3","imgs":[],"t":"문장형"},{"n":204,"b":"According to the Road Traffic Act, which of the following is a section of road where boundaries are indicated by  a line or curbstones, safety signs, or any similar artificial structures that allow pe","c":["A sidewalk","A roadside area","A crosswalk","A bicycle crossing"],"a":"1","imgs":[],"t":"문장형"},{"n":205,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is NOT the correct method  of crossing when pedestrian signals are flashing?","c":["Pedestrians should not start crossing.","Pedestrians in the middle of the crossing should quickly finish crossing.","Pedestrians should stop crossing and return to the sidewalk.","Pedestrians should stop crossing and wait in place for the next signal."],"a":"4","imgs":[],"t":"문장형"},{"n":206,"b":"According to the Road Traffic Act, which of the following is a situation wherein the driver of a motor vehicle  must drive slowly?","c":["When seeing a person crossing a crosswalk with a bicycle","When driving past a pedestrian along a back road","When seeing a pedestrian crossing a crosswalk","When seeing a pedestrian crossing a road with no crosswalk"],"a":"2","imgs":[],"t":"문장형"},{"n":207,"b":"According to the Road Traffic Act, raised crosswalks are installed on roads where it is necessary to limit the  speed to (    ) km/h or less. Which of the following is correct?","c":["10","20","30","50"],"a":"3","imgs":[],"t":"문장형"},{"n":208,"b":"According to the Road Traffic Act, which of the following is NOT a circumstance that requires stopping  temporarily  while driving?","c":["When a child crosses the road without a guardian","When the vehicle traffic light is flashing a red light","When a child is sitting or standing on the road","When the vehicle traffic light is flashing yellow"],"a":"4","imgs":[],"t":"문장형"},{"n":209,"b":"According to the Road Traffic Act, which of the following is the correct way of driving when the pedestrian  signal at a diagonal crosswalk is green?","c":["When intending to go straight, you must stop just before the stop line.","If there are no pedestrians, you can increase your speed and turn right.","If there are no pedestrians, you can increase your speed and turn left.","You can proceed in the direction where pedestrians are not crossing."],"a":"1","imgs":[],"t":"문장형"},{"n":210,"b":"According to the Road Traffic Act, which of the following is the correct term for the action of a driver to bring  his/her motor vehicle to a complete stop temporarily?","c":["Driving slowly","Stopping","Parking","Making a temporary stop"],"a":"4","imgs":[],"t":"문장형"},{"n":211,"b":"According to the Road Traffic Act, which of the following is not permitted to be used by an electric wheelchair  for medical purposes?","c":["Bicycle-only roads","A roadside area","A sidewalk","The edge of a road"],"a":"1","imgs":[],"t":"문장형"},{"n":212,"b":"Which of the following is the most appropriate way of turning left at an intersection without any traffic control?","c":["On general roadways, turn on the direction indicator immediately before the intersection and turn left.","Slow down and follow the centerline of the road, and turn left by going around the central island in the outer lane of  the intersection.","Turning left on the outer lane of the intersection is not allowed even when permitted by the commissioner of the  City/Do (Province) police agency.","You must slow down. You may or may not stop at your discretion as you enter."],"a":"4","imgs":[],"t":"문장형"},{"n":213,"b":"According to the Road Traffic Act, the width of a lane installed shall be ( ) m or wider. In such cases where an  unavoidable need is recognized, such as for the installation of a left turn-only lane,","c":["5, 300","4, 285","3, 275","2, 265"],"a":"3","imgs":[],"t":"문장형"},{"n":214,"b":"In which of the following cases is a vehicle allowed to overtake another vehicle on a road whose right side is  narrower than 6 m?","c":["When the left side of the road cannot be checked","When the traffic in the opposite direction may be impeded","When the car ahead proceeds at a low speed and a safe distance can be secured from other cars","When overtaking is prohibited or restricted as indicated by safety signs, etc."],"a":"3","imgs":[],"t":"문장형"},{"n":215,"b":"According to the Road Traffic Act, which of the following lanes indicates the direction of traffic with a signal  apparatus on the road where the traffic volume of both directions varies greatly depen","c":["The reversible lane","Bus-only lane","The acceleration lane","The overtaking lane"],"a":"1","imgs":[],"t":"문장형"},{"n":216,"b":"According to the Road Traffic Act, the driver of any type of vehicle trying to make a (   ) must be in the  right-most lane and slow down to make a (   ) at an intersection. In this case, the driver t","c":["right turn – right turn – right turn","left turn – left turn – left turn","right turn – left turn – right turn","left turn – right turn – left turn"],"a":"1","imgs":[],"t":"문장형"},{"n":217,"b":"According to the Road Traffic Act, which of the following is correct regarding a change of lane?","c":["Because it can be dangerous on a bridge, a change of lane is often restricted by solid white lines.","Broken white lines mark traffic lanes where a change of lane is limited.","Do not change lanes in an area where lane change is prohibited, even if there is roadwork or other such obstructions  that prevent you from traveling ","It is not against the law to change lanes in an area where lane change is prohibited, provided that it is done safely."],"a":"1","imgs":[],"t":"문장형"},{"n":218,"b":"Which of the following falls under the violation of “tailgating,” an act of obstructing passage by other cars by  not allowing them to pass even when the traffic light has changed after entering an in","c":["A violation of means for passing through intersections","A violation of a temporary stop","A violation of means for changing lanes","A violation of measures for preventing congestion"],"a":"1","imgs":[],"t":"문장형"},{"n":219,"b":"Which of the following is correct regarding an acceleration lane on an expressway?","c":["An acceleration lane allows vehicles on an expressway to change lanes so that they can take an exit.","An acceleration lane allows the vehicles entering an expressway to increase their speed.","An acceleration lane allows increasing speed for vehicles trying to overtake other vehicles on an expressway.","An acceleration lane is designed to lessen the effects of the lowered speed of large vehicles when driving uphill."],"a":"2","imgs":[],"t":"문장형"},{"n":220,"b":"Which of the following is the most appropriate action to take when a driver realizes that he/she incorrectly  entered an expressway after he/she has already entered it?","c":["Pull over, turn on the emergency flashers, and call the expressway patrol for help.","Take the next exit as he/she has already entered the expressway.","Turn on the emergency flashers and slowly reverse the vehicle back to the entry point to exit the expressway.","If there are two or more lanes, make a U-turn to exit the expressway."],"a":"2","imgs":[],"t":"문장형"},{"n":221,"b":"According to the Road Traffic Act, which of the following is an INCORRECT match between the type of lane and  the color painted on the lane?","c":["Yellow color for separating bidirectional traffic in a safety zone","Blue color for bus-only lanes","Pink, light green, or green colors for guide lines on the lane","White color for the outer line of the speed limit mark installed within a school zone"],"a":"4","imgs":[],"t":"문장형"},{"n":222,"b":"According to the Road Traffic Act and its Enforcement Decree, which of the following is the correct type of  vehicle that may be driven in the left-side lane on roads other than expressways?","c":["Passenger cars and compact, small, and mid-sized buses","Large passenger vehicles","Trucks","Special-purpose cars and two-wheeled vehicles"],"a":"1","imgs":[],"t":"문장형"},{"n":223,"b":"Which of the following road markings allow a driver to make a U-turn? (Given that there is a U-turn sign)","c":["Yellow solid line on the center of the road","White solid line on the center of the road","White broken line on the center of the road","Blue solid line on the center of the road"],"a":"3","imgs":[],"t":"문장형"},{"n":224,"b":"Below are the classifications of traffic by type of lane according to the Road Traffic Act and its Enforcement  Decree. Which of the following is INCORRECT?","c":["With regard to the ordering of lanes, the lane next to the median lane of a road is regarded as the first lane.","If a person drives at a slow speed, possibly impeding the normal traffic of other cars, he/she must switch to the lane  right of the one he/she was or","On a road with one-way traffic, the right side of the road is regarded as the first lane.","In principle, all vehicles on an expressway with two lanes in one direction must drive in the second lane."],"a":"3","imgs":[],"t":"문장형"},{"n":225,"b":"Under the Road Traffic Act, if the visibility distance is less than 50 m due to heavy rain, the speed of a vehicle  must be reduced by (  ) of the maximum prescribed speed. Which fits the parentheses?","c":["50/100","40/100","30/100","20/100"],"a":"1","imgs":[],"t":"문장형"},{"n":226,"b":"According to the Road Traffic Act, which two correctly describe the criteria for vehicles that may drive on  exclusive lanes for high-occupancy vehicles?","c":["Passenger cars with 3 or more persons","Trucks with 3 or more persons","Buses with 3 or more persons","Two-wheeled vehicles with 2 or more persons"],"a":"1, 3","imgs":[],"t":"문장형"},{"n":227,"b":"According to the Road Traffic Act, when installing a lane on a road where the sidewalk and the road are not  separately demarcated, which of the following is to be installed on both sides of the road ","c":["Safety area","Lane change restriction line sign","Roadside","Roadside area"],"a":"4","imgs":[],"t":"문장형"},{"n":228,"b":"Which of the following is the correct method of passing through an intersection with two left-turn lanes?","c":["Passenger cars must use only the first lane to turn left.","Passenger cars must use only the second lane to turn left.","Large buses must use only the first lane to turn left.","Large buses must use only the second lane to turn left."],"a":"4","imgs":[],"t":"문장형"},{"n":229,"b":"According to the Road Traffic Act, which of the following is INCORRECT regarding the method and speed to be  followed by motor vehicles and horses?","c":["If there is another vehicle coming straight from the opposite direction when you attempt to turn left at an intersection  with no traffic lights, you ","A vehicle making a stop on a road with no distinction between the roadway and the sidewalk should stop at a distance  of at least 50 cm from the right","A vehicle signaling its intent to turn right at an intersection shall not be impeded from proceeding by the trailing  vehicle.","The minimum speed on exclusive roads for motor vehicles is 40 km/h."],"a":"4","imgs":[],"t":"문장형"},{"n":230,"b":"Which of the following is the maximum allowed speed for a truck with a 3-ton loading weight driving on an  expressway with four lanes in one direction where the maximum allowed speed is 100 km/h?","c":["60 km/h","70 km/h","80 km/h","90 km/h"],"a":"3","imgs":[],"t":"문장형"},{"n":231,"b":"In which of the following situations are motor vehicles and horses NOT allowed to pass along the left side of a  road?","c":["When a restriction of overtaking is indicated by safety signs, etc.","When the road is designated for one-way traffic","When the right side of the road is not available for passage due to road construction, etc.","When the right side of the road is not wide enough for the passage of motor vehicles and horses"],"a":"1","imgs":[],"t":"문장형"},{"n":232,"b":"Which of the following is the most inappropriate method of passing an intersection and a Dilemma Zone?","c":["Before entering the intersection, check the traffic conditions in advance, keep a safe distance, and drive at reduced  speed anticipating all situatio","Entering the intersection at a red light leads to a signal violation.","If the front wheel enters the stop line when the traffic light changes from green to yellow, check the traffic conditions  and proceed quickly out of ","Under the Road Traffic Act, if a dilemma zone is recognized and the traffic signal changes to yellow before a vehicle  enters the intersection, the dr"],"a":"4","imgs":[],"t":"문장형"},{"n":233,"b":"Which of the following is correct regarding the driving distance between vehicles?","c":["Free running distance is the distance traveled by a vehicle  from the point when the brake is pressed after detecting  danger until the point at which","Stopping distance is the distance necessary to avoid a rear-end collision with the car in front of you if it makes an  abrupt stop.","Safe distance is the distance traveled by a vehicle from the point the brake is applied to the point at which the vehicle  comes to a complete stop.","Braking distance is the distance between the moment the driver detects danger and the moment the car comes to a  full stop."],"a":"1","imgs":[],"t":"문장형"},{"n":234,"b":"In which of the following areas is overtaking a vehicle possible?","c":["Intersection","Centerline (yellow broken line)","Inside the tunnel (white solid line)","On the bridge (white solid line)"],"a":"2","imgs":[],"t":"문장형"},{"n":235,"b":"According to the Road Traffic Act, which of the following is the most appropriate method of slowing down at  an intersection?","c":["Proceeding at a low speed such that the vehicle can be stopped immediately","Proceeding while maintaining a speed of 30 km/h","Proceeding at such a low speed that no accident occurs","Proceeding at a speed that enables the driver to avoid any sudden stops by the vehicle in front"],"a":"1","imgs":[],"t":"문장형"},{"n":236,"b":"Below are various explanations of the punishment criteria for driving a vehicle (except for personal mobility  devices) in violation of the maximum speed on the road. Which of the following is correct","c":["Anyone who drives three or more times at a speed of over 100 km/h above the speed limit is subject to a criminal fine  of up to KRW 5 million or deten","Anyone who drives three or more times at a speed of over 100 km/h above the speed limit is subject to imprisonment  for up to one year or a criminal f","Anyone who drives twice at a speed of over 100 km/h above the speed limit is subject to a criminal fine of up to KRW  3 million.","Anyone who drives at a speed of over 80 km/h above the speed limit is subject to a criminal fine of up to KRW 500,000  or detention."],"a":"2","imgs":[],"t":"문장형"},{"n":237,"b":"Which of the following is the correct method of turning right at an intersection with no traffic lights?","c":["Turn right as fast as possible.","Wait until the vehicles entering the intersection ahead of you pass by, and then turn right.","When a vehicle coming from the opposite direction is turning left, turn right at the same time with caution.","There is no need to be mindful of other vehicles when turning right from a wide road onto a narrow one."],"a":"2","imgs":[],"t":"문장형"},{"n":238,"b":"A driver intends to turn right at an intersection with traffic signals but no auxiliary signals for vehicles.  According to the Road Traffic Act and its Enforcement Decree, which of the following is n","c":["If the traffic signal has turned red, a temporary stop must be made in front of the stop line regardless of the signal  light for pedestrians at the c","If the traffic signal has turned green, a right turn may be made without making a temporary stop in front of the stop  line.","When the vehicle signal is a left-turn signal, you must come to a complete stop just before the stop line regardless of  the pedestrian signal at the ","Regardless of the traffic signal, a right turn may be made without making a temporary stop when other vehicles are not  impeded."],"a":"4","imgs":[],"t":"문장형"},{"n":239,"b":"At an intersection, which of the following is the most correct method of turning left/right?","c":["When turning right, quickly pass through the intersection while carefully checking for pedestrians and bicycles that stop  or proceed according to the","When turning left, you must pass through the outside of the intersection center.","When turning right, reduce speed in advance while driving along the right edge of the road.","When turning left at an intersection without traffic signals while a pedestrian is crossing the road, quickly pass in front  of the pedestrian."],"a":"3","imgs":[],"t":"문장형"},{"n":240,"b":"Which of the following correctly describes the stopping distance?","c":["The distance from the point at which a driver pushes the brake pedal to where the vehicle comes to a complete stop","The distance that allows a driver to avoid colliding with a vehicle ahead when it makes a sudden stop","The distance traveled by a vehicle from the point at which the driver detects danger and steps on the brake pedal to  the point at which the vehicle m","The distance from the point where a driver senses danger and presses the brake pedal to the point where the brake  function actually starts to work"],"a":"3","imgs":[],"t":"문장형"},{"n":241,"b":"What is the correct way of passing through an intersection?","c":["When the red traffic light is flashing, drive slowly.","When the yellow traffic light is flashing, drive through as quickly as you can.","Do not overtake other vehicles at an intersection.","When approaching the intersection, always use high-beam headlights."],"a":"3","imgs":[],"t":"문장형"},{"n":243,"b":"What is the maximum speed for a passenger car traveling on an expressway under the Road Traffic Act?","c":["60 km/h","70 km/h","80 km/h","90 km/h"],"a":"4","imgs":[],"t":"문장형"},{"n":244,"b":"According to the Road Traffic Act, which of the following speed limits can be placed on a general road in  residential, commercial, and industrial areas?","c":["Within 20 km/h","Within 30 km/h","Within 40 km/h","Within 50 km/h"],"a":"4","imgs":[],"t":"문장형"},{"n":245,"b":"Which of the following is the policy that limits the maximum speed in the city center to 50 km/h while lowered  to 30 km/h on back roads (including residential areas) in order to reduce traffic accide","c":["New Deal Policy","Safety Speed 5030","Campaign for Unity in Order to Reduce Traffic Accidents","Intelligent Transportation System (ITS)"],"a":"2","imgs":[],"t":"문장형"},{"n":246,"b":"Which of the following are the two correct actions a driver may take when making an unprotected left turn at  an intersection?","c":["Turn left when there is no oncoming traffic during a green light.","Turn left at any time if there is no obstruction from oncoming vehicles, regardless of the signals.","During a two-way green signal, turn left safely without obstructing oncoming vehicles.","Making an unprotected left turn during a red light and causing an accident are subject to punishment for violation of  the Highway Code’s safe driving"],"a":"1, 3","imgs":[],"t":"문장형"},{"n":247,"b":"You are driving in a city that operates an exclusive median bus lane system. Which of the following are safe  ways of driving? (Select TWO)","c":["You should continuously honk to prevent other vehicles from cutting in front of you.","You should drive with caution as pedestrians on the right may try to jaywalk.","You should slow down as pedestrians may cross the road from the bus station on the left.","You should drive and pass through a median bus lane as quickly as possible before the traffic light turns red."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":248,"b":"According to the Road Traffic Act, which of the following are TWO safe methods of changing lanes?","c":["Change lanes as quickly as possible.","You can change lanes only in those sections marked with solid white lines.","Change lanes without obstructing traffic.","You can change lanes only on a road marked with a white broken line."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":249,"b":"Which of the following are the TWO correct methods of turning right safely at an intersection?","c":["Use the turn indicator at least 30 m before where you want to turn right.","Move into the right-hand lane carefully if there is a solid white line on the road.","Turn right after checking your left side to make sure that there are no other vehicles headed in the same direction as  you.","Turn right quickly while paying attention to the traffic in the area."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":250,"b":"Which of the following are the TWO correct methods for a passenger car driver to overtake another vehicle?","c":["Make sure that there is enough space on the left before overtaking.","Overtaking must be done within the speed limit of the road being traveled.","If it is safe to do so, overtaking another vehicle on its right hand side is acceptable.","After passing a vehicle on its left, move back into the lane when the vehicle that you just passed is no longer visible in  the rear-view mirror."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":251,"b":"What are TWO safe driving methods when driving on the road?","c":["Park the vehicle in a safety zone if possible.","When the traffic lights turn yellow, stop inside the intersection to observe the traffic signal.","Maintain sufficient distance to prevent a collision with the vehicle ahead if it brakes suddenly.","When overtaking another vehicle, pass along its left side."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":252,"b":"Which of the following is not a motor vehicle that is required to install or place a fire extinguisher?","c":["A passenger car with 5 or more seats","A bus","A truck","A two-wheeled vehicle"],"a":"4","imgs":[],"t":"문장형"},{"n":253,"b":"According to the Road Traffic Act, which of the following measures must be taken when an emergency vehicle  driving with an emergency siren on approaches?","c":["When an emergency vehicle approaches an intersection, drivers of other vehicles must stop at the left edge of the  intersection.","On the road other than the intersection, other vehicles should yield so that emergency vehicles can pass first.","Drive faster than the emergency vehicle.","Stop temporarily and wait until the emergency vehicle passes."],"a":"2","imgs":[],"t":"문장형"},{"n":254,"b":"Which of the following is the safest measure to take when a fire truck approaches with flashing red lights and  siren while you are trying to turn right at an intersection?","c":["Temporarily stop, avoiding the intersection.","Stop right where you are.","Slow down, and turn right.","Pass through the intersection quickly and continue driving."],"a":"1","imgs":[],"t":"문장형"},{"n":255,"b":"According to the Road Traffic Act, which of the following privileges does NOT apply to emergency vehicles?","c":["Speed limit of motor vehicles","Restriction of overtaking","Restriction of cutting in","Ensuring pedestrian safety"],"a":"4","imgs":[],"t":"문장형"},{"n":256,"b":"Emergency vehicles should be properly outfitted, and they should convey that they are undertaking an  emergency operation by turning on their sirens or flashing lights. Which of the following vehicles","c":["Vehicles cracking down on illegal parking","Fire trucks","Ambulances","Police cars cracking down on violations of speed limit"],"a":"4","imgs":[],"t":"문장형"},{"n":257,"b":"In order for fire trucks and ambulances to be granted a special privilege to overtake other vehicles or drive at a  speed exceeding the limit in a no-passing zone, which of the following is the measur","c":["Drive while honking.","Equip the cars in a manner required for safe driving according to the Motor Vehicle Management Act and turn on the  sirens or flashing lights.","Drive with the headlights on.","Those vehicles can be granted such privileges without taking additional measures."],"a":"2","imgs":[],"t":"문장형"},{"n":258,"b":"Which of the following is necessary for a general vehicle to be recognized as an emergency vehicle when  transporting a patient in critical condition?","c":["The car should be authorized by the chief of the district police station.","The driver should turn on the headlights or emergency lights.","The car does not need to get special permission because it is transporting a patient in critical condition.","The car must be escorted by another vehicle."],"a":"2","imgs":[],"t":"문장형"},{"n":259,"b":"According to the Road Traffic Act, which TWO are considered emergency vehicles?","c":["A fire truck going to a repair shop for repairs","A vehicle transporting patients who are injured or in a critical condition, or transporting blood for transfusion","An ambulance transporting a patient discharged from a medical institution","A vehicle authorized by the commissioner of the City/Do (Province) police agency to transport urgent postal mail, etc."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":260,"b":"According to the Road Traffic Act, which of the following are TWO things that an ambulance driver is allowed to  do while operating an emergency vehicle in an emergency situation?","c":["Continue to operate the vehicle after a traffic accident without administering first aid to the injured.","Continue to operate the vehicle even if it obstructs pedestrians from crossing.","Drive along the center or along the left side of the road.","Cut in front of other vehicles on a congested road."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":261,"b":"According to the Road Traffic Act, what is the reason a fire truck driver who is operating a vehicle for its  original purpose cannot be granted exceptions as an emergency vehicle?","c":["Not wearing a seat belt","Drunk driving","Crossing of the centerline","Violation of traffic light"],"a":"2","imgs":[],"t":"문장형"},{"n":262,"b":"The regular traffic safety education provided for drivers of emergency vehicles shall be taken every ( ) years.  Which of the following best fits in (   )?","c":["1","2","3","5"],"a":"3","imgs":[],"t":"문장형"},{"n":263,"b":"Which of the following is NOT true about an exception for emergency vehicles under the Road Traffic Act?","c":["They may overtake other vehicles at a location where passing is prohibited.","They may cut in front of other vehicles even where cutting is prohibited.","They may pass the crossroad even though there is a pedestrian crossing it without regard for their safety.","They may drive faster than the speed limit prescribed for the road."],"a":"3","imgs":[],"t":"문장형"},{"n":264,"b":"Stopping and parking are prohibited within (  ) meters of fire-extinguishing water supply system, emergency  firefighting equipment, and firefighting systems under the Road Traffic Act. Which of the f","c":["5","6","8","10"],"a":"1","imgs":[],"t":"문장형"},{"n":265,"b":"Which of the following can be designated as an emergency vehicle by the commissioner of the City/Do  (Province) police agency at the request of the organization or the person intending to use the vehi","c":["A fire truck","A gasworks vehicle used for emergency gas leak repair","An ambulance","A blood bank vehicle"],"a":"2","imgs":[],"t":"문장형"},{"n":266,"b":"Which of the following CANNOT be designated as an emergency vehicle by the commissioner of the City/Do  police agency at the request of the organization or the person intending to use the vehicle?","c":["A police car used for traffic control","A vehicle used for delivery of urgent mail","A vehicle used for emergency work such as repair of phone lines","A civil defense vehicle used for emergency restorations"],"a":"1","imgs":[],"t":"문장형"},{"n":267,"b":"According to the Road Traffic Act, which of the following is NOT a situation wherein an emergency vehicle can  flash its warning lights for non-emergency matters?","c":["When a fire truck is on patrol for fire prevention, rescue, and emergency activities","When a fire truck is being driven to the workshop for urgent repair","When a vehicle commissioned for civil defense activities participates in a drill relevant to its usual emergency  responsibilities","When a police vehicle is on patrol for crime prevention and control"],"a":"2","imgs":[],"t":"문장형"},{"n":268,"b":"According to the Road Traffic Act, which of the following actions by an emergency vehicle on an emergency  rescue mission is considered an offense?","c":["Driving at 100 km/h on a general road with two lanes in one direction","Overtaking a vehicle inside a tunnel where lanes are marked with a solid white line","Cutting in front of a vehicle at an intersection to turn right","Failing to report or take the necessary actions in the event of a traffic accident resulting in personal injury because the  vehicle is on an emergenc"],"a":"4","imgs":[],"t":"문장형"},{"n":269,"b":"Which of the following is NOT an instance wherein an emergency vehicle can use a warning light for  non-emergency purposes?","c":["A fire truck on a round of patrol for fire prevention","A road maintenance vehicle on a round of patrol to prevent traffic accidents","An ambulance used in emergency response training","A police car on a round of patrol for crime prevention"],"a":"2","imgs":[],"t":"문장형"},{"n":270,"b":"Which of the following are the TWO correct methods of yielding to an emergency vehicle on the road?","c":["All vehicles must pull over to the left side of the road.","If the emergency vehicle is climbing up a narrow slope and you are facing it, the emergency vehicle must pull over to  the right to make way for you.","Near an intersection, pull over at some distance from the intersection.","When an emergency vehicle approaches from a place other than an intersection or its vicinity, the roadway shall be  yielded so that the emergency vehi"],"a":"3, 4","imgs":[],"t":"문장형"},{"n":271,"b":"Which TWO are considered emergency vehicles?","c":["A vehicle being guided by a police car for emergency purposes","An investigation vehicle used for non-investigatory purposes","A tow truck returning after completing a rescue activity","A vehicle transporting patients who are injured or in critical condition, or transporting blood for transfusion"],"a":"1, 4","imgs":[],"t":"문장형"},{"n":272,"b":"Which of the following is NOT true about the duty of a school bus driver/operator?","c":["A school bus driver must turn on the hazard lights only when children and infants are getting on or off the bus.","A school bus driver must make sure that all children and infants on board are wearing seat belts before moving the bus.","In case parents or guardians are on board together with the children, a school bus operator may post a sign indicating the  accompaniment of parents/g","In case parents or guardians are on board, there is no need to write safety operation records."],"a":"4","imgs":[],"t":"문장형"},{"n":273,"b":"In which location should the driver come to a full stop, regardless of the existence of pedestrians?","c":["A road with no centerline among the roads where the roadway and sidewalk are not distinguishable","Front of a crosswalk in a school zone with no traffic light","Pedestrian-first road","A place other than a road"],"a":"2","imgs":[],"t":"문장형"},{"n":274,"b":"A school bus for children is driving in the first lane of a road with two lanes in one direction with markings to  show that it has children or infants on board. Which of the following is the safest c","c":["Do not overtake the bus even if the second lane is empty.","Overtake the bus using the second lane.","Honk to send a signal to make way.","Check the situation of the traffic in the opposite direction, and overtake the bus by crossing the centerline."],"a":"1","imgs":[],"t":"문장형"},{"n":275,"b":"Which of the following is correct regarding school zones?","c":["Areas in front of kindergartens or middle schools are designated as school zones.","Mayors and other officials can limit or prohibit vehicles from entering a school zone.","For the purposes of a school zone, children are defined as those under 12 years old.","A school zone can limit vehicles to a speed of 30 km/h."],"a":"4","imgs":[],"t":"문장형"},{"n":276,"b":"Under the Act on Special Cases Concerning the Settlement of Traffic Accidents, what is the appropriate  punishment for a driver’s negligence resulting in injury to a child while driving at 40 km/h wit","c":["Only if demanded by the victim will the offender be subjected to criminal punishment.","Regardless of the victim's request, criminal punishment will be imposed.","When insured by comprehensive insurance, the driver will not face criminal punishment.","An agreement with the victim can prevent criminal punishment."],"a":"2","imgs":[],"t":"문장형"},{"n":277,"b":"Which of the following is the allowed seating capacity for a vehicle to be registered as a school bus for children?  (1 child is considered 1 passenger)","c":["11-seater or larger","16-seater or larger","17-seater or larger","9-seater or larger"],"a":"4","imgs":[],"t":"문장형"},{"n":278,"b":"What is the correct number of demerit points for the driver of a passenger car who has violated the speed limit  by exceeding the maximum speed by 25 km/h at around 08:30 am in a school zone?","c":["10 points","15 points","30 points","60 points"],"a":"3","imgs":[],"t":"문장형"},{"n":279,"b":"How many demerit points are imposed on the driver of a passenger car who overtakes a school bus for children  that is driving on a road with an indication that it has children or infants on board?","c":["10 points","15 points","30 points","40 points"],"a":"3","imgs":[],"t":"문장형"},{"n":280,"b":"According to the Road Traffic Act, how many hours of safety education are required for persons subject to  education regarding school buses for children?","c":["1 hour or more","3 hours or more","5 hours or more","6 hours or more"],"a":"2","imgs":[],"t":"문장형"},{"n":281,"b":"According to the Road Traffic Act, who are considered children and infants?","c":["Those 13 years old or below are considered children.","Those who are below 6 years old are considered infants.","Those who are below 15 years old are considered children.","Those who are below 7 years old are considered infants."],"a":"2","imgs":[],"t":"문장형"},{"n":282,"b":"Which of the following is the correct amount of traffic penalty that would be imposed on the driver of a  passenger car who commits a traffic signal violation in a school zone at around 13:00?","c":["KRW 50,000","KRW 70,000","KRW 120,000","KRW 150,000"],"a":"3","imgs":[],"t":"문장형"},{"n":283,"b":"Which of the following is the safest method of driving on a road where a child is playing alone without a  guardian?","c":["The child should not be there in the first place. Just drive on.","Honk to scare the child away and drive past.","Stop temporarily.","Keep an eye on the child and speed away."],"a":"3","imgs":[],"t":"문장형"},{"n":284,"b":"According to the Road Traffic Act, which of the following is a correct action taken by a driver when a child is  crossing in a crosswalk?","c":["Upon noticing a pedestrian crossing the crosswalk, check for safety and pass slowly.","In the case of a crosswalk on a general road with no traffic light, the driver can pass the stop line as long as he/she  does not enter the crosswalk ","In the case of a crosswalk on a general road with no traffic light, the driver can drive slowly behind crossing children.","Pedestrian crossing signs are placed on both ends of a crosswalk, and all drivers must come to a full stop before  reaching the crosswalk."],"a":"4","imgs":[],"t":"문장형"},{"n":285,"b":"If a school bus for children makes a stop at a road with one lane in one direction and switches on the flashers  to indicate that infants are getting on and off the bus, which of the following is the ","c":["Stop temporarily, check that it is safe, and drive on slowly.","Drive past at a reduced speed to ensure safety.","Continue to drive on.","Drive on while honking."],"a":"1","imgs":[],"t":"문장형"},{"n":286,"b":"Which of the following is the most appropriate behavior when a driver hits a child?","c":["A driver of a two-wheeled vehicle asked if the child was injured or not, but the child did not say anything. So the driver  decided that the child was","The driver of a passenger car stopped the vehicle immediately, visually checked the child, and concluded that the child  was not injured and so kept d","The driver of a truck saw the child who was knocked over but got up immediately. Upon concluding that the child was  not injured, the driver kept driv","A cyclist saw the child who was knocked over but quickly got up and ran. The cyclist reported the case to the police  station and waited at the scene."],"a":"4","imgs":[],"t":"문장형"},{"n":287,"b":"A vehicle just hit a child who suddenly emerged from an alleyway. The child appeared unharmed and claimed  that he was fine. Which of the following is the correct action taken by the driver?","c":["The driver can leave since this is a crime that is not prosecuted against objection.","The driver can leave since the child was not hurt, so this is not considered an accident.","The driver must call the parents of the child and take other necessary measures before leaving the scene.","Since the fault lies with the child, the driver can just take the child's contact information and leave."],"a":"3","imgs":[],"t":"문장형"},{"n":288,"b":"Who is responsible for the designation and management of school zones under the Road Traffic Act?","c":["Police chief","Mayor, etc.","Commissioner of the City/Do (Province) police agency","Superintendent of Education"],"a":"2","imgs":[],"t":"문장형"},{"n":289,"b":"Which of the following are TWO correct statements about school zones?","c":["A school zone refers to a section of a road located within 100m of the main gate of an elementary school.","A traffic penalty can be imposed for cars that are stopped or parked illegally in a school zone between 8 AM and 8 PM.","The length of the green signal of traffic lights installed in a school zone is based on the fastest walking speed of an  average child.","The demerit points applied to drivers who fail to consider pedestrian safety are doubled in school zones between 8 AM  and 8 PM."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":290,"b":"Which of the following are true about the special protection for school buses? (Select TWO)","c":["The method of overtaking a school bus for children is the same as the method prescribed for overtaking other kinds of  vehicles.","When children are getting on or off the bus, a car coming from the opposite direction on a road without a centerline  should check that it is safe and","When children are getting on or off the bus, a car coming from the opposite direction on a road with one lane in one  direction should stop momentaril","When children are getting on or off the bus, vehicles in the same lane and adjacent lanes should stop momentarily,  check that it is safe, and drive s"],"a":"3, 4","imgs":[],"t":"문장형"},{"n":291,"b":"Below are descriptions of a thoroughfare of bicycles. According to the Road Traffic Act, which of the following is  INCORRECT?","c":["The rider of a bicycle must pass along a bicycle track at a location with a separate bicycle track.","The rider of a bicycle must pass along close to the right side of the road at a location where no bicycle track is  constructed.","The rider of a bicycle may pass along the roadside area (excluding a section where thoroughfare for bicycles is  prohibited with safety markings).","A rider of a bicycle who intends to cross the road at a crosswalk may do so while riding the bicycle."],"a":"4","imgs":[],"t":"문장형"},{"n":292,"b":"Which ministries are responsible for jointly establishing the procedure and criteria for designating priority zones  under the Road Traffic Act?","c":["A school zone is jointly designated by the Ministry of Interior and Safety, Ministry of Health and Welfare, and Ministry  of Land, Infrastructure, and","A silver zone is jointly designated by the Ministry of Interior and Safety, Ministry of Land, Infrastructure, and Transport,  and Ministry of Environm","A priority zone for persons with disabilities is jointly designated by the Ministry of Interior and Safety, Ministry of Health  and Welfare, and Minis","A priority zone for people with mobility impairments is jointly designated by the Ministry of Interior and Safety, Ministry  of Environment, and Minis"],"a":"3","imgs":[],"t":"문장형"},{"n":293,"b":"Which of the following is the correct method of driving considering the protection of school buses for children?","c":["If you are facing and approaching a school bus for children on a road with one lane in one direction, you must stop  before reaching the bus, check th","If a school bus for children has switched on flashers indicating that children are getting off, you must take another lane  and drive past the bus qui","If there is no centerline and you are facing and approaching a school bus for children, you must keep driving at the  same speed.","You can overtake a school bus for children, even if it has signs indicating that children are on board."],"a":"1","imgs":[],"t":"문장형"},{"n":294,"b":"Which of the following are TWO correct statements regarding the registration of school buses for children?","c":["To operate a school bus, one must report to the Korea Road Traffic Authority beforehand and receive a report  certificate.","A school bus for children must be a vehicle with maximum passenger capacity of nine or more (1 child is considered 1  passenger).","If applying to renew the registration of a school bus for children because the old one needs to be replaced, one must  submit the old registration tog","The registration certificate of a school bus for children must be attached in a place where it will be easily visible on the  top left side of the win"],"a":"2, 3","imgs":[],"t":"문장형"},{"n":295,"b":"Which of the following is the correct method of facilitating the safe boarding and disembarking of a child for a  driver operating a school bus for children?","c":["Flashers must be used to ensure safety while the child is boarding the vehicle.","If traffic is congested, turn off the flashers momentarily and allow the child to board.","Drop off children around the school bus and leave immediately.","Fastening a seatbelt is not required in a school zone."],"a":"1","imgs":[],"t":"문장형"},{"n":296,"b":"According to the Road Traffic Act, which of the following is NOT true about school zones?","c":["The traffic penalty for a parking violation is the same as that for the silver zone.","A \"slow\" sign can be installed in school zones.","Parking and stopping are prohibited within a school zone.","One will face a criminal penalty for causing an accident that leaves a child injured, regardless of any settlements."],"a":"1","imgs":[],"t":"문장형"},{"n":297,"b":"A child crosses a street in a school zone with an infant. Which of the following is the correct driving behavior?","c":["Stop temporarily to protect children and infants.","Slow down as a child crosses the street while protecting the infant.","Drive fast as the child and infant are on the opposite side of the road.","Since children and infants walk slowly, keep a safe distance and drive while avoiding them."],"a":"1","imgs":[],"t":"문장형"},{"n":298,"b":"According to the Road Traffic Act, which of the following is correct regarding school zones?","c":["If a car accident occurs while a child is jaywalking, the driver is exempted from all liability.","If a cyclist hits a child while driving, only civil liability exists as a bicycle is not a vehicle.","Upon seeing a child suddenly running onto the road, stop the vehicle instead of reducing the speed.","The chief of a police station may set the speed limit of a vehicle at 50km or less per hour."],"a":"3","imgs":[],"t":"문장형"},{"n":299,"b":"Which of the following are true about school zones and driving in these zones? (Select TWO)","c":["A school zone may limit the vehicle speed to 30 km/h if necessary to ensure children's safety. Drivers must observe the  speed limit when driving in a","In a school zone, drivers of motor vehicles, motorcycles, and trams must observe the speed limit and come to a full  stop when children are crossing.","Roads near alternative or international schools are not designated as school zones; therefore, drivers must slow down  when driving in these areas as ","Speed limit and pedestrian crossing signs can be placed with priority in school zones. Drivers must slow down when a  child is standing by the centerl"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":300,"b":"Which of the following is NOT a violation of the special protection duty for school buses (on a one-lane road)?","c":["Passing through without stopping when children or toddlers are getting off.","Slowing down and passing through before reaching the bus, when approaching from the opposite direction.","Blowing the horn and passing through while children or toddlers are getting on or off.","Not overtaking a school bus displaying the child transport sign while driving."],"a":"4","imgs":[],"t":"문장형"},{"n":301,"b":"According to the Road Traffic Act, which of the following is true about a child and an infant and the  responsibilities of a school bus driver?","c":["Those 13 years old or below are considered children, and a school bus driver must ensure safety when children are  getting on and off the bus.","A school bus driver must make sure that all children, except infants, have put on their seat belts prior to departure.","A school bus driver must safely drop off a child at the destination demanded by the child.","Those who are below 6 years old are considered infants, and a school bus driver must turn on the hazard lights when  an infant is getting on and off t"],"a":"4","imgs":[],"t":"문장형"},{"n":302,"b":"According to the Road Traffic Act, which of the following is true about the operation of the yellow and red  strobe lights installed on a school bus for the purpose of allowing children or infants to ","c":["The red indicator light(s) must be flashing when stopping the bus.","The red indicator light(s) must be flashing when braking.","The yellow indicator light(s) must be flashing when attempting to stop on the road.","Both yellow and red indicator light(s) must be flashing when parking."],"a":"3","imgs":[],"t":"문장형"},{"n":303,"b":"Which of the following is NOT a law that is the basis for designating a school zone?","c":["Early Childhood Education Act","Elementary and Secondary Education Act","Act on the Establishment and Operation of Private Teaching Institutes and Extracurricular Lessons","Child Welfare Act"],"a":"4","imgs":[],"t":"문장형"},{"n":304,"b":"Below are descriptions related to school zones. Which of the following is NOT true?","c":["Traffic accidents in these areas may be excluded from the special exemption provided under the Special Traffic Accident Act.","The speed limit for vehicles can be set at 30 km/h or less.","The traffic penalty and demerit points are three times higher than those on general roads.","Parking and stopping are prohibited."],"a":"3","imgs":[],"t":"문장형"},{"n":305,"b":"According to the Road Traffic Act, which of the following children is NOT walking in a safe manner?","c":["A child walking on the edge of a roadway that is clearly separated from the sidewalk","A child walking on the edge of a one-way road while facing the oncoming traffic","A child walking on the edge of a roadway that does not have a clear separation from the sidewalk while facing the  oncoming traffic","A child walking on the right-hand side of a sidewalk"],"a":"1","imgs":[],"t":"문장형"},{"n":306,"b":"According to the Road Traffic Act, which of the following is NOT correct regarding the protection of children?","c":["If a child is crossing a road without a crosswalk, drivers must drive slowly.","If a child is standing in a safety zone, drivers must drive slowly while maintaining a safe distance.","If a child is walking in a narrow alley, drivers must drive slowly while maintaining a safe distance.","If a child is crossing a crosswalk, drivers shall make a temporary stop in front of the crosswalk."],"a":"1","imgs":[],"t":"문장형"},{"n":307,"b":"According to the Road Traffic Act, which of the following correctly describes the driver's duty regarding the  special protection of school buses?","c":["If a school bus for children with a red flasher being operated passes next to your lane, it is necessary to stop  temporarily.","You cannot overtake any school bus for children passing on the road.","If you violate this duty, you will incur 15 demerit points on your driver's license.","This duty does not apply when a school bus for children stops on a road with one lane in one direction with its red  flasher activited."],"a":"1","imgs":[],"t":"문장형"},{"n":308,"b":"According to the Road Traffic Act, which of the following constitutes a situation wherein a child’s guardian is  slapped with an administrative fine?","c":["A guardian who lets a child ride a bicycle on the roadway","A guardian who lets a child ride an electric scooter in a playground","A guardian who lets a child ride an electric scooter on the roadway","A guardian who lets a child ride a bicycle in a playground"],"a":"3","imgs":[],"t":"문장형"},{"n":310,"b":"Which of the following is NOT correct regarding the duty of a person who operates a school bus for children?","c":["When children are getting on a school bus, an adult guardian must be designated.","After completing the trip, the operator must confirm that all children and infants have disembarked from the school bus.","It is necessary to prepare and keep a record of seat belt wearing and confirmation of the accompanying guardian.","A record of confirmation of wearing seat belts and accompanying guardians must be submitted to the supervisory  authority of the facility operating th"],"a":"2","imgs":[],"t":"문장형"},{"n":311,"b":"Which of the following is the punishment imposed on the operator when an “accompanying guardian sign” is  attached even though there is no adult guardian on a school bus for children?","c":["A criminal fine of up to KRW 200,000 or detention","A criminal fine of up to KRW 300,000 or detention","A criminal fine of up to KRW 400,000 or detention","A criminal fine of up to KRW 500,000 or detention"],"a":"2","imgs":[],"t":"문장형"},{"n":312,"b":"Which of the following is true about the definition of the senior driver sign under the Road Traffic Act?","c":["A senior driver sign indicates that the vehicle is driven by a licensed driver aged 65 or older.","The background of the sign should be blue and the text should be yellow.","The front side should be made of rubber magnet for removal, and the back side should be made of reflective paper.","Attach it to the front of the vehicle in a visible location that does not interfere with safe driving."],"a":"1","imgs":[],"t":"문장형"},{"n":313,"b":"Which of the following is NOT an authority that a commissioner of the City/Do (Province) police agency or a  police chief can exercise in a silver zone?","c":["Prohibiting or restricting the passage of vehicles and horses","Designating and operating a back road as a one-way street","Setting a speed limit of 30 km/h for horses and vehicles","Designating an on-road parking lot for the elderly on a road next to the gate of a house"],"a":"4","imgs":[],"t":"문장형"},{"n":314,"b":"According to the Road Traffic Act, which of the following may be prohibited from entering or driving in a silver  zone?","c":["Personal mobility devices (PMD), bicycles","Truck-mounted drilling rigs and kick scooters for children","Motorcycles and rollators with width of 1 m or less","Road stabilizers and walking frames with width of 1 m or less"],"a":"1","imgs":[],"t":"문장형"},{"n":315,"b":"According to the Road Traffic Act, which of the following is true about a violation that took place in a silver  zone at 10 AM?","c":["If the driver of a dump truck violates the traffic signal, the traffic penalty is KRW 130,000.","If the driver of a passenger vehicle obstructs a senior pedestrian, the traffic penalty is KRW 70,000.","If a bicycle rider obstructs a senior pedestrian crossing a crosswalk, the traffic penalty is KRW 50,000.","If the driver of a cultivator fails to fulfill his/her duty of guaranteeing pedestrian safety, the traffic penalty is KRW 30,000."],"a":"1","imgs":[],"t":"문장형"},{"n":316,"b":"Which of the following ministries is NOT authorized to enact enforcement ordinances regarding the procedures  and criteria for the designation and abolition of senior or disabled protection zones?","c":["Ministry of Culture, Sports, and Tourism","Ministry of Interior and Safety","Ministry of Health and Welfare","Ministry of Land, Infrastructure, and Transport"],"a":"1","imgs":[],"t":"문장형"},{"n":317,"b":"Which of the following officials CANNOT declare a silver zone?","c":["Mayor of a special metropolitan city","Mayor of a metropolitan city","Governor of a special self-governing province","A commissioner of a city/province (-do) police agency"],"a":"4","imgs":[],"t":"문장형"},{"n":318,"b":"Which of the following is true about the general characteristics of senior citizens who are considered people  with mobility impairments?","c":["Their reflexes are slow but they are quick in making decisions from experience.","They have poor eyesight but high hearing sensitivity.","They may not be quick in responding to unexpected situations, but their cognitive ability is heightened in such cases.","They lose mobility as their health conditions deteriorate."],"a":"4","imgs":[],"t":"문장형"},{"n":319,"b":"According to the Road Traffic Act, which of the following is true about the measures that a mayor can take for a  silver zone?","c":["The mayor can restrict or prohibit access by motor vehicles and horses and trams.","The mayor can prohibit access by buses, but cannot restrict access by trams.","The mayor can prohibit access by two-wheeled vehicles, but cannot restrict access by bicycles.","The mayor cannot prohibit access by heavy equipment, but can restrict such access."],"a":"1","imgs":[],"t":"문장형"},{"n":320,"b":"The driver of a passenger car slammed on the brakes after spotting an elderly person crossing a crosswalk  without pedestrian signal lights but unfortunately hit him/her, and he/she was hospitalized f","c":["The driver is not responsible at all as there were no pedestrian signal lights.","The driver is subject to civil liability.","Only the elderly person is subject to criminal prosecution for crossing illegally.","The driver is subject to criminal liability."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":321,"b":"Which TWO are applicable to the control that a police chief has over a silver zone?","c":["Prohibition or restriction of vehicle passage","Prohibition of stopping/parking","Installation of a road parking lot","Prohibition or restriction of pedestrian passage"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":322,"b":"Which of the following is the correct method of driving when passing by an elderly person in a silver zone?","c":["Maintain a constant speed and drive by.","Maintain a safe distance and drive by slowly.","Honk and drive by quickly.","Flash the headlights and drive by."],"a":"2","imgs":[],"t":"문장형"},{"n":323,"b":"Which of the following is NOT a road facility that can be installed for the safety of the aged in a silver zone?","c":["Non-slip facilities, crash barriers","Speed bumps, non-slip facilities","Acceleration lane, silver zone sign","Crash barriers, road reflector system"],"a":"3","imgs":[],"t":"문장형"},{"n":324,"b":"Which of the following is NOT a safety precaution to be taken by a driver driving through a silver zone at night?","c":["Watch out for glare from another car’s headlights as you may not be able to see the pedestrians.","Drive at high speed because there are no elderly people around at night.","Drive through while looking out for any elderly crossing the road illegally.","Drive carefully because elderly people wearing black can be hard to spot."],"a":"2","imgs":[],"t":"문장형"},{"n":325,"b":"Which of the following is NOT true about driving across a crosswalk with a traffic light in a silver zone and  penalty for violation?","c":["When the traffic light turns green, the driver of a motor vehicle must look around first and speed up slowly.","If the driver of a passenger vehicle violates the traffic signal between 8 AM and 8 PM, the traffic penalty is KRW  120,000.","A bicycle rider must also wait for all senior pedestrians to finish crossing the street.","If a motorcycle rider obstructs pedestrians who are crossing at a crosswalk between 8 a.m. and 8 p.m., a traffic penalty  of KRW 90,000 will be impose"],"a":"4","imgs":[],"t":"문장형"},{"n":326,"b":"Which of the following statements is INCORRECT regarding a silver zone?","c":["A traffic penalty is imposed for speeding between 8 AM and 8 PM.","Green traffic lights for pedestrians are longer that those on general roadways.","No road parking lots can be installed.","Larger traffic lights are installed so that they can be seen more easily by the elderly."],"a":"4","imgs":[],"t":"문장형"},{"n":327,"b":"How many demerit points does the driver of a passenger car incur if caught driving at a speed that is 25 km/h  faster than the limit in a silver zone at around 11 AM?","c":["60 points","40 points","30 points","15 points"],"a":"3","imgs":[],"t":"문장형"},{"n":328,"b":"Which of the following is an INCORRECT method of driving when approaching a crosswalk with traffic lights in  a silver zone?","c":["If an elderly person crosses the road after the signals change, wait for the person to finish crossing before taking off.","Drivers must anticipate signal changes and drive accordingly to ensure safe driving.","Drive slowly to come to a safe stop when the signals change.","Take extra precautions as the elderly walk at a slower pace."],"a":"2","imgs":[],"t":"문장형"},{"n":329,"b":"Which of the following is INCORRECT regarding the measures applicable to a silver zone?","c":["The speed limit can be set to 30 km/h.","A \"caution\" sign can be installed as the duration of the pedestrian signal is the same as that of the normal pedestrian  signal.","Extra traffic safety installations, e.g., speed bumps, can be added.","Signal devices must be prioritized for installation and maintenance at crosswalks on arterial roads located closest to the  main entrance of the desig"],"a":"2","imgs":[],"t":"문장형"},{"n":330,"b":"Which of the following is NOT a behavior for which a traffic penalty is imposed when it occurs in a silver zone  between 8 AM and 8 PM?","c":["Violation of traffic signal","Violation of parking rules","Obstruction of pedestrians in a crosswalk","Invasion of the centerline"],"a":"4","imgs":[],"t":"문장형"},{"n":331,"b":"Which of the following is NOT true about a silver zone?","c":["When driving in a silver zone, look around with caution for any potential hazards.","A silver zone sign is a road sign that informs drivers of their duty to protect the seniors within the designated zone.","A silver zone sign is installed in the center of the road within said zone.","If the driver of a passenger vehicle obstructs a pedestrian crossing a crosswalk in a silver zone at 10 AM, the traffic  penalty is KRW 120,000."],"a":"3","imgs":[],"t":"문장형"},{"n":332,"b":"Which of the following statements about senior protection zones under the Road Traffic Act is incorrect?","c":["The authority to designate, cancel, and manage such zones lies with the mayor, governor, or local administrator.","The local police chief may designate and operate side streets as one-way roads.","The local police chief may restrict traffic within senior protection zones.","The mayor or governor may limit the driving speed to 30 km/h or less."],"a":"4","imgs":[],"t":"문장형"},{"n":333,"b":"Who among the following pedestrians is most likely to comply with the Road Traffic Act?","c":["A pedestrian who crosses a road without a crosswalk using the shortest possible distance.","A pedestrian who crosses a road without using a crosswalk, as there are no cars passing by.","A pedestrian who crosses a road behind a stopped truck.","A pedestrian who walks on the left side of a sidewalk."],"a":"1","imgs":[],"t":"문장형"},{"n":334,"b":"According to the Road Traffic Act, which of the following driving behaviors by an elderly driver is subject to the  highest demerit points?","c":["Stop the car at the crosswalk and obstruct the passage of pedestrians.","Notice a pedestrian late and apply the brake so suddenly that the pedestrian almost fell over.","Upon spotting a pedestrian who is jaywalking, honk and pass quickly in front of the pedestrian.","Overtake the pedestrian by crossing the solid yellow centerline."],"a":"4","imgs":[],"t":"문장형"},{"n":335,"b":"According to the Act on the Promotion of the Transportation Convenience of Mobility Disadvantaged Persons,  which of the following persons is not regarded as a \"mobility disadvantaged person\"?","c":["A child","An elderly person","A teenager","A pregnant woman"],"a":"3","imgs":[],"t":"문장형"},{"n":336,"b":"Which of the following is NOT correct regarding the general physical characteristics of a senior citizen?","c":["Slow movement","Vision deteriorates, but hearing improves","Slow reflexes","Physical strength is weakened"],"a":"2","imgs":[],"t":"문장형"},{"n":337,"b":"Which of the following is the most desirable driving behavior of an elderly driver?","c":["Always drive slowly for safety reasons when traveling long distances, regardless of the type of road.","Drive a vehicle without taking a rest until you reach your destination to save time.","Keep an eye on the road situation and drive by complying with the speed limit.","Drive mainly at night when there is less traffic."],"a":"3","imgs":[],"t":"문장형"},{"n":338,"b":"Which of the following is the least related to safe driving by a senior citizen?","c":["Taking sufficient rest prior to driving","Periodic checks of health condition","Verification of the route to the destination prior to driving","Encouraging nighttime driving rather than daytime driving."],"a":"4","imgs":[],"t":"문장형"},{"n":339,"b":"Which of the following is NOT the correct explanation regarding criminal punishment if a driver of a passenger  car causes an injury that will take 3 weeks to heal to an elderly person in the silver z","c":["If a driver has comprehensive insurance, he/she is not subject to criminal punishment.","Criminal punishment is applied when there is a road sign indicating a silver zone.","If a victim does not want punishment, a driver is not subject to criminal punishment.","If both parties reach an agreement, criminal punishment is not imposed."],"a":"2","imgs":[],"t":"문장형"},{"n":340,"b":"Which of the following is in the correct range of traffic penalties and demerit points (excluding surcharges)  imposed on a car driver who drives above 60 km/h at around 15:00 in a silver zone?","c":["KRW 60,000, 60 points","KRW 90,000, 60 points","KRW 120,000, 120 points","KRW 150,000, 120 points"],"a":"4","imgs":[],"t":"문장형"},{"n":341,"b":"Which of the following is incorrect regarding parking spaces designated for persons with disabilities?","c":["A vehicle with a tag permitting parking in parking spaces reserved for persons with disabilities may park there even if a  disabled person is not ridi","If a person issued with a tag permitting parking in parking spaces reserved for persons with disabilities uses it in an  unlawful manner such as trans","Any act impeding parking in parking spaces reserved for persons with disabilities, such as piling up items or blocking  passage, is strictly prohibite","When a vehicle without a parking tag is parked in a parking space reserved for persons with disabilities, an  administrative fine of KRW 100,000 is im"],"a":"1","imgs":[],"t":"문장형"},{"n":342,"b":"Which of the following is not an agency that issues a parking tag for parking spaces reserved for persons with  disabilities?","c":["Ministry of Patriots and Veterans Affairs","Special Self-Governing City Mayor, Special Self-Governing Province Governor","Head of Si/Gun/Gu","Minister of Health and Welfare"],"a":"4","imgs":[],"t":"문장형"},{"n":343,"b":"Which of the following lights must be turned on when stopping on a road at night (except for two-wheeled  vehicles)?","c":["Headlights and taillights","Indoor lights and sidelights","License plate lights and headlights","Taillights and sidelights"],"a":"4","imgs":[],"t":"문장형"},{"n":344,"b":"Which of the following descriptions is most correct regarding the yellow broken line on the edge of a road?","c":["Both parking and stopping are allowed on the edge of a road marked with yellow broken lines.","Parking is prohibited, but stopping is allowed on the edge of a road marked with yellow broken lines.","Parking is allowed, but stopping is prohibited on the edge of a road marked with yellow broken lines.","Both parking and stopping are pr
