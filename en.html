the ways to stop safely or slow down?  (Select TWO)","c":["Press the brake pedal as hard as you can.","Continuously press the hazard light button.","Keep honking firmly while driving.","Continuously operate the electronic parking brake (EPB).","Steer the steering wheel strongly to the left and right."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":752,"b":"Which of the following descriptions regarding the  given situation are correct? (Select TWO)","c":["You can park in a school zone.","If there are fences installed in a school zone, you need  not pay attention as children cannot enter the driveway.","School zones can be designated to protect children  from the dangers of traffic accidents.","Observe the speed limit and drive with caution to  ensure the safety of children as there is snow on the  road.","There is no risk of accidents because children are  cautious in school zones."],"a":"3, 4","imgs":[],"t":"문장형"},{"n":753,"b":"Which of the following are not defined as \"actions  obstructing parking in a parking space reserved for  persons with disabilities\" under the Act on the  Guarantee of Convenience Promotion of Persons ","c":["An act of obstructing a parking space reserved for  persons with disabilities by stacking objects","An act of stacking or parking objects in front, behind, or  on either side of a parking space reserved for persons  with disabilities","An act of parking a car without a permit in a parking  space reserved for persons with disabilities","An act of obstructing a parking space reserved for  persons with disabilities by erasing or damaging its lines  and signs","An act of parking a car with a permit in a parking space  reserved for persons with disabilities, but the car is not  occupied by a person with impair"],"a":"3, 5","imgs":[],"t":"문장형"},{"n":754,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Since there are no vehicles in the direction of travel, you  can stop on the right side of the road.","Even if you are driving in a school zone, you need not  observe the speed limit if no children are present.","Observe the maximum speed limit indicated by the  safety sign as you drive.","Drive with caution and watch your surroundings, as  children may suddenly jump into the road.","You should speed up and drive as fast as possible to  exit school zones."],"a":"3, 4","imgs":["img_0067.jpg"],"t":"사진형"},{"n":755,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Drive fast while continuously honking.","Slow down sufficiently in advance to drive safely.","Drive slowly even if you do not see any elderly people  walking.","For safety, it is advisable to tailgate the vehicle in front  whenever possible.","Speed up and quickly exit the silver zone as there is a  crosswalk ahead."],"a":"2, 3","imgs":["img_0068.jpg"],"t":"사진형"},{"n":756,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["You should drive at a speed of 30 km/h or less.","You may drive fast to pass through, as there are no  vehicles driving ahead.","Parking is prohibited, but stopping is allowed.","When passing through a crosswalk, honk and go  through it quickly regardless of whether there are  children present.","Be cautious of children who may suddenly appear, even  if fences are installed to prevent jaywalking."],"a":"1, 5","imgs":["img_0069.jpg"],"t":"사진형"},{"n":757,"b":"Which of the following actions by a driver or a  passenger will not be fined or slapped with a traffic  penalty in the given situation? (Select TWO)","c":["A passenger vehicle must slow down to less than 30  km/h in advance.","You walked with a two-wheeled vehicle on a sidewalk  with the engine turned off.","The driver of a personal mobility device failed to follow  the instructions of an exemplary driver.","The driver of a passenger vehicle parked in a school  zone.","A child without a helmet rides a bicycle on the sidewalk  while being watched by a guardian."],"a":"1, 2","imgs":["img_0070.jpg"],"t":"사진형"},{"n":758,"b":"Which of the following are true about traffic safety  signs in the given situation? (Select TWO)","c":["The \"30\" marked on the pavement indicates that the  maximum speed limit on the road is 30 km/h.","The yellow crosswalk markings are incorrect, as all  crosswalks should be marked in white.","Zigzag solid white lines indicate that you should slow  down, and lane changes are allowed in those sections.","An indication sign attached to the traffic light means  that there is a crosswalk.","Asphalt paved in red is used only in school zones."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":759,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["As the road curves to the left, it is safer to use the road  mirror on the right to see the situation ahead as you  proceed.","It is better to speed up on an uphill road, even if you  slightly exceed the maximum speed limit.","A yellow solid line is marked along the right side of the  road, indicating that parking is prohibited but stopping  is allowed.","You must stop before passing through crosswalks with  no traffic lights, even if there are no pedestrians.","On roads that curve left, it is safer to stay on the left  side even if you cross the centerline."],"a":"1, 4","imgs":["img_0071.jpg"],"t":"사진형"},{"n":760,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Speed up in advance before the end of the school zone.","Drive with extra attention to pedestrian safety on  unlaned roads with no centerline.","Check for pedestrians in crosswalks even outside of a  school zone and proceed slowly.","Since it is dusk, turn on the high-beam headlights to  check the safety ahead and keep honking while driving.","Parking is allowed as yellow dotted lines on the right  side of the road indicate that parking is allowed but  stopping is prohibited."],"a":"2, 3","imgs":["img_0072.jpg"],"t":"사진형"},{"n":761,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Keep honking to pass a school zone, even if there are  no pedestrians.","Slow down to reduce the risk of an accident, as there  may be vehicles crossing the centerline.","Crossing the centerline is allowed, as there is an  entrance to the parking lot in the building on the left.","Slow down further to watch out for pedestrians, as the  bus on the opposite side of the road obstructs your view.","Parking is prohibited at speed bumps in a school zone,  but stopping is allowed."],"a":"2, 4","imgs":["img_0073.jpg"],"t":"사진형"},{"n":762,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["If the traffic light ahead is red and you intend to turn  right, you may pass through the crosswalk ahead  without stopping.","If the pedestrian signal on the right is green and  pedestrians are crossing, stop before the crosswalk if you  intend to turn right.","If the pedestrian signal turns red but the pedestrians are  still crossing, honk to rush them.","You can turn left regardless of the traffic light as the  pedestrian signal on the right is green.","Drive with extra caution, as pedestrians may be crossing  belatedly."],"a":"2, 5","imgs":["img_0074.jpg"],"t":"사진형"},{"n":763,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Pass through the intersection quickly in anticipation of  vehicles emerging from the alley on your right.","Slow down to observe the situation ahead, as the fire  truck parked on the opposite side of the road is  obstructing your view.","In a school zone, stop and proceed only if there are  pedestrians in the crosswalk.","If you plan to turn right, watch out for vehicles or  pedestrians coming out of the alley on your right.","You should drive within the maximum speed limit, as the  speed limit in all school zones is set at 30km/h."],"a":"2, 4","imgs":["img_0075.jpg"],"t":"사진형"},{"n":764,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Drive while being extremely cautious about pedestrians  with umbrellas.","Speed up to pass quickly, as there are many pedestrians  around.","Even if you are not in a school zone, pay attention to  pedestrian safety as you are in front of a school.","Proceed slowly as there is an intersection ahead with no  traffic lights and visibility is limited on both sides.","Pedestrians may appear between parked cars, so honk  to warn them."],"a":"1, 3","imgs":["img_0076.jpg"],"t":"사진형"},{"n":765,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Keep honking to proceed, even if there are no  pedestrians.","Temporarily stop to watch out for pedestrians and  vehicles before entering the intersection, as there is an  alley behind a parked truck on the right","Proceed slowly if there are no pedestrians, as there is no  traffic signal at the crosswalk.","Slow down to reduce the risk of an accident, as there  are vehicles crossing the centerline ahead.","When intending to turn right, do so without stopping as  there is a stop sign on the right, but no traffic light."],"a":"2, 4","imgs":["img_0077.jpg"],"t":"사진형"},{"n":766,"b":"Which of the following descriptions regarding the  exclusive use areas for fire engines under the  Framework Act on Firefighting Services are incorrect?  (Select TWO)","c":["They are installed in apartment buildings to facilitate  firefighting operations.","No one should park a vehicle in the designated area or  block access to it in any way.","The owner of an apartment building must install at least  one in each building, without exception.","Parking as shown in the photo is subject to an  administrative fine.","Removing or damaging the \"exclusive use area\" sign  does not constitute obstruction of the exclusive use area."],"a":"3, 5","imgs":[],"t":"문장형"},{"n":767,"b":"Which of the following descriptions regarding the  compulsory disposition of vehicles that obstruct  emergency fire engine traffic are incorrect? (Select  TWO)","c":["Illegally parked vehicles that interfere with firefighting  activities can be moved.","Parked vehicles within parking lines that interfere with  firefighting activities can be removed.","Objects that obstruct the passage of firefighting vehicles  can be moved or removed.","The driver of a vehicle that has been towed due to  illegal parking may claim compensation for any losses.","The driver of a vehicle parked within a designated  parking space but has been towed may claim  compensation for damages."],"a":"4, 5","imgs":[],"t":"문장형"},{"n":768,"b":"Which of the following driving methods violate the  law in the given situation? (Select TWO)","c":["Driver B - Drives at 100 km/h.","Driver A - Drives at 70 km/h.","Driver B - Overtakes at an intersection.","Driver A - Overtakes at an intersection.","Driver B - Does not maintain a safe distance with the  vehicle ahead."],"a":"2, 4","imgs":["img_0078.jpg"],"t":"사진형"},{"n":769,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["If an emergency vehicle is approaching, vehicles must  move over to the left or right side of the road to yield  the right of way.","Follow behind the emergency vehicle as it will allow you  to travel faster.","Speed up to prevent the emergency vehicle from  changing lanes.","If the emergency vehicle is returning from an urgent  business, it does not activate its strobe lights or siren, so  there is no need to yield.","If you see an emergency vehicle behind, speed up so  that it cannot overtake you."],"a":"1, 4","imgs":["img_0079.jpg"],"t":"사진형"},{"n":770,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["The right of way can only be yielded in the second lane,  so if you are in the first lane, there is no need to watch  out for emergency vehicles behin","If there is an intersection ahead, avoid it and yield the  right of way.","Quickly switch to the second lane, turn on the hazard  lights, and drive ahead of the emergency vehicle.","If you are traveling in front of an emergency vehicle,  move to the left or right side of the road and yield the  right of way.","Since you can travel faster if you follow behind the  emergency vehicle, switch to the second lane and closely  follow behind after the emergency vehi"],"a":"2, 4","imgs":["img_0080.jpg"],"t":"사진형"},{"n":771,"b":"Which of the following traffic safety facilities and  actions are the most appropriate in the given  situation? (Select TWO)","c":["Crosswalk - You can cross while riding on your bike.","Bike crosswalk - Ride the bicycle to cross a roadway with  a bike crossing.","Pedestrian signal - Pedestrians should start crossing  quickly when the green traffic light is flashing.","Pedestrian signal - If a bike signal is not installed,  bicycle riders must follow the pedestrian signal.","Traffic light - If a bike signal is not installed, bicycle  riders must follow the traffic signal."],"a":"2, 4","imgs":["img_0081.jpg"],"t":"사진형"},{"n":772,"b":"Which of the following are the most incorrect ways  to drive in the given situation? (Select TWO)","c":["To turn right, stop just before the stop line, and then  turn right.","When turning right, proceed slowly along the right edge  of the road before turning.","Drivers turning right must pay attention to pedestrians,  bicycle riders, and others who are stopping or  proceeding, depending on the signal.","If a passenger is getting out of the car, you can stop  briefly in front of a fire hydrant.","On city streets, it is unnecessary to turn on the  headlights because the surroundings are well-lit even at  night."],"a":"4, 5","imgs":["img_0082.jpg"],"t":"사진형"},{"n":773,"b":"Which of the following are the most incorrect ways  to drive in the given situation? (Select TWO)","c":["Bicycle riders may ride their bicycle when crossing a  crosswalk.","A bicycle rider who is a child may ride on the sidewalk.","A bicycle rider must wear a helmet.","Bicycle riders must turn on their front and rear lights or  wear other light-emitting devices when riding on the  road at night.","School buses can park or stop on the left side of the  road for the convenience of children getting on and off  the bus."],"a":"1, 5","imgs":["img_0083.jpg"],"t":"사진형"},{"n":774,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Drivers need not be particularly careful unless the  agricultural machine is in motion.","Speed up as there are no speed limits on rural roads.","Drive carefully as there is a lot of sand and dust on the  road.","Maintain a safe distance from the agricultural machine  by stopping temporarily or slowing down before  approaching it.","Never honk to avoid disturbing the agricultural machine  driver."],"a":"3, 4","imgs":["img_0084.jpg"],"t":"사진형"},{"n":775,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Speed up as there are no speed limits on rural roads.","Even if there is enough space to pass between your  vehicle and the agricultural machine, stop for the safety  of the person riding the cultivator.","Maintain a safe distance from the agricultural machine  by stopping temporarily or slowing down before  approaching it.","Never honk to avoid disturbing the agricultural machine  driver.","Stopping is prohibited in the roadside areas on both  sides of the road, but parking is allowed."],"a":"2, 3","imgs":["img_0085.jpg"],"t":"사진형"},{"n":776,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Since the signals are not working, carefully observe the  intersection before entering.","When turning right, honk and overtake the cultivator on  its left.","Since the cultivator is moving slowly, speed up and turn  right ahead of it.","If you intend to go straight in the third lane, be sure to  check the cultivator's position.","Anticipate the cultivator going straight, and then quickly  switch to the second lane and go straight."],"a":"1, 4","imgs":["img_0086.jpg"],"t":"사진형"},{"n":777,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["You can drive over the centerline to overtake the  cultivator.","When the cultivator passes a parked vehicle, use the  space on the right side to overtake it at high speed.","Even if the cultivator driver signals you to go ahead,  maintain a safe distance and follow safely.","If the cultivator driver yields by moving to the second  lane, proceed to the left of the cultivator without  crossing the centerline.","There is no need to anticipate pedestrians appearing in  front of parked vehicles."],"a":"3, 4","imgs":["img_0087.jpg"],"t":"사진형"},{"n":778,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["If you intend to go straight, drive slowly and stop safely  behind the vehicle ahead as the traffic light is red.","When the light turns green, stay in your lane and safely  change lanes when there is enough distance.","If you switch to the left-turn lane and the light turns  green, quickly use the opposite lane to proceed.","When following a tractor, you can overtake it on the  right side.","When intending to make a U-turn, you may do so when  the traffic light turns red."],"a":"1, 2","imgs":["img_0088.jpg"],"t":"사진형"},{"n":779,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["The tractor has stopped, so you may honk continuously  to rush the tractor driver to proceed.","As soon as the vehicle on the opposite side passes  through, cross the centerline and overtake to the left.","Drive cautiously, anticipating that the truck on the right  may suddenly start moving while it is stopped.","If there is space on the right of the tractor, use it to  overtake.","Since the tractor moves slower than cars, maintain a  safe distance instead of aggressively attempting to  overtake."],"a":"3, 5","imgs":["img_0089.jpg"],"t":"사진형"},{"n":780,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Maintain sufficient distance from a wheelchair to aid  walking, as it is considered a pedestrian.","Once the truck in front of you has finished overtaking,  follow closely behind it to overtake.","Follow closely behind the truck, as you cannot see the  situation ahead.","Honk and request the person using a wheelchair to aid  walking to pass on the left sidewalk, as the device must  travel on the sidewalk.","Turn on the hazard lights and proceed slowly to alert  the oncoming traffic of the hazard ahead."],"a":"1, 5","imgs":["img_0090.jpg"],"t":"사진형"},{"n":781,"b":"Which of the following are the safe ways to drive  when you are trying to go straight in the given  situation? (Select TWO)","c":["Do not enter the intersection until the school bus has  departed.","Since the school bus is stopped, you should pass it on  the left.","Follow the hand signals of the school bus driver and  pass it on the left.","Enter the intersection and wait behind the school bus.","Be prepared for pedestrians who may appear behind the  oncoming truck."],"a":"1, 5","imgs":["img_0091.jpg"],"t":"사진형"},{"n":782,"b":"Which of the following are the safe ways to drive in  the given situation? (Select TWO)","c":["Quickly drive through the intersection while using  high-beam headlights to warn the bicycle rider.","Drive through the intersection at a lower speed but stay  cautious as the bicycle may enter abruptly.","Anticipate that the bicycle will stay in its lane and drive  through the intersection.","Quickly drive through the intersection while repeatedly  honking to warn the bicycle rider not to do anything  dangerous.","Because the bicycle is on the car lane, pass through  while ensuring that the bicycle has sufficient space on  the side."],"a":"2, 5","imgs":["img_0092.jpg","img_0093.jpg"],"t":"사진형"},{"n":783,"b":"Which of the following are the anticipated hazards  when driving through an intersection in the given  situation? (Select TWO)","c":["The black vehicle in lane 3 can turn right.","The white vehicle in lane 2 can make a sudden shift to  lane 1.","A jaywalking pedestrian may suddenly appear from  behind the bridge pier.","All vehicles must stop since a pedestrian may try to  cross the street at the last second.","The vehicle behind may try to overtake you."],"a":"","imgs":[],"t":"문장형"},{"n":784,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["The traffic light is green, so you can speed up and  quickly drive straight through the intersection.","Turn right from the second lane with the hazard lights  on to alert oncoming traffic.","Drive cautiously, anticipating a hazard as a vehicle on  the third lane ahead may suddenly switch to the left lane.","Since the vehicle behind you is tailgating, increase your  speed quickly to create a safe distance and swiftly pass  through the intersection.","Gradually increase your speed to pass through the  intersection  while  keeping  your  eyes  open  for  surrounding traffic."],"a":"3, 5","imgs":["img_0094.jpg","img_0095.jpg"],"t":"사진형"},{"n":785,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Accelerate quickly after the light changes to pass  through the intersection swiftly.","Turn left with your left-turn signal on, while paying  attention to other vehicles.","Accelerate sharply within the intersection and switch to  the right lane to pass through.","Consider why the white car is stopping and proceed  slowly, preparing for any hazards.","Gradually increase your speed to pass through while  checking both sides for any vehicles disobeying the  traffic signal."],"a":"4, 5","imgs":[],"t":"문장형"},{"n":786,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["To facilitate smooth traffic flow, wait ahead of the stop  line at the red light before turning left.","There is no need to pay attention to the red vehicle  turning right on the opposite side of the road as vehicles  turning left have the right of way.","Be careful as the blind spots of your car may cause you  to lose sight of the two-wheeled vehicle momentarily.","Turn left following the white traffic guide lines on the  intersection pavement.","While turning left, turn on the right-turn signal and  move directly into the third lane on the left side of the  road."],"a":"3, 4","imgs":["img_0096.jpg"],"t":"사진형"},{"n":787,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["Stay as close as possible to the car ahead to pass  through the busy intersection.","Be prepared for a vehicle in the third lane to switch to  the left lane suddenly.","Enter the intersection to maintain smooth traffic flow,  regardless of whether the vehicles ahead have stopped.","Turn on the hazard lights and safely overtake by moving  into the opposite first lane, and then continue straight  ahead.","If it appears that you may not pass through the  intersection at the green light, stop just before the stop  line."],"a":"2, 5","imgs":["img_0097.jpg"],"t":"사진형"},{"n":788,"b":"You want to turn left in the given situation. Which of  the following are the TWO most dangerous ways to  drive? (Select TWO)","c":["Turn on the hazard lights, pass through the safety zone  to enter the first lane, and turn left.","Once in the left-turn lane, stay as close as possible to  the vehicle ahead and quickly turn left.","Take caution of the vehicles behind you as you switch to  the first lane.","Switch to the first lane from the lane with white dotted  lines, and then turn left.","When switching to the left-turn lane, be mindful of the  vehicle directly in front of you."],"a":"1, 2","imgs":["img_0098.jpg"],"t":"사진형"},{"n":790,"b":"Which of the following are the safest ways to make  a U-turn in the given situation? (Select TWO)","c":["Make a U-turn within the U-turn area marked by white  dotted lines when the signal allows, starting with the car  in front of you.","There is no need to watch out for right-turning vehicles  from a left side road onto the main road.","You can make a U-turn at any time regardless of the  signal, as long as you do not obstruct traffic on the  opposite side of the road.","There is no need to yield to a car making a U-turn first  from immediately behind you.","Be sure to look before making a U-turn, as there may  be cars disobeying the traffic signal on the opposite side  of the road."],"a":"1, 5","imgs":["img_0100.jpg"],"t":"사진형"},{"n":791,"b":"You want to turn right in the given situation. Which  of the following are the safest ways to drive? (Select  TWO)","c":["Turn right while slowing down without coming to a full  stop before the intersection stop line.","Always check for pedestrians at the crosswalk with a  traffic light just before the intersection.","It is not necessary to check for vehicles going straight  from the left to the right side of the road.","Be cautious of a two-wheeled vehicle following you as  seen in the right side-view mirror.","It is not necessary to check for pedestrians at the  crosswalk with a traffic light immediately after a right  turn."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":792,"b":"Which of the following are the most dangerous  ways to turn right in the given situation? (Select TWO)","c":["Stop before the stop line and wait for the right-turn  signal to change to green.","Even after the right-turn signal turns green, keep your  eyes on the road ahead to ensure safety.","Even if the right-turn signal is red, stop temporarily and  make the turn slowly if there are no pedestrians.","There is no need to pay attention to crosswalks on the  right side of the road immediately after turning right.","Watch out for pedestrians who may suddenly run into  the crosswalk from the right sidewalk."],"a":"3, 4","imgs":["img_0101.jpg"],"t":"사진형"},{"n":793,"b":"Which of the following are the desirable ways to  drive in the given situation? (Select TWO)","c":["Slow down and keep a safe distance as the school bus  may switch to the right lane.","The school bus is slowing down, so drive safely to  overtake the bus.","Keep an eye on the electric kick scooter in lane 3 and  switch to the right lane to overtake the school bus.","Because you cannot check the front of the school bus,  stay in the lane and reduce speed to maintain a safe  distance.","Honk at the school bus driver to inform him/her that  the bus is violating the minimum speed limit."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":794,"b":"Which of the following are the biggest risk factors  when making an unprotected left turn in the given  situation? (Select TWO)","c":["There may be a vehicle coming at high speed from the  opposite second lane.","A vehicle may be stopped behind a truck in the  opposite lane, waiting to turn left.","A vehicle behind you may suddenly switch to the  second lane.","A pedestrian on the left side of the road may cross the  crosswalk.","A truck may make an unprotected left turn from the  opposite first lane."],"a":"1, 4","imgs":[],"t":"문장형"},{"n":795,"b":"Which of the following are the most dangerous  ways to drive? (Select TWO)","c":["You may collide with a car making a quick left turn in  the lane where you are driving.","You may collide with a car turning right from the road  on your right.","You may collide with a car turning right from the  opposite road.","You may collide with a car making a U-turn on the  opposite road.","You may collide with a car trying to turn right from the  third lane behind you."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":796,"b":"Which of the following descriptions regarding  right-turn traffic at a \"lane-reduced roundabout\" in  the given picture are correct? (Select TWO)","c":["Enter the roundabout and safely exit the roundabout to  the right.","Turn right while driving slowly in the rightmost lane of  the roadway without entering the roundabout.","Turning right immediately after entering a roundabout is  a \"violation of the right of way in an intersection.\"","A vehicle must come to a complete stop at the  crosswalk in the right-turn lane, regardless of whether  there are pedestrians or not.","The driver must make a large turn clockwise to turn  right after entering the roundabout."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":797,"b":"Which of the following are the safe ways to drive in  the given situation? (Select TWO)","c":["Drive slowly through the crosswalk to turn right.","Stop before the crosswalk when trying to turn right.","Slowly enter the intersection to go straight, as you have  the right of way.","Make a full stop before going straight or turning right.","Make a full stop only when you are trying to turn right."],"a":"2, 4","imgs":["img_0102.jpg"],"t":"사진형"},{"n":798,"b":"Which of the following are the safe ways to drive  when a vehicle is trying to head in the 12 o’clock  direction in the given situation? (Select TWO)","c":["Stop to yield to the passenger vehicle about to enter  the roundabout.","Turn on the left-turn signal and enter the truck apron.","Turn on the right-turn signal and drive in the 12 o’clock  direction.","If the vehicle misses the chance to get out from the  roundabout, it should circle around one more time to  exit in the right direction.","The vehicle is trying to head in the 12 o'clock direction,  so turn signals are not required."],"a":"3, 4","imgs":["img_0103.jpg"],"t":"사진형"},{"n":799,"b":"Which of the following are the safe ways to drive  when trying to turn right in the given situation?  (Select TWO)","c":["Since it is difficult to have clear visibility on the right,  come to a stop and then turn right.","Since there are no pedestrians on the crosswalk,  proceed through swiftly.","Stop before the stop line to avoid obstructing the  movement of oncoming vehicles.","Since you entered the intersection first, proceed to turn  right.","Honk to prevent pedestrians from entering the  crosswalk."],"a":"1, 3","imgs":["img_0104.jpg"],"t":"사진형"},{"n":800,"b":"You are approaching an intersection while traveling  straight from the left lane (first lane). Which of the  following are the TWO safest ways to drive?","c":["There is no traffic in the opposite direction, so overtake  the car ahead to the left side.","Slow down and approach the taxi in the first lane with a  safe distance.","Honk to stop the taxi and quickly pass to its right side.","Continue to switch to the third lane and stop.","Slow down as you approach the taxi and pedestrians if  you are switching to the second lane."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":801,"b":"The driver is driving straight ahead. Which of the  following are the TWO safest ways to drive?","c":["Accelerate to prevent the white vehicle from entering.","Drive slowly and pay attention as the white car may be  driving straight ahead.","Traffic is allowed to pass on the left side during road  maintenance, so stay on the left.","Anticipate that the white car will stop and proceed while  paying attention to the vehicles in the opposite direction.","The red car in the opposite direction may enter the  left-turn lane, so stop and observe the situation if  necessary."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":802,"b":"When driving on an urban side street, which of the  following are the two safest ways of driving?","c":["Watch out for bicycles and dogs being walked, as they  may suddenly enter the roadway.","Honk to let the cyclist know that you want to pass.","Children may suddenly come into the center of the road,  so slow down.","Increase speed to avoid the bicycle and pass by quickly.","Flash your headlights as a warning signal to the car  coming from the opposite direction."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":803,"b":"Which of the following are the safe ways to drive in  the given situation? (Select TWO)","c":["Slow down as a pedestrian may suddenly appear from  between the parked vehicles.","Drive with caution as a parked vehicle may suddenly  move.","You can ignore the marking lines in an underground  parking lot.","Drive while paying attention only to the parking space  you want.","The pillars in an underground parking lot obstruct  visibility, so continue honking while driving."],"a":"1, 2","imgs":["img_0105.jpg"],"t":"사진형"},{"n":804,"b":"You are driving straight at 30 km/h. Which of the  following are the TWO safest ways to drive?","c":["Drive through the crosswalk at no more than 30 km/h  to avoid collision with the parked cars.","Slow down as you approach and stop at the stop line  just before the crosswalk.","There are no pedestrians on the crosswalk, so proceed  at 30 km/h.","Keep driving as there are no pedestrians on the  crosswalk.","Drive slowly while paying attention to vehicles entering  the road from the right."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":805,"b":"You are about to turn left from an apartment  parking lot. Which of the following risks are NOT  what you need to prepare for? (Select TWO)","c":["Area A, which is obscured by an object and cannot be  seen","A white vehicle, which is trying to reverse","Possible collision with a recycling bag","Playing children who may possibly enter the driveway","Possible collision with a vehicle behind"],"a":"3, 5","imgs":[],"t":"문장형"},{"n":806,"b":"You are about to turn right while approaching an  intersection. Which of the following are the safest  ways to drive? (Select TWO)","c":["The child is crossing to the left, so you use the space on  the right to enter and turn right.","Watch out for vehicles entering from the opposite  direction to see if they are turning left.","Stop at the stop line just before the crosswalk and wait  for the child to complete crossing.","Accelerate through the stop line to enter the  intersection ahead of oncoming traffic.","Enter slowly and turn right at the signal with caution."],"a":"2, 3","imgs":[],"t":"문장형"},{"n":807,"b":"You are about to turn left at a T-intersection. Which  of the following are the safest ways to drive? (Select  TWO)","c":["Quickly turn left at the left-turn signal.","Stop before the crosswalk stop line.","Enter the crosswalk slowly and turn left while paying  attention to the vehicle on the left.","Turn left with a safe distance to the side of the person  on the right.","Wait for pedestrians and bicycle riders using the  crosswalk to complete crossing."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":808,"b":"Which of the following are the risks you must pay  attention to in the given situation? (Select TWO)","c":["An electric kick scooter rider may suddenly move to the  left to avoid pedestrians ahead of him/her.","Pedestrians on the right may cross to the left.","Driving slowly may cause collision with trailing cars.","You may collide with a white car coming from the  opposite direction.","An electric scooter may collide with a pedestrian at a  bus stop."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":809,"b":"Which of the following are the safe ways to drive in  the given situation? (Select TWO)","c":["Turn on the left-turn signal and headlights, and then  pass safely.","Pay attention to the signals from the cultivator operator  and pass safely.","Proceed ahead once the signals from the cultivator  operator have ended.","Ignore the hand signals of the cultivator operator and  follow behind.","Maintain sufficient safe distance from the cultivator."],"a":"4, 5","imgs":["img_0106.jpg"],"t":"사진형"},{"n":810,"b":"Which of the following are the safe ways to drive in  the given situation? (Select TWO)","c":["The entering vehicle must yield to the vehicles already  in the roundabout.","Slow down or stop the vehicle before entering the  roundabout.","Since the entering vehicle has the right of way, enter  quickly and proceed to your intended destination.","Enter the roundabout in front of vehicles already inside.","You can ignore the vehicles around you."],"a":"1, 2","imgs":["img_0107.jpg"],"t":"사진형"},{"n":811,"b":"You are entering an intersection and trying to go  straight. Which of the following are the safest ways to  drive? (Select TWO)","c":["The black car may reverse, so slow down, and be  prepared.","Be careful as the two-wheeled vehicle may change lanes  on the left of the black car.","Use the empty straight lane in the opposite direction to  go straight, and then return to your original lane.","Accelerate and pass the stopped black car in a straight  line.","Accelerate and pass the two-wheeled vehicle so that it  cannot change lanes in front of you."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":812,"b":"Which of the following are the safest ways to drive  in the given situation? (Select TWO)","c":["The black car driver uses the P space to pass quickly.","The black car driver stops behind the school bus.","The white car driver proceeds slowly while paying  attention to the school bus.","The white car driver stops before reaching the school  bus, and then proceeds slowly.","The white car driver honks continuously to indicate that  he/she is going straight."],"a":"2, 4","imgs":["img_0108.jpg"],"t":"사진형"},{"n":813,"b":"Which of the following are the TWO safest ways to  proceed at the intersection in the given picture?","c":["The driver activated the left-turn signal when he/she was  about to enter from lane A.","The driver entering from lane A immediately entered  lane a, made a turn, and proceeded north.","The driver activated the right-turn signal when he/she  was about to enter from lane B.","The driver entering from lane B immediately entered  lane b, made a turn, and then switched to lane B and  headed north.","The driver activated the left-turn signal while trying to  exit after making a turn inside."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":814,"b":"In the given situation, which of the following are  the TWO safest ways to turn right?","c":["Turn right quickly when the forward-facing green light is  on.","Come to a complete stop and check for safety before  turning right, as pedestrians may be crossing on the  right.","Stop because the dedicated right-turn signal is red.","Even if the dedicated right-turn signal is red, you may  turn right if it does not interfere with any pedestrians.","Stop at the stop line and wait until the right-turn arrow  signal turns green."],"a":"3, 5","imgs":["img_0109.jpg"],"t":"사진형"},{"n":815,"b":"Which of the following are the TWO safest ways to  turn left in the given situation?","c":["Enter the intersection quickly according to the green  signal.","Follow the vehicle in front closely.","Since the left-turn lane is congested, use the third lane  to turn left.","Do not enter the intersection, as you may obstruct  traffic by tailgating.","Slow down in advance to prevent a rear-end collision, as  there may be vehicles approaching from behind and  trying to enter the intersection."],"a":"4, 5","imgs":["img_0110.jpg"],"t":"사진형"},{"n":816,"b":"Which of the following are the TWO most likely risk  factors for a traffic accident in the given situation?","c":["Truck A attempting to back up","Pedestrian B crossing behind the truck","Vehicle C approaching from the rear","Pedestrian D walking on the sidewalk","Vehicle E attempting to turn right from the left-hand  side"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":817,"b":"Which of the following are the safe ways to drive in  the given situation? (Select TWO)","c":["It is important to enter the intersection first.","You must drive while focusing only on what is in front of  you.","You must drive with caution as the truck in lane 1 may  switch to lane 2 while entering the intersection.","Drive while paying attention to turning vehicles from the  left and vehicles entering from the right lane.","You must keep in mind that entering vehicles have the  right of way over the vehicles already in the roundabout."],"a":"3, 4","imgs":["img_0111.jpg"],"t":"사진형"},{"n":818,"b":"Which of the following are the TWO safest ways to  proceed in the given situation?","c":["Keep a lookout for a pedestrian suddenly crossing  between the vehicles waiting for the green light.","Enter the intersection quickly before the left-turn signal  changes.","Speed up to intimidate the jaywalking pedestrian.","Turn on the hazard lights and slow down to protect the  pedestrian.","Change to lane 1 suddenly to avoid a collision with the  pedestrian."],"a":"1, 4","imgs":["img_0112.jpg"],"t":"사진형"},{"n":819,"b":"You should have gone to the right, but took the wrong lane.  Which of the following are the safe ways to drive in the given  situation? (Select TWO)","c":["Enter the safety zone, turn on the hazard lights, and  then turn right.","Turn on the right-turn signal, enter the safety zone, and  then turn right.","Accelerate quickly and turn right.","Continue straight in the direction of Daegu.","Use the next interchange or junction that you see."],"a":"4, 5","imgs":[],"t":"문장형"},{"n":820,"b":"Which of the following are the TWO safest ways to  proceed in the given situation?","c":["Maintain a greater following distance than usual.","Apply the brakes very hard before entering the tunnel  to slow down in advance.","Since there is no snow inside the tunnel, accelerate  while driving through it.","Drive along the tire tracks of the vehicle in front, as  snowy roads are very slippery.","Shift to neutral to prevent skidding."],"a":"1, 4","imgs":["img_0113.jpg"],"t":"사진형"},{"n":821,"b":"You plan to make a left turn toward the Business  City and Terminal. What are the two safest ways to  proceed in the given situation?","c":["Switch to the first lane in advance to prepare for the  upcoming left turn as instructed by the navigation.","As lanes 1 and 2 go into an underpass, let the vehicle to  your rear pass, and then safely change to lane 3.","Use the SATNAV repeatedly to confirm the route.","Quickly change lanes without signaling since your  vehicle is ahead of the vehicle to your rear.","Maintain a safe distance in case the vehicle ahead of  you brakes suddenly."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":822,"b":"Which TWO are most likely to lead to an accident in  the given situation?","c":["A car driving ahead","An electric scooter suddenly turning left to enter the  road","A truck preparing to move from the right-hand side","A person working on the right-hand side of the road","A motorcycle ahead on the left-hand side"],"a":"2, 3","imgs":[],"t":"문장형"},{"n":823,"b":"Which of the following are the TWO safest ways to  proceed in the given situation?","c":["Drive close to adult pedestrians because  pedestrians-first roads apply only to children.","Maintain a safe distance from pedestrians while driving.","Honk to urge a group of pedestrians walking side by  side to walk in a single file.","Slow down or stop as needed to avoid interfering with  pedestrian traffic.","You may drive at 20 km/h or faster as long as you do  not interfere with pedestrian traffic."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":824,"b":"Which of the following are the TWO safest ways to  proceed in the given situation?","c":["Quickly switch to the third lane to avoid vehicles that  are changing lanes.","Speed up to prevent vehicles in the first lane from  merging.","Use the horn and high-beam headlights to prevent  vehicles from changing lanes.","Yield to merging vehicles by slowing down.","Slow down in advance as the braking distances are  longer on wet roads."],"a":"4, 5","imgs":["img_0114.jpg"],"t":"사진형"},{"n":825,"b":"Which TWO carry the highest risk of causing an  accident?","c":["A bicycle traveling on the right-hand side of the  sidewalk","A car waiting to turn left to enter the building","A car driving from the left-hand side of the road toward  the right","A car parked in an empty lot on the opposite side","A car reflected on a convex mirror"],"a":"1, 2","imgs":[],"t":"문장형"},{"n":826,"b":"Which of the following are the TWO most  appropriate ways to proceed in the given situation?","c":["Yield the right of way to the oncoming delivery vehicle.","Proceed as the passenger car driver has the priority.","Flash the high-beam headlights repeatedly to prevent  the other driver from proceeding.","Watch out for people getting out of parked vehicles.","Stop and wait until the oncoming driver gives way."],"a":"1, 4","imgs":["img_0115.jpg"],"t":"사진형"},{"n":827,"b":"Which of the following are the TWO safest ways to  proceed in the given situation?","c":["Step on the brakes to express objection to the sudden  change of lane of the white car in front of you.","Slow down and maintain a safe distance to allow the  white car to change lanes safely.","Switch to the 4th lane to avoid a rear-end collision.","Avoid a collision with the white car by rapidly  accelerating.","Make a sudden stop while turning the steering wheel to  the left."],"a":"2, 3","imgs":["img_0116.jpg"],"t":"사진형"},{"n":828,"b":"You are about to reenter the expressway after  taking a break at a rest area. Which of the following  are the TWO safest ways to proceed in the given  situation?","c":["Stop briefly and merge into the highway only when  there are no approaching vehicles.","Accelerate quickly and cut across directly into the first  lane.","Check your left and merge after gaining sufficient speed.","Continue driving on the shoulder.","Do not interfere with the flow of other vehicles."],"a":"3, 5","imgs":[],"t":"문장형"},{"n":829,"b":"Which of the following are the desirable ways to  drive in the given situation? (Select TWO)","c":["Switch to the first lane and proceed quickly.","Turn on the hazard lights to alert other drivers to the  presence of your vehicle.","Since the road is wet, reduce your speed and drive  slowly.","Match your speed to the speed of the vehicle in front of  you and drive while keeping an eye on it.","Switch to the road shoulder and pass the vehicles in  front."],"a":"2, 3","imgs":["img_0117.jpg"],"t":"사진형"},{"n":830,"b":"Which of the following are the TWO most  appropriate ways to proceed in the given situation?","c":["Drive as usual since there is not much snow.","Be prepared in case a truck skids and spins on the  snowy road.","Drive 10% slower than the maximum speed limit.","Turn on the hazard lights and drive slowly.","Slow down by driving in a zigzag pattern."],"a":"2, 4","imgs":[],"t":"문장형"},{"n":831,"b":"When passing through an area affected by a fire as  in the given situation, which of the following are the  TWO proper ways to proceed?","c":["Speed up and drive away quickly even if it means  exceeding the speed limit, to avoid being trapped.","Turn on the hazard lights and drive carefully due to  poor visibility ahead.","Use the radio or other sources to obtain information  about detour routes.","Set the vehicle’s air system to external circulation to get  fresh air.","Park on the shoulder and leave the road by climbing  over the right-side guardrail."],"a":"2, 3","imgs":["img_0118.jpg"],"t":"사진형"},{"n":832,"b":"Which of the following are the TWO safest ways to  proceed in the given situation?","c":["Honk at the slow-moving trailer to urge it to speed up.","Switch to the first lane to overtake the trailer ahead  safely.","Turn on the turn signal in advance when changing lanes.","Enter the first lane, which is the driving lane, and  maintain a steady speed.","Increase your speed in the first lane since there is no  speed limit."],"a":"2, 3","imgs":["img_0119.jpg"],"t":"사진형"},{"n":833,"b":"Which of the following are potential hazards in the  given situation? (Select TWO)","c":["There could be trucks parked ahead, indicating that  there is construction.","The bus in lane 2 may slow down for safety.","The bus that just switched to lane 4 may keep going.","The vehicle in lane 1 may increase speed.","A vehicle may cut in front of you."],"a":"1, 5","imgs":["img_0120.jpg"],"t":"사진형"},{"n":834,"b":"Which of the following are the safe ways to drive in  the given situation? (Select TWO)","c":["Switch to the right lane, ignoring the combination of  broken and solid white lines.","Turn on the right-turn signal to let other drivers know.","Accelerate rapidly when changing lanes to the right.","Change lanes right before the exit while slowing down.","Changing lanes is not allowed if doing so may obstruct  other vehicles."],"a":"2, 5","imgs":["img_0121.jpg"],"t":"사진형"},{"n":835,"b":"Among the vehicles driving on the expressway,  which TWO are violating the designated lane rules?","c":["A (a passenger car overtaking another vehicle)","B (a large 36-seater bus)","C (a 1-ton cargo truck)","D (a large 26-seater bus)","E (a passenger car driving normally)"],"a":"2, 3","imgs":[],"t":"문장형"},{"n":836,"b":"Which of the following are the TWO safest ways to  proceed in the given situation?","c":["Drive at a speed below 80 km/h because the road  surface is wet due to rain.","Drive carefully and remain aware that your vision may  be blocked by water splashing from a large bus on the  right when it passes through a puddle.","Turn on the hazard lights to inform the driver behind  you of your position while driving.","Switch to the first lane and continue driving, anticipating  that the vehicle ahead on the right may change lanes.","Make an emergency stop to secure safety if visibility is  suddenly blocked by splashing water from puddles."],"a":"2, 3","imgs":["img_0122.jpg"],"t":"사진형"},{"n":837,"b":"Which of the following are the TWO safest ways to  proceed in the snowy road conditions?","c":["Follow the tire tracks of the vehicle ahead when the lane  markings are not visible due to heavy snow.","Maintain a greater safe distance than usual because  braking distances shorten on snowy or icy roads.","Be prepared for chain collisions caused by slippage  accidents in tunnel entrances and exits, which are  frequent freezing zones during heavy snowfall","Reduce your speed by 20% of the speed limit on icy  roads.","Beware of a temporary loss of vision due to adaptation  to the dark after passing through the tunnel."],"a":"1, 3","imgs":[],"t":"문장형"},{"n":838,"b":"Which of the following are the TWO safest ways to  proceed in the given situation?","c":["Since there is no snow inside the tunnel, there is no  need to slow down.","The lights on the truck ahead indicate a possible  emergency outside the tunnel, so you should be  prepared.","To avoid a collision with the vehicle ahead, quickly  switch to the third lane.","Beware of a temporary loss of vision due to light  adaption when exiting the tunnel.","Be prepared in advance for sudden changes in the road  conditions between the inside and outside of the tunnel."],"a":"2, 5","imgs":[],"t":"문장형"},{"n":839,"b":"Which of the following are the desirable ways to  drive in the given situation? (Select TWO)","c":["Come to a complete stop before reaching the bicycle.","Come to a complete stop at the stop line before  reaching the crosswalk.","Since the distance to the vehicle behind is short,  accelerate to increase the distance.","Since there are no people on the crosswalk, proceed  through it as is.","Honk continuously and proceed at a low speed."],"a":"1, 2","imgs":[],"t":"문장형"},{"n":840,"b":"According to the Road Traffic Act, which of the  following best describe the road safety facility in the  given situation? (Select TWO)","c":["The speed limit is 50 km/h and it is currently enforced.","Left turn is only allowed when there is a green arrow.","The speed limit in all school zones is 50 km/h.","The sequence of a traffic signal is red, yellow, green, and  green arrow.","When the traffic light is green, you can turn left only if  there is no vehicle coming from the opposite side of the  road."],"a":"1, 5","imgs":[],"t":"문장형"},{"n":842,"b":"Which of the following are safe ways to drive in the  given situation? (Select TWO)","c":["Move into the left-hand lane past the centerline to  maintain a safe distance from the mobility aid device.","Slow down and const S=['①','②','③','④','⑤'];
const TN={"문장형": "📝 Text", "사진형": "📷 Photo", "표지판형": "🚸 Sign", "동영상형": "🎬 Video"};
const BTN_SHOW="Show Answer",BTN_HIDE="Hide Answer";
const VID_MSG="🎬 This question requires watching a video.",NOT_FOUND=" not found.",LABEL_ANS="Answer";
let cT='all',cR='all',F=Q.slice(),R=0,B=25,kwHL='';
function hlText(t){if(!kwHL)return t;const re=new RegExp('('+kwHL.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');return t.replace(re,'<span class="kw-hl">$1</span>');}
function apply(){kwHL='';F=Q.filter(q=>{let ok=true;if(cT!=='all')ok=ok&&q.t===cT;if(cR!=='all'){const[a,b]=cR.split('-').map(Number);ok=ok&&q.n>=a&&q.n<=b;}return ok;});R=0;document.getElementById('ql').innerHTML='';batch();}
function card(q){let body=kwHL?hlText(q.b):q.b;let mid='';if(q.t==='사진형'&&q.imgs.length)mid=`<div class="qb">${body}</div>`+q.imgs.map(f=>`<div class="qp"><img src="images/${f}" loading="lazy"></div>`).join('');else if(q.t==='표지판형'&&q.imgs.length)mid=`<div class="sr"><div class="sp">${q.imgs.map(f=>`<img src="images/${f}" loading="lazy">`).join('')}</div><div class="st">${body}</div></div>`;else if(q.t==='동영상형')mid=`<div class="qb">${body}</div><div class="vb">${VID_MSG}</div>`;else mid=`<div class="qb">${body}</div>`;const ch=q.c.map((c,i)=>`<div class="ci"><span class="cn">${S[i]||''}</span><span>${c}</span></div>`).join('');return `<div class="cd" id="q${q.n}"><div class="ch"><span class="qn">${q.n}</span><span class="tp ${q.t}">${TN[q.t]||q.t}</span></div>${mid}<div class="cs">${ch}</div><button class="ab" onclick="tog(this)">${BTN_SHOW}</button><div class="ax"><div class="al">${LABEL_ANS}</div><div class="av">${q.a}</div></div></div>`;}
function batch(){const l=document.getElementById('ql'),e=Math.min(R+B,F.length);let h='';for(let i=R;i<e;i++)h+=card(F[i]);l.insertAdjacentHTML('beforeend',h);R=e;document.getElementById('ct').innerHTML='<b>'+F.length+'</b> questions, <b>'+R+'</b> shown';}
function go(){const v=document.getElementById('si').value.trim();if(!v)return;const n=parseInt(v);if(!isNaN(n)&&String(n)===v){kwHL='';cT='all';cR='all';document.querySelectorAll('.tab,#rg button').forEach(b=>b.classList.remove('on'));document.querySelector('.tab[data-f="all"]').classList.add('on');document.querySelector('#rg button[data-r="all"]').classList.add('on');F=Q.slice();R=0;document.getElementById('ql').innerHTML='';const idx=F.findIndex(q=>q.n===n);if(idx<0){alert(n+NOT_FOUND);return;}while(R<=idx+3&&R<F.length)batch();const el=document.getElementById('q'+n);if(el){el.scrollIntoView({behavior:'smooth',block:'start'});el.classList.add('hl');setTimeout(()=>el.classList.remove('hl'),2500);}}else{cT='all';cR='all';document.querySelectorAll('.tab,#rg button').forEach(b=>b.classList.remove('on'));document.querySelector('.tab[data-f="all"]').classList.add('on');document.querySelector('#rg button[data-r="all"]').classList.add('on');const kw=v.toLowerCase();kwHL=v;F=Q.filter(q=>q.b&&q.b.toLowerCase().includes(kw));R=0;document.getElementById('ql').innerHTML='';if(F.length===0){document.getElementById('ct').innerHTML='No results for <b>"'+v+'"</b>';return;}batch();window.scrollTo({top:document.getElementById('ct').offsetTop,behavior:'smooth'});}}
function tog(b){const x=b.nextElementSibling;x.classList.toggle('show');b.textContent=x.classList.contains('show')?BTN_HIDE:BTN_SHOW;}
document.getElementById('tp').addEventListener('click',e=>{const b=e.target.closest('.tab');if(!b)return;document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));b.classList.add('on');cT=b.dataset.f;apply();});
document.getElementById('rg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;document.querySelectorAll('#rg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cR=b.dataset.r;apply();});
window.addEventListener('scroll',()=>{document.getElementById('tt').style.display=scrollY>400?'block':'none';if(innerHeight+scrollY>=document.body.offsetHeight-500&&R<F.length)batch();});
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')go()});
function hash(){const h=location.hash.replace('#','');if(h&&!isNaN(h)){document.getElementById('si').value=h;setTimeout(go,300);}}
batch();hash();addEventListener('hashchange',hash);
